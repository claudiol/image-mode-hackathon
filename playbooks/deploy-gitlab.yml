---
###############################################################################
# Deploy GitLab EE on the Terraform-created EC2 instance
#
# Integrations:
#
# - Terraform-generated public DNS and exportable ACM certificate
# - AWS Secrets Manager
# - Red Hat IdM LDAP over LDAPS
# - GitLab container registry
#
# Expected Terraform inventory variables:
#
#   aws_region
#   secret_prefix
#   idm_domain_name
#   idm_realm_name
#   idm_server_fqdn
#   idm_server_ip
#   gitlab_hostname
#   public_tls_fqdn
#   acm_certificate_arn
#   gitlab_registry_port
#
# Expected AWS Secrets Manager secrets:
#
#   <secret_prefix>/gitlab/root_password
#   <secret_prefix>/idm/admin_password
#
# Required GitLab EC2 IAM permissions:
#
#   acm:DescribeCertificate
#   acm:ExportCertificate
#   secretsmanager:DescribeSecret
#   secretsmanager:GetSecretValue
#
# Required collection:
#
#   ansible-galaxy collection install ansible.posix
###############################################################################

- name: Deploy GitLab with ACM TLS and Red Hat IdM authentication
  hosts: gitlab
  become: true
  gather_facts: true
  any_errors_fatal: true
  serial: 1

  environment:
    LANG: C.UTF-8
    LC_ALL: C.UTF-8
    AWS_DEFAULT_REGION: "{{ aws_region }}"

  vars:
    ###########################################################################
    # GitLab identity
    ###########################################################################

    gitlab_fqdn: >-
      {{
        gitlab_hostname
        | default(public_tls_fqdn, true)
        | default(inventory_hostname, true)
      }}

    gitlab_public_tls_fqdn: >-
      {{
        public_tls_fqdn
        | default(gitlab_fqdn, true)
      }}

    gitlab_external_url: "https://{{ gitlab_fqdn }}"

    gitlab_registry_enabled: true

    gitlab_registry_external_url: >-
      https://{{ gitlab_fqdn }}:{{ gitlab_registry_effective_port }}

    ###########################################################################
    # GitLab package
    ###########################################################################

    gitlab_package_name: "gitlab-ee"
    gitlab_package_state: "present"

    gitlab_repository_script_url: >-
      https://packages.gitlab.com/install/repositories/gitlab/gitlab-ee/script.rpm.sh

    gitlab_repository_script_path: >-
      /var/tmp/gitlab-ee-repository.sh

    # Use the Terraform/AAP value when supplied; otherwise default to 5050.
    gitlab_registry_effective_port: >-
      {{
        gitlab_registry_port
        | default(5050, true)
        | int
      }}

    ###########################################################################
    # AWS Secrets Manager
    ###########################################################################

    gitlab_root_password_secret_name: >-
      {{ secret_prefix }}/gitlab/root_password

    gitlab_idm_admin_password_secret_name: >-
      {{ secret_prefix }}/idm/admin_password

    ###########################################################################
    # ACM public certificate
    ###########################################################################

    gitlab_acm_certificate_arn: >-
      {{
        acm_certificate_arn
        | default('', true)
      }}

    gitlab_acm_certificate_minimum_validity_seconds: 1209600
    gitlab_acm_export_passphrase_bytes: 48
    gitlab_force_public_tls_install: false

    ###########################################################################
    # ACM certificate staging
    ###########################################################################

    gitlab_tls_root: "/opt/gitlab/certs"
    gitlab_tls_directory: "{{ gitlab_tls_root }}"

    gitlab_tls_certificate_path: >-
      {{ gitlab_tls_directory }}/{{ gitlab_public_tls_fqdn }}.crt

    gitlab_tls_chain_path: >-
      {{ gitlab_tls_directory }}/{{ gitlab_public_tls_fqdn }}-chain.crt

    gitlab_tls_fullchain_path: >-
      {{ gitlab_tls_directory }}/{{ gitlab_public_tls_fqdn }}-fullchain.crt

    gitlab_tls_encrypted_private_key_path: >-
      {{ gitlab_tls_directory }}/{{ gitlab_public_tls_fqdn }}-encrypted.key

    gitlab_tls_private_key_path: >-
      {{ gitlab_tls_directory }}/{{ gitlab_public_tls_fqdn }}.key

    gitlab_tls_export_json_path: >-
      {{ gitlab_tls_directory }}/acm-export.json

    gitlab_tls_passphrase_path: >-
      {{ gitlab_tls_directory }}/.acm-export-passphrase

    gitlab_tls_backup_directory: >-
      {{ gitlab_tls_directory }}/backup

    ###########################################################################
    # GitLab certificate installation
    ###########################################################################

    gitlab_ssl_directory: "/etc/gitlab/ssl"

    gitlab_ssl_certificate_path: >-
      {{ gitlab_ssl_directory }}/{{ gitlab_public_tls_fqdn }}.crt

    gitlab_ssl_private_key_path: >-
      {{ gitlab_ssl_directory }}/{{ gitlab_public_tls_fqdn }}.key

    ###########################################################################
    # Red Hat IdM LDAP
    ###########################################################################

    gitlab_ldap_label: "Red Hat IdM"
    gitlab_ldap_host: "{{ idm_server_fqdn }}"
    gitlab_ldap_port: 636
    gitlab_ldap_encryption: "simple_tls"
    gitlab_ldap_verify_certificates: true
    gitlab_ldap_timeout: 10

    gitlab_idm_base_dn: >-
      {{
        idm_domain_name
        | lower
        | split('.')
        | map('regex_replace', '^', 'dc=')
        | join(',')
      }}

    gitlab_ldap_user_base: >-
      cn=users,cn=accounts,{{ gitlab_idm_base_dn }}

    gitlab_ldap_group_base: >-
      cn=groups,cn=accounts,{{ gitlab_idm_base_dn }}

    # Lab implementation. A dedicated read-only LDAP bind account is preferable
    # for production.
    gitlab_ldap_bind_dn: >-
      uid=admin,cn=users,cn=accounts,{{ gitlab_idm_base_dn }}

    # GitLab expects the CN, not the complete group DN.
    gitlab_ldap_admin_group_cn: "idm-admins"

    # Every normal IdM person entry may authenticate.
    gitlab_ldap_user_filter: "(objectClass=person)"

    gitlab_ldap_lowercase_usernames: true
    gitlab_ldap_allow_username_or_email_login: true
    gitlab_ldap_block_auto_created_users: false


    # Complete DN for the IdM group whose members should become GitLab
    # instance administrators.
    gitlab_ldap_admin_group_dn: >-
      cn={{ gitlab_ldap_admin_group_cn }},{{ gitlab_ldap_group_base }}

    ###########################################################################
    # GitLab administrator bootstrap from IdM
    ###########################################################################

    # This is an Ansible-managed alternative to licensed LDAP Group Sync.
    gitlab_idm_admin_bootstrap_enabled: true

    # When true, fail the playbook if an IdM administrator has not yet signed
    # into GitLab and therefore does not yet have a GitLab account.
    #
    # Leave false for initial deployment. After each IdM admin signs in once,
    # rerun the playbook to promote the account.
    gitlab_idm_admin_require_existing_gitlab_accounts: false

    # Remove GitLab administrator access from existing LDAP users who are no
    # longer members of the configured IdM administrator group.
    #
    # This intentionally excludes the local GitLab root account.
    gitlab_idm_admin_reconcile_removals: true

    # LDAP provider generated from the ldap_servers key named "main".
    gitlab_ldap_provider: "ldapmain"


    gitlab_idm_ca_source_path: "/etc/ipa/ca.crt"
    gitlab_trusted_certificates_directory: "/etc/gitlab/trusted-certs"
    gitlab_idm_ca_gitlab_path: "/etc/gitlab/trusted-certs/red-hat-idm-ca.crt"

    ###########################################################################
    # Normal GitLab user defaults
    ###########################################################################

    gitlab_default_projects_limit: 10
    gitlab_default_can_create_group: false

    ###########################################################################
    # Firewall and readiness
    ###########################################################################

    gitlab_firewall_services:
      - ssh
      - http
      - https

  
    # External UI check. GitLab recommends the sign-in endpoint when checking
    # effective application availability through the public web interface.
    gitlab_health_url: "https://{{ gitlab_fqdn }}/users/sign_in"

    # Internal readiness probe. --resolve sends the request through localhost
    # while preserving the correct TLS hostname and Host header.
    gitlab_internal_readiness_url: >-

      https://{{ gitlab_fqdn }}/-/readiness

    gitlab_readiness_retries: 60
    gitlab_readiness_delay: 20

  handlers:
    - name: Reconfigure GitLab
      ansible.builtin.command:
        argv:
          - gitlab-ctl
          - reconfigure
      changed_when: true
      no_log: true

  pre_tasks:
    ###########################################################################
    # PHASE 0 | Validate deployment inputs
    ###########################################################################

    - name: PHASE 0 | Verify supported operating system
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
          - ansible_facts.distribution_major_version | int >= 8
        fail_msg: >-
          GitLab deployment requires RHEL or a compatible Red Hat-family
          operating system version 8 or later.

    - name: PHASE 0 | Validate Terraform inventory variables
      ansible.builtin.assert:
        that:
          - aws_region is defined
          - aws_region | length > 0
          - secret_prefix is defined
          - secret_prefix | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - gitlab_fqdn | length > 0
          - gitlab_public_tls_fqdn | length > 0
          - gitlab_acm_certificate_arn | length > 0
          - gitlab_acm_certificate_arn is match('^arn:aws[a-zA-Z-]*:acm:')
          - gitlab_registry_effective_port | int > 0
          - gitlab_registry_effective_port | int < 65536
          - gitlab_idm_base_dn | length > 0
          - "'\\\\1' not in gitlab_idm_base_dn"
          - gitlab_idm_base_dn is match('^dc=[^,]+(?:,dc=[^,]+)+$')
          - "'\\\\1' not in gitlab_ldap_bind_dn"
          - "'\\\\1' not in gitlab_ldap_group_base"
          - gitlab_ldap_admin_group_cn | length > 0
          - gitlab_ldap_admin_group_dn | length > 0
          - gitlab_ldap_admin_group_dn is match(
              '^cn=[^,]+,cn=groups,cn=accounts,dc=[^,]+(?:,dc=[^,]+)+$'
            )
          - gitlab_ldap_provider | length > 0
        fail_msg: >-
          The Terraform inventory must provide aws_region, secret_prefix,
          idm_domain_name, idm_server_fqdn, gitlab_hostname/public_tls_fqdn,
          and acm_certificate_arn. gitlab_registry_port is optional and
          defaults to 5050. The generated IdM LDAP distinguished names must
          also be valid.

    - name: PHASE 0 | Verify IdM hostname resolves
      ansible.builtin.command:
        argv:
          - getent
          - ahostsv4
          - "{{ gitlab_ldap_host }}"
      changed_when: false

    - name: PHASE 0 | Verify GitLab hostname resolves
      ansible.builtin.command:
        argv:
          - getent
          - ahostsv4
          - "{{ gitlab_fqdn }}"
      changed_when: false

  tasks:
    ###########################################################################
    # PHASE 1 | Install operating-system prerequisites
    ###########################################################################

    - name: PHASE 1 | Install required packages
      ansible.builtin.dnf:
        name:
          - awscli2
          - ca-certificates
          - curl
          - firewalld
          - jq
          - openldap-clients
          - openssh-server
          - openssl
          - policycoreutils-python-utils
          - postfix
          - tar
        state: present

    - name: PHASE 1 | Enable required services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - sshd
        - firewalld
        - postfix

    - name: PHASE 1 | Open GitLab firewall services
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ gitlab_firewall_services }}"

    - name: PHASE 1 | Open GitLab registry port
      ansible.posix.firewalld:
        port: "{{ gitlab_registry_effective_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      when: gitlab_registry_enabled | bool

    ###########################################################################
    # PHASE 2 | Validate AWS instance identity and retrieve secrets
    ###########################################################################

    - name: PHASE 2 | Verify GitLab EC2 instance role identity
      ansible.builtin.command:
        argv:
          - aws
          - sts
          - get-caller-identity
          - --region
          - "{{ aws_region }}"
          - --output
          - json
      register: gitlab_aws_caller_identity
      changed_when: false

    - name: PHASE 2 | Retrieve GitLab root password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ gitlab_root_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: gitlab_root_password_lookup
      changed_when: false
      no_log: true

    - name: PHASE 2 | Retrieve IdM LDAP bind password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ gitlab_idm_admin_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: gitlab_idm_admin_password_lookup
      changed_when: false
      no_log: true

    - name: PHASE 2 | Store retrieved credentials
      ansible.builtin.set_fact:
        gitlab_initial_root_password: >-
          {{ gitlab_root_password_lookup.stdout | trim }}
        gitlab_ldap_bind_password: >-
          {{ gitlab_idm_admin_password_lookup.stdout | trim }}
      no_log: true

    - name: PHASE 2 | Validate retrieved credentials
      ansible.builtin.assert:
        that:
          - gitlab_initial_root_password | length > 0
          - gitlab_initial_root_password not in ["None", "null"]
          - gitlab_ldap_bind_password | length > 0
          - gitlab_ldap_bind_password not in ["None", "null"]
        fail_msg: >-
          AWS Secrets Manager returned an empty GitLab root password or IdM
          LDAP bind password.
      no_log: true

    ###########################################################################
    # PHASE 3 | Trust and validate Red Hat IdM LDAPS
    ###########################################################################

    - name: PHASE 3 | Inspect IdM CA certificate
      ansible.builtin.stat:
        path: /etc/ipa/ca.crt
      register: gitlab_idm_ca

    - name: PHASE 3 | Require the GitLab host to be enrolled in IdM
      ansible.builtin.assert:
        that:
          - gitlab_idm_ca.stat.exists
          - gitlab_idm_ca.stat.isreg
        fail_msg: >-
          /etc/ipa/ca.crt was not found. Enroll the GitLab EC2 host into IdM
          before running this playbook.

    - name: PHASE 3 | Install IdM CA into system trust
      ansible.builtin.copy:
        src: /etc/ipa/ca.crt
        dest: /etc/pki/ca-trust/source/anchors/idm-ca.crt
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      register: gitlab_idm_ca_install

    - name: PHASE 3 | Refresh system CA trust
      ansible.builtin.command:
        argv:
          - update-ca-trust
          - extract
      when: gitlab_idm_ca_install.changed
      changed_when: true

    - name: PHASE 3 | Verify IdM LDAPS certificate
      ansible.builtin.shell: |
        set -euo pipefail

        timeout 20 openssl s_client \
          -connect {{ gitlab_ldap_host | quote }}:{{ gitlab_ldap_port }} \
          -servername {{ gitlab_ldap_host | quote }} \
          -CAfile /etc/pki/tls/certs/ca-bundle.crt \
          -verify_return_error \
          </dev/null 2>&1 |
        grep -q "Verify return code: 0"
      args:
        executable: /bin/bash
      changed_when: false

    - name: PHASE 3 | Validate generated LDAP distinguished names
      ansible.builtin.assert:
        that:
          - gitlab_idm_base_dn is match('^dc=[^,]+(?:,dc=[^,]+)+$')
          - gitlab_ldap_bind_dn is match(
            '^uid=[^,]+,cn=users,cn=accounts,dc=[^,]+(?:,dc=[^,]+)+$'
            )
          - gitlab_ldap_group_base is match(
            '^cn=groups,cn=accounts,dc=[^,]+(?:,dc=[^,]+)+$'
            )
          - "'\\\\1' not in gitlab_idm_base_dn"
          - "'\\\\1' not in gitlab_ldap_bind_dn"
          - "'\\\\1' not in gitlab_ldap_group_base"
        fail_msg: >-
          Invalid LDAP distinguished names were generated from
          idm_domain_name={{ idm_domain_name }}. Generated base DN:
          {{ gitlab_idm_base_dn }}.

    - name: PHASE 3 | Create temporary LDAP bind-password file
      ansible.builtin.tempfile:
        state: file
        path: /run
        prefix: gitlab-ldap-bind-
      register: gitlab_ldap_bind_password_file
      no_log: true

    - name: PHASE 3 | Store LDAP bind password securely
      ansible.builtin.copy:
        content: "{{ gitlab_ldap_bind_password }}"
        dest: "{{ gitlab_ldap_bind_password_file.path }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: PHASE 3 | Verify IdM administrator group exists
      block:
        - name: PHASE 3 | Query IdM administrator group
          ansible.builtin.command:
            argv:
              - ldapsearch
              - -LLL
              - -x
              - -H
              - "ldaps://{{ gitlab_ldap_host }}:{{ gitlab_ldap_port }}"
              - -D
              - "{{ gitlab_ldap_bind_dn }}"
              - -y
              - "{{ gitlab_ldap_bind_password_file.path }}"
              - -b
              - "{{ gitlab_ldap_group_base }}"
              - -s
              - sub
              - "(cn={{ gitlab_ldap_admin_group_cn }})"
              - dn
              - cn
          register: gitlab_idm_admin_group_lookup
          changed_when: false
          no_log: true

        - name: PHASE 3 | Assert IdM administrator group exists
          ansible.builtin.assert:
            that:
              - >-
                (
                  'cn=' ~ gitlab_ldap_admin_group_cn | lower
                )
                in
                (
                  gitlab_idm_admin_group_lookup.stdout | lower
                )
            fail_msg: >-
              IdM group {{ gitlab_ldap_admin_group_cn }} was not found under
              {{ gitlab_ldap_group_base }}.
      always:
        - name: PHASE 3 | Remove temporary LDAP bind-password file
          ansible.builtin.file:
            path: "{{ gitlab_ldap_bind_password_file.path }}"
            state: absent
          when:
            - gitlab_ldap_bind_password_file is defined
            - gitlab_ldap_bind_password_file.path is defined
          no_log: true

     ###########################################################################
    # PHASE 4 | Validate and export Terraform-created ACM certificate
    ###########################################################################

    - name: PHASE 4 | Describe GitLab ACM certificate
      ansible.builtin.command:
        argv:
          - aws
          - acm
          - describe-certificate
          - --certificate-arn
          - "{{ gitlab_acm_certificate_arn }}"
          - --region
          - "{{ aws_region }}"
          - --output
          - json
      register: gitlab_acm_description
      changed_when: false

    - name: PHASE 4 | Parse GitLab ACM certificate description
      ansible.builtin.set_fact:
        gitlab_acm_certificate_data: >-
          {{
            (
              gitlab_acm_description.stdout
              | from_json
            ).Certificate
          }}

    - name: PHASE 4 | Validate GitLab ACM certificate
      ansible.builtin.assert:
        that:
          - gitlab_acm_certificate_data.Status == "ISSUED"
          - >-
            gitlab_public_tls_fqdn
            in
            (
              gitlab_acm_certificate_data.SubjectAlternativeNames
              | default([])
            )
            or
            gitlab_acm_certificate_data.DomainName
            == gitlab_public_tls_fqdn
        fail_msg: >-
          ACM certificate {{ gitlab_acm_certificate_arn }} must be ISSUED and
          cover {{ gitlab_public_tls_fqdn }}.

    - name: PHASE 4 | Create GitLab TLS directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ gitlab_tls_directory }}"
          mode: "0700"
        - path: "{{ gitlab_tls_backup_directory }}"
          mode: "0700"
        - path: "{{ gitlab_ssl_directory }}"
          mode: "0700"

    - name: PHASE 4 | Remove stale ACM export artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ gitlab_tls_export_json_path }}"
        - "{{ gitlab_tls_passphrase_path }}"
        - "{{ gitlab_tls_encrypted_private_key_path }}"
        - "{{ gitlab_tls_private_key_path }}"
      no_log: true

    - name: PHASE 4 | Generate temporary ACM export passphrase
      ansible.builtin.shell: |
        set -euo pipefail
        umask 077

        openssl rand \
          -hex \
          {{ gitlab_acm_export_passphrase_bytes | int }} |
        tr -d '\n' \
          > {{ gitlab_tls_passphrase_path | quote }}

        test -s {{ gitlab_tls_passphrase_path | quote }}

        chmod 0600 {{ gitlab_tls_passphrase_path | quote }}
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: PHASE 4 | Export GitLab certificate from ACM
      ansible.builtin.command:
        argv:
          - aws
          - acm
          - export-certificate
          - --certificate-arn
          - "{{ gitlab_acm_certificate_arn }}"
          - --passphrase
          - "fileb://{{ gitlab_tls_passphrase_path }}"
          - --region
          - "{{ aws_region }}"
          - --output
          - json
      register: gitlab_acm_export
      changed_when: true
      no_log: true

    - name: PHASE 4 | Store ACM export response securely
      ansible.builtin.copy:
        content: "{{ gitlab_acm_export.stdout }}"
        dest: "{{ gitlab_tls_export_json_path }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: PHASE 4 | Validate ACM export response
      ansible.builtin.command:
        argv:
          - jq
          - -e
          - >-
            .Certificate != null
            and .Certificate != ""
            and .CertificateChain != null
            and .CertificateChain != ""
            and .PrivateKey != null
            and .PrivateKey != ""
          - "{{ gitlab_tls_export_json_path }}"
      changed_when: false
      no_log: true

    - name: PHASE 4 | Extract ACM certificate components
      ansible.builtin.shell: |
        set -euo pipefail
        umask 077

        jq -er '.Certificate' \
          {{ gitlab_tls_export_json_path | quote }} \
          > {{ gitlab_tls_certificate_path | quote }}

        jq -er '.CertificateChain' \
          {{ gitlab_tls_export_json_path | quote }} \
          > {{ gitlab_tls_chain_path | quote }}

        jq -er '.PrivateKey' \
          {{ gitlab_tls_export_json_path | quote }} \
          > {{ gitlab_tls_encrypted_private_key_path | quote }}

        chmod 0644 \
          {{ gitlab_tls_certificate_path | quote }} \
          {{ gitlab_tls_chain_path | quote }}

        chmod 0600 \
          {{ gitlab_tls_encrypted_private_key_path | quote }}
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: PHASE 4 | Inspect extracted ACM certificate
      ansible.builtin.stat:
        path: "{{ gitlab_tls_certificate_path }}"
      register: gitlab_acm_extracted_certificate

    - name: PHASE 4 | Inspect extracted ACM certificate chain
      ansible.builtin.stat:
        path: "{{ gitlab_tls_chain_path }}"
      register: gitlab_acm_extracted_certificate_chain

    - name: PHASE 4 | Inspect extracted encrypted ACM private key
      ansible.builtin.stat:
        path: "{{ gitlab_tls_encrypted_private_key_path }}"
      register: gitlab_acm_extracted_encrypted_private_key

    - name: PHASE 4 | Validate extracted ACM certificate components
      ansible.builtin.assert:
        that:
          - gitlab_acm_extracted_certificate.stat.exists
          - gitlab_acm_extracted_certificate.stat.isreg
          - gitlab_acm_extracted_certificate.stat.size | int > 0
          - gitlab_acm_extracted_certificate_chain.stat.exists
          - gitlab_acm_extracted_certificate_chain.stat.isreg
          - gitlab_acm_extracted_certificate_chain.stat.size | int > 0
          - gitlab_acm_extracted_encrypted_private_key.stat.exists
          - gitlab_acm_extracted_encrypted_private_key.stat.isreg
          - gitlab_acm_extracted_encrypted_private_key.stat.size | int > 0
        fail_msg: >-
          ACM export did not return a usable certificate, certificate chain,
          and encrypted private key for {{ gitlab_acm_certificate_arn }}.

    - name: PHASE 4 | Validate exported certificate PEM format
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_tls_certificate_path }}"
          - -noout
      changed_when: false

    - name: PHASE 4 | Decrypt ACM private key
      ansible.builtin.command:
        argv:
          - openssl
          - pkey
          - -in
          - "{{ gitlab_tls_encrypted_private_key_path }}"
          - -passin
          - "file:{{ gitlab_tls_passphrase_path }}"
          - -out
          - "{{ gitlab_tls_private_key_path }}"
      changed_when: true
      no_log: true

    - name: PHASE 4 | Validate decrypted ACM private key
      ansible.builtin.command:
        argv:
          - openssl
          - pkey
          - -in
          - "{{ gitlab_tls_private_key_path }}"
          - -check
          - -noout
      changed_when: false
      no_log: true

    - name: PHASE 4 | Set decrypted private-key permissions
      ansible.builtin.file:
        path: "{{ gitlab_tls_private_key_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: PHASE 4 | Build full certificate chain
      ansible.builtin.shell: |
        set -euo pipefail
        umask 077

        temporary_fullchain="$(mktemp)"

        cleanup() {
          rm -f "$temporary_fullchain"
        }

        trap cleanup EXIT

        cat \
          {{ gitlab_tls_certificate_path | quote }} \
          {{ gitlab_tls_chain_path | quote }} \
          > "$temporary_fullchain"

        install \
          -o root \
          -g root \
          -m 0644 \
          "$temporary_fullchain" \
          {{ gitlab_tls_fullchain_path | quote }}
      args:
        executable: /bin/bash
      changed_when: true

    - name: PHASE 4 | Validate full certificate chain file
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_tls_fullchain_path }}"
          - -noout
      changed_when: false 

    ###########################################################################
    # PHASE 5 | Validate the exported certificate and private key
    ###########################################################################

    - name: PHASE 5 | Validate certificate hostname
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_tls_certificate_path }}"
          - -noout
          - -checkhost
          - "{{ gitlab_public_tls_fqdn }}"
      changed_when: false

    - name: PHASE 5 | Validate minimum certificate lifetime
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_tls_certificate_path }}"
          - -checkend
          - "{{ gitlab_acm_certificate_minimum_validity_seconds | string }}"
          - -noout
      changed_when: false

    - name: PHASE 5 | Read certificate public-key digest
      ansible.builtin.shell: |
        set -euo pipefail

        openssl x509 \
          -in {{ gitlab_tls_certificate_path | quote }} \
          -pubkey \
          -noout |
        openssl pkey \
          -pubin \
          -outform DER |
        openssl sha256
      args:
        executable: /bin/bash
      register: gitlab_certificate_public_key_digest
      changed_when: false

    - name: PHASE 5 | Read private-key public-key digest
      ansible.builtin.shell: |
        set -euo pipefail

        openssl pkey \
          -in {{ gitlab_tls_private_key_path | quote }} \
          -pubout \
          -outform DER |
        openssl sha256
      args:
        executable: /bin/bash
      register: gitlab_private_key_public_key_digest
      changed_when: false
      no_log: true

    - name: PHASE 5 | Assert certificate and private key match
      ansible.builtin.assert:
        that:
          - >-
            gitlab_certificate_public_key_digest.stdout | trim
            ==
            gitlab_private_key_public_key_digest.stdout | trim
        fail_msg: >-
          The private key exported from ACM does not match the GitLab
          certificate.
      no_log: true

    ###########################################################################
    # PHASE 6 | Install GitLab certificate and key
    ###########################################################################

    - name: PHASE 6 | Inspect existing GitLab certificate
      ansible.builtin.stat:
        path: "{{ gitlab_ssl_certificate_path }}"
      register: gitlab_existing_ssl_certificate

    - name: PHASE 6 | Back up existing GitLab certificate
      ansible.builtin.copy:
        src: "{{ gitlab_ssl_certificate_path }}"
        dest: >-
          {{ gitlab_tls_backup_directory }}/{{
            gitlab_public_tls_fqdn
          }}-{{ ansible_date_time.iso8601_basic_short }}.crt
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      when:
        - gitlab_existing_ssl_certificate.stat.exists
        - gitlab_force_public_tls_install | bool

    - name: PHASE 6 | Inspect existing GitLab private key
      ansible.builtin.stat:
        path: "{{ gitlab_ssl_private_key_path }}"
      register: gitlab_existing_ssl_private_key

    - name: PHASE 6 | Back up existing GitLab private key
      ansible.builtin.copy:
        src: "{{ gitlab_ssl_private_key_path }}"
        dest: >-
          {{ gitlab_tls_backup_directory }}/{{
            gitlab_public_tls_fqdn
          }}-{{ ansible_date_time.iso8601_basic_short }}.key
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      when:
        - gitlab_existing_ssl_private_key.stat.exists
        - gitlab_force_public_tls_install | bool
      no_log: true

    - name: PHASE 6 | Install GitLab full-chain certificate
      ansible.builtin.copy:
        src: "{{ gitlab_tls_fullchain_path }}"
        dest: "{{ gitlab_ssl_certificate_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      notify: Reconfigure GitLab

    - name: PHASE 6 | Install GitLab private key
      ansible.builtin.copy:
        src: "{{ gitlab_tls_private_key_path }}"
        dest: "{{ gitlab_ssl_private_key_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Reconfigure GitLab

    - name: PHASE 6 | Remove temporary ACM export artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ gitlab_tls_export_json_path }}"
        - "{{ gitlab_tls_passphrase_path }}"
        - "{{ gitlab_tls_encrypted_private_key_path }}"
      no_log: true

    ###########################################################################
    # PHASE 7 | Configure GitLab package repository
    ###########################################################################

    - name: PHASE 7 | Download official GitLab repository installer
      ansible.builtin.command:
        argv:
          - curl
          - --fail
          - --silent
          - --show-error
          - --location
          - --retry
          - "5"
          - --retry-delay
          - "5"
          - --retry-all-errors
          - --connect-timeout
          - "20"
          - --max-time
          - "300"
          - --output
          - "{{ gitlab_repository_script_path }}"
          - "{{ gitlab_repository_script_url }}"
      register: gitlab_repository_script_download
      changed_when: true

    - name: PHASE 7 | Set GitLab repository installer permissions
      ansible.builtin.file:
        path: "{{ gitlab_repository_script_path }}"
        owner: root
        group: root
        mode: "0700"

    - name: PHASE 7 | Validate GitLab repository installer
      ansible.builtin.command:
        argv:
          - /bin/bash
          - -n
          - "{{ gitlab_repository_script_path }}"
      changed_when: false

    - name: PHASE 7 | Check whether GitLab repository is configured
      ansible.builtin.stat:
        path: /etc/yum.repos.d/gitlab_gitlab-ee.repo
      register: gitlab_repository_file

    - name: PHASE 7 | Configure GitLab package repository
      ansible.builtin.command:
        argv:
          - "{{ gitlab_repository_script_path }}"
      when: not gitlab_repository_file.stat.exists
      changed_when: true

    - name: PHASE 7 | Verify GitLab repository file was created
      ansible.builtin.stat:
        path: /etc/yum.repos.d/gitlab_gitlab-ee.repo
      register: gitlab_repository_file_after_configuration

    - name: PHASE 7 | Assert GitLab repository is configured
      ansible.builtin.assert:
        that:
          - gitlab_repository_file_after_configuration.stat.exists
          - gitlab_repository_file_after_configuration.stat.isreg
        fail_msg: >-
          The GitLab repository installer completed, but
          /etc/yum.repos.d/gitlab_gitlab-ee.repo was not created.

    ###########################################################################
    # PHASE 8 | Install GitLab
    ###########################################################################

    - name: PHASE 8 | Start GitLab EE package installation
      ansible.builtin.dnf:
        name: "{{ gitlab_package_name }}"
        state: "{{ gitlab_package_state }}"
      environment:
        EXTERNAL_URL: "{{ gitlab_external_url }}"
        GITLAB_ROOT_PASSWORD: "{{ gitlab_initial_root_password }}"
      async: 3600
      poll: 0
      register: gitlab_package_install_job
      no_log: true

    - name: PHASE 8 | Wait for GitLab EE package installation
      ansible.builtin.async_status:
        jid: "{{ gitlab_package_install_job.ansible_job_id }}"
      register: gitlab_package_install
      until: gitlab_package_install.finished
      retries: 180
      delay: 20
      no_log: true

    ###########################################################################
    # PHASE 9 | Configure GitLab, registry, TLS, and IdM LDAP
    ###########################################################################

    ###########################################################################
    # PHASE 9 | Normalize IdM CA and GitLab trust paths
    ###########################################################################

    - name: PHASE 9 | Normalize GitLab IdM CA paths
      ansible.builtin.set_fact:
        gitlab_idm_ca_source_path_normalized: >-
          {{ gitlab_idm_ca_source_path | trim }}
        gitlab_trusted_certificates_directory_normalized: >-
          {{ gitlab_trusted_certificates_directory | trim }}
        gitlab_idm_ca_gitlab_path_normalized: >-
          {{ gitlab_idm_ca_gitlab_path | trim }}

    - name: PHASE 9 | Validate normalized GitLab IdM CA paths
      ansible.builtin.assert:
        that:
          - gitlab_idm_ca_source_path_normalized | length > 0
          - gitlab_trusted_certificates_directory_normalized | length > 0
          - gitlab_idm_ca_gitlab_path_normalized | length > 0
          - gitlab_idm_ca_source_path_normalized.startswith('/')
          - gitlab_trusted_certificates_directory_normalized.startswith('/')
          - gitlab_idm_ca_gitlab_path_normalized.startswith('/')
          - >-
            gitlab_idm_ca_gitlab_path_normalized
            ==
            (
              gitlab_trusted_certificates_directory_normalized
              ~ '/red-hat-idm-ca.crt'
            )
        fail_msg: >-
          The GitLab IdM CA paths are invalid. Expected an absolute source
          path, an absolute trusted-certificates directory, and an installed
          CA path ending in /red-hat-idm-ca.crt.

    ###########################################################################
    # PHASE 9 | Install Red Hat IdM CA into GitLab embedded trust
    ###########################################################################

    - name: PHASE 9 | Inspect IdM CA source certificate
      ansible.builtin.stat:
        path: "{{ gitlab_idm_ca_source_path_normalized }}"
      register: gitlab_idm_ca_source

    - name: PHASE 9 | Require IdM CA source certificate
      ansible.builtin.assert:
        that:
          - gitlab_idm_ca_source.stat.exists
          - gitlab_idm_ca_source.stat.isreg
          - gitlab_idm_ca_source.stat.size | int > 0
        fail_msg: >-
          The Red Hat IdM CA certificate was not found at
          {{ gitlab_idm_ca_source_path_normalized }}. The GitLab host must be
          enrolled in IdM before LDAP over LDAPS can be configured.

    - name: PHASE 9 | Validate IdM CA source certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_idm_ca_source_path_normalized }}"
          - -noout
          - -subject
          - -issuer
      register: gitlab_idm_ca_source_validation
      changed_when: false

    - name: PHASE 9 | Create GitLab configuration directory
      ansible.builtin.file:
        path: /etc/gitlab
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: PHASE 9 | Create GitLab trusted certificates directory
      ansible.builtin.file:
        path: "{{ gitlab_trusted_certificates_directory_normalized }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      register: gitlab_trusted_certificates_directory_creation

    - name: PHASE 9 | Inspect GitLab trusted certificates directory
      ansible.builtin.stat:
        path: "{{ gitlab_trusted_certificates_directory_normalized }}"
      register: gitlab_trusted_certificates_directory_status

    - name: PHASE 9 | Assert GitLab trusted certificates directory exists
      ansible.builtin.assert:
        that:
          - gitlab_trusted_certificates_directory_status.stat.exists
          - gitlab_trusted_certificates_directory_status.stat.isdir
          - gitlab_trusted_certificates_directory_status.stat.pw_name == "root"
          - gitlab_trusted_certificates_directory_status.stat.gr_name == "root"
          - gitlab_trusted_certificates_directory_status.stat.mode == "0755"
        fail_msg: >-
          GitLab trusted certificate directory
          {{ gitlab_trusted_certificates_directory_normalized }} was not
          created successfully with root:root ownership and mode 0755.

    - name: PHASE 9 | Install IdM CA into GitLab trusted certificates
      ansible.builtin.copy:
        src: "{{ gitlab_idm_ca_source_path_normalized }}"
        dest: "{{ gitlab_idm_ca_gitlab_path_normalized }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      register: gitlab_idm_ca_gitlab_install
      notify: Reconfigure GitLab

    - name: PHASE 9 | Inspect installed GitLab IdM CA certificate
      ansible.builtin.stat:
        path: "{{ gitlab_idm_ca_gitlab_path_normalized }}"
      register: gitlab_idm_ca_gitlab_status

    - name: PHASE 9 | Assert installed GitLab IdM CA certificate exists
      ansible.builtin.assert:
        that:
          - gitlab_idm_ca_gitlab_status.stat.exists
          - gitlab_idm_ca_gitlab_status.stat.isreg
          - gitlab_idm_ca_gitlab_status.stat.size | int > 0
        fail_msg: >-
          The Red Hat IdM CA certificate was not installed successfully at
          {{ gitlab_idm_ca_gitlab_path_normalized }}.

    - name: PHASE 9 | Validate installed GitLab IdM CA certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ gitlab_idm_ca_gitlab_path_normalized }}"
          - -noout
          - -subject
          - -issuer
      changed_when: false

    ###########################################################################
    # PHASE 9 | Render GitLab configuration
    ###########################################################################

    - name: PHASE 9 | Render GitLab configuration
      ansible.builtin.copy:
        dest: /etc/gitlab/gitlab.rb
        owner: root
        group: root
        mode: "0600"
        backup: true
        content: |
          ############################################################################
          # Managed by Ansible
          ############################################################################

          external_url {{ gitlab_external_url | to_json }}

          ############################################################################
          # HTTPS
          ############################################################################

          letsencrypt['enable'] = false

          nginx['redirect_http_to_https'] = true
          nginx['ssl_certificate'] = {{ gitlab_ssl_certificate_path | to_json }}
          nginx['ssl_certificate_key'] = {{ gitlab_ssl_private_key_path | to_json }}

          ############################################################################
          # Normal user defaults
          ############################################################################

          gitlab_rails['gitlab_default_projects_limit'] = {{ gitlab_default_projects_limit | int }}
          gitlab_rails['gitlab_default_can_create_group'] = {{ gitlab_default_can_create_group | bool | lower }}

          ############################################################################
          # Red Hat IdM LDAP
          #
          # LDAP authentication and just-in-time account creation are enabled.
          # IdM administrator promotion is handled separately by PHASE 10.
          #
          # The IdM CA is installed in /etc/gitlab/trusted-certs and supplied
          # explicitly through tls_options.ca_file.
          #
          # Do not configure admin_group or run gitlab:ldap:group_sync unless
          # this GitLab instance has an active license supporting LDAP Group
          # Sync.
          ############################################################################

          gitlab_rails['ldap_enabled'] = true
          gitlab_rails['prevent_ldap_sign_in'] = false

          gitlab_rails['ldap_servers'] = {
            'main' => {
              'label' => {{ gitlab_ldap_label | to_json }},
              'host' => {{ gitlab_ldap_host | to_json }},
              'port' => {{ gitlab_ldap_port | int }},
              'uid' => 'uid',

              'bind_dn' => {{ gitlab_ldap_bind_dn | to_json }},
              'password' => {{ gitlab_ldap_bind_password | to_json }},

              'encryption' => {{ gitlab_ldap_encryption | to_json }},
              'verify_certificates' => {{ gitlab_ldap_verify_certificates | bool | lower }},
              'timeout' => {{ gitlab_ldap_timeout | int }},

              'tls_options' => {
                'ca_file' => {{ gitlab_idm_ca_gitlab_path_normalized | to_json }}
              },

              'active_directory' => false,
              'allow_username_or_email_login' => {{ gitlab_ldap_allow_username_or_email_login | bool | lower }},
              'lowercase_usernames' => {{ gitlab_ldap_lowercase_usernames | bool | lower }},
              'block_auto_created_users' => {{ gitlab_ldap_block_auto_created_users | bool | lower }},

              'base' => {{ gitlab_ldap_user_base | to_json }},
              'user_filter' => {{ gitlab_ldap_user_filter | to_json }},

              'attributes' => {
                'username' => ['uid'],
                'email' => ['mail'],
                'name' => 'cn',
                'first_name' => 'givenName',
                'last_name' => 'sn'
              }
            }
          }

          ############################################################################
          # LDAP account provisioning
          #
          # IdM users matching the LDAP user filter may sign in. GitLab creates
          # and links the account during the user's first successful LDAP login.
          ############################################################################

          gitlab_rails['omniauth_allow_single_sign_on'] = ['ldapmain']
          gitlab_rails['omniauth_block_auto_created_users'] = false

          ############################################################################
          # GitLab container registry
          ############################################################################

          registry_external_url {{ gitlab_registry_external_url | to_json }}

          gitlab_rails['registry_enabled'] = {{ gitlab_registry_enabled | bool | lower }}

          registry_nginx['ssl_certificate'] = {{ gitlab_ssl_certificate_path | to_json }}
          registry_nginx['ssl_certificate_key'] = {{ gitlab_ssl_private_key_path | to_json }}
      register: gitlab_configuration
      no_log: true
      notify: Reconfigure GitLab

    ###########################################################################
    # PHASE 9 | Apply GitLab configuration
    ###########################################################################

    - name: PHASE 9 | Apply GitLab configuration
      ansible.builtin.meta: flush_handlers

    ###########################################################################
    # PHASE 9 | Verify GitLab embedded IdM CA trust
    ###########################################################################

    - name: PHASE 9 | Verify IdM CA was added to GitLab embedded trust
      ansible.builtin.shell: |
        set -euo pipefail

        ca_hash="$(
          /opt/gitlab/embedded/bin/openssl x509 \
            -in {{ gitlab_idm_ca_gitlab_path_normalized | quote }} \
            -noout \
            -hash
        )"

        test -n "$ca_hash"

        find /opt/gitlab/embedded/ssl/certs \
          -maxdepth 1 \
          -name "${ca_hash}.*" \
          -print \
          -quit |
        grep -q .
      args:
        executable: /bin/bash
      changed_when: false

    - name: PHASE 9 | Verify IdM LDAPS with GitLab embedded OpenSSL
      ansible.builtin.shell: |
        set -euo pipefail

        timeout 30 \
          /opt/gitlab/embedded/bin/openssl s_client \
            -connect {{ gitlab_ldap_host | quote }}:{{ gitlab_ldap_port | int }} \
            -servername {{ gitlab_ldap_host | quote }} \
            -CAfile {{ gitlab_idm_ca_gitlab_path_normalized | quote }} \
            -verify_hostname {{ gitlab_ldap_host | quote }} \
            -verify_return_error \
            </dev/null 2>&1 |
        grep -q "Verify return code: 0"
      args:
        executable: /bin/bash
      changed_when: false

    ###########################################################################
    # PHASE 9 | Validate rendered GitLab configuration
    ###########################################################################

    - name: PHASE 9 | Validate rendered GitLab configuration
      ansible.builtin.command:
        argv:
          - gitlab-ctl
          - show-config
      register: gitlab_rendered_configuration
      changed_when: false
      no_log: true

    - name: PHASE 9 | Verify LDAP configuration is present
      ansible.builtin.assert:
        that:
          - >-
            'ldap_enabled'
            in
            (
              gitlab_rendered_configuration.stdout
              | default('')
            )
          - >-
            gitlab_ldap_host
            in
            (
              gitlab_rendered_configuration.stdout
              | default('')
            )
          - >-
            gitlab_idm_ca_gitlab_path_normalized
            in
            (
              gitlab_rendered_configuration.stdout
              | default('')
            )
        fail_msg: >-
          GitLab reconfiguration completed, but the rendered configuration
          does not contain the expected Red Hat IdM LDAP settings or the
          configured IdM CA file.
      no_log: true

    ###########################################################################
    # PHASE 9 | Validate GitLab LDAP connectivity
    ###########################################################################

    - name: PHASE 9 | Run GitLab LDAP connectivity check
      ansible.builtin.command:
        argv:
          - gitlab-rake
          - gitlab:ldap:check
      register: gitlab_ldap_check_after_ca_install
      changed_when: false
      no_log: true

    ###########################################################################
    # PHASE 9 | Validate configuration file security
    ###########################################################################

    - name: PHASE 9 | Verify GitLab configuration file permissions
      ansible.builtin.stat:
        path: /etc/gitlab/gitlab.rb
      register: gitlab_configuration_file

    - name: PHASE 9 | Assert GitLab configuration is protected
      ansible.builtin.assert:
        that:
          - gitlab_configuration_file.stat.exists
          - gitlab_configuration_file.stat.isreg
          - gitlab_configuration_file.stat.pw_name == "root"
          - gitlab_configuration_file.stat.gr_name == "root"
          - gitlab_configuration_file.stat.mode == "0600"
        fail_msg: >-
          /etc/gitlab/gitlab.rb must exist, be owned by root:root, and have
          mode 0600 because it contains the LDAP bind password.

    - name: PHASE 9 | Verify GitLab IdM CA file permissions
      ansible.builtin.stat:
        path: "{{ gitlab_idm_ca_gitlab_path_normalized }}"
      register: gitlab_idm_ca_gitlab_file

    - name: PHASE 9 | Assert GitLab IdM CA file is protected
      ansible.builtin.assert:
        that:
          - gitlab_idm_ca_gitlab_file.stat.exists
          - gitlab_idm_ca_gitlab_file.stat.isreg
          - gitlab_idm_ca_gitlab_file.stat.pw_name == "root"
          - gitlab_idm_ca_gitlab_file.stat.gr_name == "root"
          - gitlab_idm_ca_gitlab_file.stat.mode == "0644"
        fail_msg: >-
          {{ gitlab_idm_ca_gitlab_path_normalized }} must exist, be owned by
          root:root, and have mode 0644.
    ###########################################################################
    # PHASE 10 | Validate GitLab and bootstrap administrators from IdM
    ###########################################################################

    - name: PHASE 10 | Check GitLab service status
      ansible.builtin.command:
        argv:
          - gitlab-ctl
          - status
      register: gitlab_service_status
      changed_when: false

    - name: PHASE 10 | Run GitLab application check
      ansible.builtin.command:
        argv:
          - gitlab-rake
          - gitlab:check
          - SANITIZE=true
      register: gitlab_application_check
      changed_when: false

    - name: PHASE 10 | Run GitLab LDAP connectivity check
      ansible.builtin.command:
        argv:
          - gitlab-rake
          - gitlab:ldap:check
      register: gitlab_ldap_check
      changed_when: false
      no_log: true

    - name: PHASE 10 | Bootstrap GitLab administrators from IdM
      when: gitlab_idm_admin_bootstrap_enabled | bool
      block:
        #######################################################################
        # Query IdM administrator membership
        #######################################################################

        - name: PHASE 10 | Create temporary LDAP bind-password file
          ansible.builtin.tempfile:
            state: file
            path: /run
            prefix: gitlab-admin-bootstrap-ldap-
          register: gitlab_admin_bootstrap_password_file
          no_log: true

        - name: PHASE 10 | Store LDAP bind password securely
          ansible.builtin.copy:
            content: "{{ gitlab_ldap_bind_password }}"
            dest: "{{ gitlab_admin_bootstrap_password_file.path }}"
            owner: root
            group: root
            mode: "0600"
          no_log: true

        - name: PHASE 10 | Query IdM administrator group members
          ansible.builtin.command:
            argv:
              - ldapsearch
              - -LLL
              - -o
              - ldif-wrap=no
              - -x
              - -H
              - "ldaps://{{ gitlab_ldap_host }}:{{ gitlab_ldap_port }}"
              - -D
              - "{{ gitlab_ldap_bind_dn }}"
              - -y
              - "{{ gitlab_admin_bootstrap_password_file.path }}"
              - -b
              - "{{ gitlab_ldap_admin_group_dn }}"
              - -s
              - base
              - "(objectClass=*)"
              - cn
              - member
          register: gitlab_idm_admin_group_members
          changed_when: false
          no_log: true

        - name: PHASE 10 | Extract IdM administrator user DNs
          ansible.builtin.set_fact:
            gitlab_idm_admin_member_dns: >-
              {{
                gitlab_idm_admin_group_members.stdout_lines
                | select('match', '^member: ')
                | map('regex_replace', '^member: ', '')
                | select(
                    'match',
                    '^uid=[^,]+,cn=users,cn=accounts,'
                  )
                | list
                | unique
                | sort
              }}
          no_log: true

        - name: PHASE 10 | Extract IdM administrator usernames
          ansible.builtin.set_fact:
            gitlab_idm_admin_usernames: >-
              {{
                gitlab_idm_admin_member_dns
                | map(
                    'regex_replace',
                    '^uid=([^,]+),.*$',
                    '\1'
                  )
                | map('lower')
                | list
                | unique
                | sort
              }}
          no_log: true

        - name: PHASE 10 | Validate IdM administrator membership
          ansible.builtin.assert:
            that:
              - gitlab_idm_admin_usernames | length > 0
            fail_msg: >-
              IdM group {{ gitlab_ldap_admin_group_dn }} exists but no direct
              user members were found. Add user entries directly to the group,
              or update the membership query if the group contains only nested
              groups.

        #######################################################################
        # Promote existing GitLab LDAP users and reconcile removed members
        #######################################################################

        - name: PHASE 10 | Reconcile GitLab administrators with IdM
          ansible.builtin.command:
            argv:
              - gitlab-rails
              - runner
              - |
                require 'json'

                expected_usernames =
                  JSON.parse(ENV.fetch('IDM_ADMIN_USERNAMES_JSON'))
                      .map { |value| value.to_s.downcase }
                      .uniq
                      .sort

                ldap_provider = ENV.fetch('GITLAB_LDAP_PROVIDER')
                reconcile_removals =
                  ENV.fetch('RECONCILE_ADMIN_REMOVALS', 'false') == 'true'

                promoted = []
                already_admin = []
                pending = []
                demoted = []

                expected_usernames.each do |username|
                  user = User.find_by('lower(username) = ?', username)

                  if user.nil?
                    pending << username
                    next
                  end

                  ldap_identity = user.identities.find_by(provider: ldap_provider)

                  if ldap_identity.nil?
                    pending << username
                    next
                  end

                  if user.admin?
                    already_admin << username
                  else
                    user.admin = true
                    user.save!
                    promoted << username
                  end
                end

                if reconcile_removals
                  User
                    .joins(:identities)
                    .where(identities: { provider: ldap_provider })
                    .where(admin: true)
                    .where.not(username: expected_usernames)
                    .find_each do |user|
                      next if user.username == 'root'

                      user.admin = false
                      user.save!
                      demoted << user.username
                    end
                end

                result = {
                  expected: expected_usernames,
                  promoted: promoted.sort,
                  already_admin: already_admin.sort,
                  pending_first_login: pending.sort,
                  demoted: demoted.sort
                }

                puts "GITLAB_IDM_ADMIN_RESULT=#{JSON.generate(result)}"
          environment:
            IDM_ADMIN_USERNAMES_JSON: >-
              {{ gitlab_idm_admin_usernames | to_json }}
            GITLAB_LDAP_PROVIDER: "{{ gitlab_ldap_provider }}"
            RECONCILE_ADMIN_REMOVALS: >-
              {{ gitlab_idm_admin_reconcile_removals | bool | lower }}
          register: gitlab_idm_admin_reconciliation
          changed_when: >-
            (
              gitlab_idm_admin_reconciliation.stdout
              | regex_search(
                  '"promoted":\s*\[(?!\])'
                )
            )
            is not none
            or
            (
              gitlab_idm_admin_reconciliation.stdout
              | regex_search(
                  '"demoted":\s*\[(?!\])'
                )
            )
            is not none

        - name: PHASE 10 | Extract GitLab IdM administrator result
          ansible.builtin.set_fact:
            gitlab_idm_admin_result: >-
              {{
                (
                  gitlab_idm_admin_reconciliation.stdout_lines
                  | select(
                      'match',
                      '^GITLAB_IDM_ADMIN_RESULT='
                    )
                  | map(
                      'regex_replace',
                      '^GITLAB_IDM_ADMIN_RESULT=',
                      ''
                    )
                  | first
                )
                | from_json
              }}

        - name: PHASE 10 | Validate GitLab administrator reconciliation result
          ansible.builtin.assert:
            that:
              - gitlab_idm_admin_result.expected is defined
              - gitlab_idm_admin_result.promoted is defined
              - gitlab_idm_admin_result.already_admin is defined
              - gitlab_idm_admin_result.pending_first_login is defined
              - gitlab_idm_admin_result.demoted is defined
            fail_msg: >-
              GitLab administrator reconciliation did not return the expected
              structured result.

        - name: PHASE 10 | Report IdM administrators awaiting first login
          ansible.builtin.debug:
            msg:
              - >-
                The following IdM administrators do not yet have a linked
                GitLab LDAP account:
                {{
                  gitlab_idm_admin_result.pending_first_login
                  | join(', ')
                }}
              - >-
                Each pending user must sign in to
                {{ gitlab_external_url }} once using Red Hat IdM credentials.
              - >-
                Rerun this playbook after first login to grant GitLab
                administrator access.
          when:
            - gitlab_idm_admin_result.pending_first_login | length > 0

        - name: PHASE 10 | Require GitLab accounts for all IdM administrators
          ansible.builtin.assert:
            that:
              - gitlab_idm_admin_result.pending_first_login | length == 0
            fail_msg: >-
              One or more IdM administrators have not signed in to GitLab:
              {{
                gitlab_idm_admin_result.pending_first_login
                | join(', ')
              }}. They must sign in once through LDAP before this playbook can
              promote their linked GitLab accounts.
          when:
            - gitlab_idm_admin_require_existing_gitlab_accounts | bool

        - name: PHASE 10 | Verify expected GitLab administrators
          ansible.builtin.command:
            argv:
              - gitlab-rails
              - runner
              - |
                require 'json'

                expected =
                  JSON.parse(ENV.fetch('IDM_ADMIN_USERNAMES_JSON'))
                      .map { |value| value.to_s.downcase }
                      .uniq
                      .sort

                verified = []
                missing = []

                expected.each do |username|
                  user = User.find_by('lower(username) = ?', username)

                  if user&.admin?
                    verified << username
                  else
                    missing << username
                  end
                end

                puts(
                  "GITLAB_IDM_ADMIN_VERIFICATION=" +
                  JSON.generate(
                    {
                      verified: verified.sort,
                      missing_or_not_admin: missing.sort
                    }
                  )
                )
          environment:
            IDM_ADMIN_USERNAMES_JSON: >-
              {{ gitlab_idm_admin_usernames | to_json }}
          register: gitlab_idm_admin_verification_command
          changed_when: false

        - name: PHASE 10 | Extract GitLab administrator verification
          ansible.builtin.set_fact:
            gitlab_idm_admin_verification: >-
              {{
                (
                  gitlab_idm_admin_verification_command.stdout_lines
                  | select(
                      'match',
                      '^GITLAB_IDM_ADMIN_VERIFICATION='
                    )
                  | map(
                      'regex_replace',
                      '^GITLAB_IDM_ADMIN_VERIFICATION=',
                      ''
                    )
                  | first
                )
                | from_json
              }}

        - name: PHASE 10 | Report GitLab administrator bootstrap
          ansible.builtin.debug:
            msg:
              - >-
                IdM administrator group:
                {{ gitlab_ldap_admin_group_dn }}
              - >-
                Expected IdM administrators:
                {{
                  gitlab_idm_admin_result.expected
                  | join(', ')
                }}
              - >-
                Promoted during this run:
                {{
                  gitlab_idm_admin_result.promoted
                  | default([])
                  | join(', ')
                  | default('none', true)
                }}
              - >-
                Already GitLab administrators:
                {{
                  gitlab_idm_admin_result.already_admin
                  | default([])
                  | join(', ')
                  | default('none', true)
                }}
              - >-
                Awaiting first LDAP login:
                {{
                  gitlab_idm_admin_result.pending_first_login
                  | default([])
                  | join(', ')
                  | default('none', true)
                }}
              - >-
                Administrator access removed:
                {{
                  gitlab_idm_admin_result.demoted
                  | default([])
                  | join(', ')
                  | default('none', true)
                }}
              - >-
                Verified GitLab administrators:
                {{
                  gitlab_idm_admin_verification.verified
                  | default([])
                  | join(', ')
                  | default('none', true)
                }}

      always:
        - name: PHASE 10 | Remove temporary LDAP bind-password file
          ansible.builtin.file:
            path: "{{ gitlab_admin_bootstrap_password_file.path }}"
            state: absent
          when:
            - gitlab_admin_bootstrap_password_file is defined
            - gitlab_admin_bootstrap_password_file.path is defined
          no_log: true

    - name: PHASE 10 | Report disabled IdM administrator bootstrap
      ansible.builtin.debug:
        msg: >-
          GitLab administrator bootstrap from IdM is disabled by
          gitlab_idm_admin_bootstrap_enabled=false.
      when: not gitlab_idm_admin_bootstrap_enabled | bool

    ###########################################################################
    # PHASE 11 | Validate public endpoints
    ###########################################################################

    - name: PHASE 11 | Wait for GitLab HTTPS endpoint
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --location
          - --output
          - /dev/null
          - --write-out
          - "%{http_code}"
          - --connect-timeout
          - "10"
          - --max-time
          - "30"
          - "{{ gitlab_health_url }}"
      register: gitlab_https_health
      retries: "{{ gitlab_readiness_retries }}"
      delay: "{{ gitlab_readiness_delay }}"
      until:
        - gitlab_https_health.rc == 0
        - gitlab_https_health.stdout | trim in ["200", "302"]
      changed_when: false

    - name: PHASE 11 | Verify certificate presented by GitLab
      ansible.builtin.shell: |
        set -euo pipefail

        openssl s_client \
          -connect {{ gitlab_public_tls_fqdn | quote }}:443 \
          -servername {{ gitlab_public_tls_fqdn | quote }} \
          -verify_return_error \
          </dev/null 2>&1 |
        grep -q "Verify return code: 0"
      args:
        executable: /bin/bash
      changed_when: false

    - name: PHASE 11 | Wait for GitLab registry HTTPS endpoint
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --output
          - /dev/null
          - --write-out
          - "%{http_code}"
          - --connect-timeout
          - "10"
          - --max-time
          - "30"
          - "https://{{ gitlab_fqdn }}:{{ gitlab_registry_effective_port }}/v2/"
      register: gitlab_registry_health
      retries: 30
      delay: 10
      until:
        - gitlab_registry_health.rc == 0
        - gitlab_registry_health.stdout | trim in ["200", "401"]
      changed_when: false

    ###########################################################################
    # PHASE 12 | Report
    ###########################################################################

    - name: PHASE 12 | Display deployment result
      ansible.builtin.debug:
        msg:
          - "GitLab URL: {{ gitlab_external_url }}"
          - "GitLab registry: {{ gitlab_registry_external_url }}"
          - "ACM certificate: {{ gitlab_acm_certificate_arn }}"
          - "Staged certificate: {{ gitlab_tls_fullchain_path }}"
          - "Installed certificate: {{ gitlab_ssl_certificate_path }}"
          - "LDAP server: {{ gitlab_ldap_host }}:{{ gitlab_ldap_port }}"
          - "LDAP administrator group: {{ gitlab_ldap_admin_group_cn }}"
          - "Other matching IdM users receive standard GitLab accounts."
