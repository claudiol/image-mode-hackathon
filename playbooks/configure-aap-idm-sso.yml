---
- name: Configure AAP LDAP login with Red Hat IdM
  hosts: aap
  become: false
  gather_facts: false

  vars:
    aap_url: "https://{{ inventory_hostname }}"

    idm_bind_user: "aap-bind"
    idm_admin_user: "admin"
    idm_admin_group: "idm-admins"
    idm_base_dn: "{{ idm_domain_name.split('.') | map('regex_replace', '^(.*)$', 'dc=\\1') | join(',') }}"

    ldap_server_uri: "ldaps://{{ idm_server_fqdn }}:636"
    ldap_bind_dn: "uid={{ idm_bind_user }},cn=users,cn=accounts,{{ idm_base_dn }}"
    ldap_user_search_base: "cn=users,cn=accounts,{{ idm_base_dn }}"
    ldap_group_search_base: "cn=groups,cn=accounts,{{ idm_base_dn }}"
    ldap_admin_group_dn: "cn={{ idm_admin_group }},cn=groups,cn=accounts,{{ idm_base_dn }}"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - aws_region is defined
          - aws_region | length > 0
          - aws_profile is defined
          - aws_profile | length > 0
          - secret_prefix is defined
          - secret_prefix | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_base_dn is defined
          - idm_base_dn | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: "Missing aws_region, aws_profile, secret_prefix, idm_server_fqdn, idm_domain_name, idm_base_dn, or [idm] inventory group."

    - name: Read AAP gateway admin username from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/aap/gateway_admin_username"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: gateway_admin_username_result
      changed_when: false
      no_log: true

    - name: Read AAP gateway admin password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/aap/gateway_admin_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: gateway_admin_password_result
      changed_when: false
      no_log: true

    - name: Read IdM admin password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/idm/admin_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_admin_password_result
      changed_when: false
      no_log: true

    - name: Set secret facts
      ansible.builtin.set_fact:
        gateway_admin_username: "{{ gateway_admin_username_result.stdout }}"
        gateway_admin_password: "{{ gateway_admin_password_result.stdout }}"
        idm_admin_password: "{{ idm_admin_password_result.stdout }}"
      no_log: true

    - name: Generate AAP LDAP bind password for this run
      ansible.builtin.set_fact:
        aap_bind_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      no_log: true

  tasks:
    - name: Ensure AAP LDAP bind user exists in IdM and reset its password
      ansible.builtin.shell: |
        set -euo pipefail

        echo "{{ idm_admin_password }}" | kinit "{{ idm_admin_user }}"

        if ipa user-show "{{ idm_bind_user }}" >/dev/null 2>&1; then
          printf '%s\n%s\n' "{{ aap_bind_password }}" "{{ aap_bind_password }}" | ipa passwd "{{ idm_bind_user }}"
        else
          printf '%s\n%s\n' "{{ aap_bind_password }}" "{{ aap_bind_password }}" | ipa user-add "{{ idm_bind_user }}" \
            --first="AAP" \
            --last="Bind" \
            --password
        fi

        ipa user-mod "{{ idm_bind_user }}" \
          --setattr=nsaccountlock=FALSE || true

        kdestroy
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      no_log: true

    - name: Read current AAP Gateway authentication settings
      ansible.builtin.uri:
        url: "{{ aap_url }}/api/gateway/v1/settings/authentication/"
        method: GET
        user: "{{ gateway_admin_username }}"
        password: "{{ gateway_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        return_content: true
      register: current_aap_auth_settings
      no_log: false

    - name: Configure AAP Gateway LDAP authentication against IdM
      ansible.builtin.uri:
        url: "{{ aap_url }}/api/gateway/v1/settings/authentication/"
        method: PUT
        user: "{{ gateway_admin_username }}"
        password: "{{ gateway_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code:
          - 200
          - 202
        body_format: json
        body: >-
          {{
            current_aap_auth_settings.json | combine({
              "AUTH_LDAP_SERVER_URI": [ldap_server_uri],
              "AUTH_LDAP_BIND_DN": [ldap_bind_dn],
              "AUTH_LDAP_BIND_PASSWORD": [aap_bind_password],
              "AUTH_LDAP_USER_SEARCH": [
                ldap_user_search_base,
                "SCOPE_SUBTREE",
                "(uid=%(user)s)"
              ],
              "AUTH_LDAP_GROUP_SEARCH": [
                ldap_group_search_base,
                "SCOPE_SUBTREE",
                "(objectClass=ipausergroup)"
              ],
              "AUTH_LDAP_GROUP_TYPE": ["MemberDNGroupType"],
              "AUTH_LDAP_GROUP_TYPE_PARAMS": {
                "member_attr": "member",
                "name_attr": "cn"
              },
              "AUTH_LDAP_USER_ATTR_MAP": {
                "username": "uid",
                "first_name": "givenName",
                "last_name": "sn",
                "email": "mail"
              },
              "AUTH_LDAP_USER_FLAGS_BY_GROUP": {
                "is_superuser": [ldap_admin_group_dn]
              },
              "AUTH_LDAP_ORGANIZATION_MAP": {
                "Default": {
                  "users": true,
                  "admins": [ldap_admin_group_dn],
                  "remove_users": false,
                  "remove_admins": false
                }
              },
              "AUTH_LDAP_ALWAYS_UPDATE_USER": [true],
              "AUTH_LDAP_CACHE_TIMEOUT": [3600],
              "AUTH_LDAP_CONNECTION_OPTIONS": {
                "OPT_REFERRALS": 0,
                "OPT_NETWORK_TIMEOUT": 30
              }
            }, recursive=True)
          }}
      no_log: false

    - name: Confirm AAP IdM LDAP login configuration
      ansible.builtin.debug:
        msg:
          - "AAP LDAP authentication configuration completed."
          - "All IdM users under: {{ ldap_user_search_base }} can log in."
          - "IdM admin group mapped to AAP admin: {{ ldap_admin_group_dn }}"
          - "LDAP server: {{ ldap_server_uri }}"
          - "AAP bind user: {{ ldap_bind_dn }}"