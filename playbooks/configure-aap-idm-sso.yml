---
- name: Configure AAP SSO with Red Hat IdM LDAP
  hosts: aap
  become: false
  gather_facts: false

  vars:
    aap_url: "https://{{ inventory_hostname }}"

    idm_bind_user: "aap-bind"
    idm_admin_user: "admin"
    idm_admin_group: "idm-admins"

    ldap_server_uri: "ldaps://{{ idm_server_fqdn }}:636"
    ldap_bind_dn: "uid={{ idm_bind_user }},cn=users,cn=accounts,{{ idm_base_dn }}"
    ldap_user_search_base: "cn=users,cn=accounts,{{ idm_base_dn }}"
    ldap_group_search_base: "cn=groups,cn=accounts,{{ idm_base_dn }}"
    ldap_admin_group_dn: "cn={{ idm_admin_group }},cn=groups,cn=accounts,{{ idm_base_dn }}"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - aws_region is defined
          - aws_region | length > 0
          - secret_prefix is defined
          - secret_prefix | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - idm_base_dn is defined
          - idm_base_dn | length > 0
        fail_msg: "Missing aws_region, secret_prefix, idm_server_fqdn, or idm_base_dn."

    - name: Load required secrets from AWS Secrets Manager
      ansible.builtin.set_fact:
        gateway_admin_username: "{{ lookup('amazon.aws.secretsmanager_secret', secret_prefix ~ '/aap/gateway_admin_username', region=aws_region) }}"
        gateway_admin_password: "{{ lookup('amazon.aws.secretsmanager_secret', secret_prefix ~ '/aap/gateway_admin_password', region=aws_region) }}"
        idm_admin_password: "{{ lookup('amazon.aws.secretsmanager_secret', secret_prefix ~ '/idm/admin_password', region=aws_region) }}"
      no_log: true

    - name: Generate AAP LDAP bind password for this run
      ansible.builtin.set_fact:
        aap_bind_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      no_log: true

  tasks:
    - name: Ensure AAP LDAP bind user exists in IdM and reset its password
      ansible.builtin.shell: |
        set -euo pipefail

        echo "{{ idm_admin_password }}" | kinit "{{ idm_admin_user }}"

        if ipa user-show "{{ idm_bind_user }}" >/dev/null 2>&1; then
          echo "{{ aap_bind_password }}" | ipa passwd "{{ idm_bind_user }}"
        else
          echo "{{ aap_bind_password }}" | ipa user-add "{{ idm_bind_user }}" \
            --first="AAP" \
            --last="Bind" \
            --password
        fi

        kdestroy
      args:
        executable: /bin/bash
      delegate_to: "{{ idm_server_fqdn }}"
      become: true
      no_log: true

    - name: Configure AAP Gateway LDAP authentication against IdM
      ansible.builtin.uri:
        url: "{{ aap_url }}/api/gateway/v1/settings/authentication/"
        method: PATCH
        user: "{{ gateway_admin_username }}"
        password: "{{ gateway_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code:
          - 200
          - 202
        body_format: json
        body:
          AUTH_LDAP_SERVER_URI:
            - "{{ ldap_server_uri }}"

          AUTH_LDAP_BIND_DN:
            - "{{ ldap_bind_dn }}"

          AUTH_LDAP_BIND_PASSWORD:
            - "{{ aap_bind_password }}"

          AUTH_LDAP_USER_SEARCH:
            - "{{ ldap_user_search_base }}"
            - "SCOPE_SUBTREE"
            - "(uid=%(user)s)"

          AUTH_LDAP_GROUP_SEARCH:
            - "{{ ldap_group_search_base }}"
            - "SCOPE_SUBTREE"
            - "(objectClass=ipausergroup)"

          AUTH_LDAP_GROUP_TYPE:
            - "MemberDNGroupType"

          AUTH_LDAP_REQUIRE_GROUP:
            - "{{ ldap_admin_group_dn }}"

          AUTH_LDAP_USER_ATTR_MAP:
            username: "uid"
            first_name: "givenName"
            last_name: "sn"
            email: "mail"

          AUTH_LDAP_USER_FLAGS_BY_GROUP:
            is_superuser:
              - "{{ ldap_admin_group_dn }}"

          AUTH_LDAP_ORGANIZATION_MAP:
            Default:
              admins:
                - "{{ ldap_admin_group_dn }}"
              remove_admins: false
      no_log: true

    - name: Confirm AAP IdM SSO configuration
      ansible.builtin.debug:
        msg:
          - "AAP SSO configuration completed."
          - "LDAP server: {{ ldap_server_uri }}"
          - "AAP bind user: {{ ldap_bind_dn }}"
          - "AAP admins group: {{ ldap_admin_group_dn }}"