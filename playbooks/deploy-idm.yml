---
- name: Prepare and install Red Hat IdM / FreeIPA on AWS EC2 RHEL 9+
  hosts: idm
  become: true
  gather_facts: true

  vars:
    ###########################################################################
    # IdM identity settings
    ###########################################################################

    idm_short_name: "{{ inventory_hostname_short }}"

    idm_parent_domain: "{{ parent_domain_name }}"
    idm_domain: "{{ idm_domain_name }}"
    idm_realm: "{{ idm_realm_name }}"
    idm_fqdn: "{{ idm_server_fqdn }}"

    idm_forward_policy: only

    ###########################################################################
    # IdM authorization settings
    ###########################################################################

    idm_admin_group: idm-admins
    idm_sudo_rule: allow_idm_admins_all

    ###########################################################################
    # AWS Secrets Manager settings
    ###########################################################################

    idm_admin_password_secret_name: >-
      {{ secret_prefix }}/idm/admin_password

    idm_dm_password_secret_name: >-
      {{ secret_prefix }}/idm/directory_manager_password

    idm_default_user_password_secret_name: >-
      {{ secret_prefix }}/idm/default_user_password


    ###########################################################################
    # Public TLS certificate settings
    ###########################################################################

    idm_public_tls_fqdn: >-
      {{
        public_tls_fqdn
        | default(idm_fqdn, true)
      }}

    idm_acm_certificate_arn: >-
      {{
        acm_certificate_arn
        | default('', true)
      }}

    idm_tls_root: /opt/certs
    idm_tls_directory: "{{ idm_tls_root }}/idm"

    idm_tls_certificate_path: >-
      {{ idm_tls_directory }}/{{ idm_public_tls_fqdn }}.crt

    idm_tls_chain_path: >-
      {{ idm_tls_directory }}/{{ idm_public_tls_fqdn }}-chain.crt

    idm_tls_fullchain_path: >-
      {{ idm_tls_directory }}/{{ idm_public_tls_fqdn }}-fullchain.crt

    idm_tls_private_key_path: >-
      {{ idm_tls_directory }}/{{ idm_public_tls_fqdn }}.key

    idm_tls_backup_directory: >-
      {{ idm_tls_directory }}/backup

    idm_tls_local_staging_prefix: idm-acm-tls-

    # Regenerate and reinstall the certificate even when the currently
    # installed Apache certificate already matches the ACM certificate.
    idm_force_public_tls_install: false
    idm_tls_chain_parts_directory: >-

      {{ idm_tls_directory }}/chain-parts

    idm_current_http_certificate_path: >-

      {{ idm_tls_directory }}/current-http.crt

    idm_acm_certificate_minimum_validity_seconds: 1209600

    ###########################################################################
    # IdM installer controls
    ###########################################################################

    # Maximum amount of time allowed for ipa-server-install.
    idm_install_timeout_seconds: 3600

    # Ansible reports installer polling status at this interval.
    idm_install_poll_seconds: 30

    idm_install_log: /var/log/ipaserver-install.log
    idm_install_wrapper_log: /var/log/ansible-idm-install.log

    idm_install_diagnostics_log: >-
      /var/log/ansible-idm-install-diagnostics.log

    ###########################################################################
    # Minimum resource requirements
    ###########################################################################

    idm_minimum_memory_mb: 1800
    idm_minimum_root_disk_mb: 4096

    ###########################################################################
    # Firewall ports
    ###########################################################################

    required_tcp_ports:
      - 53
      - 80
      - 88
      - 389
      - 443
      - 464
      - 636

    required_udp_ports:
      - 53
      - 88
      - 123
      - 464

  pre_tasks:
    ###########################################################################
    # Validate inventory and AWS settings
    ###########################################################################

    - name: Validate required AWS lookup inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - aws_profile is defined
          - aws_profile | length > 0
        fail_msg: >-
          Missing secret_prefix, aws_region, or aws_profile from the
          generated Ansible inventory.

    ###########################################################################
    # Read IdM secrets from AWS Secrets Manager
    ###########################################################################

    - name: Read IdM admin password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ idm_admin_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_admin_secret_result
      changed_when: false
      no_log: true

    - name: Read IdM Directory Manager password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ idm_dm_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_dm_secret_result
      changed_when: false
      no_log: true

    - name: Read IdM default user password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ idm_default_user_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_default_user_password_result
      changed_when: false
      no_log: true

    - name: Set IdM password facts
      ansible.builtin.set_fact:
        idm_vault_admin_password: >-
          {{ idm_admin_secret_result.stdout | trim }}
        idm_vault_dm_password: >-
          {{ idm_dm_secret_result.stdout | trim }}
        idm_default_user_password: >-
          {{ idm_default_user_password_result.stdout | trim }}
      no_log: true

    - name: Validate required AWS secret values
      ansible.builtin.assert:
        that:
          - idm_vault_dm_password is defined
          - idm_vault_dm_password | length > 0
          - idm_vault_admin_password is defined
          - idm_vault_admin_password | length > 0
          - idm_default_user_password is defined
          - idm_default_user_password | length > 0
        fail_msg: >-
          Missing IdM values from AWS Secrets Manager. Verify that Terraform
          created the IdM secrets and stored secret versions successfully.
      no_log: true

    ###########################################################################
    # Validate Terraform-generated DNS settings
    ###########################################################################

    - name: Validate Terraform-provided DNS variables
      ansible.builtin.assert:
        that:
          - parent_domain_name is defined
          - parent_domain_name | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_realm_name is defined
          - idm_realm_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - aws_dns_resolver is defined
          - aws_dns_resolver | length > 0
          - public_tls_fqdn is defined
          - public_tls_fqdn | length > 0
          - acm_certificate_arn is defined
          - acm_certificate_arn | length > 0
        fail_msg: >-
          Missing Terraform DNS inventory variables. Check inventory.tpl and
          the variables passed to Terraform templatefile().

    - name: Validate AWS private IPv4 discovery
      ansible.builtin.assert:
        that:
          - >-
            idm_server_ip is defined
            or private_ip is defined
            or ansible_facts["default_ipv4"]["address"] is defined
        fail_msg: >-
          Could not detect the private IPv4 address for the IdM server.

    - name: Set discovered IdM network facts
      ansible.builtin.set_fact:
        idm_private_ip: >-
          {{
            idm_server_ip
            | default(
                private_ip
                | default(
                    ansible_facts["default_ipv4"]["address"],
                    true
                  ),
                true
              )
          }}
        idm_network_interface: >-
          {{ ansible_facts["default_ipv4"]["interface"] }}

    - name: Determine active NetworkManager connection name
      ansible.builtin.command:
        argv:
          - nmcli
          - -g
          - GENERAL.CONNECTION
          - device
          - show
          - "{{ idm_network_interface }}"
      register: idm_nm_connection_result
      changed_when: false

    - name: Set NetworkManager connection fact
      ansible.builtin.set_fact:
        idm_nm_connection: >-
          {{ idm_nm_connection_result.stdout | trim }}

    - name: Validate NetworkManager connection discovery
      ansible.builtin.assert:
        that:
          - idm_nm_connection | length > 0
          - idm_nm_connection != "--"
        fail_msg: >-
          Could not determine the active NetworkManager connection for
          interface {{ idm_network_interface }}.

    - name: Validate IdM DNS relationship
      ansible.builtin.assert:
        that:
          - idm_domain == "lab." ~ idm_parent_domain
          - idm_fqdn == idm_short_name ~ "." ~ idm_domain
          - idm_realm == idm_domain | upper
        fail_msg: >-
          DNS relationship mismatch detected. Expected:
          idm_fqdn={{ idm_short_name }}.{{ idm_domain }},
          idm_domain=lab.{{ idm_parent_domain }},
          idm_realm={{ idm_domain | upper }}.

    - name: Validate Terraform-provided IdM users
      ansible.builtin.assert:
        that:
          - idm_users is defined
          - idm_users | length > 0
        fail_msg: >-
          idm_users is missing. Check variables.tf, terraform.tfvars, and
          inventory.tpl.


    - name: Verify the local AWS CLI is available
      ansible.builtin.command:
        argv:
          - aws
          - --version
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify the IdM ACM certificate is issued
      ansible.builtin.command:
        argv:
          - aws
          - acm
          - describe-certificate
          - --certificate-arn
          - "{{ idm_acm_certificate_arn }}"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - Certificate.Status
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_acm_certificate_status
      changed_when: false
      failed_when: >-
        idm_acm_certificate_status.rc != 0
        or idm_acm_certificate_status.stdout | trim != 'ISSUED'


  tasks:
    ###########################################################################
    # Install operating-system prerequisites
    ###########################################################################

    - name: Ensure required IdM packages are installed
      ansible.builtin.dnf:
        name:
          - bind-utils
          - ca-certificates
          - chrony
          - firewalld
          - ipa-server
          - ipa-server-dns
          - NetworkManager
          - openssl
          - python3-libselinux
        state: present

    ###########################################################################
    # Configure hostname
    ###########################################################################

    - name: Set persistent IdM hostname
      ansible.builtin.hostname:
        name: "{{ idm_fqdn }}"

    - name: Preserve hostname across cloud-init runs
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
        content: |
          preserve_hostname: true
        owner: root
        group: root
        mode: "0644"

    - name: Remove myhostname from NSS hosts lookup
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^(hosts:\s+.*)\s+myhostname(\s*.*)$'
        replace: '\1\2'
        backup: true

    - name: Ensure IdM hostname resolves to its private AWS address
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED IDM HOSTS"
        block: |
          {{ idm_private_ip }} {{ idm_fqdn }} {{ idm_short_name }}
        owner: root
        group: root
        mode: "0644"

    ###########################################################################
    # Configure IPv6 loopback
    ###########################################################################

    - name: Ensure IPv6 is enabled
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "0"
        sysctl_file: /etc/sysctl.d/99-idm-ipv6.conf
        state: present
        reload: true
      loop:
        - net.ipv6.conf.lo.disable_ipv6
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6

    - name: Check whether IPv6 loopback address exists
      ansible.builtin.command:
        argv:
          - ip
          - -6
          - address
          - show
          - dev
          - lo
      register: idm_ipv6_loopback_status
      changed_when: false

    - name: Add IPv6 loopback address when missing
      ansible.builtin.command:
        argv:
          - ip
          - -6
          - address
          - add
          - "::1/128"
          - dev
          - lo
      when: "'inet6 ::1/128' not in idm_ipv6_loopback_status.stdout"

    ###########################################################################
    # Configure time synchronization
    ###########################################################################

    - name: Enable and start chronyd
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: Wait for chronyd to report tracking information
      ansible.builtin.command:
        argv:
          - chronyc
          - tracking
      register: idm_chrony_tracking
      changed_when: false
      retries: 10
      delay: 3
      until: idm_chrony_tracking.rc == 0

    ###########################################################################
    # Configure firewall
    ###########################################################################

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open IdM TCP ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_tcp_ports }}"

    - name: Open IdM UDP ports
      ansible.posix.firewalld:
        port: "{{ item }}/udp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_udp_ports }}"

    ###########################################################################
    # Configure pre-install DNS
    #
    # Do not configure 127.0.0.1 as DNS until IdM named is operational.
    ###########################################################################

    - name: Configure AWS resolver as pre-install DNS server
      community.general.nmcli:
        conn_name: "{{ idm_nm_connection }}"
        dns4:
          - "{{ aws_dns_resolver }}"
        dns4_ignore_auto: true
        state: present
      register: idm_preinstall_nmcli_dns

    - name: Reapply NetworkManager connection after pre-install DNS change
      ansible.builtin.command:
        argv:
          - nmcli
          - device
          - reapply
          - "{{ idm_network_interface }}"
      register: idm_preinstall_nmcli_reapply
      changed_when: idm_preinstall_nmcli_reapply.rc == 0
      when: idm_preinstall_nmcli_dns.changed

    - name: Wait for resolver configuration to settle
      ansible.builtin.pause:
        seconds: 3
      when: idm_preinstall_nmcli_dns.changed

    ###########################################################################
    # Preflight validation
    ###########################################################################

    - name: Verify configured fully qualified hostname
      ansible.builtin.command:
        argv:
          - hostname
          - --fqdn
      register: idm_hostname_check
      changed_when: false
      failed_when: >-
        idm_hostname_check.rc != 0
        or idm_hostname_check.stdout | trim != idm_fqdn

    - name: Verify IdM hostname resolves locally to private address
      ansible.builtin.command:
        argv:
          - getent
          - ahostsv4
          - "{{ idm_fqdn }}"
      register: idm_hostname_resolution
      changed_when: false
      failed_when: >-
        idm_hostname_resolution.rc != 0
        or idm_private_ip not in idm_hostname_resolution.stdout

    - name: Verify AWS DNS resolver answers UDP queries
      ansible.builtin.command:
        argv:
          - dig
          - "+time=3"
          - "+tries=1"
          - "+short"
          - "@{{ aws_dns_resolver }}"
          - amazon.com
          - A
      register: idm_aws_dns_udp_test
      changed_when: false
      retries: 3
      delay: 3
      until:
        - idm_aws_dns_udp_test.rc == 0
        - idm_aws_dns_udp_test.stdout_lines | length > 0

    - name: Verify AWS DNS resolver answers TCP queries
      ansible.builtin.command:
        argv:
          - dig
          - "+tcp"
          - "+time=3"
          - "+tries=1"
          - "+short"
          - "@{{ aws_dns_resolver }}"
          - amazon.com
          - A
      register: idm_aws_dns_tcp_test
      changed_when: false
      retries: 3
      delay: 3
      until:
        - idm_aws_dns_tcp_test.rc == 0
        - idm_aws_dns_tcp_test.stdout_lines | length > 0

    - name: Gather available root filesystem space
      ansible.builtin.command:
        argv:
          - df
          - --output=avail
          - --block-size=1M
          - /
      register: idm_root_disk_available
      changed_when: false

    - name: Set available root disk fact
      ansible.builtin.set_fact:
        idm_root_disk_available_mb: >-
          {{ idm_root_disk_available.stdout_lines[-1] | trim | int }}

    - name: Validate available memory and disk space
      ansible.builtin.assert:
        that:
          - ansible_facts.memtotal_mb | int >= idm_minimum_memory_mb
          - idm_root_disk_available_mb | int >= idm_minimum_root_disk_mb
        fail_msg: >-
          IdM resource validation failed. Required:
          memory={{ idm_minimum_memory_mb }} MB,
          root_disk={{ idm_minimum_root_disk_mb }} MB.
          Detected:
          memory={{ ansible_facts.memtotal_mb }} MB,
          root_disk={{ idm_root_disk_available_mb }} MB.

    - name: Display IdM preflight summary
      ansible.builtin.debug:
        msg:
          - "IdM preflight checks passed."
          - "Hostname: {{ idm_fqdn }}"
          - "Private IP: {{ idm_private_ip }}"
          - "Network interface: {{ idm_network_interface }}"
          - "NetworkManager connection: {{ idm_nm_connection }}"
          - "AWS DNS resolver: {{ aws_dns_resolver }}"
          - "Memory: {{ ansible_facts.memtotal_mb }} MB"
          - "Free root disk: {{ idm_root_disk_available_mb }} MB"

    ###########################################################################
    # Detect existing installation or partial installation
    ###########################################################################

    - name: Check whether IdM services are fully operational
      ansible.builtin.command:
        argv:
          - ipactl
          - status
      register: ipa_status
      failed_when: false
      changed_when: false

    - name: Check for existing IdM default configuration
      ansible.builtin.stat:
        path: /etc/ipa/default.conf
      register: ipa_default_conf

    - name: Check for existing IPA installation marker
      ansible.builtin.stat:
        path: /var/lib/ipa/sysrestore/sysrestore.state
      register: ipa_sysrestore_state

    - name: Report partial IdM installation detection
      ansible.builtin.debug:
        msg: >-
          Existing IdM configuration was found, but ipactl status failed.
          The incomplete installation will be removed before reinstalling.
      when:
        - ipa_status.rc != 0
        - >-
          ipa_default_conf.stat.exists
          or ipa_sysrestore_state.stat.exists

    - name: Remove failed partial IdM installation
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - --uninstall
          - --unattended
      async: 1200
      poll: 15
      register: ipa_partial_uninstall
      changed_when: ipa_partial_uninstall.rc == 0
      failed_when: false
      when:
        - ipa_status.rc != 0
        - >-
          ipa_default_conf.stat.exists
          or ipa_sysrestore_state.stat.exists

    - name: Remove stale IdM installation logs before clean installation
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ idm_install_wrapper_log }}"
        - "{{ idm_install_diagnostics_log }}"
      when: ipa_status.rc != 0

    ###########################################################################
    # Install IdM
    ###########################################################################

    - name: Install IdM server with integrated DNS for lab subdomain
      when: ipa_status.rc != 0
      block:
        - name: Display IdM installation start information
          ansible.builtin.debug:
            msg:
              - "Starting Red Hat IdM server installation."
              - "Hostname: {{ idm_fqdn }}"
              - "Private IP: {{ idm_private_ip }}"
              - "Domain: {{ idm_domain }}"
              - "Realm: {{ idm_realm }}"
              - "DNS forwarder: {{ aws_dns_resolver }}"
              - >-
                Installer timeout:
                {{ idm_install_timeout_seconds }} seconds
              - >-
                Ansible poll interval:
                {{ idm_install_poll_seconds }} seconds
              - "Installer log: {{ idm_install_log }}"
              - "Wrapper log: {{ idm_install_wrapper_log }}"

        - name: Run bounded IdM server installation
          ansible.builtin.shell: |
            set -o pipefail

            ipa-server-install \
              --hostname="{{ idm_fqdn }}" \
              --ip-address="{{ idm_private_ip }}" \
              --domain="{{ idm_domain }}" \
              --realm="{{ idm_realm }}" \
              --ds-password="${IDM_DM_PASSWORD}" \
              --admin-password="${IDM_ADMIN_PASSWORD}" \
              --setup-dns \
              --forwarder="{{ aws_dns_resolver }}" \
              --forward-policy="{{ idm_forward_policy }}" \
              --no-dnssec-validation \
              --no-host-dns \
              --no-reverse \
              --no-ntp \
              --unattended \
              > "{{ idm_install_wrapper_log }}" 2>&1
          args:
            executable: /bin/bash
          environment:
            IDM_DM_PASSWORD: "{{ idm_vault_dm_password }}"
            IDM_ADMIN_PASSWORD: "{{ idm_vault_admin_password }}"
          async: "{{ idm_install_timeout_seconds }}"
          poll: "{{ idm_install_poll_seconds }}"
          register: ipa_install
          changed_when: ipa_install.rc == 0
          no_log: false

        - name: Wait for IdM services to become operational
          ansible.builtin.command:
            argv:
              - ipactl
              - status
          register: ipa_post_install_status
          changed_when: false
          retries: 20
          delay: 15
          until: ipa_post_install_status.rc == 0

      rescue:
        - name: Capture IdM installation diagnostics
          ansible.builtin.shell: |
            {
              echo "============================================================"
              echo "IdM installation diagnostics"
              echo "Generated: $(date --iso-8601=seconds)"
              echo "============================================================"

              echo
              echo "HOSTNAME"
              hostnamectl || true
              hostname --fqdn || true

              echo
              echo "HOSTNAME RESOLUTION"
              getent ahostsv4 "{{ idm_fqdn }}" || true

              echo
              echo "HOSTS FILE"
              cat /etc/hosts || true

              echo
              echo "RESOLVER CONFIGURATION"
              cat /etc/resolv.conf || true
              resolvectl status || true
              nmcli device show "{{ idm_network_interface }}" || true

              echo
              echo "AWS RESOLVER UDP TEST"
              dig +time=3 +tries=1 \
                "@{{ aws_dns_resolver }}" amazon.com A || true

              echo
              echo "AWS RESOLVER TCP TEST"
              dig +tcp +time=3 +tries=1 \
                "@{{ aws_dns_resolver }}" amazon.com A || true

              echo
              echo "IDM DOMAIN LOOKUP"
              dig +time=3 +tries=1 \
                "@{{ aws_dns_resolver }}" "{{ idm_domain }}" SOA || true

              echo
              echo "SYSTEM TIME"
              timedatectl || true
              chronyc tracking || true
              chronyc sources -v || true

              echo
              echo "FILESYSTEM"
              df -h || true
              df -i || true

              echo
              echo "MEMORY"
              free -m || true

              echo
              echo "LISTENING PORTS"
              ss -lntup || true

              echo
              echo "RUNNING IPA INSTALLER PROCESSES"
              ps -ef | grep -E \
                'ipa-server-install|pkispawn|dscreate' |
                grep -v grep || true

              echo
              echo "FAILED SYSTEMD SERVICES"
              systemctl --failed --no-pager || true

              echo
              echo "IPA SERVICE STATUS"
              ipactl status || true

              echo
              echo "DIRECTORY SERVER SERVICES"
              systemctl --no-pager --full status 'dirsrv@*' || true

              echo
              echo "PKI TOMCAT STATUS"
              systemctl --no-pager --full status \
                pki-tomcatd@pki-tomcat.service || true

              echo
              echo "NAMED STATUS"
              systemctl --no-pager --full status \
                named-pkcs11.service named.service || true

              echo
              echo "WRAPPER LOG - LAST 300 LINES"
              tail -n 300 "{{ idm_install_wrapper_log }}" || true

              echo
              echo "IPA INSTALLER LOG - LAST 500 LINES"
              tail -n 500 "{{ idm_install_log }}" || true

              echo
              echo "IPA INSTALLER ERROR LOG"
              tail -n 300 /var/log/ipaserver-install.log || true

              echo
              echo "DIRECTORY SERVER JOURNAL"
              journalctl --no-pager -n 200 -u 'dirsrv@*' || true

              echo
              echo "PKI TOMCAT JOURNAL"
              journalctl --no-pager -n 200 \
                -u pki-tomcatd@pki-tomcat.service || true

              echo
              echo "NAMED JOURNAL"
              journalctl --no-pager -n 200 \
                -u named-pkcs11.service \
                -u named.service || true

              echo
              echo "RECENT SYSTEM JOURNAL"
              journalctl --no-pager -n 500 || true
            } > "{{ idm_install_diagnostics_log }}" 2>&1

            cat "{{ idm_install_diagnostics_log }}"
          args:
            executable: /bin/bash
          register: idm_install_diagnostics
          changed_when: false
          failed_when: false

        - name: Display IdM installation diagnostics
          ansible.builtin.debug:
            var: idm_install_diagnostics.stdout_lines

        - name: Stop after failed or timed-out IdM installation
          ansible.builtin.fail:
            msg: >-
              IdM installation failed or exceeded the
              {{ idm_install_timeout_seconds }}-second timeout.
              Review {{ idm_install_log }},
              {{ idm_install_wrapper_log }}, and
              {{ idm_install_diagnostics_log }} on
              {{ inventory_hostname }}.

    ###########################################################################
    # Verify installation
    ###########################################################################

    - name: Verify IdM services are running
      ansible.builtin.command:
        argv:
          - ipactl
          - status
      register: ipa_verify
      changed_when: false
      retries: 10
      delay: 15
      until: ipa_verify.rc == 0

    ###########################################################################
    # Configure post-install DNS
    #
    # IdM named is now operational, so localhost can safely become primary DNS.
    ###########################################################################

    - name: Configure local IdM DNS as primary resolver
      community.general.nmcli:
        conn_name: "{{ idm_nm_connection }}"
        dns4:
          - "127.0.0.1"
          - "{{ aws_dns_resolver }}"
        dns4_ignore_auto: true
        state: present
      register: idm_postinstall_nmcli_dns

    - name: Reapply NetworkManager connection after IdM DNS installation
      ansible.builtin.command:
        argv:
          - nmcli
          - device
          - reapply
          - "{{ idm_network_interface }}"
      register: idm_postinstall_nmcli_reapply
      changed_when: idm_postinstall_nmcli_reapply.rc == 0
      when: idm_postinstall_nmcli_dns.changed

    - name: Wait for local IdM DNS server to answer
      ansible.builtin.command:
        argv:
          - dig
          - "+time=2"
          - "+tries=1"
          - "+short"
          - "@127.0.0.1"
          - "{{ idm_fqdn }}"
          - A
      register: idm_local_dns_ready
      changed_when: false
      retries: 30
      delay: 5
      until:
        - idm_local_dns_ready.rc == 0
        - idm_private_ip in idm_local_dns_ready.stdout_lines

    ###########################################################################
    # Authenticate to IdM
    ###########################################################################

    - name: Authenticate to IdM as admin
      ansible.builtin.command:
        argv:
          - kinit
          - admin
      args:
        stdin: "{{ idm_vault_admin_password }}"
      changed_when: false
      no_log: true

    - name: Verify Kerberos credentials
      ansible.builtin.command:
        argv:
          - klist
          - -s
      changed_when: false

    ###########################################################################
    # Create DNS records for inventory hosts
    ###########################################################################

    - name: Check existing IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-show
          - "{{ idm_domain }}"
          - "{{ item.split('.')[0] }}"
      register: idm_dns_record_checks
      failed_when: false
      changed_when: false
      loop: "{{ groups['all'] }}"
      loop_control:
        label: "{{ item }}"
      when:
        - hostvars[item].private_ip is defined

    - name: Add missing IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-add
          - "{{ idm_domain }}"
          - "{{ item.item.split('.')[0] }}"
          - "--a-rec={{ hostvars[item.item].private_ip }}"
      register: idm_dns_record_add
      changed_when: idm_dns_record_add.rc == 0
      failed_when:
        - idm_dns_record_add.rc != 0
        - >-
          'already exists'
          not in (idm_dns_record_add.stderr | default(''))
        - >-
          'already exists'
          not in (idm_dns_record_add.stdout | default(''))
      loop: "{{ idm_dns_record_checks.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc != 0
        - hostvars[item.item].private_ip is defined

    - name: Update incorrect IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-mod
          - "{{ idm_domain }}"
          - "{{ item.item.split('.')[0] }}"
          - "--a-rec={{ hostvars[item.item].private_ip }}"
      register: idm_dns_record_mod
      changed_when: >-
        'Modified record'
        in (idm_dns_record_mod.stdout | default(''))
      failed_when:
        - idm_dns_record_mod.rc != 0
        - >-
          'no modifications to be performed'
          not in (idm_dns_record_mod.stderr | default(''))
        - >-
          'no modifications to be performed'
          not in (idm_dns_record_mod.stdout | default(''))
      loop: "{{ idm_dns_record_checks.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc == 0
        - hostvars[item.item].private_ip is defined
        - >-
          'A record: ' ~ hostvars[item.item].private_ip
          not in (item.stdout | default(''))

    - name: Verify IdM DNS resolves inventory hosts to private addresses
      ansible.builtin.command:
        argv:
          - dig
          - "+time=3"
          - "+tries=1"
          - "+short"
          - "@127.0.0.1"
          - "{{ item }}"
          - A
      register: idm_dns_verify
      changed_when: false
      retries: 5
      delay: 3
      until:
        - idm_dns_verify.rc == 0
        - hostvars[item].private_ip in idm_dns_verify.stdout_lines
      loop: "{{ groups['all'] }}"
      loop_control:
        label: "{{ item }}"
      when:
        - hostvars[item].private_ip is defined

    ###########################################################################
    # Create IdM administrative group
    ###########################################################################

    - name: Ensure global IdM admin group exists
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ idm_admin_group }}"
          - >-
            --desc=Global IdM administrators with sudo and IdM console access
      register: idm_admin_group_add
      changed_when: idm_admin_group_add.rc == 0
      failed_when:
        - idm_admin_group_add.rc != 0
        - >-
          'already exists'
          not in (idm_admin_group_add.stderr | default(''))
        - >-
          'already exists'
          not in (idm_admin_group_add.stdout | default(''))

    ###########################################################################
    # Create IdM users
    ###########################################################################

    - name: Ensure IdM users exist
      ansible.builtin.command:
        argv:
          - ipa
          - user-add
          - "{{ item }}"
          - "--first={{ item }}"
          - --last=User
      register: idm_user_add
      changed_when: idm_user_add.rc == 0
      failed_when:
        - idm_user_add.rc != 0
        - >-
          'already exists'
          not in (idm_user_add.stderr | default(''))
        - >-
          'already exists'
          not in (idm_user_add.stdout | default(''))
      loop: "{{ idm_users }}"
      loop_control:
        label: "{{ item }}"

    - name: Set temporary password for newly created IdM users
      ansible.builtin.command:
        argv:
          - ipa
          - passwd
          - "{{ item.item }}"
        stdin: |
          {{ idm_default_user_password }}
          {{ idm_default_user_password }}
      register: idm_user_temp_password
      no_log: true
      changed_when: idm_user_temp_password.rc == 0
      failed_when: idm_user_temp_password.rc != 0
      loop: "{{ idm_user_add.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc == 0

    ###########################################################################
    # Grant administrative membership
    ###########################################################################

    - name: Add users to global IdM admin group
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ idm_admin_group }}"
          - "--users={{ item }}"
      register: idm_group_member_add
      changed_when: >-
        'Number of members added 1'
        in (idm_group_member_add.stdout | default(''))
      failed_when:
        - idm_group_member_add.rc != 0
        - >-
          'This entry is already a member'
          not in (idm_group_member_add.stderr | default(''))
        - >-
          'This entry is already a member'
          not in (idm_group_member_add.stdout | default(''))
      loop: "{{ idm_users }}"
      loop_control:
        label: "{{ item }}"

    - name: Add global admin group to built-in IdM admins group
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - admins
          - "--groups={{ idm_admin_group }}"
      register: idm_console_admin_add
      changed_when: >-
        'Number of members added 1'
        in (idm_console_admin_add.stdout | default(''))
      failed_when:
        - idm_console_admin_add.rc != 0
        - >-
          'This entry is already a member'
          not in (idm_console_admin_add.stderr | default(''))
        - >-
          'This entry is already a member'
          not in (idm_console_admin_add.stdout | default(''))

    ###########################################################################
    # Configure IdM sudo rule
    ###########################################################################

    - name: Ensure sudo rule exists for global IdM admins
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add
          - "{{ idm_sudo_rule }}"
          - "--desc=Allow idm-admins sudo access on all hosts"
      register: idm_sudo_rule_add
      changed_when: idm_sudo_rule_add.rc == 0
      failed_when:
        - idm_sudo_rule_add.rc != 0
        - >-
          'already exists'
          not in (idm_sudo_rule_add.stderr | default(''))
        - >-
          'already exists'
          not in (idm_sudo_rule_add.stdout | default(''))

    - name: Allow sudo rule to apply to all hosts
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-mod
          - "{{ idm_sudo_rule }}"
          - --hostcat=all
      register: idm_sudo_hostcat
      changed_when: >-
        'Modified Sudo Rule'
        in (idm_sudo_hostcat.stdout | default(''))
      failed_when:
        - idm_sudo_hostcat.rc != 0
        - >-
          'no modifications to be performed'
          not in (idm_sudo_hostcat.stderr | default(''))
        - >-
          'no modifications to be performed'
          not in (idm_sudo_hostcat.stdout | default(''))

    - name: Allow sudo rule to run all commands
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-mod
          - "{{ idm_sudo_rule }}"
          - --cmdcat=all
      register: idm_sudo_cmdcat
      changed_when: >-
        'Modified Sudo Rule'
        in (idm_sudo_cmdcat.stdout | default(''))
      failed_when:
        - idm_sudo_cmdcat.rc != 0
        - >-
          'no modifications to be performed'
          not in (idm_sudo_cmdcat.stderr | default(''))
        - >-
          'no modifications to be performed'
          not in (idm_sudo_cmdcat.stdout | default(''))

    - name: Add IdM admin group to sudo rule
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ idm_sudo_rule }}"
          - "--groups={{ idm_admin_group }}"
      register: idm_sudo_group_add
      changed_when: >-
        'Number of members added 1'
        in (idm_sudo_group_add.stdout | default(''))
      failed_when:
        - idm_sudo_group_add.rc != 0
        - >-
          'This entry is already a member'
          not in (idm_sudo_group_add.stderr | default(''))
        - >-
          'This entry is already a member'
          not in (idm_sudo_group_add.stdout | default(''))

    ###########################################################################
    # Install publicly trusted TLS certificate for the IdM Web UI
    #
    # This replaces only the Apache/httpd certificate. The Directory Server
    # LDAP certificate and the integrated IdM CA remain unchanged.
    ###########################################################################

    - name: Create IdM public TLS directory
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ idm_tls_root }}"
          mode: "0755"
        - path: "{{ idm_tls_directory }}"
          mode: "0700"
        - path: "{{ idm_tls_backup_directory }}"
          mode: "0700"
        - path: "{{ idm_tls_chain_parts_directory }}"
          mode: "0700"
      loop_control:
        label: "{{ item.path }}"
    - name: Read currently installed IdM HTTP certificate
      ansible.builtin.shell: |
        set -euo pipefail

        openssl s_client \
          -connect 127.0.0.1:443 \
          -servername "{{ idm_public_tls_fqdn }}" \
          -showcerts \
          </dev/null 2>/dev/null |
          awk '
            /-----BEGIN CERTIFICATE-----/ {
              capture = 1
            }

            capture {
              print
            }

            /-----END CERTIFICATE-----/ {
              exit
            }
          '
      args:
        executable: /bin/bash
      register: idm_current_http_certificate_pem
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Write currently installed IdM HTTP certificate
      ansible.builtin.copy:
        content: |
          {{ idm_current_http_certificate_pem.stdout | trim }}
        dest: "{{ idm_current_http_certificate_path }}"
        owner: root
        group: root
        mode: "0644"
      when:
        - idm_current_http_certificate_pem.stdout | default('') | length > 0

    - name: Read currently installed IdM HTTP certificate fingerprint
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ idm_current_http_certificate_path }}"
          - -noout
          - -fingerprint
          - -sha256
      register: idm_current_http_certificate_fingerprint
      changed_when: false
      failed_when: false
      when:
        - idm_current_http_certificate_pem.stdout | default('') | length > 0

    - name: Normalize current IdM HTTP certificate fingerprint
      ansible.builtin.set_fact:
        idm_current_http_certificate_sha256: >-
          {{
            idm_current_http_certificate_fingerprint.stdout
            | default('')
            | regex_replace('^.*=', '')
            | regex_replace(':', '')
            | trim
            | upper
          }}

    - name: Create local ACM TLS staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: "{{ idm_tls_local_staging_prefix }}"
      delegate_to: localhost
      become: false
      register: idm_tls_local_staging
      no_log: true

    - name: Deploy ACM certificate to IdM
      block:
        #######################################################################
        # Export certificate from ACM on the Ansible control machine
        #######################################################################

        - name: Generate temporary ACM export passphrase
          ansible.builtin.set_fact:
            idm_acm_export_passphrase: >-
              {{
                lookup(
                  'ansible.builtin.password',
                  '/dev/null',
                  length=64,
                  chars=['ascii_letters', 'digits']
                )
              }}
          no_log: true

        - name: Write ACM export passphrase without trailing newline
          ansible.builtin.copy:
            content: "{{ idm_acm_export_passphrase }}"
            dest: "{{ idm_tls_local_staging.path }}/passphrase"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Export IdM certificate from AWS ACM
          ansible.builtin.command:
            argv:
              - aws
              - acm
              - export-certificate
              - --certificate-arn
              - "{{ idm_acm_certificate_arn }}"
              - --passphrase
              - "fileb://{{ idm_tls_local_staging.path }}/passphrase"
              - --region
              - "{{ aws_region }}"
              - --profile
              - "{{ aws_profile }}"
              - --output
              - json
              - --no-cli-pager
          delegate_to: localhost
          become: false
          register: idm_acm_export_result
          changed_when: false
          no_log: true

        - name: Parse exported ACM certificate data
          ansible.builtin.set_fact:
            idm_acm_exported_certificate: >-
              {{
                idm_acm_export_result.stdout
                | from_json
              }}
          no_log: true

        - name: Validate exported ACM certificate data
          ansible.builtin.assert:
            that:
              - >-
                idm_acm_exported_certificate.Certificate
                | default('')
                | length > 0
              - >-
                idm_acm_exported_certificate.CertificateChain
                | default('')
                | length > 0
              - >-
                idm_acm_exported_certificate.PrivateKey
                | default('')
                | length > 0
            fail_msg: >-
              ACM export did not return the certificate, certificate chain,
              and encrypted private key.
          no_log: true


        - name: Write exported ACM leaf certificate locally
          ansible.builtin.copy:
            content: |
              {{ idm_acm_exported_certificate.Certificate | trim }}
            dest: "{{ idm_tls_local_staging.path }}/server.crt"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Write exported ACM certificate chain locally
          ansible.builtin.copy:
            content: |
              {{ idm_acm_exported_certificate.CertificateChain | trim }}
            dest: "{{ idm_tls_local_staging.path }}/chain.crt"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Write exported encrypted ACM private key locally
          ansible.builtin.copy:
            content: |
              {{ idm_acm_exported_certificate.PrivateKey | trim }}
            dest: "{{ idm_tls_local_staging.path }}/server-encrypted.key"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        #######################################################################
        # Validate and compare the exported certificate before installation
        #######################################################################

        - name: Build exported ACM full certificate chain locally
          ansible.builtin.shell: |
            set -euo pipefail

            cat \
              "{{ idm_tls_local_staging.path }}/server.crt" \
              "{{ idm_tls_local_staging.path }}/chain.crt" \
              > "{{ idm_tls_local_staging.path }}/fullchain.crt"

            chmod 0600 "{{ idm_tls_local_staging.path }}/fullchain.crt"
          args:
            executable: /bin/bash
          delegate_to: localhost
          become: false
          changed_when: false
          no_log: true

        - name: Validate exported ACM certificate hostname locally
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ idm_tls_local_staging.path }}/server.crt"
              - -noout
              - -checkhost
              - "{{ idm_public_tls_fqdn }}"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Verify exported ACM certificate remains valid for at least 14 days
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ idm_tls_local_staging.path }}/server.crt"
              - -noout
              - -checkend
              - "{{ idm_acm_certificate_minimum_validity_seconds | string }}"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Read exported ACM certificate fingerprint
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ idm_tls_local_staging.path }}/server.crt"
              - -noout
              - -fingerprint
              - -sha256
          delegate_to: localhost
          become: false
          register: idm_acm_certificate_fingerprint
          changed_when: false

        - name: Normalize exported ACM certificate fingerprint
          ansible.builtin.set_fact:
            idm_acm_certificate_sha256: >-
              {{
                idm_acm_certificate_fingerprint.stdout
                | default('')
                | regex_replace('^.*=', '')
                | regex_replace(':', '')
                | trim
                | upper
              }}

        - name: Validate exported ACM certificate fingerprint
          ansible.builtin.assert:
            that:
              - idm_acm_certificate_fingerprint.rc == 0
              - idm_acm_certificate_sha256 | length == 64
              - idm_acm_certificate_sha256 is match('^[0-9A-F]{64}$')
            fail_msg: >-
              Could not determine a valid SHA-256 fingerprint from the
              certificate exported from AWS ACM. OpenSSL output was:
              {{
                idm_acm_certificate_fingerprint.stdout
                | default('no output')
              }}


        - name: Determine whether IdM HTTP certificate replacement is required
          ansible.builtin.set_fact:
            idm_public_tls_install_required: >-
              {{
                idm_force_public_tls_install | bool
                or
                (
                  idm_current_http_certificate_sha256
                  | default('')
                  | trim
                )
                !=
                (
                  idm_acm_certificate_sha256
                  | default('')
                  | trim
                )
              }}

        - name: Report current IdM TLS certificate state
          ansible.builtin.debug:
            msg:
              - "Public TLS FQDN: {{ idm_public_tls_fqdn }}"
              - "ACM certificate: {{ idm_acm_certificate_arn }}"
              - >-
                Current certificate fingerprint:
                {{
                  idm_current_http_certificate_sha256
                  | default('not detected')
                }}
              - >-
                ACM certificate fingerprint:
                {{ idm_acm_certificate_sha256 }}
              - >-
                Certificate replacement required:
                {{ idm_public_tls_install_required }}

        #######################################################################
        # Back up current IdM HTTP certificate configuration
        #######################################################################

        - name: Create timestamp for IdM TLS backup
          ansible.builtin.set_fact:
            idm_tls_backup_timestamp: >-
              {{ ansible_date_time.iso8601_basic_short }}
          when: idm_public_tls_install_required

        - name: Back up current IdM TLS files
          community.general.archive:
            path:
              - /var/lib/ipa/private
              - /var/lib/ipa/certs
              - /etc/httpd/alias
              - /var/lib/certmonger
            dest: >-
              {{
                idm_tls_backup_directory
              }}/idm-http-tls-{{
                idm_tls_backup_timestamp
              }}.tar.gz
            format: gz
            owner: root
            group: root
            mode: "0600"
          when: idm_public_tls_install_required

        #######################################################################
        # Copy certificate material to /opt/certs/idm
        #######################################################################

        #######################################################################
        # Copy certificate material to /opt/certs/idm
        #######################################################################

        - name: Install ACM leaf certificate in IdM TLS directory
          ansible.builtin.copy:
            src: "{{ idm_tls_local_staging.path }}/server.crt"
            dest: "{{ idm_tls_certificate_path }}"
            owner: root
            group: root
            mode: "0644"
          when: idm_public_tls_install_required

        - name: Install ACM certificate chain in IdM TLS directory
          ansible.builtin.copy:
            src: "{{ idm_tls_local_staging.path }}/chain.crt"
            dest: "{{ idm_tls_chain_path }}"
            owner: root
            group: root
            mode: "0644"
          when: idm_public_tls_install_required

        - name: Install ACM full certificate chain in IdM TLS directory
          ansible.builtin.copy:
            src: "{{ idm_tls_local_staging.path }}/fullchain.crt"
            dest: "{{ idm_tls_fullchain_path }}"
            owner: root
            group: root
            mode: "0644"
          when: idm_public_tls_install_required

        - name: Install encrypted ACM private key temporarily
          ansible.builtin.copy:
            src: "{{ idm_tls_local_staging.path }}/server-encrypted.key"
            dest: "{{ idm_tls_private_key_path }}.encrypted"
            owner: root
            group: root
            mode: "0600"
          when: idm_public_tls_install_required
          no_log: true

        - name: Install temporary ACM key passphrase
          ansible.builtin.copy:
            content: "{{ idm_acm_export_passphrase }}"
            dest: "{{ idm_tls_directory }}/.acm-passphrase"
            owner: root
            group: root
            mode: "0600"
          when: idm_public_tls_install_required
          no_log: true

 
        - name: Validate ACM certificate hostname
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ idm_tls_certificate_path }}"
              - -noout
              - -checkhost
              - "{{ idm_public_tls_fqdn }}"
          changed_when: false

        - name: Verify ACM certificate remains valid for at least 14 days
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ idm_tls_certificate_path }}"
              - -noout
              - -checkend
              - "{{ idm_acm_certificate_minimum_validity_seconds | string }}"
          changed_when: false

        - name: Read ACM certificate public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl x509 \
              -in "{{ idm_tls_certificate_path }}" \
              -noout \
              -pubkey |
              openssl pkey \
                -pubin \
                -outform DER |
              openssl sha256
          args:
            executable: /bin/bash
          register: idm_acm_certificate_public_key_hash
          changed_when: false
          when: idm_public_tls_install_required

        - name: Read ACM private key public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl pkey \
              -in "{{ idm_tls_private_key_path }}" \
              -pubout \
              -outform DER |
              openssl sha256
          args:
            executable: /bin/bash
          register: idm_acm_private_key_public_key_hash
          changed_when: false
          no_log: true
          when: idm_public_tls_install_required


        - name: Decrypt ACM private key on the IdM server
          ansible.builtin.command:
            argv:
              - openssl
              - pkey
              - -in
              - "{{ idm_tls_private_key_path }}.encrypted"
              - -out
              - "{{ idm_tls_private_key_path }}"
              - -passin
              - "file:{{ idm_tls_directory }}/.acm-passphrase"
          register: idm_acm_private_key_decrypt
          changed_when: true
          when: idm_public_tls_install_required
          no_log: true

        - name: Secure decrypted ACM private key
          ansible.builtin.file:
            path: "{{ idm_tls_private_key_path }}"
            owner: root
            group: root
            mode: "0600"
          when: idm_public_tls_install_required

        - name: Verify ACM certificate and private key match
          ansible.builtin.assert:
            that:
              - >-
                idm_acm_certificate_public_key_hash.stdout | trim
                ==
                idm_acm_private_key_public_key_hash.stdout | trim
            fail_msg: >-
              The exported ACM certificate and private key do not match.
          no_log: true
          when: idm_public_tls_install_required

        - name: Restore SELinux contexts on IdM TLS directory
          ansible.builtin.command:
            argv:
              - restorecon
              - -RFv
              - "{{ idm_tls_directory }}"
          register: idm_tls_restorecon
          changed_when: >-
            idm_tls_restorecon.stdout | default('') | length > 0
          when: idm_public_tls_install_required


        #######################################################################
        # Install only the Apache/httpd certificate in IdM
        #######################################################################

        #######################################################################
        # Trust the public CA chain inside IdM
        #######################################################################

        - name: Remove old split ACM CA chain files
          ansible.builtin.find:
            paths: "{{ idm_tls_chain_parts_directory }}"
            patterns: "ca-*.crt"
            file_type: file
          register: idm_old_acm_chain_parts
          when: idm_public_tls_install_required

        - name: Delete old split ACM CA chain files
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ idm_old_acm_chain_parts.files | default([]) }}"
          loop_control:
            label: "{{ item.path }}"
          when: idm_public_tls_install_required

        - name: Split ACM CA chain into individual certificates
          ansible.builtin.shell: |
            set -euo pipefail

            awk '
              /-----BEGIN CERTIFICATE-----/ {
                certificate_number++
                output_file = sprintf(
                  "{{ idm_tls_chain_parts_directory }}/ca-%02d.crt",
                  certificate_number
                )
              }

              output_file != "" {
                print > output_file
              }

              /-----END CERTIFICATE-----/ {
                close(output_file)
                output_file = ""
              }
            ' "{{ idm_tls_chain_path }}"
          args:
            executable: /bin/bash
          changed_when: true
          when: idm_public_tls_install_required

        - name: Find individual ACM CA certificates
          ansible.builtin.find:
            paths: "{{ idm_tls_chain_parts_directory }}"
            patterns: "ca-*.crt"
            file_type: file
          register: idm_acm_chain_parts
          when: idm_public_tls_install_required

        - name: Validate split ACM CA chain
          ansible.builtin.assert:
            that:
              - idm_acm_chain_parts.files | default([]) | length > 0
            fail_msg: >-
              ACM certificate chain did not contain any usable CA
              certificates.
          when: idm_public_tls_install_required

        - name: Install ACM CA chain certificates into IdM
          ansible.builtin.command:
            argv:
              - ipa-cacert-manage
              - install
              - "{{ item.path }}"
          register: idm_acm_ca_install
          changed_when: idm_acm_ca_install.rc == 0
          failed_when:
            - idm_acm_ca_install.rc != 0
            - >-
              'already exists'
              not in (
                (
                  idm_acm_ca_install.stdout | default('')
                )
                ~
                (
                  idm_acm_ca_install.stderr | default('')
                )
              ) | lower
          loop: >-
            {{
              idm_acm_chain_parts.files
              | default([])
              | sort(attribute='path')
            }}
          loop_control:
            label: "{{ item.path }}"
          when: idm_public_tls_install_required

        - name: Update IdM certificate databases
          ansible.builtin.command:
            argv:
              - ipa-certupdate
          register: idm_ipa_certupdate
          changed_when: true
          when: idm_public_tls_install_required

        - name: Install public ACM certificate for IdM Web UI
          ansible.builtin.command:
            argv:
              - ipa-server-certinstall
              - --http
              - "{{ idm_tls_private_key_path }}"
              - "{{ idm_tls_fullchain_path }}"
          args:
            stdin: "{{ idm_vault_dm_password }}"
            stdin_add_newline: true
          register: idm_http_certificate_install
          changed_when: idm_http_certificate_install.rc == 0
          no_log: true
          when: idm_public_tls_install_required


        - name: Remove encrypted ACM private key
          ansible.builtin.file:
            path: "{{ idm_tls_private_key_path }}.encrypted"
            state: absent
          no_log: true

        - name: Remove temporary ACM passphrase file
          ansible.builtin.file:
            path: "{{ idm_tls_directory }}/.acm-passphrase"
            state: absent
          no_log: true

        - name: Restart Apache after IdM Web UI certificate replacement
          ansible.builtin.service:
            name: httpd
            state: restarted
          when: idm_public_tls_install_required

        - name: Wait for IdM HTTPS service
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 443
            state: started
            timeout: 120

        #######################################################################
        # Validate installed certificate
        #######################################################################

        - name: Read installed IdM Web UI certificate
          ansible.builtin.shell: |
            set -euo pipefail

            openssl s_client \
              -connect 127.0.0.1:443 \
              -servername "{{ idm_public_tls_fqdn }}" \
              -showcerts \
              </dev/null 2>/dev/null |
              openssl x509 \
                -noout \
                -subject \
                -issuer \
                -serial \
                -dates \
                -fingerprint \
                -sha256 \
                -ext subjectAltName
          args:
            executable: /bin/bash
          register: idm_installed_http_certificate
          changed_when: false

        - name: Verify installed IdM certificate hostname
          ansible.builtin.shell: |
            set -euo pipefail

            openssl s_client \
              -connect 127.0.0.1:443 \
              -servername "{{ idm_public_tls_fqdn }}" \
              </dev/null 2>/dev/null |
              openssl x509 \
                -noout \
                -checkhost "{{ idm_public_tls_fqdn }}"
          args:
            executable: /bin/bash
          register: idm_installed_certificate_hostname_check
          changed_when: false

        - name: Read installed IdM certificate fingerprint
          ansible.builtin.shell: |
            set -euo pipefail

            openssl s_client \
              -connect 127.0.0.1:443 \
              -servername "{{ idm_public_tls_fqdn }}" \
              </dev/null 2>/dev/null |
              openssl x509 \
                -noout \
                -fingerprint \
                -sha256
          args:
            executable: /bin/bash
          register: idm_installed_certificate_fingerprint
          changed_when: false

        - name: Normalize installed IdM certificate fingerprint
          ansible.builtin.set_fact:
            idm_installed_certificate_sha256: >-
              {{
                idm_installed_certificate_fingerprint.stdout
                | default('')
                | regex_replace('^.*=', '')
                | regex_replace(':', '')
                | trim
                | upper
              }}

        - name: Verify installed certificate matches ACM certificate
          ansible.builtin.assert:
            that:
              - >-
                idm_installed_certificate_fingerprint.stdout | trim
                ==
                idm_acm_certificate_fingerprint.stdout | trim
            fail_msg: >-
              The certificate currently served by IdM Apache does not match
              the certificate exported from ACM.

        - name: Verify all IdM services remain operational
          ansible.builtin.command:
            argv:
              - ipactl
              - status
          register: idm_post_tls_ipactl_status
          changed_when: false
          failed_when: idm_post_tls_ipactl_status.rc != 0

        - name: Show installed IdM public TLS certificate
          ansible.builtin.debug:
            msg:
              - "IdM Web UI public certificate installed successfully."
              - "URL: https://{{ idm_public_tls_fqdn }}"
              - "Certificate: {{ idm_tls_certificate_path }}"
              - "Certificate chain: {{ idm_tls_chain_path }}"
              - "Full chain: {{ idm_tls_fullchain_path }}"
              - "Private key: {{ idm_tls_private_key_path }}"
              - "{{ idm_installed_http_certificate.stdout_lines }}"

      always:
        - name: Remove local ACM TLS staging directory
          ansible.builtin.file:
            path: >-
              {{
                idm_tls_local_staging.path
                | default('/nonexistent')
              }}
            state: absent
          delegate_to: localhost
          become: false
          no_log: true

        - name: Clear ACM export facts
          ansible.builtin.set_fact:
            idm_acm_export_passphrase: ""
            idm_acm_exported_certificate: {}
          no_log: true

        - name: Remove encrypted ACM private key
          ansible.builtin.file:
            path: "{{ idm_tls_private_key_path }}.encrypted"
            state: absent
          no_log: true

        - name: Remove temporary ACM passphrase file
          ansible.builtin.file:
            path: "{{ idm_tls_directory }}/.acm-passphrase"
            state: absent
          no_log: true
    ###########################################################################
    # Final validation
    ###########################################################################

    - name: Verify final IdM service status
      ansible.builtin.command:
        argv:
          - ipactl
          - status
      register: idm_final_status
      changed_when: false
      failed_when: idm_final_status.rc != 0

    - name: Verify admin group membership
      ansible.builtin.command:
        argv:
          - ipa
          - group-show
          - "{{ idm_admin_group }}"
          - --all
      register: idm_admin_group_verify
      changed_when: false
      failed_when: idm_admin_group_verify.rc != 0

    - name: Show IdM installation status
      ansible.builtin.debug:
        msg:
          - "IdM installation completed and verified."
          - "AWS parent DNS domain: {{ idm_parent_domain }}"
          - "IdM DNS domain: {{ idm_domain }}"
          - "IdM FQDN: {{ idm_fqdn }}"
          - "IdM realm: {{ idm_realm }}"
          - "IdM private IP: {{ idm_private_ip }}"
          - "AWS DNS forwarder: {{ aws_dns_resolver }}"
          - "Primary local resolver: 127.0.0.1"
          - "NetworkManager connection: {{ idm_nm_connection }}"
          - >-
            Created or verified users:
            {{ idm_users | join(', ') }}
          - "Admin group: {{ idm_admin_group }}"
          - "Sudo rule: {{ idm_sudo_rule }}"
          - "Installer log: {{ idm_install_log }}"
          - "Wrapper log: {{ idm_install_wrapper_log }}"