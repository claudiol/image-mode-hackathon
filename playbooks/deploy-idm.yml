---
- name: Prepare and install Red Hat IdM / FreeIPA on AWS EC2 RHEL 9+
  hosts: idm
  become: true
  gather_facts: true

  vars:
    idm_short_name: "{{ inventory_hostname_short }}"

    idm_parent_domain: "{{ parent_domain_name }}"
    idm_domain: "{{ idm_domain_name }}"
    idm_realm: "{{ idm_realm_name }}"
    idm_fqdn: "{{ idm_server_fqdn }}"

    idm_forward_policy: "only"
    idm_default_user_password: "RedHat123^"

    idm_admin_group: idm-admins
    idm_sudo_rule: allow_idm_admins_all

    required_tcp_ports:
      - 80
      - 443
      - 389
      - 636
      - 88
      - 464
      - 53

    required_udp_ports:
      - 88
      - 464
      - 53
      - 123

  pre_tasks:
    - name: Validate required AWS lookup inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
        fail_msg: "Missing secret_prefix or aws_region from inventory."

    - name: Read IdM admin password from AWS Secrets Manager using AWS CLI
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/idm/admin_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_admin_secret_result
      changed_when: false
      no_log: false

    - name: Read IdM Directory Manager password from AWS Secrets Manager using AWS CLI
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/idm/directory_manager_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_dm_secret_result
      changed_when: false
      no_log: false

    - name: Set IdM password facts
      ansible.builtin.set_fact:
        idm_vault_admin_password: "{{ idm_admin_secret_result.stdout }}"
        idm_vault_dm_password: "{{ idm_dm_secret_result.stdout }}"
      no_log: true

    - name: Validate required AWS secret variables
      ansible.builtin.assert:
        that:
          - idm_vault_dm_password is defined
          - idm_vault_dm_password | length > 0
          - idm_vault_admin_password is defined
          - idm_vault_admin_password | length > 0
        fail_msg: "Missing IdM AWS Secrets Manager values. Check Terraform-created IdM secrets."
      no_log: true

    - name: Validate Terraform-provided DNS variables
      ansible.builtin.assert:
        that:
          - parent_domain_name is defined
          - parent_domain_name | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_realm_name is defined
          - idm_realm_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - aws_dns_resolver is defined
          - aws_dns_resolver | length > 0
        fail_msg: "Missing Terraform DNS inventory variables. Check inventory.tpl and Terraform templatefile vars."

    - name: Validate AWS private IPv4 discovery
      ansible.builtin.assert:
        that:
          - private_ip is defined or ansible_facts["default_ipv4"]["address"] is defined
        fail_msg: "Could not detect private IPv4 address."

    - name: Set discovered network facts
      ansible.builtin.set_fact:
        idm_private_ip: "{{ idm_server_ip | default(private_ip | default(ansible_facts['default_ipv4']['address'], true), true) }}"
        idm_nm_connection: "{{ ansible_facts['default_ipv4']['interface'] }}"

    - name: Validate IdM DNS relationship
      ansible.builtin.assert:
        that:
          - idm_domain == "lab." ~ idm_parent_domain
          - idm_fqdn == idm_short_name ~ "." ~ idm_domain
          - idm_realm == idm_domain | upper
        fail_msg: >-
          DNS mismatch detected. Expected idm_fqdn={{ idm_short_name }}.{{ idm_domain }},
          idm_domain=lab.{{ idm_parent_domain }}, realm={{ idm_domain | upper }}.
          
    - name: Validate Terraform-provided IdM users
      ansible.builtin.assert:
        that:
          - idm_users is defined
          - idm_users | length > 0
        fail_msg: "idm_users missing. Check Terraform variables.tf, terraform.tfvars, and inventory.tpl."

  tasks:
    - name: Ensure required IdM packages are installed
      ansible.builtin.dnf:
        name:
          - firewalld
          - chrony
          - bind-utils
          - NetworkManager
          - python3-libselinux
          - ipa-server
          - ipa-server-dns
        state: present

    - name: Set persistent IdM lab hostname
      ansible.builtin.hostname:
        name: "{{ idm_fqdn }}"

    - name: Preserve hostname across cloud-init runs
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
        content: |
          preserve_hostname: true
        owner: root
        group: root
        mode: "0644"

    - name: Remove myhostname from NSS hosts lookup
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^(hosts:\s+.*)\s+myhostname(\s*.*)$'
        replace: '\1\2'

    - name: Ensure IdM lab hostname resolves to private AWS IP
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED IDM HOSTS"
        block: |
          {{ idm_private_ip }} {{ idm_fqdn }} {{ idm_short_name }}

    - name: Ensure IPv6 loopback is enabled
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "0"
        sysctl_file: /etc/sysctl.d/99-idm-ipv6.conf
        state: present
        reload: true
      loop:
        - net.ipv6.conf.lo.disable_ipv6
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6

    - name: Ensure ::1 exists on loopback
      ansible.builtin.command: ip -6 addr add ::1/128 dev lo
      register: ipv6_loopback
      failed_when: false
      changed_when: ipv6_loopback.rc == 0

    - name: Enable and start chronyd
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open IdM TCP ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_tcp_ports }}"

    - name: Open IdM UDP ports
      ansible.posix.firewalld:
        port: "{{ item }}/udp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_udp_ports }}"

    - name: Configure NetworkManager DNS for IdM host
      community.general.nmcli:
        conn_name: "{{ idm_nm_connection }}"
        dns4:
          - "127.0.0.1"
          - "{{ aws_dns_resolver }}"
        dns4_ignore_auto: true
        state: present
      register: nmcli_dns
      failed_when: false

    - name: Restart NetworkManager when DNS pinning changed
      ansible.builtin.service:
        name: NetworkManager
        state: restarted
      when: nmcli_dns.changed | default(false)

    - name: Check whether IdM is fully installed
      ansible.builtin.command: ipactl status
      register: ipa_status
      failed_when: false
      changed_when: false

    - name: Check for existing partial IdM config
      ansible.builtin.stat:
        path: /etc/ipa/default.conf
      register: ipa_default_conf

    - name: Remove failed partial IdM install when config exists but services are down
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - --uninstall
          - --unattended
      register: ipa_partial_uninstall
      failed_when: false
      changed_when: ipa_partial_uninstall.rc == 0
      when:
        - ipa_status.rc != 0
        - ipa_default_conf.stat.exists

    - name: Install IdM server with integrated DNS for lab subdomain
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - "--hostname={{ idm_fqdn }}"
          - "--ip-address={{ idm_private_ip }}"
          - "--domain={{ idm_domain }}"
          - "--realm={{ idm_realm }}"
          - "--ds-password={{ idm_vault_dm_password }}"
          - "--admin-password={{ idm_vault_admin_password }}"
          - "--setup-dns"
          - "--forwarder={{ aws_dns_resolver }}"
          - "--forward-policy={{ idm_forward_policy }}"
          - "--no-dnssec-validation"
          - "--unattended"
          - "--no-reverse"
      register: ipa_install
      no_log: true
      when: ipa_status.rc != 0

    - name: Verify IdM services are running
      ansible.builtin.command: ipactl status
      register: ipa_verify
      changed_when: false
      failed_when: ipa_verify.rc != 0

    - name: Authenticate to IdM as admin
      ansible.builtin.command: kinit admin
      args:
        stdin: "{{ idm_vault_admin_password }}"
      changed_when: false
      no_log: true

    - name: Check existing IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-show
          - "{{ idm_domain }}"
          - "{{ item.split('.')[0] }}"
      register: idm_dns_record_checks
      failed_when: false
      changed_when: false
      loop: "{{ groups['all'] }}"
      loop_control:
        label: "{{ item }}"
      when:
        - hostvars[item].private_ip is defined

    - name: Add missing IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-add
          - "{{ idm_domain }}"
          - "{{ item.item.split('.')[0] }}"
          - "--a-rec={{ hostvars[item.item].private_ip }}"
      register: idm_dns_record_add
      changed_when: idm_dns_record_add.rc == 0
      failed_when:
        - idm_dns_record_add.rc != 0
        - "'already exists' not in (idm_dns_record_add.stderr | default(''))"
        - "'already exists' not in (idm_dns_record_add.stdout | default(''))"
      loop: "{{ idm_dns_record_checks.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc != 0
        - hostvars[item.item].private_ip is defined

    - name: Update existing IdM DNS A records for inventory hosts
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-mod
          - "{{ idm_domain }}"
          - "{{ item.item.split('.')[0] }}"
          - "--a-rec={{ hostvars[item.item].private_ip }}"
      register: idm_dns_record_mod
      changed_when: "'Modified record' in (idm_dns_record_mod.stdout | default(''))"
      failed_when:
        - idm_dns_record_mod.rc != 0
        - "'no modifications to be performed' not in (idm_dns_record_mod.stderr | default(''))"
        - "'no modifications to be performed' not in (idm_dns_record_mod.stdout | default(''))"
      loop: "{{ idm_dns_record_checks.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc == 0
        - hostvars[item.item].private_ip is defined
        - "'A record: ' ~ hostvars[item.item].private_ip not in (item.stdout | default(''))"

    - name: Verify IdM DNS resolves all inventory hosts to private IPs
      ansible.builtin.command:
        argv:
          - dig
          - "+short"
          - "@127.0.0.1"
          - "{{ item }}"
          - A
      register: idm_dns_verify
      changed_when: false
      failed_when: hostvars[item].private_ip not in idm_dns_verify.stdout_lines
      loop: "{{ groups['all'] }}"
      loop_control:
        label: "{{ item }}"
      when:
        - hostvars[item].private_ip is defined

    - name: Ensure global IdM admin group exists
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ idm_admin_group }}"
          - "--desc=Global IdM administrators with sudo and IdM console access"
      register: idm_admin_group_add
      changed_when: idm_admin_group_add.rc == 0
      failed_when:
        - idm_admin_group_add.rc != 0
        - "'already exists' not in (idm_admin_group_add.stderr | default(''))"
        - "'already exists' not in (idm_admin_group_add.stdout | default(''))"

    - name: Ensure IdM users exist
      ansible.builtin.command:
        argv:
          - ipa
          - user-add
          - "{{ item }}"
          - "--first={{ item }}"
          - "--last=User"
      register: idm_user_add
      changed_when: idm_user_add.rc == 0
      failed_when:
        - idm_user_add.rc != 0
        - "'already exists' not in (idm_user_add.stderr | default(''))"
        - "'already exists' not in (idm_user_add.stdout | default(''))"
      loop: "{{ idm_users }}"

    - name: Set temporary password for newly created IdM users
      ansible.builtin.command:
        argv:
          - ipa
          - passwd
          - "{{ item.item }}"
        stdin: |
          {{ idm_default_user_password }}
          {{ idm_default_user_password }}
      register: idm_user_temp_password
      no_log: true
      changed_when: idm_user_temp_password.rc == 0
      failed_when: idm_user_temp_password.rc != 0
      loop: "{{ idm_user_add.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc == 0

    - name: Add users to global IdM admin group
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ idm_admin_group }}"
          - "--users={{ item }}"
      register: idm_group_member_add
      changed_when: "'Number of members added 1' in (idm_group_member_add.stdout | default(''))"
      failed_when:
        - idm_group_member_add.rc != 0
        - "'This entry is already a member' not in (idm_group_member_add.stderr | default(''))"
        - "'This entry is already a member' not in (idm_group_member_add.stdout | default(''))"
      loop: "{{ idm_users }}"

    - name: Add global admin group to IdM built-in admins group
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - admins
          - "--groups={{ idm_admin_group }}"
      register: idm_console_admin_add
      changed_when: "'Number of members added 1' in (idm_console_admin_add.stdout | default(''))"
      failed_when:
        - idm_console_admin_add.rc != 0
        - "'This entry is already a member' not in (idm_console_admin_add.stderr | default(''))"
        - "'This entry is already a member' not in (idm_console_admin_add.stdout | default(''))"

    - name: Ensure sudo rule exists for global IdM admins
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add
          - "{{ idm_sudo_rule }}"
          - "--desc=Allow idm-admins sudo access on all hosts"
      register: idm_sudo_rule_add
      changed_when: idm_sudo_rule_add.rc == 0
      failed_when:
        - idm_sudo_rule_add.rc != 0
        - "'already exists' not in (idm_sudo_rule_add.stderr | default(''))"
        - "'already exists' not in (idm_sudo_rule_add.stdout | default(''))"

    - name: Allow sudo rule to apply to all hosts
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-mod
          - "{{ idm_sudo_rule }}"
          - "--hostcat=all"
      register: idm_sudo_hostcat
      changed_when: "'Modified Sudo Rule' in (idm_sudo_hostcat.stdout | default(''))"
      failed_when:
        - idm_sudo_hostcat.rc != 0
        - "'no modifications to be performed' not in (idm_sudo_hostcat.stderr | default(''))"
        - "'no modifications to be performed' not in (idm_sudo_hostcat.stdout | default(''))"

    - name: Allow sudo rule to run all commands
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-mod
          - "{{ idm_sudo_rule }}"
          - "--cmdcat=all"
      register: idm_sudo_cmdcat
      changed_when: "'Modified Sudo Rule' in (idm_sudo_cmdcat.stdout | default(''))"
      failed_when:
        - idm_sudo_cmdcat.rc != 0
        - "'no modifications to be performed' not in (idm_sudo_cmdcat.stderr | default(''))"
        - "'no modifications to be performed' not in (idm_sudo_cmdcat.stdout | default(''))"

    - name: Add IdM admin group to sudo rule
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ idm_sudo_rule }}"
          - "--groups={{ idm_admin_group }}"
      register: idm_sudo_group_add
      changed_when: "'Number of members added 1' in (idm_sudo_group_add.stdout | default(''))"
      failed_when:
        - idm_sudo_group_add.rc != 0
        - "'This entry is already a member' not in (idm_sudo_group_add.stderr | default(''))"
        - "'This entry is already a member' not in (idm_sudo_group_add.stdout | default(''))"



    - name: Show IdM install status
      ansible.builtin.debug:
        msg:
          - "IdM install completed and verified."
          - "AWS parent DNS domain: {{ idm_parent_domain }}"
          - "IdM DNS domain: {{ idm_domain }}"
          - "IdM FQDN: {{ idm_fqdn }}"
          - "IdM realm: {{ idm_realm }}"
          - "IdM private IP: {{ idm_private_ip }}"
          - "AWS DNS forwarder: {{ aws_dns_resolver }}"
          - "IdM DNS A records were created/updated for inventory hosts."
          - "Created/verified users: {{ idm_users | join(', ') }}"
          - "Admin sudo group: {{ idm_admin_group }}"
          - "Sudo rule: {{ idm_sudo_rule }}"