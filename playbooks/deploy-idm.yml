---
- name: Prepare and install Red Hat IdM / FreeIPA on AWS EC2 RHEL 9+
  hosts: idm
  become: true
  gather_facts: true

  vars_files:
    - ../vars/secrets.yml

  vars:
    idm_short_name: "{{ inventory_hostname_short }}"

    # Parent/public OpenTLC domain:
    # idm-1.sandbox4075.opentlc.com -> sandbox4075.opentlc.com
    idm_parent_domain: "{{ inventory_hostname.split('.')[1:] | join('.') }}"

    # Private IdM lab DNS zone:
    # sandbox4075.opentlc.com -> lab.sandbox4075.opentlc.com
    idm_domain: "lab.{{ idm_parent_domain }}"
    idm_realm: "{{ idm_domain | upper }}"

    # Final IdM hostname:
    # idm-1.lab.sandbox4075.opentlc.com
    idm_fqdn: "{{ idm_short_name }}.{{ idm_domain }}"

    idm_setup_dns: true
    idm_no_reverse: true
    idm_forward_policy: "only"

    required_tcp_ports:
      - 80
      - 443
      - 389
      - 636
      - 88
      - 464
      - 53

    required_udp_ports:
      - 88
      - 464
      - 53
      - 123

  pre_tasks:
    - name: Validate required vault variables
      ansible.builtin.assert:
        that:
          - idm_vault_dm_password is defined
          - idm_vault_dm_password | length > 0
          - idm_vault_admin_password is defined
          - idm_vault_admin_password | length > 0
        fail_msg: "Missing IdM vault passwords. Define idm_vault_dm_password and idm_vault_admin_password in vars/secrets.yml."

    - name: Validate AWS private IPv4 discovery
      ansible.builtin.assert:
        that:
          - private_ip is defined or ansible_default_ipv4.address is defined
        fail_msg: "Could not detect private_ip or ansible_default_ipv4.address."

    - name: Set discovered network facts
      ansible.builtin.set_fact:
        idm_private_ip: "{{ private_ip | default(ansible_default_ipv4.address, true) }}"
        idm_nm_connection: "{{ ansible_default_ipv4.interface }}"

  tasks:
    - name: Ensure required IdM packages are installed
      ansible.builtin.dnf:
        name:
          - firewalld
          - chrony
          - bind-utils
          - NetworkManager
          - python3-libselinux
          - ipa-server
          - ipa-server-dns
        state: present

    - name: Set persistent IdM lab hostname
      ansible.builtin.hostname:
        name: "{{ idm_fqdn }}"

    - name: Preserve hostname across cloud-init runs
      ansible.builtin.lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^preserve_hostname:'
        line: 'preserve_hostname: true'
        state: present
        create: false

    - name: Remove myhostname from NSS hosts lookup
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^(hosts:\s+.*)\s+myhostname(\s*.*)$'
        replace: '\1\2'

    - name: Ensure IdM lab hostname resolves to private AWS IP
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED IDM HOSTS"
        block: |
          {{ idm_private_ip }} {{ idm_fqdn }} {{ idm_short_name }}

    - name: Ensure IPv6 loopback is enabled
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "0"
        sysctl_file: /etc/sysctl.d/99-idm-ipv6.conf
        state: present
        reload: true
      loop:
        - net.ipv6.conf.lo.disable_ipv6
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6

    - name: Ensure ::1 exists on loopback
      ansible.builtin.command: ip -6 addr add ::1/128 dev lo
      register: ipv6_loopback
      failed_when: false
      changed_when: ipv6_loopback.rc == 0

    - name: Enable and start chronyd
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open IdM TCP ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_tcp_ports }}"

    - name: Open IdM UDP ports
      ansible.posix.firewalld:
        port: "{{ item }}/udp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_udp_ports }}"

    - name: Configure NetworkManager DNS for IdM host
      community.general.nmcli:
        conn_name: "{{ idm_nm_connection }}"
        dns4:
          - "127.0.0.1"
          - "{{ aws_dns_resolver }}"
        dns4_ignore_auto: true
        state: present
      register: nmcli_dns
      failed_when: false

    - name: Restart NetworkManager when DNS pinning changed
      ansible.builtin.service:
        name: NetworkManager
        state: restarted
      when: nmcli_dns.changed | default(false)

    - name: Check whether IdM is fully installed
      ansible.builtin.command: ipactl status
      register: ipa_status
      failed_when: false
      changed_when: false

    - name: Remove failed partial IdM install before retry
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - --uninstall
          - --unattended
      register: ipa_uninstall
      failed_when: false
      changed_when: ipa_uninstall.rc == 0
      when:
        - ipa_status.rc != 0
        - ansible.builtin.stat is not defined

    - name: Check for existing partial IdM config
      ansible.builtin.stat:
        path: /etc/ipa/default.conf
      register: ipa_default_conf

    - name: Remove failed partial IdM install when config exists but services are down
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - --uninstall
          - --unattended
      register: ipa_partial_uninstall
      failed_when: false
      changed_when: ipa_partial_uninstall.rc == 0
      when:
        - ipa_status.rc != 0
        - ipa_default_conf.stat.exists

    - name: Install IdM server with integrated DNS for lab subdomain
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - "--hostname={{ idm_fqdn }}"
          - "--ip-address={{ idm_private_ip }}"
          - "--domain={{ idm_domain }}"
          - "--realm={{ idm_realm }}"
          - "--ds-password={{ idm_vault_dm_password }}"
          - "--admin-password={{ idm_vault_admin_password }}"
          - "--setup-dns"
          - "--forwarder={{ aws_dns_resolver }}"
          - "--forward-policy={{ idm_forward_policy }}"
          - "--no-dnssec-validation"
          - "--unattended"
          - "--no-reverse"
      register: ipa_install
      no_log: true
      when: ipa_status.rc != 0

    - name: Verify IdM services are running
      ansible.builtin.command: ipactl status
      register: ipa_verify
      changed_when: false
      failed_when: ipa_verify.rc != 0

    - name: Show IdM install status
      ansible.builtin.debug:
        msg:
          - "IdM install completed and verified."
          - "SSH inventory hostname: {{ inventory_hostname }}"
          - "IdM FQDN: {{ idm_fqdn }}"
          - "IdM DNS domain: {{ idm_domain }}"
          - "IdM realm: {{ idm_realm }}"
          - "Parent DNS domain: {{ idm_parent_domain }}"
          - "Private IP: {{ idm_private_ip }}"