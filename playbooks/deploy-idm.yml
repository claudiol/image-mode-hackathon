---
- name: Prepare and install Red Hat IdM / FreeIPA on AWS EC2 RHEL 9+
  hosts: idm_servers
  become: true
  gather_facts: true

  vars_files:
    - vars-vault.yml

  vars:
    idm_fqdn: "idm.redhat.local"
    idm_short_name: "idm"
    idm_domain: "redhat.local"
    idm_realm: "REDHAT.LOCAL"

    # AWS VPC resolver is normally VPC CIDR base + 2.
    # Override this in inventory/group_vars if your VPC differs.
    aws_dns_resolver: "10.20.0.2"

    idm_setup_dns: true
    idm_no_reverse: true
    idm_forward_policy: "only"

    required_tcp_ports:
      - 80
      - 443
      - 389
      - 636
      - 88
      - 464
      - 53

    required_udp_ports:
      - 88
      - 464
      - 53
      - 123

  pre_tasks:
    - name: Validate required vault variables
      ansible.builtin.assert:
        that:
          - idm_vault_dm_password is defined
          - idm_vault_dm_password | length > 0
          - idm_vault_admin_password is defined
          - idm_vault_admin_password | length > 0
        fail_msg: "Missing IdM vault passwords. Define idm_vault_dm_password and idm_vault_admin_password in vars-vault.yml."

    - name: Validate AWS private IPv4 discovery
      ansible.builtin.assert:
        that:
          - ansible_default_ipv4.address is defined
          - ansible_default_ipv4.address | length > 0
        fail_msg: "Could not detect ansible_default_ipv4.address. Check host networking/facts."

    - name: Set discovered network facts
      ansible.builtin.set_fact:
        idm_private_ip: "{{ ansible_default_ipv4.address }}"
        idm_nm_connection: "{{ ansible_default_ipv4.interface }}"

  tasks:
    - name: Ensure RHEL 9 AppStream/Base packages are available
      ansible.builtin.dnf:
        name:
          - firewalld
          - chrony
          - bind-utils
          - NetworkManager
          - python3-libselinux
          - ipa-server
          - ipa-server-dns
        state: present

    - name: Set persistent hostname
      ansible.builtin.hostname:
        name: "{{ idm_fqdn }}"

    - name: Preserve hostname across cloud-init runs
      ansible.builtin.lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^preserve_hostname:'
        line: 'preserve_hostname: true'
        state: present
        create: false

    - name: Remove myhostname from NSS hosts lookup
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^(hosts:\s+.*)\s+myhostname(\s*.*)$'
        replace: '\1\2'

    - name: Ensure IdM hostname resolves to private AWS IP
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED IDM HOSTS"
        block: |
          {{ idm_private_ip }} {{ idm_fqdn }} {{ idm_short_name }}

    - name: Ensure IPv6 loopback is enabled
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "0"
        sysctl_file: /etc/sysctl.d/99-idm-ipv6.conf
        state: present
        reload: true
      loop:
        - net.ipv6.conf.lo.disable_ipv6
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6

    - name: Ensure ::1 exists on loopback
      ansible.builtin.command: ip -6 addr add ::1/128 dev lo
      register: ipv6_loopback
      failed_when: false
      changed_when: ipv6_loopback.rc == 0

    - name: Enable and start chronyd
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open IdM TCP ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_tcp_ports }}"

    - name: Open IdM UDP ports
      ansible.posix.firewalld:
        port: "{{ item }}/udp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ required_udp_ports }}"

    - name: Configure NetworkManager DNS for IdM host
      community.general.nmcli:
        conn_name: "{{ idm_nm_connection }}"
        dns4:
          - "127.0.0.1"
          - "{{ aws_dns_resolver }}"
        dns4_ignore_auto: true
        state: present
      register: nmcli_dns
      failed_when: false

    - name: Restart NetworkManager when DNS pinning changed
      ansible.builtin.service:
        name: NetworkManager
        state: restarted
      when: nmcli_dns.changed | default(false)

    - name: Install IdM server with integrated DNS
      ansible.builtin.command:
        argv:
          - ipa-server-install
          - "--hostname={{ idm_fqdn }}"
          - "--ip-address={{ idm_private_ip }}"
          - "--domain={{ idm_domain }}"
          - "--realm={{ idm_realm }}"
          - "--ds-password={{ idm_vault_dm_password }}"
          - "--admin-password={{ idm_vault_admin_password }}"
          - "--setup-dns"
          - "--forwarder={{ aws_dns_resolver }}"
          - "--forward-policy={{ idm_forward_policy }}"
          - "--no-dnssec-validation"
          - "--unattended"
          - "{{ '--no-reverse' if idm_no_reverse else '' }}"
      args:
        creates: /etc/ipa/default.conf
      register: ipa_install
      no_log: true

    - name: Show IdM install status
      ansible.builtin.debug:
        msg: "IdM install completed or was already present at /etc/ipa/default.conf."