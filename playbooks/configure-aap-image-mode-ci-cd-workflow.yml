---
- name: Configure AAP Image Mode CI/CD
  hosts: localhost
  connection: local
  gather_facts: false

  collections:
    - infra.aap_configuration
    - ansible.controller

  vars_files:
    - ../vars/organizations.yml
    - ../vars/credential_types.yml
    - ../vars/credentials.yml
    - ../vars/execution_environments.yml
    - ../vars/projects.yml
    - ../vars/job_templates.yml
    - ../vars/workflow_job_templates.yml

  vars:
    ###########################################################################
    # AAP object names
    ###########################################################################

    aap_organization_name: "Image Mode Lab"
    aap_inventory_name: "Image Mode Lab Infrastructure"
    aap_project_name: "Image Mode CI/CD"
    terraform_inventory_source_name: "Terraform Inventory Source"

    ###########################################################################
    # Terraform inventory source
    ###########################################################################

    terraform_inventory_source_path: "playbooks/inventory/hosts"

    ###########################################################################
    # AWS Secrets Manager names
    ###########################################################################

    aap_gateway_username_secret_name: >-
      {{ secret_prefix }}/aap/gateway_admin_username

    aap_gateway_password_secret_name: >-
      {{ secret_prefix }}/aap/gateway_admin_password

    aap_vault_password_secret_name: >-
      {{ secret_prefix }}/aap/vault_password

    redhat_registry_username_secret_name: >-
      {{ secret_prefix }}/redhat/registry_username

    redhat_registry_password_secret_name: >-
      {{ secret_prefix }}/redhat/registry_password

    quay_superuser_secret_name: >-
      {{ secret_prefix }}/quay/superuser

    quay_superuser_password_secret_name: >-
      {{ secret_prefix }}/quay/superuser_password

    resolved_lab_ssh_private_key_secret_name: >-
      {{
        lab_ssh_private_key_secret_name
        | default(secret_prefix ~ '/aws/ssh_private_key', true)
      }}

    ###########################################################################
    # Registry configuration
    ###########################################################################

    redhat_registry_host: "registry.redhat.io"
    quay_default_org: "image-mode"

    ###########################################################################
    # Git configuration
    #
    # Terraform currently does not create Git credentials.
    ###########################################################################

    git_username: >-
      {{
        lookup('ansible.builtin.env', 'IMAGE_MODE_GIT_USERNAME')
        | default('', true)
      }}

    git_token: >-
      {{
        lookup('ansible.builtin.env', 'IMAGE_MODE_GIT_TOKEN')
        | default('', true)
      }}

    image_mode_repo_url: >-
      {{
        lookup('ansible.builtin.env', 'IMAGE_MODE_REPO_URL')
        | default(
            'https://github.com/claudiol/image-mode-hackathon.git',
            true
          )
      }}

    image_mode_repo_branch: >-
      {{
        lookup('ansible.builtin.env', 'IMAGE_MODE_REPO_BRANCH')
        | default('dev', true)
      }}

    ###########################################################################
    # Image Mode configuration
    ###########################################################################

    rhel_version: >-
      {{
        lookup('ansible.builtin.env', 'RHEL_IMAGE_MODE_VERSION')
        | default('10', true)
        | string
      }}

    image_mode_base_image_map:
      "9": "registry.redhat.io/rhel9/rhel-bootc:latest"
      "10": "registry.redhat.io/rhel10/rhel-bootc:latest"

    quay_registry_repository_map:
      "9": "rhel9-image-mode"
      "10": "rhel10-image-mode"

    image_mode_image_tag: >-
      {{
        lookup('ansible.builtin.env', 'IMAGE_MODE_IMAGE_TAG')
        | default('dev', true)
      }}

    image_mode_ee_repository: "image-mode-ee"
    image_mode_ee_tag: "latest"

  pre_tasks:
    ###########################################################################
    # Validate Terraform-generated inventory
    ###########################################################################

    - name: Validate required Terraform inventory variables
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | string | trim | length > 0
          - aws_region is defined
          - aws_region | string | trim | length > 0
          - aws_profile is defined
          - aws_profile | string | trim | length > 0
          - groups['aap'] is defined
          - groups['aap'] | length > 0
          - groups['quay'] is defined
          - groups['quay'] | length > 0
        fail_msg: >-
          The Terraform-generated inventory must define secret_prefix,
          aws_region, aws_profile, an [aap] group, and a [quay] group.

    - name: Normalize AWS configuration
      ansible.builtin.set_fact:
        resolved_aws_region: "{{ aws_region | string | trim }}"
        resolved_aws_profile: "{{ aws_profile | string | trim }}"

    ###########################################################################
    # Validate local AWS CLI
    ###########################################################################

    - name: Check that AWS CLI is installed
      ansible.builtin.command:
        argv:
          - aws
          - --version
      register: aws_cli_version
      changed_when: false

    - name: Validate AWS CLI profile and caller identity
      ansible.builtin.command:
        argv:
          - aws
          - sts
          - get-caller-identity
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --output
          - json
      register: aws_caller_identity_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Resolve AAP host information
    ###########################################################################

    - name: Set primary AAP inventory hostname
      ansible.builtin.set_fact:
        resolved_aap_inventory_hostname: "{{ groups['aap'][0] }}"

    - name: Resolve AAP FQDN and public IP
      ansible.builtin.set_fact:
        resolved_aap_fqdn: >-
          {{
            hostvars[resolved_aap_inventory_hostname].fqdn
            | default(resolved_aap_inventory_hostname, true)
          }}

        resolved_aap_controller_ip: >-
          {{
            hostvars[resolved_aap_inventory_hostname].ansible_host
            | default(
                hostvars[resolved_aap_inventory_hostname].public_ip
                | default('', true),
                true
              )
            | string
            | regex_replace('^_', '')
          }}

    - name: Validate resolved AAP endpoint information
      ansible.builtin.assert:
        that:
          - resolved_aap_fqdn | length > 0
          - resolved_aap_controller_ip | length > 0
        fail_msg: >-
          AAP FQDN or public IP could not be resolved from the
          Terraform-generated [aap] inventory group.

    ###########################################################################
    # Resolve Quay host information
    ###########################################################################

    - name: Set primary Quay inventory hostname
      ansible.builtin.set_fact:
        resolved_quay_inventory_hostname: "{{ groups['quay'][0] }}"

    - name: Resolve Quay registry hostname
      ansible.builtin.set_fact:
        resolved_quay_hostname: >-
          {{
            hostvars[resolved_quay_inventory_hostname].fqdn
            | default(resolved_quay_inventory_hostname, true)
          }}

    - name: Validate resolved Quay registry hostname
      ansible.builtin.assert:
        that:
          - resolved_quay_hostname | length > 0
        fail_msg: >-
          Quay hostname could not be resolved from the Terraform-generated
          [quay] inventory group.

    ###########################################################################
    # Read AAP gateway credentials
    ###########################################################################

    - name: Read AAP gateway administrator username
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ aap_gateway_username_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: aap_gateway_username_secret_result
      changed_when: false
      no_log: true

    - name: Read AAP gateway administrator password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ aap_gateway_password_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: aap_gateway_password_secret_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Read Quay registry credentials
    ###########################################################################

    - name: Read Quay administrator username
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ quay_superuser_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_superuser_secret_result
      changed_when: false
      no_log: true

    - name: Read Quay administrator password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ quay_superuser_password_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_superuser_password_secret_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Read Terraform-generated SSH private key
    ###########################################################################

    - name: Read Terraform-generated SSH private key
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ resolved_lab_ssh_private_key_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: lab_ssh_private_key_secret_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Read Red Hat registry credentials
    ###########################################################################

    - name: Read Red Hat registry username
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ redhat_registry_username_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: redhat_registry_username_secret_result
      changed_when: false
      no_log: true

    - name: Read Red Hat registry password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ redhat_registry_password_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: redhat_registry_password_secret_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Read AAP vault credential
    ###########################################################################

    - name: Read AAP vault password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ aap_vault_password_secret_name }}"
          - --region
          - "{{ resolved_aws_region }}"
          - --profile
          - "{{ resolved_aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      register: aap_vault_password_secret_result
      changed_when: false
      no_log: true

    ###########################################################################
    # Map AWS command results to variables used by AAP configuration files
    ###########################################################################

    - name: Set AAP controller credentials
      ansible.builtin.set_fact:
        gateway_admin_username: >-
          {{ aap_gateway_username_secret_result.stdout | trim }}

        gateway_admin_password: >-
          {{ aap_gateway_password_secret_result.stdout | trim }}

        controller_username: >-
          {{ aap_gateway_username_secret_result.stdout | trim }}

        controller_password: >-
          {{ aap_gateway_password_secret_result.stdout | trim }}

        controller_validate_certs: false
      no_log: true

    - name: Set Quay registry credentials
      ansible.builtin.set_fact:
        quay_superuser: >-
          {{ quay_superuser_secret_result.stdout | trim }}

        quay_superuser_password: >-
          {{ quay_superuser_password_secret_result.stdout | trim }}

        quay_hostname: "{{ resolved_quay_hostname }}"
        quay_registry_host: "{{ resolved_quay_hostname }}"

        quay_registry_username: >-
          {{ quay_superuser_secret_result.stdout | trim }}

        quay_registry_password: >-
          {{ quay_superuser_password_secret_result.stdout | trim }}
      no_log: true

    - name: Set machine credential variables
      ansible.builtin.set_fact:
        aws_ssh_private_key: >-
          {{ lab_ssh_private_key_secret_result.stdout }}

        image_mode_ssh_private_key: >-
          {{ lab_ssh_private_key_secret_result.stdout }}
      no_log: true

    - name: Set Red Hat registry credential variables
      ansible.builtin.set_fact:
        redhat_registry_username: >-
          {{ redhat_registry_username_secret_result.stdout | trim }}

        redhat_registry_password: >-
          {{ redhat_registry_password_secret_result.stdout | trim }}
      no_log: true

    - name: Set AAP vault credential variables
      ansible.builtin.set_fact:
        ansible_vault_password: >-
          {{ aap_vault_password_secret_result.stdout | trim }}
      no_log: true

    ###########################################################################
    # Validate retrieved secrets
    ###########################################################################

    - name: Validate AAP gateway credentials
      ansible.builtin.assert:
        that:
          - controller_username | length > 0
          - controller_password | length > 0
          - controller_username != "None"
          - controller_password != "None"
        fail_msg: >-
          AAP gateway credentials could not be retrieved from AWS Secrets
          Manager.
      no_log: true

    - name: Validate Quay registry credentials
      ansible.builtin.assert:
        that:
          - quay_registry_username | length > 0
          - quay_registry_password | length > 0
          - quay_registry_username != "None"
          - quay_registry_password != "None"
        fail_msg: >-
          Quay registry credentials could not be retrieved from AWS Secrets
          Manager.
      no_log: true

    - name: Validate Terraform-generated SSH private key
      ansible.builtin.assert:
        that:
          - image_mode_ssh_private_key | length > 0
          - "'BEGIN' in image_mode_ssh_private_key"
          - "'PRIVATE KEY' in image_mode_ssh_private_key"
          - "'END' in image_mode_ssh_private_key"
        fail_msg: >-
          The Terraform-generated SSH private key could not be retrieved or is
          not a valid PEM private key.
      no_log: true

    - name: Validate Red Hat registry credentials
      ansible.builtin.assert:
        that:
          - redhat_registry_username | length > 0
          - redhat_registry_password | length > 0
          - redhat_registry_username != "None"
          - redhat_registry_password != "None"
        fail_msg: >-
          Red Hat registry credentials could not be retrieved from AWS Secrets
          Manager.
      no_log: true

    - name: Validate AAP vault password
      ansible.builtin.assert:
        that:
          - ansible_vault_password | length > 0
          - ansible_vault_password != "None"
        fail_msg: >-
          The AAP vault password could not be retrieved from AWS Secrets
          Manager.
      no_log: true

    ###########################################################################
    # Resolve Image Mode image names
    ###########################################################################

    - name: Validate selected RHEL Image Mode version
      ansible.builtin.assert:
        that:
          - rhel_version in image_mode_base_image_map
          - rhel_version in quay_registry_repository_map
        fail_msg: >-
          Unsupported RHEL Image Mode version '{{ rhel_version }}'.
          Supported versions are
          {{ image_mode_base_image_map.keys() | list | join(', ') }}.

    - name: Resolve Image Mode registry variables
      ansible.builtin.set_fact:
        image_mode_base_image: >-
          {{ image_mode_base_image_map[rhel_version] }}

        image_mode_registry_image: >-
          {{
            resolved_quay_hostname
            ~ '/'
            ~ quay_default_org
            ~ '/'
            ~ quay_registry_repository_map[rhel_version]
          }}

        image_mode_ee_image: >-
          {{
            resolved_quay_hostname
            ~ '/'
            ~ quay_default_org
            ~ '/'
            ~ image_mode_ee_repository
            ~ ':'
            ~ image_mode_ee_tag
          }}

    ###########################################################################
    # Resolve reachable AAP endpoint
    ###########################################################################

    - name: Build preferred AAP controller endpoint list
      ansible.builtin.set_fact:
        aap_controller_endpoint_candidates:
          - "https://{{ resolved_aap_fqdn }}"
          - "https://{{ resolved_aap_controller_ip }}"

    - name: Check available AAP controller endpoints
      ansible.builtin.uri:
        url: "{{ item }}/api/gateway/v1/status/"
        method: GET
        validate_certs: false
        status_code:
          - 200
          - 401
          - 403
        timeout: 15
      loop: "{{ aap_controller_endpoint_candidates }}"
      loop_control:
        label: "{{ item }}"
      register: aap_endpoint_checks
      failed_when: false
      changed_when: false

    - name: Select first reachable AAP controller endpoint
      ansible.builtin.set_fact:
        controller_host: >-
          {{
            (
              aap_endpoint_checks.results
              | selectattr('status', 'defined')
              | selectattr('status', 'in', [200, 401, 403])
              | map(attribute='item')
              | list
              | first
            )
            | default('')
          }}

    - name: Fail if no AAP controller endpoint is reachable
      ansible.builtin.fail:
        msg:
          - "AAP controller is not reachable using its FQDN or public IP."
          - "Tried FQDN: https://{{ resolved_aap_fqdn }}"
          - "Tried IP: https://{{ resolved_aap_controller_ip }}"
      when: controller_host | length == 0

    ###########################################################################
    # Configure variables used by infra.aap_configuration
    ###########################################################################

    - name: Set controller connection variables
      ansible.builtin.set_fact:
        controller_hostname: "{{ controller_host }}"
        controller_validate_certs: false

        aap_hostname: "{{ controller_host }}"
        aap_username: "{{ controller_username }}"
        aap_password: "{{ controller_password }}"
        aap_validate_certs: false
      no_log: true

    ###########################################################################
    # Verify controller authentication
    ###########################################################################

    - name: Verify AAP gateway authentication
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/gateway/v1/me/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        timeout: 30
      register: aap_authentication_check
      changed_when: false
      no_log: true

    ###########################################################################
    # Display resolved nonsecret configuration
    ###########################################################################

    - name: Show selected deployment endpoints
      ansible.builtin.debug:
        msg:
          - "AAP controller endpoint: {{ controller_host }}"
          - "Quay registry hostname: {{ resolved_quay_hostname }}"
          - "AWS region: {{ resolved_aws_region }}"
          - "AWS profile: {{ resolved_aws_profile }}"
          - "RHEL Image Mode version: {{ rhel_version }}"
          - "Base image: {{ image_mode_base_image }}"
          - >-
            Destination image:
            {{ image_mode_registry_image }}:{{ image_mode_image_tag }}
          - "Execution environment: {{ image_mode_ee_image }}"

  tasks:
    ###########################################################################
    # Organizations
    ###########################################################################

    - name: Configure AAP organizations
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_organizations
      tags:
        - organizations

    ###########################################################################
    # Credential types
    ###########################################################################

    - name: Configure AAP credential types
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_credential_types
      tags:
        - credential_types

    ###########################################################################
    # Credentials
    #
    # credentials.yml may reference:
    #
    # image_mode_ssh_private_key
    # aws_ssh_private_key
    # quay_registry_host
    # quay_registry_username
    # quay_registry_password
    # redhat_registry_host
    # redhat_registry_username
    # redhat_registry_password
    # ansible_vault_password
    # git_username
    # git_token
    ###########################################################################

    - name: Configure AAP credentials
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_credentials
      tags:
        - credentials
      no_log: true

    ###########################################################################
    # Inventories
    ###########################################################################

    - name: Set default AAP inventory definition
      ansible.builtin.set_fact:
        controller_inventories:
          - name: "{{ aap_inventory_name }}"
            description: >-
              Terraform-generated Image Mode Lab infrastructure inventory
            organization: "{{ aap_organization_name }}"
            variables:
              aws_region: "{{ resolved_aws_region }}"
              aws_profile: "{{ resolved_aws_profile }}"
              secret_prefix: "{{ secret_prefix }}"
              parent_domain_name: >-
                {{ parent_domain_name | default('') }}
              idm_domain_name: >-
                {{ idm_domain_name | default('') }}
              idm_realm_name: >-
                {{ idm_realm_name | default('') }}
              idm_server_fqdn: >-
                {{ idm_server_fqdn | default('') }}
              idm_server_ip: >-
                {{ idm_server_ip | default('') }}
              aap_fqdn: "{{ resolved_aap_fqdn }}"
              quay_hostname: "{{ resolved_quay_hostname }}"
            state: present
      when:
        - controller_inventories is not defined or
          controller_inventories | length == 0
      tags:
        - inventories

    - name: Configure AAP inventories
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_inventories
      tags:
        - inventories

    ###########################################################################
    # Execution environments
    ###########################################################################

    - name: Configure AAP execution environments
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_execution_environments
      tags:
        - execution_environments

    ###########################################################################
    # Projects
    ###########################################################################

    - name: Configure AAP projects
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_projects
      tags:
        - projects

    ###########################################################################
    # Inventory sources
    ###########################################################################

    - name: Set default Terraform inventory source definition
      ansible.builtin.set_fact:
        controller_inventory_sources:
          - name: "{{ terraform_inventory_source_name }}"
            description: >-
              Imports the Terraform-generated Ansible inventory from SCM
            organization: "{{ aap_organization_name }}"
            inventory: "{{ aap_inventory_name }}"
            source: scm
            source_project: "{{ aap_project_name }}"
            source_path: "{{ terraform_inventory_source_path }}"
            overwrite: true
            overwrite_vars: true
            update_on_launch: true
            update_cache_timeout: 0
            state: present
      when:
        - controller_inventory_sources is not defined or
          controller_inventory_sources | length == 0
      tags:
        - inventory_sources

    - name: Configure AAP inventory sources
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_inventory_sources
      tags:
        - inventory_sources

    - name: Synchronize Terraform inventory source
      ansible.controller.inventory_source_update:
        name: "{{ terraform_inventory_source_name }}"
        organization: "{{ aap_organization_name }}"
        inventory: "{{ aap_inventory_name }}"
        wait: true
        interval: 2
        timeout: 600
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: false
      tags:
        - inventory_sources
        - inventory_sync
      no_log: true

    ###########################################################################
    # Job templates
    ###########################################################################

    - name: Configure AAP job templates
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_job_templates
      tags:
        - job_templates

    ###########################################################################
    # Workflow job templates
    ###########################################################################

    # - name: Configure AAP workflow job templates
    #   ansible.builtin.include_role:
    #     name: infra.aap_configuration.controller_workflow_job_templates
    #   tags:
    #     - workflow_job_templates

  environment:
    AWS_REGION: "{{ resolved_aws_region }}"
    AWS_DEFAULT_REGION: "{{ resolved_aws_region }}"
    AWS_PROFILE: "{{ resolved_aws_profile }}"

    CONTROLLER_HOST: "{{ controller_host }}"
    CONTROLLER_USERNAME: "{{ controller_username }}"
    CONTROLLER_PASSWORD: "{{ controller_password }}"
    CONTROLLER_VERIFY_SSL: "false"

    TOWER_HOST: "{{ controller_host }}"
    TOWER_USERNAME: "{{ controller_username }}"
    TOWER_PASSWORD: "{{ controller_password }}"
    TOWER_VERIFY_SSL: "false"

  post_tasks:
    - name: Display completed AAP configuration
      ansible.builtin.debug:
        msg:
          - "AAP Image Mode CI/CD configuration completed."
          - "Organization: {{ aap_organization_name }}"
          - "Inventory: {{ aap_inventory_name }}"
          - "Inventory source: {{ terraform_inventory_source_name }}"
          - "AAP endpoint: {{ controller_host }}"
          - "Quay registry: {{ resolved_quay_hostname }}"
          - "Machine credential key source: AWS Secrets Manager"
          - "Quay credential source: AWS Secrets Manager"