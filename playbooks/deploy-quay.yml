---
- name: Configure single-node Red Hat Quay with AWS Secrets Manager and IdM LDAP
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    quay_container_uid: "1001"
    quay_container_gid: "0"

    quay_db_name: quay
    quay_db_user: quay

    quay_tls_cert_days: 3650
    quay_tls_country: US
    quay_tls_state: NC
    quay_tls_city: Raleigh
    quay_tls_org: Red Hat
    quay_tls_org_unit: Image Mode Lab

    ###########################################################################
    # Existing/default Quay organization and repository
    ###########################################################################

    quay_default_org: image-mode
    quay_default_repository: image-mode

    quay_default_team: writers
    quay_default_team_role: creator

    quay_owner_team: owners
    quay_owner_team_role: admin

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    redhat_registry_host: registry.redhat.io

    quay_force_clean_rebuild: false

    ###########################################################################
    # AAP robot account in the existing image-mode organization
    ###########################################################################

    quay_aap_robot_short_name: aap

    quay_aap_robot_username: >-
      {{ quay_default_org }}+{{ quay_aap_robot_short_name }}

    quay_aap_robot_description: >-
      AAP automation account for building and publishing Image Mode images

    # Explicit repository permission. write includes pull and push.
    quay_aap_repository_permission: write

    # The robot is also added to the existing writers team.
    quay_aap_team: "{{ quay_default_team }}"

    quay_aap_robot_secret_name: >-
      {{ secret_prefix }}/quay/aap_robot

    quay_aap_robot_authfile: >-
      /root/.config/containers/aap-quay-auth.json

    ###########################################################################
    # IdM LDAP directory structure
    ###########################################################################

    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"

    idm_user_container_relative_dn: "cn=users,cn=accounts"
    idm_group_container_relative_dn: "cn=groups,cn=accounts"

    idm_user_container_dn: >-
      {{ idm_user_container_relative_dn }},{{ idm_base_dn }}

    idm_group_container_dn: >-
      {{ idm_group_container_relative_dn }},{{ idm_base_dn }}

    ###########################################################################
    # Quay LDAP authentication
    ###########################################################################

    quay_ldap_uri: "ldaps://{{ idm_server_fqdn }}:636"

    quay_ldap_ca_remote_path: /etc/ipa/ca.crt
    quay_ldap_ca_host_path: "{{ quay_root }}/config/extra_ca_certs/idm-ca.crt"

    quay_ldap_base_dn: "{{ idm_base_dn }}"

    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts

    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail
    quay_ldap_bind_dn: "uid=admin,{{ idm_user_container_dn }}"
    quay_ldap_user_filter: "(&(objectClass=person)(uid=*))"
    quay_ldap_team_sync_stale_time: 60m

    ###########################################################################
    # Quay users and IdM groups
    ###########################################################################

    quay_admin_users: "{{ idm_users | default([]) | unique }}"
    quay_org_member_users: "{{ quay_admin_users }}"

    quay_idm_owner_group: "quay-{{ quay_default_org }}-owners"
    quay_idm_writer_group: "quay-{{ quay_default_org }}-writers"

    quay_idm_owner_group_relative_dn: >-
      cn={{ quay_idm_owner_group }},{{ idm_group_container_relative_dn }}

    quay_idm_writer_group_relative_dn: >-
      cn={{ quay_idm_writer_group }},{{ idm_group_container_relative_dn }}

    quay_idm_owner_group_dn: >-
      {{ quay_idm_owner_group_relative_dn }},{{ idm_base_dn }}

    quay_idm_writer_group_dn: >-
      {{ quay_idm_writer_group_relative_dn }},{{ idm_base_dn }}

    quay_ldap_superuser_filter: >-
      (memberOf={{ quay_idm_owner_group_dn }})

    quay_team_syncs:
      - team: "{{ quay_owner_team }}"
        role: "{{ quay_owner_team_role }}"
        idm_group: "{{ quay_idm_owner_group }}"
        group_dn: "{{ quay_idm_owner_group_relative_dn }}"
        full_group_dn: "{{ quay_idm_owner_group_dn }}"
        users: "{{ quay_admin_users }}"

      - team: "{{ quay_default_team }}"
        role: "{{ quay_default_team_role }}"
        idm_group: "{{ quay_idm_writer_group }}"
        group_dn: "{{ quay_idm_writer_group_relative_dn }}"
        full_group_dn: "{{ quay_idm_writer_group_dn }}"
        users: "{{ quay_org_member_users }}"

    ###########################################################################
    # AWS Secrets Manager paths
    ###########################################################################

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

    aws_cli_environment: >-
      {{
        {'AWS_PROFILE': aws_profile}
        if (
          aws_profile is defined
          and aws_profile | string | length > 0
        )
        else {}
      }}

  pre_tasks:
    - name: Validate Terraform inventory inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: >-
          Missing secret_prefix, aws_region, idm_domain_name,
          idm_server_fqdn, or the idm inventory group.

    - name: Read required secrets from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/{{ item.value }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Build required secret map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({item.item.key: item.stdout})
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets
      ansible.builtin.set_fact:
        redhat_registry_username: >-
          {{ quay_required_secrets.redhat_registry_username }}
        redhat_registry_password: >-
          {{ quay_required_secrets.redhat_registry_password }}
        quay_superuser: >-
          {{ quay_required_secrets.quay_superuser }}
        quay_db_password: >-
          {{ quay_required_secrets.quay_db_password }}
        quay_secret_key: >-
          {{ quay_required_secrets.quay_secret_key }}
        quay_database_secret_key: >-
          {{ quay_required_secrets.quay_database_secret_key }}
        quay_superuser_password: >-
          {{ quay_required_secrets.quay_superuser_password }}
        idm_admin_password: >-
          {{ quay_required_secrets.idm_admin_password }}
      no_log: true

    - name: Read optional Quay API token from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_admin_token_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Normalize optional Quay API token
      ansible.builtin.set_fact:
        quay_admin_access_token: >-
          {{
            ''
            if (
              quay_admin_token_result.rc != 0
              or quay_admin_token_result.stdout | default('') | trim == ''
              or quay_admin_token_result.stdout | default('') | trim
                 == 'CHANGE_ME_AFTER_QUAY_DEPLOYMENT'
            )
            else quay_admin_token_result.stdout | trim
          }}
      no_log: true

    - name: Read optional existing AAP robot secret
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ quay_aap_robot_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: existing_quay_aap_robot_secret_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Parse existing AAP robot secret
      ansible.builtin.set_fact:
        existing_quay_aap_robot_secret: >-
          {{ existing_quay_aap_robot_secret_result.stdout | from_json }}
      when:
        - existing_quay_aap_robot_secret_result.rc == 0
        - existing_quay_aap_robot_secret_result.stdout | trim | length > 0
      no_log: true

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname | length > 0
          - quay_root | length > 0
          - quay_image | length > 0
          - postgres_image | length > 0
          - redis_image | length > 0
          - quay_db_name | length > 0
          - quay_db_user | length > 0
          - quay_db_password | length > 0
          - quay_secret_key | length > 0
          - quay_database_secret_key | length > 0
          - quay_superuser | length > 0
          - quay_superuser_password | length > 0
          - quay_superuser_email | length > 0
          - redhat_registry_username | length > 0
          - redhat_registry_password | length > 0
          - quay_default_org | length > 0
          - quay_default_repository | length > 0
          - quay_default_team | length > 0
          - idm_admin_password | length > 0
          - quay_admin_users | length > 0
          - quay_aap_robot_short_name | length > 0
          - quay_aap_robot_username | length > 0
          - quay_aap_team | length > 0
          - quay_aap_repository_permission in ['read', 'write', 'admin']
          - quay_aap_robot_secret_name | length > 0
        fail_msg: >-
          Missing required Quay, robot, IdM, inventory, or AWS secret values.

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - jq
          - openldap-clients
        state: present

    - name: Stop old generated Quay systemd service if present
      ansible.builtin.systemd:
        name: pod-quay-pod.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove old generated systemd units if present
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service

    - name: Reload systemd after removing old units
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ quay_http_port }}"
        - "{{ quay_https_port }}"

    - name: Create Podman authentication directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: "{{ redhat_registry_host }}"
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"
      no_log: true

    - name: Pull required container images
      containers.podman.podman_image:
        name: "{{ item }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: present
      loop:
        - "{{ quay_image }}"
        - "{{ postgres_image }}"
        - "{{ redis_image }}"

    - name: Stop and remove existing Quay pod before reconciliation
      containers.podman.podman_pod:
        name: quay-pod
        state: absent

    - name: Remove persistent Quay data when clean rebuild is requested
      ansible.builtin.file:
        path: "{{ quay_root }}"
        state: absent
      when: quay_force_clean_rebuild | bool

    - name: Create Quay directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ quay_root }}"
          owner: root
          group: root
          mode: "0755"
        - path: "{{ quay_root }}/config"
          owner: "{{ quay_container_uid }}"
          group: "{{ quay_container_gid }}"
          mode: "0750"
        - path: "{{ quay_root }}/config/extra_ca_certs"
          owner: "{{ quay_container_uid }}"
          group: "{{ quay_container_gid }}"
          mode: "0750"
        - path: "{{ quay_root }}/storage"
          owner: root
          group: root
          mode: "0777"
        - path: "{{ quay_root }}/storage/registry"
          owner: root
          group: root
          mode: "0777"
        - path: "{{ quay_root }}/postgres"
          owner: "26"
          group: "26"
          mode: "0700"
        - path: "{{ quay_root }}/redis"
          owner: root
          group: root
          mode: "0777"

    - name: Define persistent SELinux labels
      ansible.builtin.command:
        argv:
          - semanage
          - fcontext
          - -a
          - -t
          - container_file_t
          - "{{ item }}"
      loop:
        - "{{ quay_root }}/config(/.*)?"
        - "{{ quay_root }}/storage(/.*)?"
        - "{{ quay_root }}/postgres(/.*)?"
        - "{{ quay_root }}/redis(/.*)?"
      register: quay_semanage_result
      changed_when: quay_semanage_result.rc == 0
      failed_when: >
        quay_semanage_result.rc != 0
        and 'already defined' not in quay_semanage_result.stderr | default('')

    - name: Restore SELinux labels
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}"
      register: quay_restorecon
      changed_when: quay_restorecon.stdout | length > 0

    - name: Inspect Quay TLS certificate
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.cert"
      register: quay_tls_cert_stat

    - name: Inspect Quay TLS private key
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.key"
      register: quay_tls_key_stat

    - name: Remove incomplete Quay TLS certificate pair
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ quay_root }}/config/ssl.cert"
        - "{{ quay_root }}/config/ssl.key"
      when: >
        not quay_tls_cert_stat.stat.exists
        or not quay_tls_key_stat.stat.exists

    - name: Generate self-signed TLS certificate for Quay
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -newkey
          - rsa:4096
          - -nodes
          - -sha256
          - -keyout
          - "{{ quay_root }}/config/ssl.key"
          - -x509
          - -days
          - "{{ quay_tls_cert_days | string }}"
          - -out
          - "{{ quay_root }}/config/ssl.cert"
          - -subj
          - >-
            /C={{ quay_tls_country }}/ST={{ quay_tls_state
            }}/L={{ quay_tls_city }}/O={{ quay_tls_org
            }}/OU={{ quay_tls_org_unit }}/CN={{ quay_hostname }}
          - -addext
          - "subjectAltName=DNS:{{ quay_hostname }}"
      when: >
        not quay_tls_cert_stat.stat.exists
        or not quay_tls_key_stat.stat.exists
      no_log: true

    - name: Set Quay TLS file ownership and permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: file
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ quay_root }}/config/ssl.key"
          mode: "0640"
        - path: "{{ quay_root }}/config/ssl.cert"
          mode: "0644"

    - name: Create and start Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"
      no_log: true

    - name: Run Redis container
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command:
          - redis-server
          - --save
          - "60"
          - "1"
          - --loglevel
          - warning
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - pg_isready
          - -h
          - 127.0.0.1
          - -p
          - "5432"
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable PostgreSQL pg_trgm
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -c
          - CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Read IdM CA certificate
      ansible.builtin.slurp:
        src: "{{ quay_ldap_ca_remote_path }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_idm_ca
      changed_when: false

    - name: Install IdM CA for Quay and the host
      ansible.builtin.copy:
        dest: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "0644"
        content: "{{ quay_idm_ca.content | b64decode }}"
      loop:
        - path: "{{ quay_ldap_ca_host_path }}"
          owner: "{{ quay_container_uid }}"
          group: "{{ quay_container_gid }}"
        - path: /etc/pki/ca-trust/source/anchors/idm-ca.crt
          owner: root
          group: root
      register: quay_ca_copy

    - name: Refresh host CA trust
      ansible.builtin.command:
        argv:
          - update-ca-trust
      changed_when: quay_ca_copy.changed

    - name: Verify IdM LDAP bind over LDAPS
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ idm_user_container_dn }}"
          - "{{ quay_ldap_user_filter }}"
          - dn
          - uid
          - mail
      changed_when: false
      no_log: true

    - name: Obtain IdM administrator Kerberos ticket
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n' {{ idm_admin_password | quote }} | kinit admin
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      changed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Ensure IdM groups exist for Quay synchronization
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ item.idm_group }}"
          - >-
            --desc=Quay {{ quay_default_org }}
            {{ item.team }} synchronized team
      loop: "{{ quay_team_syncs }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_add
      changed_when: idm_group_add.rc == 0
      failed_when: >
        idm_group_add.rc != 0
        and 'already exists' not in idm_group_add.stderr | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Add IdM users to Quay synchronization groups
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.0.idm_group }}"
          - "--users={{ item.1 }}"
      loop: "{{ quay_team_syncs | subelements('users') }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_member_add
      changed_when: >-
        'Number of members added 1' in idm_group_member_add.stdout
      failed_when: >
        idm_group_member_add.rc != 0
        and 'Number of members added 0'
            not in idm_group_member_add.stdout | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    ###########################################################################
    # Bootstrap Quay with database authentication
    ###########################################################################

    - name: Write bootstrap Quay configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          ROBOTS_DISALLOW: false
          BROWSER_API_CALLS_XHR_ONLY: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore configuration SELinux labels
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}/config"
      changed_when: false

    - name: Run Quay registry in bootstrap mode
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for Quay HTTPS in bootstrap mode
      ansible.builtin.command:
        argv:
          - curl
          - -kfsS
          - --connect-timeout
          - "5"
          - --max-time
          - "15"
          - "https://127.0.0.1:{{ quay_https_port }}/"
      register: quay_bootstrap_https_check
      retries: 60
      delay: 5
      until: quay_bootstrap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Fail when Quay bootstrap startup fails
      ansible.builtin.fail:
        msg: >-
          Quay did not respond in database-authentication bootstrap mode.
          Inspect with: podman logs quay-registry
      when: quay_bootstrap_https_check.rc != 0

    - name: Initialize the Quay bootstrap administrator
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code:
          - 200
          - 201
          - 400
      register: quay_init_user
      no_log: true
      failed_when: false

    - name: Select generated or stored Quay API token
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default(quay_admin_access_token, true)
          }}
      no_log: true

    - name: Read locally cached bootstrap token when needed
      ansible.builtin.slurp:
        src: "{{ quay_root }}/config/bootstrap-token"
      register: local_bootstrap_token
      failed_when: false
      no_log: true
      when: quay_api_token | default('') | length == 0

    - name: Use locally cached bootstrap token
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{ local_bootstrap_token.content | b64decode | trim }}
      when:
        - quay_api_token | default('') | length == 0
        - local_bootstrap_token.content is defined
      no_log: true

    - name: Fail when no Quay API token is available
      ansible.builtin.fail:
        msg: >-
          No Quay API token is available. Store a valid token at
          {{ secret_prefix }}/quay/admin_access_token for existing databases.
      when: quay_api_token | default('') | length == 0

    - name: Cache Quay API token locally
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/bootstrap-token"
        owner: root
        group: root
        mode: "0600"
        content: "{{ quay_api_token }}"
      no_log: true

    - name: Check whether the Quay API token secret exists
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - describe-secret
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
      register: quay_api_token_secret_lookup
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Create the Quay API token secret when absent
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - create-secret
          - --name
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_api_token }}"
      when: quay_api_token_secret_lookup.rc != 0
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Update the Quay API token secret when present
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_api_token }}"
      when: quay_api_token_secret_lookup.rc == 0
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Mark the bootstrap administrator as verified
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - -i
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -v
          - "quay_username={{ quay_superuser }}"
          - -X
          - --no-psqlrc
          - -t
          - -A
        stdin: |
          UPDATE public."user"
          SET verified = true
          WHERE username = :'quay_username';

          SELECT CASE
            WHEN EXISTS (
              SELECT 1
              FROM public."user"
              WHERE username = :'quay_username'
                AND verified = true
            )
            THEN 'BOOTSTRAP_ADMIN_VERIFIED'
            ELSE 'BOOTSTRAP_ADMIN_NOT_FOUND'
          END;
      register: quay_verify_bootstrap_admin
      changed_when: "'UPDATE 1' in quay_verify_bootstrap_admin.stdout"
      failed_when: >
        quay_verify_bootstrap_admin.rc != 0
        or 'BOOTSTRAP_ADMIN_VERIFIED'
           not in quay_verify_bootstrap_admin.stdout
      no_log: true

    ###########################################################################
    # Existing/default organization, teams, repository, and AAP robot
    ###########################################################################

    - name: Ensure the default Quay organization exists
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_org
      no_log: true
      failed_when: >
        quay_create_org.status == 400
        and (
          quay_create_org.json.error_message | default('')
          is not search('already|exists')
        )

    - name: Ensure owner and writer teams exist
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: "{{ item.role }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_team_syncs }}"
      no_log: true

    - name: Add bootstrap administrator to owners
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ quay_owner_team
          }}/members/{{ quay_superuser | urlencode }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      failed_when: false
      no_log: true

    - name: Check whether the existing default repository exists
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/repository/{{ quay_default_org
          }}/{{ quay_default_repository }}
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code:
          - 200
          - 404
        return_content: true
      register: quay_default_repository_lookup
      changed_when: false
      no_log: true

    - name: Create the default repository beneath the existing organization
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/repository
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        body_format: json
        body:
          repository: "{{ quay_default_repository }}"
          namespace: "{{ quay_default_org }}"
          description: >-
            Image Mode container images built and published by AAP
          visibility: private
        status_code:
          - 200
          - 201
          - 400
        return_content: true
      when: quay_default_repository_lookup.status == 404
      register: quay_default_repository_create
      changed_when: quay_default_repository_create.status in [200, 201]
      failed_when: >
        quay_default_repository_create.status == 400
        and (
          quay_default_repository_create.json.error_message
          | default(
              quay_default_repository_create.json.message | default('')
            )
          is not search('already|exists')
        )
      no_log: true

    - name: Check whether the AAP robot exists in the default organization
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/robots/{{ quay_aap_robot_short_name }}
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code:
          - 200
          - 404
        return_content: true
      register: quay_aap_robot_lookup
      changed_when: false
      no_log: true

    - name: Create the AAP robot in the existing default organization
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/robots/{{ quay_aap_robot_short_name }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        body_format: json
        body:
          description: "{{ quay_aap_robot_description }}"
        status_code:
          - 200
          - 201
          - 400
        return_content: true
      when: quay_aap_robot_lookup.status == 404
      register: quay_aap_robot_create
      changed_when: quay_aap_robot_create.status in [200, 201]
      failed_when: >
        quay_aap_robot_create.status == 400
        and (
          quay_aap_robot_create.json.error_message
          | default(quay_aap_robot_create.json.message | default(''))
          is not search('already|exists')
        )
      no_log: true

    - name: Read the reconciled AAP robot
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/robots/{{ quay_aap_robot_short_name }}
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code: 200
        return_content: true
      register: quay_aap_robot_details
      changed_when: false
      no_log: true

    - name: Select robot token returned by Quay
      ansible.builtin.set_fact:
        quay_aap_robot_token: >-
          {{
            (
              quay_aap_robot_create.json.token
              if (
                quay_aap_robot_create is defined
                and quay_aap_robot_create.json is defined
                and quay_aap_robot_create.json.token is defined
              )
              else quay_aap_robot_details.json.token | default('')
            )
          }}
      no_log: true

    - name: Reuse the robot token stored in AWS when necessary
      ansible.builtin.set_fact:
        quay_aap_robot_token: >-
          {{
            existing_quay_aap_robot_secret.password
            | default(existing_quay_aap_robot_secret.token | default(''))
          }}
      when:
        - quay_aap_robot_token | default('') | length == 0
        - existing_quay_aap_robot_secret is defined
        - existing_quay_aap_robot_secret.username | default('')
          == quay_aap_robot_username
      no_log: true

    - name: Regenerate the AAP robot token when no usable token exists
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/robots/{{ quay_aap_robot_short_name }}/regenerate
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code:
          - 200
          - 201
        return_content: true
      when: quay_aap_robot_token | default('') | length == 0
      register: quay_aap_robot_regenerate
      changed_when: true
      no_log: true

    - name: Select regenerated AAP robot token
      ansible.builtin.set_fact:
        quay_aap_robot_token: "{{ quay_aap_robot_regenerate.json.token }}"
      when:
        - quay_aap_robot_token | default('') | length == 0
        - quay_aap_robot_regenerate.json.token is defined
      no_log: true

    - name: Validate AAP robot identity and token
      ansible.builtin.assert:
        that:
          - quay_aap_robot_username ==
            quay_default_org ~ '+' ~ quay_aap_robot_short_name
          - quay_aap_robot_token | default('') | length > 0
        fail_msg: >-
          The AAP robot exists in {{ quay_default_org }}, but no usable
          robot token could be obtained.
      no_log: true

    - name: Add AAP robot to the existing writers team
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ quay_aap_team
          }}/members/{{ quay_aap_robot_username | urlencode }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code:
          - 200
          - 201
          - 204
          - 400
        return_content: true
      register: quay_aap_robot_team_membership
      changed_when: quay_aap_robot_team_membership.status in [200, 201, 204]
      failed_when: >
        quay_aap_robot_team_membership.status == 400
        and (
          quay_aap_robot_team_membership.json.error_message
          | default(
              quay_aap_robot_team_membership.json.message | default('')
            )
          is not search('already|exists|member')
        )
      no_log: true

    - name: Grant AAP robot write access to the existing repository
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/repository/{{ quay_default_org
          }}/{{ quay_default_repository
          }}/permissions/user/{{ quay_aap_robot_username | urlencode }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        body_format: json
        body:
          role: "{{ quay_aap_repository_permission }}"
        status_code:
          - 200
          - 201
        return_content: true
      register: quay_aap_robot_permission_update
      changed_when: true
      no_log: true

    - name: Verify AAP robot repository permission
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/repository/{{ quay_default_org
          }}/{{ quay_default_repository
          }}/permissions/user/{{ quay_aap_robot_username | urlencode }}
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code: 200
        return_content: true
      register: quay_aap_robot_permission_verify
      changed_when: false
      failed_when: >
        quay_aap_robot_permission_verify.json.role | default('')
        != quay_aap_repository_permission
      no_log: true

    - name: Build AAP robot AWS secret document
      ansible.builtin.set_fact:
        quay_aap_robot_secret_document:
          registry: "{{ quay_hostname }}"
          registry_url: "https://{{ quay_hostname }}"
          organization: "{{ quay_default_org }}"
          repository: "{{ quay_default_repository }}"
          image_repository: >-
            {{ quay_hostname }}/{{ quay_default_org
            }}/{{ quay_default_repository }}
          username: "{{ quay_aap_robot_username }}"
          password: "{{ quay_aap_robot_token }}"
          token: "{{ quay_aap_robot_token }}"
          team: "{{ quay_aap_team }}"
          permission: "{{ quay_aap_repository_permission }}"
      no_log: true

    - name: Check whether the AAP robot secret exists
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - describe-secret
          - --secret-id
          - "{{ quay_aap_robot_secret_name }}"
          - --region
          - "{{ aws_region }}"
      register: quay_aap_robot_secret_lookup
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Create AAP robot secret when absent
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - create-secret
          - --name
          - "{{ quay_aap_robot_secret_name }}"
          - --description
          - Quay robot credential used by AAP for Image Mode builds
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_aap_robot_secret_document | to_json }}"
      when: quay_aap_robot_secret_lookup.rc != 0
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Update existing AAP robot secret
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ quay_aap_robot_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_aap_robot_secret_document | to_json }}"
      when: quay_aap_robot_secret_lookup.rc == 0
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment: "{{ aws_cli_environment }}"

    ###########################################################################
    # Final LDAP configuration
    ###########################################################################

    - name: Stop Quay before enabling LDAP
      containers.podman.podman_container:
        name: quay-registry
        state: stopped

    - name: Write final Quay LDAP configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: false
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          ROBOTS_DISALLOW: false
          BROWSER_API_CALLS_XHR_ONLY: false

          FEATURE_TEAM_SYNCING: true
          TEAM_RESYNC_STALE_TIME: "{{ quay_ldap_team_sync_stale_time }}"
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"

          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"

          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"

          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}

          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"
          LDAP_SUPERUSER_FILTER: "{{ quay_ldap_superuser_filter }}"
          LDAP_TIMEOUT: 15
          LDAP_NETWORK_TIMEOUT: 15

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore SELinux labels after LDAP configuration
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}/config"
      changed_when: false

    - name: Start Quay with LDAP authentication
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for Quay after LDAP switch
      ansible.builtin.command:
        argv:
          - curl
          - -kfsS
          - --connect-timeout
          - "5"
          - --max-time
          - "15"
          - "https://127.0.0.1:{{ quay_https_port }}/"
      register: quay_ldap_https_check
      retries: 60
      delay: 5
      until: quay_ldap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Fail when Quay does not start with LDAP
      ansible.builtin.fail:
        msg: >-
          Quay did not respond after switching to IdM LDAP authentication.
          Inspect with: podman logs quay-registry
      when: quay_ldap_https_check.rc != 0

    ###########################################################################
    # Validate Quay-native robot authentication after LDAP is enabled
    ###########################################################################

    - name: Remove previous temporary AAP robot authentication file
      ansible.builtin.file:
        path: "{{ quay_aap_robot_authfile }}"
        state: absent

    - name: Log in to LDAP-enabled Quay with the AAP robot
      containers.podman.podman_login:
        registry: "{{ quay_hostname }}"
        username: "{{ quay_aap_robot_username }}"
        password: "{{ quay_aap_robot_token }}"
        authfile: "{{ quay_aap_robot_authfile }}"
        tlsverify: false
        reauthorize: true
      register: quay_aap_robot_login
      no_log: true

    - name: Request robot pull and push authorization
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/v2/auth?service={{ quay_hostname | urlencode
          }}&scope=repository:{{ quay_default_org
          }}/{{ quay_default_repository }}:pull,push
        method: GET
        validate_certs: false
        force_basic_auth: true
        url_username: "{{ quay_aap_robot_username }}"
        url_password: "{{ quay_aap_robot_token }}"
        status_code: 200
        return_content: true
      register: quay_aap_robot_registry_authorization
      changed_when: false
      no_log: true

    - name: Validate AAP robot after LDAP switch
      ansible.builtin.assert:
        that:
          - quay_aap_robot_login is succeeded
          - quay_aap_robot_registry_authorization.status == 200
          - >-
            (
              quay_aap_robot_registry_authorization.json.token
              | default(
                  quay_aap_robot_registry_authorization.json.access_token
                  | default('')
                )
            ) | length > 0
        fail_msg: >-
          {{ quay_aap_robot_username }} could not obtain pull and push
          authorization for
          {{ quay_default_org }}/{{ quay_default_repository }}
          after Quay switched to LDAP.
      no_log: true

    - name: Remove temporary AAP robot authentication file
      ansible.builtin.file:
        path: "{{ quay_aap_robot_authfile }}"
        state: absent

    ###########################################################################
    # Enable and validate LDAP team synchronization
    ###########################################################################

    - name: Enable LDAP synchronization for Quay teams
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}/syncing
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          group_dn: "{{ item.group_dn }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_enable_team_sync
      no_log: true
      failed_when: >
        quay_enable_team_sync.status == 400
        and (
          quay_enable_team_sync.json.error_message | default('')
          is not search('already|exists|enabled')
        )

    - name: Read synchronized Quay team configuration
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}/permissions
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code: 200
        return_content: true
      loop: "{{ quay_team_syncs }}"
      loop_control:
        label: "{{ item.team }}"
      register: quay_synced_teams
      changed_when: false
      no_log: true

    - name: Show synchronized Quay team validation
      ansible.builtin.debug:
        msg:
          team: "{{ item.item.team }}"
          role: "{{ item.item.role }}"
          idm_group: "{{ item.item.idm_group }}"
          group_dn: "{{ item.item.group_dn }}"
          api_status: "{{ item.status }}"
          repository_permissions: >-
            {{ item.json.permissions | default([]) }}
      loop: "{{ quay_synced_teams.results }}"
      loop_control:
        label: "{{ item.item.team }}"

    - name: Display deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Authentication: IdM LDAP"
          - "Organization: {{ quay_default_org }}"
          - >-
            Existing/default repository:
            {{ quay_default_org }}/{{ quay_default_repository }}
          - "AAP robot: {{ quay_aap_robot_username }}"
          - "AAP robot team: {{ quay_aap_team }}"
          - >-
            AAP robot repository permission:
            {{ quay_aap_repository_permission }}
          - >-
            AAP image path:
            {{ quay_hostname }}/{{ quay_default_org
            }}/{{ quay_default_repository }}
          - >-
            AAP robot AWS secret:
            {{ quay_aap_robot_secret_name }}
          - >-
            Robot authentication was validated after the LDAP switch.
          - "IdM owner group: {{ quay_idm_owner_group_dn }}"
          - "IdM writer group: {{ quay_idm_writer_group_dn }}"

    - name: Show running containers
      ansible.builtin.command:
        argv:
          - podman
          - ps
      register: podman_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        msg: >-
          {{ podman_ps.stdout_lines
          | default(['podman ps was not executed']) }}
