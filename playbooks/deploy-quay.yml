---
- name: Configure single-node Red Hat Quay with AWS Secrets Manager and IdM LDAP
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    quay_container_uid: "1001"
    quay_container_gid: "0"

    quay_db_name: quay
    quay_db_user: quay

    quay_tls_cert_days: 3650
    quay_tls_country: US
    quay_tls_state: NC
    quay_tls_city: Raleigh
    quay_tls_org: Red Hat
    quay_tls_org_unit: Image Mode Lab

    quay_default_org: image-mode
    quay_default_team: writers
    quay_default_team_role: creator

    quay_owner_team: owners
    quay_owner_team_role: admin

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    redhat_registry_host: registry.redhat.io
    quay_force_clean_rebuild: false

    ###########################################################################
    # Dedicated IdM LDAP registry account
    ###########################################################################

    quay_registry_ldap_username: image-mode-builder
    quay_registry_ldap_first_name: Image
    quay_registry_ldap_last_name: Mode Builder
    quay_registry_ldap_email: image-mode-builder@example.com

    quay_registry_ldap_password_secret_path: >-
      quay/ldap_users/{{ quay_registry_ldap_username }}/password

    quay_registry_ldap_password_secret_name: >-
      {{ secret_prefix }}/{{ quay_registry_ldap_password_secret_path }}

    quay_registry_ldap_authfile: >-
      /root/.config/containers/{{ quay_registry_ldap_username }}-auth.json

    quay_registry_ldap_password_expiration: "20380119031407Z"

    ###########################################################################
    # Managed repositories
    ###########################################################################

    quay_managed_repositories:
      - name: image-mode-base
        description: Base image for Image Mode builds
        visibility: private
      - name: image-mode-development
        description: Image Mode development images
        visibility: private
      - name: image-mode-production
        description: Image Mode production images
        visibility: private

    ###########################################################################
    # IdM LDAP directory structure
    ###########################################################################

    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"
    idm_user_container_relative_dn: "cn=users,cn=accounts"
    idm_group_container_relative_dn: "cn=groups,cn=accounts"

    idm_user_container_dn: >-
      {{ idm_user_container_relative_dn }},{{ idm_base_dn }}

    idm_group_container_dn: >-
      {{ idm_group_container_relative_dn }},{{ idm_base_dn }}

    ###########################################################################
    # Quay LDAP authentication
    ###########################################################################

    quay_ldap_uri: "ldaps://{{ idm_server_fqdn }}:636"
    quay_ldap_ca_remote_path: /etc/ipa/ca.crt
    quay_ldap_ca_host_path: "{{ quay_root }}/config/extra_ca_certs/idm-ca.crt"

    quay_ldap_base_dn: "{{ idm_base_dn }}"

    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts

    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail
    quay_ldap_bind_dn: "uid=admin,{{ idm_user_container_dn }}"
    quay_ldap_user_filter: "(&(objectClass=person)(uid=*))"
    quay_ldap_team_sync_stale_time: 60m

    ###########################################################################
    # Quay users and IdM groups
    ###########################################################################

    quay_admin_users: "{{ idm_users | default([]) | unique }}"
    quay_org_member_users: "{{ quay_admin_users }}"

    quay_writer_users: >-
      {{
        (
          quay_org_member_users
          + [quay_registry_ldap_username]
        )
        | unique
        | list
      }}

    quay_idm_owner_group: "quay-{{ quay_default_org }}-owners"
    quay_idm_writer_group: "quay-{{ quay_default_org }}-writers"

    quay_idm_owner_group_relative_dn: >-
      cn={{ quay_idm_owner_group }},{{ idm_group_container_relative_dn }}

    quay_idm_writer_group_relative_dn: >-
      cn={{ quay_idm_writer_group }},{{ idm_group_container_relative_dn }}

    quay_idm_owner_group_dn: >-
      {{ quay_idm_owner_group_relative_dn }},{{ idm_base_dn }}

    quay_idm_writer_group_dn: >-
      {{ quay_idm_writer_group_relative_dn }},{{ idm_base_dn }}

    quay_ldap_superuser_filter: >-
      (memberOf={{ quay_idm_owner_group_dn }})

    quay_team_syncs:
      - team: "{{ quay_owner_team }}"
        role: "{{ quay_owner_team_role }}"
        idm_group: "{{ quay_idm_owner_group }}"
        group_dn: "{{ quay_idm_owner_group_relative_dn }}"
        full_group_dn: "{{ quay_idm_owner_group_dn }}"
        users: "{{ quay_admin_users }}"

      - team: "{{ quay_default_team }}"
        role: "{{ quay_default_team_role }}"
        idm_group: "{{ quay_idm_writer_group }}"
        group_dn: "{{ quay_idm_writer_group_relative_dn }}"
        full_group_dn: "{{ quay_idm_writer_group_dn }}"
        users: "{{ quay_writer_users }}"

    ###########################################################################
    # AWS Secrets Manager paths
    ###########################################################################

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

    aws_cli_environment: >-
      {{
        {'AWS_PROFILE': aws_profile}
        if (
          aws_profile is defined
          and aws_profile | string | length > 0
        )
        else {}
      }}

  pre_tasks:
    - name: Validate Terraform inventory inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: >-
          Missing secret_prefix, aws_region, idm_domain_name,
          idm_server_fqdn, or the idm inventory group.

    - name: Read required secrets from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/{{ item.value }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Build required secret map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({item.item.key: item.stdout})
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets
      ansible.builtin.set_fact:
        redhat_registry_username: "{{ quay_required_secrets.redhat_registry_username }}"
        redhat_registry_password: "{{ quay_required_secrets.redhat_registry_password }}"
        quay_superuser: "{{ quay_required_secrets.quay_superuser }}"
        quay_db_password: "{{ quay_required_secrets.quay_db_password }}"
        quay_secret_key: "{{ quay_required_secrets.quay_secret_key }}"
        quay_database_secret_key: "{{ quay_required_secrets.quay_database_secret_key }}"
        quay_superuser_password: "{{ quay_required_secrets.quay_superuser_password }}"
        idm_admin_password: "{{ quay_required_secrets.idm_admin_password }}"
      no_log: true

    - name: Read optional Quay bootstrap API token
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_admin_token_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Normalize optional Quay bootstrap API token
      ansible.builtin.set_fact:
        quay_admin_access_token: >-
          {{
            ''
            if (
              quay_admin_token_result.rc != 0
              or quay_admin_token_result.stdout | default('') | trim == ''
              or quay_admin_token_result.stdout | default('') | trim
                 == 'CHANGE_ME_AFTER_QUAY_DEPLOYMENT'
            )
            else quay_admin_token_result.stdout | trim
          }}
      no_log: true

    - name: Read existing dedicated Quay LDAP password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ quay_registry_ldap_password_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_registry_ldap_password_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Generate dedicated Quay LDAP password when absent
      ansible.builtin.set_fact:
        quay_registry_ldap_password: >-
          {{
            lookup(
              'ansible.builtin.password',
              '/dev/null',
              length=40,
              chars=['ascii_letters', 'digits']
            )
          }}
        quay_registry_ldap_password_generated: true
      when:
        - quay_registry_ldap_password_result.rc != 0
          or quay_registry_ldap_password_result.stdout | default('') | trim | length == 0
      no_log: true

    - name: Reuse existing dedicated Quay LDAP password
      ansible.builtin.set_fact:
        quay_registry_ldap_password: "{{ quay_registry_ldap_password_result.stdout | trim }}"
        quay_registry_ldap_password_generated: false
      when:
        - quay_registry_ldap_password_result.rc == 0
        - quay_registry_ldap_password_result.stdout | default('') | trim | length > 0
      no_log: true

    - name: Create AWS secret for generated dedicated Quay LDAP password
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - create-secret
          - --name
          - "{{ quay_registry_ldap_password_secret_name }}"
          - --description
          - "IdM LDAP password for Quay registry user {{ quay_registry_ldap_username }}"
          - --secret-string
          - "{{ quay_registry_ldap_password }}"
          - --region
          - "{{ aws_region }}"
      delegate_to: localhost
      become: false
      register: quay_registry_ldap_secret_create
      changed_when: quay_registry_ldap_secret_create.rc == 0
      failed_when: >
        quay_registry_ldap_secret_create.rc != 0
        and 'ResourceExistsException' not in
            quay_registry_ldap_secret_create.stderr | default('')
      no_log: true
      environment: "{{ aws_cli_environment }}"
      when: quay_registry_ldap_password_generated | bool

    - name: Persist generated password when the secret already existed
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ quay_registry_ldap_password_secret_name }}"
          - --secret-string
          - "{{ quay_registry_ldap_password }}"
          - --region
          - "{{ aws_region }}"
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment: "{{ aws_cli_environment }}"
      when:
        - quay_registry_ldap_password_generated | bool
        - quay_registry_ldap_secret_create.rc != 0

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname | length > 0
          - quay_root | length > 0
          - quay_db_password | length > 0
          - quay_secret_key | length > 0
          - quay_database_secret_key | length > 0
          - quay_superuser | length > 0
          - quay_superuser_password | length > 0
          - idm_admin_password | length > 0
          - quay_admin_users | length > 0
          - quay_registry_ldap_username | length > 0
          - quay_registry_ldap_password | length >= 32
        fail_msg: Missing required Quay, IdM, inventory, or AWS secret values.

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - jq
          - openldap-clients
        state: present

    - name: Stop old generated Quay systemd service if present
      ansible.builtin.systemd:
        name: pod-quay-pod.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove old generated systemd units
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ quay_http_port }}"
        - "{{ quay_https_port }}"

    - name: Create Podman authentication directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: "{{ redhat_registry_host }}"
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"
      no_log: true

    - name: Pull required container images
      containers.podman.podman_image:
        name: "{{ item }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: present
      loop:
        - "{{ quay_image }}"
        - "{{ postgres_image }}"
        - "{{ redis_image }}"

    - name: Remove existing Quay pod before reconciliation
      containers.podman.podman_pod:
        name: quay-pod
        state: absent

    - name: Remove persistent Quay data for clean rebuild
      ansible.builtin.file:
        path: "{{ quay_root }}"
        state: absent
      when: quay_force_clean_rebuild | bool

    - name: Create Quay directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - {path: "{{ quay_root }}", owner: root, group: root, mode: "0755"}
        - {path: "{{ quay_root }}/config", owner: "{{ quay_container_uid }}", group: "{{ quay_container_gid }}", mode: "0750"}
        - {path: "{{ quay_root }}/config/extra_ca_certs", owner: "{{ quay_container_uid }}", group: "{{ quay_container_gid }}", mode: "0750"}
        - {path: "{{ quay_root }}/storage", owner: root, group: root, mode: "0777"}
        - {path: "{{ quay_root }}/storage/registry", owner: root, group: root, mode: "0777"}
        - {path: "{{ quay_root }}/postgres", owner: "26", group: "26", mode: "0700"}
        - {path: "{{ quay_root }}/redis", owner: root, group: root, mode: "0777"}

    - name: Define persistent SELinux labels
      ansible.builtin.command:
        argv:
          - semanage
          - fcontext
          - -a
          - -t
          - container_file_t
          - "{{ item }}"
      loop:
        - "{{ quay_root }}/config(/.*)?"
        - "{{ quay_root }}/storage(/.*)?"
        - "{{ quay_root }}/postgres(/.*)?"
        - "{{ quay_root }}/redis(/.*)?"
      register: quay_semanage_result
      changed_when: quay_semanage_result.rc == 0
      failed_when: >
        quay_semanage_result.rc != 0
        and 'already defined' not in quay_semanage_result.stderr | default('')

    - name: Restore SELinux labels
      ansible.builtin.command:
        argv: [restorecon, -RFv, "{{ quay_root }}"]
      register: quay_restorecon
      changed_when: quay_restorecon.stdout | length > 0

    - name: Check TLS certificate
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.cert"
      register: quay_tls_cert_stat

    - name: Check TLS key
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.key"
      register: quay_tls_key_stat

    - name: Generate self-signed Quay TLS certificate
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -newkey
          - rsa:4096
          - -nodes
          - -sha256
          - -keyout
          - "{{ quay_root }}/config/ssl.key"
          - -x509
          - -days
          - "{{ quay_tls_cert_days | string }}"
          - -out
          - "{{ quay_root }}/config/ssl.cert"
          - -subj
          - "/C={{ quay_tls_country }}/ST={{ quay_tls_state }}/L={{ quay_tls_city }}/O={{ quay_tls_org }}/OU={{ quay_tls_org_unit }}/CN={{ quay_hostname }}"
          - -addext
          - "subjectAltName=DNS:{{ quay_hostname }}"
      when: not quay_tls_cert_stat.stat.exists or not quay_tls_key_stat.stat.exists
      no_log: true

    - name: Set TLS file ownership
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "{{ item.mode }}"
      loop:
        - {path: "{{ quay_root }}/config/ssl.key", mode: "0640"}
        - {path: "{{ quay_root }}/config/ssl.cert", mode: "0644"}

    - name: Create and start Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"
      no_log: true

    - name: Run Redis container
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command: [redis-server, --save, "60", "1", --loglevel, warning]
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - pg_isready
          - -h
          - 127.0.0.1
          - -p
          - "5432"
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable pg_trgm
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -c
          - CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Read IdM CA certificate
      ansible.builtin.slurp:
        src: "{{ quay_ldap_ca_remote_path }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_idm_ca
      changed_when: false

    - name: Install IdM CA for Quay
      ansible.builtin.copy:
        dest: "{{ quay_ldap_ca_host_path }}"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0644"
        content: "{{ quay_idm_ca.content | b64decode }}"

    - name: Install IdM CA into system trust
      ansible.builtin.copy:
        dest: /etc/pki/ca-trust/source/anchors/idm-ca.crt
        owner: root
        group: root
        mode: "0644"
        content: "{{ quay_idm_ca.content | b64decode }}"
      register: quay_system_ca_copy

    - name: Refresh system CA trust
      ansible.builtin.command: update-ca-trust
      changed_when: quay_system_ca_copy.changed

    - name: Validate IdM LDAP bind
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ idm_user_container_dn }}"
          - "{{ quay_ldap_user_filter }}"
          - dn
          - uid
          - mail
      changed_when: false
      no_log: true

    - name: Obtain IdM administrator Kerberos ticket
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n' {{ idm_admin_password | quote }} | kinit admin
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      changed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Check dedicated IdM registry user
      ansible.builtin.command:
        argv: [ipa, user-show, "{{ quay_registry_ldap_username }}", --all, --raw]
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_check
      changed_when: false
      failed_when: false
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Create dedicated IdM registry user
      ansible.builtin.command:
        argv:
          - ipa
          - user-add
          - "{{ quay_registry_ldap_username }}"
          - "--first={{ quay_registry_ldap_first_name }}"
          - "--last={{ quay_registry_ldap_last_name }}"
          - "--email={{ quay_registry_ldap_email }}"
          - --password
        stdin: |
          {{ quay_registry_ldap_password }}
          {{ quay_registry_ldap_password }}
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_create
      changed_when: quay_registry_idm_user_create.rc == 0
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin
      when: quay_registry_idm_user_check.rc != 0

    - name: Mark dedicated IdM registry password active and long-lived
      ansible.builtin.command:
        argv:
          - ipa
          - user-mod
          - "{{ quay_registry_ldap_username }}"
          - "--setattr=krbLastPwdChange={{ ansible_date_time.iso8601_basic_short }}Z"
          - "--setattr=krbPasswordExpiration={{ quay_registry_ldap_password_expiration }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_password_attributes
      changed_when: quay_registry_password_attributes.rc == 0
      failed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin
      when: quay_registry_idm_user_check.rc != 0

    - name: Ensure IdM groups exist for Quay synchronization
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ item.idm_group }}"
          - "--desc=Quay {{ quay_default_org }} {{ item.team }} synchronized team"
      loop: "{{ quay_team_syncs }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_add
      changed_when: idm_group_add.rc == 0
      failed_when: >
        idm_group_add.rc != 0
        and 'already exists' not in idm_group_add.stderr | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Add IdM users to Quay synchronization groups
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.0.idm_group }}"
          - "--users={{ item.1 }}"
      loop: "{{ quay_team_syncs | subelements('users') }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_member_add
      changed_when: "'Number of members added 1' in idm_group_member_add.stdout"
      failed_when: >
        idm_group_member_add.rc != 0
        and 'Number of members added 0' not in idm_group_member_add.stdout | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Verify dedicated registry user belongs to writer group
      ansible.builtin.command:
        argv: [ipa, group-show, "{{ quay_idm_writer_group }}", --all, --raw]
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_writer_group_check
      changed_when: false
      failed_when: >
        quay_registry_writer_group_check.rc != 0
        or quay_registry_ldap_username not in quay_registry_writer_group_check.stdout
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    ###########################################################################
    # Bootstrap Quay
    ###########################################################################

    - name: Write bootstrap Quay configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true
          BROWSER_API_CALLS_XHR_ONLY: false

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"
          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379
          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry
          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default
          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore bootstrap configuration labels
      ansible.builtin.command:
        argv: [restorecon, -RFv, "{{ quay_root }}/config"]
      changed_when: false

    - name: Run Quay in bootstrap mode
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for bootstrap Quay HTTPS
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/"
        method: GET
        validate_certs: false
        status_code: 200
      register: quay_bootstrap_https_check
      retries: 60
      delay: 5
      until: quay_bootstrap_https_check.status == 200

    - name: Initialize bootstrap administrator
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize"
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code: [200, 201, 400]
      register: quay_init_user
      failed_when: false
      no_log: true

    - name: Select generated or stored bootstrap API token
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default(quay_admin_access_token, true)
          }}
      no_log: true

    - name: Fail when no Quay API token is available
      ansible.builtin.fail:
        msg: >-
          No Quay bootstrap API token is available. Ensure
          {{ secret_prefix }}/quay/admin_access_token contains a valid token.
      when: quay_api_token | default('') | length == 0

    - name: Store bootstrap API token in AWS
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_api_token }}"
      delegate_to: localhost
      become: false
      changed_when: true
      failed_when: false
      no_log: true
      environment: "{{ aws_cli_environment }}"

    - name: Verify bootstrap administrator
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - -i
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -v
          - "quay_username={{ quay_superuser }}"
          - -X
          - --no-psqlrc
          - -t
          - -A
        stdin: |
          UPDATE public."user"
          SET verified = true
          WHERE username = :'quay_username';

          SELECT CASE
            WHEN EXISTS (
              SELECT 1
              FROM public."user"
              WHERE username = :'quay_username'
                AND verified = true
            )
            THEN 'BOOTSTRAP_ADMIN_VERIFIED'
            ELSE 'BOOTSTRAP_ADMIN_NOT_FOUND'
          END;
      register: quay_verify_bootstrap_admin
      changed_when: "'UPDATE 1' in quay_verify_bootstrap_admin.stdout"
      failed_when: >
        quay_verify_bootstrap_admin.rc != 0
        or 'BOOTSTRAP_ADMIN_VERIFIED' not in quay_verify_bootstrap_admin.stdout
      no_log: true

    - name: Ensure Quay organization exists
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code: [200, 201, 400]
      register: quay_create_org
      failed_when: >
        quay_create_org.status == 400
        and (quay_create_org.json.error_message | default('') is not search('already|exists'))
      no_log: true

    - name: Ensure owner and writer teams exist
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ item.team }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: "{{ item.role }}"
        status_code: [200, 201, 400]
      loop: "{{ quay_team_syncs }}"
      no_log: true

    ###########################################################################
    # Final LDAP configuration
    ###########################################################################

    - name: Stop Quay before enabling LDAP
      containers.podman.podman_container:
        name: quay-registry
        state: stopped

    - name: Write final Quay LDAP configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true
          BROWSER_API_CALLS_XHR_ONLY: false

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: false
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          FEATURE_TEAM_SYNCING: true
          TEAM_RESYNC_STALE_TIME: "{{ quay_ldap_team_sync_stale_time }}"
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"
          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379
          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry
          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default
          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"
          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"
          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"
          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}
          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"
          LDAP_SUPERUSER_FILTER: "{{ quay_ldap_superuser_filter }}"
          LDAP_TIMEOUT: 15
          LDAP_NETWORK_TIMEOUT: 15

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore LDAP configuration labels
      ansible.builtin.command:
        argv: [restorecon, -RFv, "{{ quay_root }}/config"]
      changed_when: false

    - name: Start Quay with LDAP
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for LDAP Quay HTTPS
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/"
        method: GET
        validate_certs: false
        status_code: 200
      register: quay_ldap_https_check
      retries: 60
      delay: 5
      until: quay_ldap_https_check.status == 200

    - name: Enable LDAP synchronization for Quay teams
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ item.team }}/syncing"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          group_dn: "{{ item.group_dn }}"
        status_code: [200, 201, 204, 400]
      loop: "{{ quay_team_syncs }}"
      register: quay_enable_team_sync
      failed_when: >
        quay_enable_team_sync.status == 400
        and (quay_enable_team_sync.json.error_message | default('') is not search('already|exists|enabled'))
      no_log: true

    - name: Remove stale dedicated registry auth file
      ansible.builtin.file:
        path: "{{ quay_registry_ldap_authfile }}"
        state: absent

    - name: Perform initial Quay login as dedicated IdM registry user
      ansible.builtin.command:
        argv:
          - podman
          - login
          - "{{ quay_hostname }}"
          - --username
          - "{{ quay_registry_ldap_username }}"
          - --password-stdin
          - --authfile
          - "{{ quay_registry_ldap_authfile }}"
          - --tls-verify=false
        stdin: "{{ quay_registry_ldap_password }}"
      register: quay_registry_ldap_login
      retries: 12
      delay: 10
      until: quay_registry_ldap_login.rc == 0
      changed_when: true
      no_log: true

    - name: Verify dedicated LDAP-backed Quay user exists
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -tAc
          - "SELECT username FROM public.\"user\" WHERE username = '{{ quay_registry_ldap_username | replace(\"'\", \"''\") }}';"
      register: quay_registry_database_user
      changed_when: false
      failed_when: quay_registry_database_user.stdout | trim != quay_registry_ldap_username

    - name: Ensure managed Image Mode repositories exist
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/repository"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        body_format: json
        body:
          namespace: "{{ quay_default_org }}"
          repository: "{{ item.name }}"
          description: "{{ item.description }}"
          visibility: "{{ item.visibility }}"
        status_code: [200, 201, 400]
      loop: "{{ quay_managed_repositories }}"
      loop_control:
        label: "{{ quay_default_org }}/{{ item.name }}"
      register: quay_repository_create
      failed_when: >
        quay_repository_create.status == 400
        and (quay_repository_create.json.error_message | default('') is not search('already|exists'))
      no_log: true

    - name: Grant writers team push and pull access
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/repository/{{ quay_default_org }}/{{ item.name }}/permissions/team/{{ quay_default_team }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        body_format: json
        body:
          role: write
        status_code: [200, 201]
      loop: "{{ quay_managed_repositories }}"
      loop_control:
        label: "{{ quay_default_org }}/{{ item.name }} writers=write"
      no_log: true

    - name: Read synchronized writers team members
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}/members"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code: 200
        return_content: true
      register: quay_writer_team_members
      changed_when: false
      no_log: true

    - name: Verify final dedicated registry login
      ansible.builtin.command:
        argv:
          - podman
          - login
          - "{{ quay_hostname }}"
          - --username
          - "{{ quay_registry_ldap_username }}"
          - --password-stdin
          - --authfile
          - "{{ quay_registry_ldap_authfile }}"
          - --tls-verify=false
        stdin: "{{ quay_registry_ldap_password }}"
      register: quay_registry_final_login_check
      changed_when: false
      no_log: true

    - name: Display deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Authentication: IdM LDAP"
          - "Organization: {{ quay_default_org }}"
          - "Owner team: {{ quay_owner_team }}"
          - "Writer team: {{ quay_default_team }}"
          - "Registry LDAP account: {{ quay_registry_ldap_username }}"
          - "Registry password secret: {{ quay_registry_ldap_password_secret_name }}"
          - "Registry IdM group: {{ quay_idm_writer_group }}"
          - "Managed repositories: {{ quay_managed_repositories | map(attribute='name') | list }}"
          - "The dedicated LDAP account can authenticate and receives writer-team access."
          - "Use a Quay robot account for unattended CI/CD after a scoped OAuth token is provisioned."

    - name: Show running containers
      ansible.builtin.command:
        argv: [podman, ps]
      register: podman_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        msg: "{{ podman_ps.stdout_lines | default(['podman ps was not executed']) }}"
