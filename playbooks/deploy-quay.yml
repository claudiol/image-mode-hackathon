---
- name: Configure single-node Red Hat Quay with AWS Secrets Manager and IdM LDAP
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    quay_db_name: quay
    quay_db_user: quay

    quay_tls_cert_days: 3650
    quay_tls_country: US
    quay_tls_state: NC
    quay_tls_city: Raleigh
    quay_tls_org: Red Hat
    quay_tls_org_unit: Image Mode Lab

    quay_default_org: image-mode
    quay_default_team: writers
    quay_default_team_role: creator

    quay_owner_team: owners
    quay_owner_team_role: admin

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    redhat_registry_host: registry.redhat.io

    # Preserve database and registry data on normal reruns.
    # Set true only when intentionally destroying and rebuilding the deployment.
    quay_force_clean_rebuild: false

    # idm_domain_name can change, for example:
    # lab.sandbox1139.opentlc.com
    #
    # This generates:
    # dc=lab,dc=sandbox1139,dc=opentlc,dc=com
    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"
    idm_user_container_dn: "cn=users,cn=accounts,{{ idm_base_dn }}"
    idm_group_container_dn: "cn=groups,cn=accounts,{{ idm_base_dn }}"

    # Example resulting user DN:
    # uid=pduncan,cn=users,cn=accounts,dc=lab,dc=sandbox1139,dc=opentlc,dc=com
    quay_ldap_uri: "ldap://{{ idm_server_fqdn }}:389"
    quay_ldap_base_dn: "{{ idm_base_dn }}"
    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts
    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail
    quay_ldap_bind_dn: "uid=admin,{{ idm_user_container_dn }}"
    quay_ldap_user_filter: "(uid=*)"

    quay_ldap_team_sync_stale_time: 60m

    quay_admin_users: "{{ idm_users | default([]) | unique }}"
    quay_org_member_users: "{{ quay_admin_users }}"

    quay_idm_owner_group: "quay-{{ quay_default_org }}-owners"
    quay_idm_writer_group: "quay-{{ quay_default_org }}-writers"

    quay_idm_owner_group_dn: "cn={{ quay_idm_owner_group }},{{ idm_group_container_dn }}"
    quay_idm_writer_group_dn: "cn={{ quay_idm_writer_group }},{{ idm_group_container_dn }}"

    quay_team_syncs:
      - team: "{{ quay_owner_team }}"
        role: "{{ quay_owner_team_role }}"
        idm_group: "{{ quay_idm_owner_group }}"
        group_dn: "{{ quay_idm_owner_group_dn }}"
        users: "{{ quay_admin_users }}"
      - team: "{{ quay_default_team }}"
        role: "{{ quay_default_team_role }}"
        idm_group: "{{ quay_idm_writer_group }}"
        group_dn: "{{ quay_idm_writer_group_dn }}"
        users: "{{ quay_org_member_users }}"

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

  pre_tasks:
    - name: Validate Terraform inventory inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: >-
          Missing secret_prefix, aws_region, idm_domain_name,
          idm_server_fqdn, or the idm inventory group.

    - name: Read required secrets from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/{{ item.value }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Build required secret map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({item.item.key: item.stdout})
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets
      ansible.builtin.set_fact:
        redhat_registry_username: "{{ quay_required_secrets.redhat_registry_username }}"
        redhat_registry_password: "{{ quay_required_secrets.redhat_registry_password }}"
        quay_superuser: "{{ quay_required_secrets.quay_superuser }}"
        quay_db_password: "{{ quay_required_secrets.quay_db_password }}"
        quay_secret_key: "{{ quay_required_secrets.quay_secret_key }}"
        quay_database_secret_key: "{{ quay_required_secrets.quay_database_secret_key }}"
        quay_superuser_password: "{{ quay_required_secrets.quay_superuser_password }}"
        idm_admin_password: "{{ quay_required_secrets.idm_admin_password }}"
      no_log: true

    - name: Read optional Quay API token from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_admin_token_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Normalize optional Quay API token
      ansible.builtin.set_fact:
        quay_admin_access_token: >-
          {{
            ''
            if (
              quay_admin_token_result.rc != 0
              or quay_admin_token_result.stdout | default('') | trim == ''
              or quay_admin_token_result.stdout | default('') | trim
                 == 'CHANGE_ME_AFTER_QUAY_DEPLOYMENT'
            )
            else quay_admin_token_result.stdout | trim
          }}
      no_log: true

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname is defined
          - quay_hostname | length > 0
          - quay_root | length > 0
          - quay_http_port is defined
          - quay_https_port is defined
          - quay_image | length > 0
          - postgres_image | length > 0
          - redis_image | length > 0
          - quay_db_name | length > 0
          - quay_db_user | length > 0
          - quay_db_password | length > 0
          - quay_secret_key | length > 0
          - quay_database_secret_key | length > 0
          - quay_superuser | length > 0
          - quay_superuser_password | length > 0
          - quay_superuser_email | length > 0
          - redhat_registry_host | length > 0
          - redhat_registry_username | length > 0
          - redhat_registry_password | length > 0
          - quay_default_org | length > 0
          - quay_default_team | length > 0
          - idm_admin_password | length > 0
          - quay_admin_users | length > 0
        fail_msg: "Missing required Quay, IdM, inventory, or AWS secret values."

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - jq
          - openldap-clients
        state: present

    - name: Stop old generated Quay systemd service if present
      ansible.builtin.systemd:
        name: pod-quay-pod.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove old generated systemd units if present
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service

    - name: Reload systemd after removing old units
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ quay_http_port }}"
        - "{{ quay_https_port }}"

    - name: Create Podman authentication directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: "{{ redhat_registry_host }}"
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"
      no_log: true

    - name: Stop and remove existing Quay pod before container reconciliation
      containers.podman.podman_pod:
        name: quay-pod
        state: absent

    - name: Remove persistent Quay data only when clean rebuild is requested
      ansible.builtin.file:
        path: "{{ quay_root }}"
        state: absent
      when: quay_force_clean_rebuild | bool

    # Preserve the ownership and paths from the known-good baseline.
    - name: Create Quay directories with container-compatible ownership
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - {path: "{{ quay_root }}"}
        - {path: "{{ quay_root }}/config"}
        - {path: "{{ quay_root }}/storage", mode: "0777"}
        - {path: "{{ quay_root }}/storage/registry", mode: "0777"}
        - {path: "{{ quay_root }}/postgres", owner: "26", group: "26", mode: "0700"}
        - {path: "{{ quay_root }}/redis"}

    - name: Reinforce PostgreSQL host-directory ownership
      ansible.builtin.file:
        path: "{{ quay_root }}/postgres"
        state: directory
        owner: "26"
        group: "26"
        mode: "0700"
        recurse: false

    - name: Set SELinux context on Quay storage
      ansible.builtin.command:
        argv:
          - chcon
          - -Rt
          - container_file_t
          - "{{ quay_root }}/storage"
      changed_when: false
      failed_when: false

    - name: Check Quay TLS certificate
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.cert"
      register: quay_tls_cert_stat

    - name: Check Quay TLS private key
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.key"
      register: quay_tls_key_stat

    - name: Remove incomplete Quay TLS certificate pair
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ quay_root }}/config/ssl.cert"
        - "{{ quay_root }}/config/ssl.key"
      when: >
        not quay_tls_cert_stat.stat.exists
        or not quay_tls_key_stat.stat.exists

    - name: Ensure Quay configuration directory is readable by the container
      ansible.builtin.file:
        path: "{{ quay_root }}/config"
        state: directory
        owner: root
        group: root
        mode: "0755"


    - name: Generate self-signed TLS certificate for Quay
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -newkey
          - rsa:4096
          - -nodes
          - -sha256
          - -keyout
          - "{{ quay_root }}/config/ssl.key"
          - -x509
          - -days
          - "{{ quay_tls_cert_days | string }}"
          - -out
          - "{{ quay_root }}/config/ssl.cert"
          - -subj
          - "/C={{ quay_tls_country }}/ST={{ quay_tls_state }}/L={{ quay_tls_city }}/O={{ quay_tls_org }}/OU={{ quay_tls_org_unit }}/CN={{ quay_hostname }}"
          - -addext
          - "subjectAltName=DNS:{{ quay_hostname }}"
      when: >
        not quay_tls_cert_stat.stat.exists
        or not quay_tls_key_stat.stat.exists

    - name: Verify Quay TLS certificate was created
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.cert"
      register: quay_tls_cert_created

    - name: Verify Quay TLS private key was created
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/ssl.key"
      register: quay_tls_key_created

    - name: Fail when Quay TLS generation did not create both files
      ansible.builtin.assert:
        that:
          - quay_tls_cert_created.stat.exists
          - quay_tls_key_created.stat.exists
        fail_msg: >-
          OpenSSL did not create both {{ quay_root }}/config/ssl.cert
          and {{ quay_root }}/config/ssl.key.

    - name: Set permissions on Quay TLS private key
      ansible.builtin.file:
        path: "{{ quay_root }}/config/ssl.key"
        owner: root
        group: root
        mode: "0644"

    - name: Set permissions on Quay TLS certificate
      ansible.builtin.file:
        path: "{{ quay_root }}/config/ssl.cert"
        owner: root
        group: root
        mode: "0644"

    - name: Create and start Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container using known-good storage settings
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"
      no_log: true

    - name: Run Redis container using known-good command and mount
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command: "redis-server --save 60 1 --loglevel warning"
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL container to become ready
      ansible.builtin.command: >
        podman exec quay-postgres
        pg_isready
        -h 127.0.0.1
        -p 5432
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable required PostgreSQL pg_trgm extension for Quay
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -v ON_ERROR_STOP=1
        -c "CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;"
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Verify PostgreSQL pg_trgm extension exists
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -tAc "SELECT extname FROM pg_extension WHERE extname = 'pg_trgm';"
      register: pg_trgm_verify
      changed_when: false
      failed_when: pg_trgm_verify.stdout | trim != "pg_trgm"

    - name: Verify IdM LDAP bind and dynamic user search
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ idm_user_container_dn }}"
          - "{{ quay_ldap_user_filter }}"
          - dn
          - uid
          - mail
      changed_when: false
      no_log: true

    - name: Obtain IdM administrator Kerberos ticket
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n' {{ idm_admin_password | quote }} | kinit admin
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      changed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Ensure IdM groups exist for Quay team synchronization
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ item.idm_group }}"
          - "--desc=Quay {{ quay_default_org }} {{ item.team }} synchronized team"
      loop: "{{ quay_team_syncs }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_add
      changed_when: idm_group_add.rc == 0
      failed_when: >
        idm_group_add.rc != 0
        and 'already exists' not in idm_group_add.stderr | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Add IdM users to Quay synchronization groups
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.0.idm_group }}"
          - "--users={{ item.1 }}"
      loop: "{{ quay_team_syncs | subelements('users') }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_member_add
      changed_when: "'Number of members added 1' in idm_group_member_add.stdout"
      failed_when: >
        idm_group_member_add.rc != 0
        and 'Number of members added 0' not in idm_group_member_add.stdout | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Verify IdM synchronization groups through LDAP
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ item.group_dn }}"
          - "(objectClass=*)"
          - dn
          - cn
          - member
      loop: "{{ quay_team_syncs }}"
      changed_when: false
      no_log: true

    # Quay must first start with Database authentication so /user/initialize
    # can create the bootstrap administrator and API token.
    - name: Write bootstrap Quay configuration with Database authentication
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    # Follow the proven working deployment pattern: validate the host files,
    # then let the Quay container consume the bind-mounted configuration directly.
    # Do not launch a second temporary Quay container against the same :Z mount,
    # because its entrypoint and SELinux relabeling can interfere with validation.
    - name: Check generated Quay configuration and TLS files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ quay_root }}/config/config.yaml"
        - "{{ quay_root }}/config/ssl.cert"
        - "{{ quay_root }}/config/ssl.key"
      register: quay_config_file_stats

    - name: Verify generated Quay configuration and TLS files are readable
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
          - item.stat.readable
        fail_msg: "Required Quay file {{ item.stat.path | default(item.item) }} is missing or unreadable."
      loop: "{{ quay_config_file_stats.results }}"

    - name: Run Quay registry in bootstrap mode
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS in bootstrap mode
      ansible.builtin.command: >
        curl -kfsS
        --connect-timeout 5
        --max-time 15
        https://127.0.0.1:{{ quay_https_port }}/
      register: quay_bootstrap_https_check
      retries: 30
      delay: 5
      until: quay_bootstrap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Show Quay logs when bootstrap startup fails
      ansible.builtin.command:
        argv:
          - podman
          - logs
          - --tail
          - "200"
          - quay-registry
      register: quay_bootstrap_logs
      changed_when: false
      failed_when: false
      when: quay_bootstrap_https_check.rc != 0

    - name: Display Quay stdout when bootstrap startup fails
      ansible.builtin.debug:
        var: quay_bootstrap_logs.stdout_lines
      when:
        - quay_bootstrap_https_check.rc != 0
        - quay_bootstrap_logs.stdout_lines | default([]) | length > 0

    - name: Display Quay stderr when bootstrap startup fails
      ansible.builtin.debug:
        var: quay_bootstrap_logs.stderr_lines
      when:
        - quay_bootstrap_https_check.rc != 0
        - quay_bootstrap_logs.stderr_lines | default([]) | length > 0

    - name: Inspect Quay container state when bootstrap startup fails
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - quay-registry
          - --format
          - >-
            Status={{ '{{' }}.State.Status{{ '}}' }}
            Running={{ '{{' }}.State.Running{{ '}}' }}
            ExitCode={{ '{{' }}.State.ExitCode{{ '}}' }}
            Error={{ '{{' }}.State.Error{{ '}}' }}
            RestartCount={{ '{{' }}.RestartCount{{ '}}' }}
      register: quay_bootstrap_inspect
      changed_when: false
      failed_when: false
      when: quay_bootstrap_https_check.rc != 0

    - name: Display Quay container state after bootstrap failure
      ansible.builtin.debug:
        var: quay_bootstrap_inspect.stdout_lines
      when: quay_bootstrap_https_check.rc != 0

    - name: Fail when Quay bootstrap startup fails
      ansible.builtin.fail:
        msg: >-
          Quay did not respond in Database-authentication bootstrap mode.
          Review the Quay logs and container state displayed above.
      when: quay_bootstrap_https_check.rc != 0

    - name: Initialize the Quay bootstrap administrator
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize"
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code:
          - 200
          - 201
          - 400
      register: quay_init_user
      no_log: true
      failed_when: false

    - name: Select newly generated or previously stored Quay API token
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default(quay_admin_access_token, true)
          }}
      no_log: true

    - name: Read locally cached bootstrap token when API and AWS tokens are unavailable
      ansible.builtin.slurp:
        src: "{{ quay_root }}/config/bootstrap-token"
      register: local_bootstrap_token
      failed_when: false
      no_log: true
      when: quay_api_token | default('') | length == 0

    - name: Use locally cached bootstrap token
      ansible.builtin.set_fact:
        quay_api_token: "{{ local_bootstrap_token.content | b64decode | trim }}"
      no_log: true
      when:
        - quay_api_token | default('') | length == 0
        - local_bootstrap_token is defined
        - local_bootstrap_token.content is defined

    - name: Fail when no Quay API token is available
      ansible.builtin.fail:
        msg: >-
          No Quay API token is available. For a new database,
          /api/v1/user/initialize must return one. For an existing database,
          store the valid token at
          {{ secret_prefix }}/quay/admin_access_token in AWS Secrets Manager.
      when: quay_api_token | default('') | length == 0

    - name: Cache Quay API token on the Quay server
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/bootstrap-token"
        owner: root
        group: root
        mode: "0600"
        content: "{{ quay_api_token }}"
      no_log: true

    - name: Store Quay API token in AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ secret_prefix }}/quay/admin_access_token"
          - --region
          - "{{ aws_region }}"
          - --secret-string
          - "{{ quay_api_token }}"
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Mark the bootstrap administrator email as confirmed
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -v
          - "quay_username={{ quay_superuser }}"
          - -c
          - >-
            UPDATE public.user
            SET email_confirmed = true
            WHERE username = :'quay_username';
      register: quay_confirm_email
      changed_when: "'UPDATE 1' in quay_confirm_email.stdout"
      failed_when: >
        quay_confirm_email.rc != 0
        or (
          'UPDATE 1' not in quay_confirm_email.stdout
          and 'UPDATE 0' not in quay_confirm_email.stdout
        )
      no_log: true

    - name: Ensure the image-mode organization exists
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_org
      no_log: true
      failed_when: >
        quay_create_org.status == 400
        and (
          quay_create_org.json.error_message | default('')
          is not search('already|exists')
        )

    - name: Ensure owner and writer teams exist
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{
          quay_default_org }}/team/{{ item.team }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: "{{ item.role }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_create_teams
      no_log: true

    - name: Add bootstrap administrator to the owners team
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{
          quay_default_org }}/team/{{ quay_owner_team }}/members/{{ quay_superuser }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      register: quay_add_bootstrap_owner
      no_log: true
      failed_when: false

    - name: Stop Quay before enabling LDAP authentication
      containers.podman.podman_container:
        name: quay-registry
        state: stopped

    - name: Write final Quay configuration with IdM LDAP authentication
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          FEATURE_TEAM_SYNCING: true
          TEAM_RESYNC_STALE_TIME: "{{ quay_ldap_team_sync_stale_time }}"
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"
          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"
          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"
          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}
          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"

          SUPER_USERS:
            - "{{ quay_superuser }}"
          {% for admin_user in quay_admin_users %}
            - "{{ admin_user }}"
          {% endfor %}
      no_log: true

    - name: Start Quay registry with LDAP authentication
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS after LDAP switch
      ansible.builtin.command: >
        curl -kfsS
        --connect-timeout 5
        --max-time 15
        https://127.0.0.1:{{ quay_https_port }}/
      register: quay_ldap_https_check
      retries: 30
      delay: 5
      until: quay_ldap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Show Quay logs when LDAP startup fails
      ansible.builtin.command:
        argv:
          - podman
          - logs
          - --tail
          - "200"
          - quay-registry
      register: quay_ldap_logs
      changed_when: false
      failed_when: false
      when: quay_ldap_https_check.rc != 0

    - name: Display Quay stdout when LDAP startup fails
      ansible.builtin.debug:
        var: quay_ldap_logs.stdout_lines
      when:
        - quay_ldap_https_check.rc != 0
        - quay_ldap_logs.stdout_lines | default([]) | length > 0

    - name: Display Quay stderr when LDAP startup fails
      ansible.builtin.debug:
        var: quay_ldap_logs.stderr_lines
      when:
        - quay_ldap_https_check.rc != 0
        - quay_ldap_logs.stderr_lines | default([]) | length > 0

    - name: Inspect Quay container state when LDAP startup fails
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - quay-registry
          - --format
          - >-
            Status={{ '{{' }}.State.Status{{ '}}' }}
            Running={{ '{{' }}.State.Running{{ '}}' }}
            ExitCode={{ '{{' }}.State.ExitCode{{ '}}' }}
            Error={{ '{{' }}.State.Error{{ '}}' }}
            RestartCount={{ '{{' }}.RestartCount{{ '}}' }}
      register: quay_ldap_inspect
      changed_when: false
      failed_when: false
      when: quay_ldap_https_check.rc != 0

    - name: Display Quay container state after LDAP failure
      ansible.builtin.debug:
        var: quay_ldap_inspect.stdout_lines
      when: quay_ldap_https_check.rc != 0

    - name: Fail when Quay does not start with LDAP
      ansible.builtin.fail:
        msg: >-
          Quay did not respond after switching to IdM LDAP authentication.
          Review the Quay logs and container state displayed above.
      when: quay_ldap_https_check.rc != 0

    - name: Enable LDAP synchronization for Quay teams
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{
          quay_default_org }}/team/{{ item.team }}/syncing
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          group_dn: "{{ item.group_dn }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_enable_team_sync
      no_log: true
      failed_when: >
        quay_enable_team_sync.status == 400
        and (
          quay_enable_team_sync.json.error_message | default('')
          is not search('already|exists|enabled')
        )

    - name: Read synchronized team configuration
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{
          quay_default_org }}/team/{{ item.team }}
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      loop: "{{ quay_team_syncs }}"
      register: quay_synced_teams
      no_log: true

    - name: Show running containers
      ansible.builtin.command: podman ps
      register: podman_ps
      changed_when: false

    - name: Display deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Authentication: IdM LDAP"
          - "IdM base DN: {{ idm_base_dn }}"
          - "IdM user container: {{ idm_user_container_dn }}"
          - "IdM owner group: {{ quay_idm_owner_group_dn }}"
          - "IdM writer group: {{ quay_idm_writer_group_dn }}"
          - "Organization: {{ quay_default_org }}"
          - "Owner team: {{ quay_owner_team }}"
          - "Writer team: {{ quay_default_team }}"
          - "PostgreSQL data directory retained at {{ quay_root }}/postgres with UID/GID 26."
          - "LDAP users receive organization access through synchronized IdM groups."

    - name: Display running containers
      ansible.builtin.debug:
        var: podman_ps.stdout_lines
