---
- name: Configure single-node Quay server
  hosts: quay_demo
  become: true

  vars_files:
    - ../files/vars-quay-vault.yml

  vars:
    quay_http_port: "{{ quay_http_port | default(8080) }}"
    quay_https_port: "{{ quay_https_port | default(443) }}"
    quay_root: "{{ quay_root | default('/opt/quay') }}"
    redhat_registry_url: "{{ redhat_registry_url | default('registry.redhat.io') }}"
    redhat_registry_authfile: /root/.config/containers/auth.json
    quay_default_org: "{{ quay_default_org | default('image-mode') }}"
    quay_default_team: "{{ quay_default_team | default('writers') }}"

  tasks:
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
        state: present

    - name: Stop old generated Quay systemd service if present
      ansible.builtin.systemd:
        name: pod-quay-pod.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove old generated systemd units if present
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service

    - name: Reload systemd after removing old units
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay HTTP port locally
      ansible.posix.firewalld:
        port: "{{ quay_http_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled

    - name: Open Quay HTTPS port locally
      ansible.posix.firewalld:
        port: "{{ quay_https_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled

    - name: Create Podman auth directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: "{{ redhat_registry_url }}"
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"

    - name: Stop existing Quay pod before rebuild
      containers.podman.podman_pod:
        name: quay-pod
        state: absent

    - name: Create Quay directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ quay_root }}" }
        - { path: "{{ quay_root }}/config" }
        - { path: "{{ quay_root }}/storage", mode: "0777" }
        - { path: "{{ quay_root }}/storage/registry", mode: "0777" }
        - { path: "{{ quay_root }}/postgres", owner: "26", group: "26", mode: "0700" }
        - { path: "{{ quay_root }}/redis" }

    - name: Set SELinux context on Quay storage
      ansible.builtin.command: "chcon -Rt container_file_t {{ quay_root }}/storage"
      changed_when: false
      failed_when: false

    - name: Generate Red Hat demo self-signed TLS certificate for Quay
      ansible.builtin.command: >
        openssl req
        -newkey rsa:4096
        -nodes
        -sha256
        -keyout {{ quay_root }}/config/ssl.key
        -x509
        -days {{ quay_tls_cert_days }}
        -out {{ quay_root }}/config/ssl.cert
        -subj "/C={{ quay_tls_country }}/ST={{ quay_tls_state }}/L={{ quay_tls_city }}/O={{ quay_tls_org }}/OU={{ quay_tls_org_unit }}/CN={{ quay_hostname }}"
        -addext "subjectAltName=DNS:{{ quay_hostname }}"
      args:
        creates: "{{ quay_root }}/config/ssl.cert"

    - name: Set permissions on Quay TLS files
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - "{{ quay_root }}/config/ssl.key"
        - "{{ quay_root }}/config/ssl.cert"

    - name: Create Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"

    - name: Run Redis container
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command: "redis-server --save 60 1 --loglevel warning"
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL container to become ready
      ansible.builtin.command: >
        podman exec quay-postgres
        pg_isready
        -h 127.0.0.1
        -p 5432
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable required PostgreSQL pg_trgm extension for Quay
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -v ON_ERROR_STOP=1
        -c "CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;"
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Verify PostgreSQL pg_trgm extension exists
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -tAc "SELECT extname FROM pg_extension WHERE extname = 'pg_trgm';"
      register: pg_trgm_verify
      changed_when: false
      failed_when: pg_trgm_verify.stdout | trim != "pg_trgm"

    - name: Create Quay config.yaml
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        mode: "0644"
        content: |
          SERVER_HOSTNAME: {{ quay_hostname }}
          PREFERRED_URL_SCHEME: https
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: Database
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: {{ quay_secret_key }}
          SECRET_KEY: {{ quay_secret_key }}

          DB_URI: postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}

          BUILDLOGS_REDIS:
            host: 127.0.0.1
            port: 6379

          USER_EVENTS_REDIS:
            host: 127.0.0.1
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - {{ quay_superuser }}

    - name: Run Quay registry container
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS to respond locally
      ansible.builtin.command: >
        curl -kfsS https://127.0.0.1:{{ quay_https_port }}
      register: quay_https_check
      retries: 30
      delay: 5
      until: quay_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Show Quay registry logs if HTTPS check failed
      ansible.builtin.command: podman logs quay-registry --tail 150
      register: quay_logs
      changed_when: false
      failed_when: false
      when: quay_https_check.rc != 0

    - name: Display Quay registry logs if HTTPS check failed
      ansible.builtin.debug:
        var: quay_logs.stdout_lines
      when: quay_https_check.rc != 0

    - name: Fail if Quay did not become reachable
      ansible.builtin.fail:
        msg: "Quay container started but HTTPS did not respond. Check Quay logs above."
      when: quay_https_check.rc != 0

    - name: Create initial Quay admin user
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize"
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code:
          - 200
          - 400
      register: quay_init_user

    - name: Set Quay API token fact
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default(quay_admin_access_token | default(''), true)
          }}

    - name: Save generated Quay API token locally on server
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/bootstrap-token"
        mode: "0600"
        content: "{{ quay_api_token }}"
      when: quay_api_token | length > 0

    - name: Mark initial Quay admin email as confirmed
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -v ON_ERROR_STOP=1
        -c "UPDATE public.user SET email_confirmed = true WHERE username = '{{ quay_superuser }}';"
      register: quay_confirm_email
      changed_when: "'UPDATE 1' in quay_confirm_email.stdout"
      failed_when: false

    - name: Fail if no Quay API token is available for org bootstrap
      ansible.builtin.fail:
        msg: >-
          No Quay API token is available. On a clean database, /api/v1/user/initialize
          should return access_token. On reruns, set quay_admin_access_token in vars-quay-vault.yml.
      when: quay_api_token | length == 0

    - name: Create default image-mode organization
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_org

    - name: Create writers team in image-mode organization
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: creator
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_team

    - name: Add Quay admin user to image-mode writers team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}/members/{{ quay_superuser }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      register: quay_add_team_member

    - name: Display Quay initialize result
      ansible.builtin.debug:
        var: quay_init_user.json

    - name: Display default organization result
      ansible.builtin.debug:
        msg:
          - "Organization: {{ quay_default_org }}"
          - "Team: {{ quay_default_team }}"
          - "API token available: {{ quay_api_token | length > 0 }}"

    - name: Show running containers
      ansible.builtin.command: podman ps
      register: podman_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        var: podman_ps.stdout_lines

    - name: Show access URL
      ansible.builtin.debug:
        msg: "Quay should be available at https://{{ quay_hostname }}"