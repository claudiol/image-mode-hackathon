---
- name: Configure single-node Red Hat Quay server with IdM LDAP authentication and team sync
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    quay_db_name: quay
    quay_db_user: quay

    quay_tls_cert_days: 3650
    quay_tls_country: US
    quay_tls_state: NC
    quay_tls_city: Raleigh
    quay_tls_org: Red Hat
    quay_tls_org_unit: Image Mode Lab

    quay_default_org: image-mode
    quay_default_team: writers
    quay_default_team_role: creator

    quay_owner_team: owners
    quay_owner_team_role: admin

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    quay_force_clean_rebuild: true

    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"
    idm_default_user_password: "RedHat123^"

    quay_ldap_uri: "ldap://{{ idm_server_fqdn }}:389"
    quay_ldap_base_dn: "{{ idm_base_dn }}"
    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts
    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail
    quay_ldap_bind_dn: "uid=admin,cn=users,cn=accounts,{{ idm_base_dn }}"
    quay_ldap_user_filter: "(uid=*)"

    quay_admin_users: "{{ idm_users | default([]) }}"
    quay_org_member_users: "{{ quay_admin_users | unique }}"

    quay_ldap_team_sync_enabled: true
    quay_ldap_team_sync_stale_time: 60m

    quay_idm_owner_group: "quay-{{ quay_default_org }}-owners"
    quay_idm_writer_group: "quay-{{ quay_default_org }}-writers"

    quay_idm_owner_group_dn: "cn={{ quay_idm_owner_group }},cn=groups,cn=accounts,{{ idm_base_dn }}"
    quay_idm_writer_group_dn: "cn={{ quay_idm_writer_group }},cn=groups,cn=accounts,{{ idm_base_dn }}"

    quay_team_syncs:
      - team: "{{ quay_owner_team }}"
        role: "{{ quay_owner_team_role }}"
        idm_group: "{{ quay_idm_owner_group }}"
        group_dn: "{{ quay_idm_owner_group_dn }}"
        users: "{{ quay_admin_users | unique }}"
      - team: "{{ quay_default_team }}"
        role: "{{ quay_default_team_role }}"
        idm_group: "{{ quay_idm_writer_group }}"
        group_dn: "{{ quay_idm_writer_group_dn }}"
        users: "{{ quay_org_member_users | unique }}"

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

  pre_tasks:
    - name: Validate required Terraform inventory variables
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
        fail_msg: "Missing secret_prefix, aws_region, idm_domain_name, or idm_server_fqdn from Terraform inventory."

    - name: Read required secrets from AWS Secrets Manager using AWS CLI
      ansible.builtin.command: >
        aws secretsmanager get-secret-value
        --secret-id {{ secret_prefix }}/{{ item.value }}
        --region {{ aws_region }}
        --query SecretString
        --output text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Build required secret fact map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({ item.item.key: item.stdout })
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets as facts
      ansible.builtin.set_fact:
        redhat_registry_username: "{{ quay_required_secrets.redhat_registry_username }}"
        redhat_registry_password: "{{ quay_required_secrets.redhat_registry_password }}"
        quay_superuser: "{{ quay_required_secrets.quay_superuser }}"
        quay_db_password: "{{ quay_required_secrets.quay_db_password }}"
        quay_secret_key: "{{ quay_required_secrets.quay_secret_key }}"
        quay_database_secret_key: "{{ quay_required_secrets.quay_database_secret_key }}"
        quay_superuser_password: "{{ quay_required_secrets.quay_superuser_password }}"
        idm_admin_password: "{{ quay_required_secrets.idm_admin_password }}"
      no_log: true

    - name: Read optional existing Quay admin API token from AWS Secrets Manager using AWS CLI
      ansible.builtin.command: >
        aws secretsmanager get-secret-value
        --secret-id {{ secret_prefix }}/quay/admin_access_token
        --region {{ aws_region }}
        --query SecretString
        --output text
      register: quay_admin_token_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Normalize optional Quay API token
      ansible.builtin.set_fact:
        quay_admin_access_token: >-
          {{
            ''
            if (
              quay_admin_token_result.rc != 0 or
              quay_admin_token_result.stdout | default('') in ['CHANGE_ME_AFTER_QUAY_DEPLOYMENT', '']
            )
            else quay_admin_token_result.stdout
          }}
      no_log: true

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname | length > 0
          - quay_db_password | length > 0
          - quay_secret_key | length > 0
          - quay_database_secret_key | length > 0
          - quay_superuser | length > 0
          - quay_superuser_password | length > 0
          - redhat_registry_username | length > 0
          - redhat_registry_password | length > 0
          - idm_admin_password | length > 0
          - quay_admin_users | length > 0
        fail_msg: "Missing required Quay, IdM, AWS Secrets variables, or idm_users list."

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - openldap-clients
        state: present

    - name: Verify IdM LDAP bind and user search from Quay server
      ansible.builtin.command: >
        ldapsearch -x
        -H {{ quay_ldap_uri }}
        -D {{ quay_ldap_bind_dn | quote }}
        -w {{ idm_admin_password | quote }}
        -b {{ ('cn=users,cn=accounts,' ~ idm_base_dn) | quote }}
        {{ quay_ldap_user_filter | quote }}
        uid
      changed_when: false
      no_log: true

    - name: Get IdM admin Kerberos ticket on IdM server
      ansible.builtin.shell: |
        set -euo pipefail
        echo {{ idm_admin_password | quote }} | kinit admin
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      changed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Ensure IdM groups exist for Quay team sync
      ansible.builtin.command: >
        ipa group-add {{ item.idm_group }}
        --desc="Quay {{ quay_default_org }} {{ item.team }} synchronized team"
      loop: "{{ quay_team_syncs }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_idm_group_create
      changed_when: quay_idm_group_create.rc == 0
      failed_when: >
        quay_idm_group_create.rc != 0 and
        ('already exists' not in quay_idm_group_create.stderr | default(''))
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Add IdM users to Quay sync groups
      ansible.builtin.command: >
        ipa group-add-member {{ item.0.idm_group }}
        --users={{ item.1 }}
      loop: "{{ quay_team_syncs | subelements('users') }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_idm_group_members
      changed_when: "'Number of members added 1' in quay_idm_group_members.stdout"
      failed_when: false
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Verify IdM Quay sync groups are visible through LDAP from Quay server
      ansible.builtin.command: >
        ldapsearch -x
        -H {{ quay_ldap_uri }}
        -D {{ quay_ldap_bind_dn | quote }}
        -w {{ idm_admin_password | quote }}
        -b {{ item.group_dn | quote }}
        objectClass cn member
      loop: "{{ quay_team_syncs }}"
      changed_when: false
      no_log: true

    # Keep the rest of your existing podman/postgres/redis/bootstrap tasks here unchanged
    # until the config.yaml sections.

    - name: Create bootstrap Quay config.yaml using local Database authentication
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
          {% for admin_user in quay_admin_users | unique %}
            - "{{ admin_user }}"
          {% endfor %}
      no_log: true

    # Keep your existing bootstrap start/wait/initialize-token/org-create tasks.

    - name: Create or update Quay teams for IdM sync
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ item.team }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: "{{ item.role }}"
        status_code:
          - 200
          - 201
      loop: "{{ quay_team_syncs }}"
      no_log: false

    - name: Stop Quay before switching to IdM LDAP authentication
      ansible.builtin.command: podman stop quay-registry
      changed_when: true
      failed_when: false

    - name: Create final Quay config.yaml with IdM LDAP authentication and team sync
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          FEATURE_TEAM_SYNCING: true
          TEAM_RESYNC_STALE_TIME: "{{ quay_ldap_team_sync_stale_time }}"
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"
          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"
          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"
          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}
          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"

          SUPER_USERS:
            - "{{ quay_superuser }}"
          {% for admin_user in quay_admin_users | unique %}
            - "{{ admin_user }}"
          {% endfor %}
      no_log: true

    - name: Start Quay registry container with LDAP team sync configuration
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS to respond after LDAP switch
      ansible.builtin.command: >
        curl -kfsS
        --connect-timeout 5
        --max-time 15
        https://127.0.0.1:{{ quay_https_port }}/
      register: quay_ldap_https_check
      retries: 60
      delay: 5
      until: quay_ldap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Fail if Quay did not become reachable after LDAP switch
      ansible.builtin.fail:
        msg: "Quay container started but HTTPS did not respond after switching to LDAP team sync."
      when: quay_ldap_https_check.rc != 0

    - name: Enable LDAP syncing for Quay teams
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ item.team }}/syncing"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          group_dn: "{{ item.group_dn }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_enable_team_sync
      no_log: true
      failed_when: >
        quay_enable_team_sync.status == 400 and
        (
          quay_enable_team_sync.json.error_message | default('') is not search('already')
        )

    - name: Verify Quay team sync configuration
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ item.team }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      loop: "{{ quay_team_syncs }}"
      register: quay_verify_synced_teams
      no_log: true

    - name: Display Quay deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Authentication: IdM LDAP"
          - "Team sync enabled: {{ quay_ldap_team_sync_enabled }}"
          - "Owner team sync group: {{ quay_idm_owner_group_dn }}"
          - "Writer team sync group: {{ quay_idm_writer_group_dn }}"
          - "Quay superusers: {{ ([quay_superuser] + quay_admin_users) | unique }}"
          - "Note: Quay team membership is now controlled by IdM groups, not manual Quay member API calls."