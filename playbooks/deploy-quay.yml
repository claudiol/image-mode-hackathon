---
- name: Configure single-node Red Hat Quay server with IdM LDAP authentication
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    quay_db_name: quay
    quay_db_user: quay

    quay_tls_cert_days: 3650
    quay_tls_country: US
    quay_tls_state: NC
    quay_tls_city: Raleigh
    quay_tls_org: Red Hat
    quay_tls_org_unit: Image Mode Lab

    quay_default_org: image-mode
    quay_default_team: writers
    quay_default_owner_team: owners
    quay_default_member_team: members

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    quay_force_clean_rebuild: true

    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"
    idm_default_user_password: "RedHat123^"

    quay_ldap_uri: "ldap://{{ idm_server_fqdn }}:389"
    quay_ldap_base_dn: "{{ idm_base_dn }}"
    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts
    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail
    quay_ldap_bind_dn: "uid=admin,cn=users,cn=accounts,{{ idm_base_dn }}"
    quay_ldap_user_filter: "(uid=*)"

    quay_admin_users: "{{ idm_users | default([]) }}"

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

  pre_tasks:
    - name: Validate required Terraform inventory variables
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
        fail_msg: "Missing secret_prefix, aws_region, idm_domain_name, or idm_server_fqdn from Terraform inventory."

    - name: Read required secrets from AWS Secrets Manager using AWS CLI
      ansible.builtin.command: >
        aws secretsmanager get-secret-value
        --secret-id {{ secret_prefix }}/{{ item.value }}
        --region {{ aws_region }}
        --query SecretString
        --output text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Build required secret fact map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({ item.item.key: item.stdout })
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets as facts
      ansible.builtin.set_fact:
        redhat_registry_username: "{{ quay_required_secrets.redhat_registry_username }}"
        redhat_registry_password: "{{ quay_required_secrets.redhat_registry_password }}"
        quay_superuser: "{{ quay_required_secrets.quay_superuser }}"
        quay_db_password: "{{ quay_required_secrets.quay_db_password }}"
        quay_secret_key: "{{ quay_required_secrets.quay_secret_key }}"
        quay_database_secret_key: "{{ quay_required_secrets.quay_database_secret_key }}"
        quay_superuser_password: "{{ quay_required_secrets.quay_superuser_password }}"
        idm_admin_password: "{{ quay_required_secrets.idm_admin_password }}"
      no_log: true

    - name: Read optional existing Quay admin API token from AWS Secrets Manager using AWS CLI
      ansible.builtin.command: >
        aws secretsmanager get-secret-value
        --secret-id {{ secret_prefix }}/quay/admin_access_token
        --region {{ aws_region }}
        --query SecretString
        --output text
      register: quay_admin_token_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Normalize optional Quay API token
      ansible.builtin.set_fact:
        quay_admin_access_token: >-
          {{
            ''
            if (
              quay_admin_token_result.rc != 0 or
              quay_admin_token_result.stdout | default('') in ['CHANGE_ME_AFTER_QUAY_DEPLOYMENT', '']
            )
            else quay_admin_token_result.stdout
          }}
      no_log: true

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname is defined
          - quay_hostname | length > 0
          - quay_root is defined
          - quay_http_port is defined
          - quay_https_port is defined
          - quay_image is defined
          - postgres_image is defined
          - redis_image is defined
          - quay_db_name is defined
          - quay_db_user is defined
          - quay_db_password is defined
          - quay_secret_key is defined
          - quay_database_secret_key is defined
          - quay_superuser is defined
          - quay_superuser_password is defined
          - quay_superuser_email is defined
          - redhat_registry_username is defined
          - redhat_registry_password is defined
          - quay_default_org is defined
          - quay_default_team is defined
          - quay_default_owner_team is defined
          - quay_default_member_team is defined
          - quay_ldap_uri is defined
          - quay_ldap_base_dn is defined
          - quay_ldap_bind_dn is defined
          - idm_admin_password is defined
        fail_msg: "Missing required Quay, IdM, or AWS Secrets variables."

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - openldap-clients
        state: present

    - name: Stop old generated Quay systemd service if present
      ansible.builtin.systemd:
        name: pod-quay-pod.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove old generated systemd units if present
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service

    - name: Reload systemd after removing old units
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay HTTP port locally
      ansible.posix.firewalld:
        port: "{{ quay_http_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled

    - name: Open Quay HTTPS port locally
      ansible.posix.firewalld:
        port: "{{ quay_https_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled

    - name: Verify IdM LDAP bind and user search from Quay server
      ansible.builtin.command: >
        ldapsearch -x
        -H {{ quay_ldap_uri }}
        -D {{ quay_ldap_bind_dn | quote }}
        -w {{ idm_admin_password | quote }}
        -b {{ ('cn=users,cn=accounts,' ~ idm_base_dn) | quote }}
        {{ quay_ldap_user_filter | quote }}
        uid
      register: quay_ldap_search_check
      changed_when: false
      no_log: true

    - name: Create Podman auth directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: registry.redhat.io
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"
      no_log: true

    - name: Remove old Quay containers
      ansible.builtin.command: "podman rm -f {{ item }}"
      loop:
        - quay-registry
        - quay-postgres
        - quay-redis
      changed_when: false
      failed_when: false

    - name: Remove old Quay pod
      ansible.builtin.command: podman pod rm -f quay-pod
      changed_when: false
      failed_when: false

    - name: Remove old Quay data for clean lab rebuild
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ quay_root }}/postgres"
        - "{{ quay_root }}/redis"
        - "{{ quay_root }}/storage"
        - "{{ quay_root }}/config/config.yaml"
        - "{{ quay_root }}/config/bootstrap-token"
      when: quay_force_clean_rebuild | bool

    - name: Create Quay directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ quay_root }}" }
        - { path: "{{ quay_root }}/config" }
        - { path: "{{ quay_root }}/storage", mode: "0777" }
        - { path: "{{ quay_root }}/storage/registry", mode: "0777" }
        - { path: "{{ quay_root }}/postgres", owner: "26", group: "26", mode: "0700" }
        - { path: "{{ quay_root }}/redis" }

    - name: Set SELinux context on Quay storage
      ansible.builtin.command: "chcon -Rt container_file_t {{ quay_root }}/storage"
      changed_when: false
      failed_when: false

    - name: Generate demo self-signed TLS certificate for Quay
      ansible.builtin.command: >
        openssl req
        -newkey rsa:4096
        -nodes
        -sha256
        -keyout {{ quay_root }}/config/ssl.key
        -x509
        -days {{ quay_tls_cert_days }}
        -out {{ quay_root }}/config/ssl.cert
        -subj "/C={{ quay_tls_country }}/ST={{ quay_tls_state }}/L={{ quay_tls_city }}/O={{ quay_tls_org }}/OU={{ quay_tls_org_unit }}/CN={{ quay_hostname }}"
        -addext "subjectAltName=DNS:{{ quay_hostname }}"
      args:
        creates: "{{ quay_root }}/config/ssl.cert"

    - name: Set permissions on Quay TLS files
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - "{{ quay_root }}/config/ssl.key"
        - "{{ quay_root }}/config/ssl.cert"

    - name: Create Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"
      no_log: true

    - name: Run Redis container
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command: "redis-server --save 60 1 --loglevel warning"
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL container to become ready
      ansible.builtin.command: >
        podman exec quay-postgres
        pg_isready
        -h 127.0.0.1
        -p 5432
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable required PostgreSQL pg_trgm extension for Quay
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -v ON_ERROR_STOP=1
        -c "CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;"
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Verify PostgreSQL pg_trgm extension exists
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -tAc "SELECT extname FROM pg_extension WHERE extname = 'pg_trgm';"
      register: pg_trgm_verify
      changed_when: false
      failed_when: pg_trgm_verify.stdout | trim != "pg_trgm"

    - name: Create bootstrap Quay config.yaml using local Database authentication
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
          {% for admin_user in quay_admin_users %}
            - "{{ admin_user }}"
          {% endfor %}
      no_log: true

    - name: Run Quay registry container for bootstrap
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS to respond during bootstrap
      ansible.builtin.command: >
        curl -kfsS
        --connect-timeout 5
        --max-time 15
        https://127.0.0.1:{{ quay_https_port }}/
      register: quay_https_check
      retries: 60
      delay: 5
      until: quay_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Show Quay registry logs if bootstrap HTTPS check failed
      ansible.builtin.command: podman logs --tail 300 quay-registry
      register: quay_logs
      changed_when: false
      failed_when: false
      when: quay_https_check.rc != 0

    - name: Display Quay registry logs if bootstrap HTTPS check failed
      ansible.builtin.debug:
        msg: "{{ quay_logs.stdout_lines + quay_logs.stderr_lines }}"
      when: quay_https_check.rc != 0

    - name: Fail if Quay did not become reachable during bootstrap
      ansible.builtin.fail:
        msg: "Quay container started but HTTPS did not respond during Database bootstrap. Check Quay logs above."
      when: quay_https_check.rc != 0

    - name: Create initial local Quay bootstrap admin user
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize"
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code:
          - 200
          - 400
      register: quay_init_user
      failed_when: false
      no_log: true

    - name: Set Quay API token fact
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default(quay_admin_access_token | default(''), true)
          }}
      no_log: true

    - name: Fail if no Quay API token is available for org bootstrap
      ansible.builtin.fail:
        msg: >-
          No Quay API token is available. A clean Database bootstrap should return
          access_token from /api/v1/user/initialize.
      when: quay_api_token | length == 0

    - name: Save generated Quay API token locally on server
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/bootstrap-token"
        mode: "0600"
        content: "{{ quay_api_token }}"
      no_log: true

    - name: Save generated Quay API token to AWS Secrets Manager
      ansible.builtin.command: >
        aws secretsmanager put-secret-value
        --secret-id {{ secret_prefix }}/quay/admin_access_token
        --secret-string {{ quay_api_token | quote }}
        --region {{ aws_region }}
      delegate_to: localhost
      become: false
      changed_when: true
      failed_when: false
      no_log: true
      environment:
        AWS_PROFILE: "{{ aws_profile | default(omit) }}"

    - name: Mark initial Quay admin email as confirmed
      ansible.builtin.command: >
        podman exec quay-postgres
        psql
        -U {{ quay_db_user }}
        -d {{ quay_db_name }}
        -v ON_ERROR_STOP=1
        -c "UPDATE public.user SET email_confirmed = true WHERE username = '{{ quay_superuser }}';"
      register: quay_confirm_email
      changed_when: "'UPDATE 1' in quay_confirm_email.stdout"
      failed_when: false

    - name: Create default image-mode organization
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/"
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_org
      no_log: true
      failed_when: >
        quay_create_org.status == 400 and
        (
          quay_create_org.json.error_message | default('') is not search('already exists')
        )

    - name: Verify default organization exists
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      register: quay_verify_org
      no_log: true

    - name: Create writers team in image-mode organization
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: creator
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_team
      no_log: true
      failed_when: >
        quay_create_team.status == 400 and
        (
          quay_create_team.json.error_message | default('') is not search('already exists')
        )

    - name: Verify writers team exists
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      register: quay_verify_team
      no_log: false

    - name: Add local bootstrap admin user to writers team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}/members/{{ quay_superuser }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      register: quay_add_bootstrap_member
      no_log: true
      failed_when: false

    - name: Add local bootstrap admin user to owners team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_owner_team }}/members/{{ quay_superuser }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      register: quay_add_bootstrap_owner
      no_log: true
      failed_when: false

    - name: Add local bootstrap admin user to members team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_member_team }}/members/{{ quay_superuser }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      register: quay_add_bootstrap_org_member
      no_log: true
      failed_when: false

    - name: Stop Quay before switching to IdM LDAP authentication
      ansible.builtin.command: podman stop quay-registry
      changed_when: true
      failed_when: false

    - name: Create final Quay config.yaml with IdM LDAP authentication
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        mode: "0644"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"
          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"
          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"
          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}
          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"

          SUPER_USERS:
            - "{{ quay_superuser }}"
          {% for admin_user in quay_admin_users %}
            - "{{ admin_user }}"
          {% endfor %}
      no_log: true

    - name: Start Quay registry container with LDAP configuration
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:Z"
          - "{{ quay_root }}/storage:/datastorage:Z"

    - name: Wait for Quay HTTPS to respond after LDAP switch
      ansible.builtin.command: >
        curl -kfsS
        --connect-timeout 5
        --max-time 15
        https://127.0.0.1:{{ quay_https_port }}/
      register: quay_ldap_https_check
      retries: 60
      delay: 5
      until: quay_ldap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Show Quay registry logs if LDAP HTTPS check failed
      ansible.builtin.command: podman logs --tail 300 quay-registry
      register: quay_ldap_logs
      changed_when: false
      failed_when: false
      when: quay_ldap_https_check.rc != 0

    - name: Display Quay registry logs if LDAP HTTPS check failed
      ansible.builtin.debug:
        msg: "{{ quay_ldap_logs.stdout_lines + quay_ldap_logs.stderr_lines }}"
      when: quay_ldap_https_check.rc != 0

    - name: Fail if Quay did not become reachable after LDAP switch
      ansible.builtin.fail:
        msg: "Quay container started but HTTPS did not respond after switching to LDAP. Check Quay logs above."
      when: quay_ldap_https_check.rc != 0

    - name: Initialize LDAP-backed Quay users so org membership can be assigned
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize"
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ item }}"
          password: "{{ idm_default_user_password }}"
          email: "{{ item }}@example.com"
          access_token: false
        status_code:
          - 200
          - 400
      loop: "{{ quay_admin_users | unique }}"
      register: quay_initialize_ldap_users
      failed_when: false
      no_log: true

    - name: Add LDAP users to image-mode owners team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_owner_team }}/members/{{ item }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_admin_users | unique }}"
      register: quay_add_ldap_owners
      failed_when: false
      no_log: true

    - name: Add LDAP users to image-mode members team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_member_team }}/members/{{ item }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_admin_users | unique }}"
      register: quay_add_ldap_members
      failed_when: false
      no_log: true

    - name: Add LDAP users to image-mode writers team
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}/members/{{ item }}"
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_admin_users | unique }}"
      register: quay_add_ldap_writers
      failed_when: false
      no_log: true

    - name: Verify image-mode owners team after LDAP user assignment
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_owner_team }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      register: quay_verify_owner_team
      no_log: true

    - name: Verify image-mode members team after LDAP user assignment
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_member_team }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      register: quay_verify_member_team
      no_log: true

    - name: Verify image-mode writers team after LDAP user assignment
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/{{ quay_default_org }}/team/{{ quay_default_team }}"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
      register: quay_verify_writer_team
      no_log: true

    - name: Display Quay deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Image: {{ quay_image }}"
          - "Authentication: IdM LDAP"
          - "LDAP URI: {{ quay_ldap_uri }}"
          - "LDAP base DN: {{ quay_ldap_base_dn }}"
          - "LDAP login attribute: {{ quay_ldap_uid_attr }}"
          - "Quay superusers: {{ ([quay_superuser] + quay_admin_users) | unique }}"
          - "Default organization verified: {{ quay_verify_org.status == 200 }}"
          - "Writers team verified: {{ quay_verify_writer_team.status == 200 }}"
          - "Owners team verified: {{ quay_verify_owner_team.status == 200 }}"
          - "Members team verified: {{ quay_verify_member_team.status == 200 }}"
          - "Bootstrap token saved: true"
          - "Note: LDAP users are initialized in Quay and added to image-mode owners, members, and writers teams."

    - name: Show running containers
      ansible.builtin.command: podman ps
      register: podman_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        var: podman_ps.stdout_lines