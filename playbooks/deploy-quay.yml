---
- name: Configure single-node Red Hat Quay with AWS Secrets Manager and IdM LDAP
  hosts: quay
  become: true
  gather_facts: true

  vars:
    redhat_registry_authfile: /root/.config/containers/auth.json

    quay_root: /opt/quay
    quay_http_port: 80
    quay_https_port: 443

    quay_image: registry.redhat.io/quay/quay-rhel8:v3.13
    postgres_image: registry.redhat.io/rhel8/postgresql-13:latest
    redis_image: registry.redhat.io/rhel8/redis-6:latest

    # Quay runs as a non-root user inside the quay-rhel8 image.
    # Configuration files containing secrets remain inaccessible to
    # unprivileged host users while remaining readable by Quay.
    quay_container_uid: "1001"
    quay_container_gid: "0"

    quay_db_name: quay
    quay_db_user: quay

    ###########################################################################
    # Public Quay TLS certificate
    ###########################################################################

    quay_public_tls_fqdn: >-
      {{
        public_tls_fqdn
        | default(quay_hostname, true)
      }}

    quay_acm_certificate_arn: >-
      {{
        acm_certificate_arn
        | default('', true)
      }}

    # All persistent Quay TLS material remains beneath /opt/quay.
    quay_tls_root: "{{ quay_root }}"
    quay_tls_directory: "{{ quay_tls_root }}/certs"

    quay_tls_certificate_path: "{{ quay_root }}/config/ssl.cert"
    quay_tls_private_key_path: "{{ quay_root }}/config/ssl.key"
    quay_tls_leaf_certificate_path: "{{ quay_tls_directory }}/quay-leaf.crt"
    quay_tls_chain_path: "{{ quay_tls_directory }}/quay-chain.crt"

    quay_tls_local_staging_prefix: "quay-acm-tls-"

    # Require the certificate to remain valid for at least 14 days.
    quay_tls_minimum_validity_seconds: 1209600

    quay_default_org: image-mode
    quay_default_team: writers
    quay_default_team_role: creator

    quay_owner_team: owners
    quay_owner_team_role: admin

    quay_superuser_email: quayadmin@example.com
    quay_hostname: "{{ inventory_hostname }}"

    redhat_registry_host: registry.redhat.io

    ###############################################################################
    # Existing deployment handling
    ###############################################################################

    # When true, an existing Quay installation is destroyed and recreated.
    #
    # This removes:
    #   - PostgreSQL data
    #   - Redis data
    #   - Quay configuration
    #   - Registry repositories and image layers
    #   - Cached bootstrap tokens
    #   - Installed Quay TLS files
    #
    # IdM users, IdM groups, and AWS Secrets Manager secrets are preserved.
    quay_rebuild_existing_installation: true


    ###########################################################################
    # IdM LDAP directory structure
    ###########################################################################

    idm_base_dn: "dc={{ idm_domain_name.split('.') | join(',dc=') }}"

    # Relative container DNs beneath idm_base_dn.
    idm_user_container_relative_dn: "cn=users,cn=accounts"
    idm_group_container_relative_dn: "cn=groups,cn=accounts"

    # Full container DNs used for direct LDAP operations.
    idm_user_container_dn: >-
      {{ idm_user_container_relative_dn }},{{ idm_base_dn }}

    idm_group_container_dn: >-
      {{ idm_group_container_relative_dn }},{{ idm_base_dn }}

    ###########################################################################
    # Quay LDAP authentication
    ###########################################################################

    quay_ldap_uri: "ldaps://{{ idm_server_fqdn }}:636"

    quay_ldap_ca_remote_path: /etc/ipa/ca.crt
    quay_ldap_ca_host_path: "{{ quay_root }}/config/extra_ca_certs/idm-ca.crt"

    # Quay appends this base DN when resolving relative LDAP paths.
    quay_ldap_base_dn: "{{ idm_base_dn }}"

    quay_ldap_user_rdn:
      - cn=users
      - cn=accounts

    quay_ldap_uid_attr: uid
    quay_ldap_email_attr: mail

    # Full bind DN required for LDAP authentication.
    quay_ldap_bind_dn: "uid=admin,{{ idm_user_container_dn }}"

    quay_ldap_user_filter: "(&(objectClass=person)(uid=*))"

    # How frequently Quay considers synchronized LDAP team membership stale.
    quay_ldap_team_sync_stale_time: 60m

    ###########################################################################
    # Quay users
    ###########################################################################

    quay_admin_users: "{{ idm_users | default([]) | unique }}"
    quay_org_member_users: "{{ quay_admin_users }}"

    ###########################################################################
    # IdM groups used by Quay
    ###########################################################################

    quay_idm_owner_group: "quay-{{ quay_default_org }}-owners"
    quay_idm_writer_group: "quay-{{ quay_default_org }}-writers"

    # Relative group DNs.
    #
    # These values are passed to the Quay team synchronization API because
    # Quay resolves them relative to LDAP_BASE_DN.
    quay_idm_owner_group_relative_dn: >-
      cn={{ quay_idm_owner_group }},{{ idm_group_container_relative_dn }}

    quay_idm_writer_group_relative_dn: >-
      cn={{ quay_idm_writer_group }},{{ idm_group_container_relative_dn }}

    # Full group DNs.
    #
    # These values are used for IdM operations, ldapsearch validation, and
    # filters that compare against the user's full memberOf attribute.
    quay_idm_owner_group_dn: >-
      {{ quay_idm_owner_group_relative_dn }},{{ idm_base_dn }}

    quay_idm_writer_group_dn: >-
      {{ quay_idm_writer_group_relative_dn }},{{ idm_base_dn }}

    # The memberOf attribute contains a complete LDAP DN, so this filter must
    # use the full owner-group DN rather than the relative API value.
    quay_ldap_superuser_filter: >-
      (memberOf={{ quay_idm_owner_group_dn }})

    ###########################################################################
    # Dedicated IdM LDAP account for Quay registry access
    ###########################################################################

    quay_registry_ldap_username: image-mode-builder
    quay_registry_ldap_first_name: Image
    quay_registry_ldap_last_name: Mode Builder
    quay_registry_ldap_email: image-mode-builder@example.com

    # Stores a JSON object containing both username and password.
    quay_registry_ldap_secret_name: "{{ secret_prefix }}/quay/ldap_users/{{ quay_registry_ldap_username }}"
  

    # Include the dedicated registry account in the existing IdM group that
    # synchronizes to the Quay writers team.

    quay_writer_users: "{{ (quay_org_member_users + [quay_registry_ldap_username]) | unique | list }}"


    ###########################################################################
    # Quay team-to-IdM synchronization mappings
    ###########################################################################

    quay_team_syncs:
      - team: "{{ quay_owner_team }}"
        role: "{{ quay_owner_team_role }}"
        idm_group: "{{ quay_idm_owner_group }}"

        # Passed to:
        # POST /api/v1/organization/<org>/team/<team>/syncing
        group_dn: "{{ quay_idm_owner_group_relative_dn }}"

        # Used only for direct LDAP validation and diagnostics.
        full_group_dn: "{{ quay_idm_owner_group_dn }}"

        users: "{{ quay_admin_users }}"

      - team: "{{ quay_default_team }}"
        role: "{{ quay_default_team_role }}"
        idm_group: "{{ quay_idm_writer_group }}"

        # Passed to:
        # POST /api/v1/organization/<org>/team/<team>/syncing
        group_dn: "{{ quay_idm_writer_group_relative_dn }}"

        # Used only for direct LDAP validation and diagnostics.
        full_group_dn: "{{ quay_idm_writer_group_dn }}"

        users: "{{ quay_writer_users }}"

    ###########################################################################
    # AWS Secrets Manager paths
    ###########################################################################

    required_secret_paths:
      redhat_registry_username: redhat/registry_username
      redhat_registry_password: redhat/registry_password
      quay_superuser: quay/superuser
      quay_db_password: quay/db_password
      quay_secret_key: quay/secret_key
      quay_database_secret_key: quay/database_secret_key
      quay_superuser_password: quay/superuser_password
      idm_admin_password: idm/admin_password

  pre_tasks:
    - name: Validate Terraform inventory inputs
      ansible.builtin.assert:
        that:
          - secret_prefix is defined
          - secret_prefix | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - quay_public_tls_fqdn | string | length > 0
          - quay_acm_certificate_arn | string | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: >-
          Missing secret_prefix, aws_region, public_tls_fqdn,
          acm_certificate_arn, idm_domain_name, idm_server_fqdn,
          or the idm inventory group.

    - name: Verify Quay ACM certificate is issued
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'acm',
              'describe-certificate',
              '--certificate-arn',
              quay_acm_certificate_arn,
              '--region',
              aws_region,
              '--query',
              'Certificate.Status',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: quay_acm_certificate_status
      changed_when: false
      failed_when: >-
        quay_acm_certificate_status.rc != 0
        or
        quay_acm_certificate_status.stdout | trim != 'ISSUED'

    - name: Read required secrets from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/{{ item.value }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      loop: "{{ required_secret_paths | dict2items }}"
      register: required_secret_results
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      environment: >-
        {{
          {'AWS_PROFILE': aws_profile}
          if (
            aws_profile is defined
            and aws_profile | string | length > 0
          )
          else {}
        }}

    - name: Build required secret map
      ansible.builtin.set_fact:
        quay_required_secrets: >-
          {{
            quay_required_secrets | default({})
            | combine({item.item.key: item.stdout})
          }}
      loop: "{{ required_secret_results.results }}"
      no_log: true

    - name: Apply required secrets
      ansible.builtin.set_fact:
        redhat_registry_username: >-
          {{ quay_required_secrets.redhat_registry_username }}
        redhat_registry_password: >-
          {{ quay_required_secrets.redhat_registry_password }}
        quay_superuser: >-
          {{ quay_required_secrets.quay_superuser }}
        quay_db_password: >-
          {{ quay_required_secrets.quay_db_password }}
        quay_secret_key: >-
          {{ quay_required_secrets.quay_secret_key }}
        quay_database_secret_key: >-
          {{ quay_required_secrets.quay_database_secret_key }}
        quay_superuser_password: >-
          {{ quay_required_secrets.quay_superuser_password }}
        idm_admin_password: >-
          {{ quay_required_secrets.idm_admin_password }}
      no_log: true


    ###########################################################################
    # Dedicated Quay LDAP user credential
    ###########################################################################

    - name: Read dedicated Quay LDAP user secret from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ quay_registry_ldap_secret_name }}"
          - --region
          - "{{ aws_region }}"
          - --query
          - SecretString
          - --output
          - text
      register: quay_registry_ldap_secret_result
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      environment: >-
        {{
          {'AWS_PROFILE': aws_profile}
          if (
            aws_profile is defined
            and aws_profile | string | length > 0
          )
          else {}
        }}

    - name: Parse existing dedicated Quay LDAP user secret
      ansible.builtin.set_fact:
        quay_registry_ldap_stored_credentials: >-
          {{
            (
              quay_registry_ldap_secret_result.stdout | from_json
            )
            if (
              quay_registry_ldap_secret_result.rc == 0
              and
              quay_registry_ldap_secret_result.stdout
              | default('')
              | trim
              | length > 0
            )
            else {}
          }}
      no_log: true

    - name: Validate existing dedicated Quay LDAP user secret
      ansible.builtin.assert:
        that:
          - >-
            quay_registry_ldap_stored_credentials.username
            | default(quay_registry_ldap_username)
            == quay_registry_ldap_username
        fail_msg: >-
          The existing secret {{ quay_registry_ldap_secret_name }} contains
          credentials for a different username.
      when:
        - quay_registry_ldap_secret_result.rc == 0
        - quay_registry_ldap_stored_credentials | length > 0
      no_log: true

    - name: Use existing dedicated Quay LDAP user password
      ansible.builtin.set_fact:
        quay_registry_ldap_password: >-
          {{ quay_registry_ldap_stored_credentials.password }}
        quay_registry_ldap_secret_needs_creation: false
      when:
        - quay_registry_ldap_stored_credentials.password is defined
        - >-
          quay_registry_ldap_stored_credentials.password
          | string
          | length > 0
      no_log: true

    - name: Generate random password for dedicated Quay LDAP user
      ansible.builtin.set_fact:
        quay_registry_ldap_password: >-
          {{
            lookup(
              'ansible.builtin.password',
              '/dev/null',
              length=40,
              chars=['ascii_letters', 'digits']
            )
          }}
        quay_registry_ldap_secret_needs_creation: true
      when: quay_registry_ldap_password is not defined
      no_log: true

    - name: Build dedicated Quay LDAP credential object
      ansible.builtin.set_fact:
        quay_registry_ldap_credentials:
          username: "{{ quay_registry_ldap_username }}"
          password: "{{ quay_registry_ldap_password }}"
      no_log: true

    - name: Create dedicated Quay LDAP user secret in AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - create-secret
          - --name
          - "{{ quay_registry_ldap_secret_name | trim }}"
          - --description
          - "IdM LDAP credentials for the Image Mode Quay registry user"
          - --secret-string
          - "{{ quay_registry_ldap_credentials | to_json }}"
          - --region
          - "{{ aws_region | trim }}"
      delegate_to: localhost
      become: false
      register: quay_registry_ldap_secret_create
      changed_when: quay_registry_ldap_secret_create.rc == 0
      failed_when: >-

        (
          quay_registry_ldap_secret_create.rc != 0
        )
        and
        (
          'ResourceExistsException'
          not in
          (
            quay_registry_ldap_secret_create.stderr
            | default('')
          )
        )
      when: quay_registry_ldap_secret_needs_creation | bool
      no_log: true
      environment: >-
        {{
          {'AWS_PROFILE': aws_profile | trim}
          if (
            aws_profile is defined
            and aws_profile | string | trim | length > 0
          )
          else {}
        }}


    - name: Store generated credentials when AWS secret appeared concurrently
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - put-secret-value
          - --secret-id
          - "{{ quay_registry_ldap_secret_name }}"
          - --secret-string
          - "{{ quay_registry_ldap_credentials | to_json }}"
          - --region
          - "{{ aws_region }}"
      delegate_to: localhost
      become: false
      changed_when: true
      when:
        - quay_registry_ldap_secret_needs_creation | bool
        - quay_registry_ldap_secret_create.rc != 0
      no_log: true
      environment: >-
        {{
          {'AWS_PROFILE': aws_profile}
          if (
            aws_profile is defined
            and aws_profile | string | length > 0
          )
          else {}
        }}

    - name: Validate dedicated Quay LDAP credentials
      ansible.builtin.assert:
        that:
          - quay_registry_ldap_username | length > 0
          - quay_registry_ldap_password | length >= 32
          - quay_registry_ldap_secret_name | length > 0
        fail_msg: >-
          No valid credentials are available for the dedicated Quay LDAP user.
      no_log: true

  tasks:
    - name: Validate required Quay variables
      ansible.builtin.assert:
        that:
          - quay_hostname is defined
          - quay_hostname | length > 0
          - quay_root | length > 0
          - quay_http_port is defined
          - quay_https_port is defined
          - quay_image | length > 0
          - postgres_image | length > 0
          - redis_image | length > 0
          - quay_db_name | length > 0
          - quay_db_user | length > 0
          - quay_db_password | length > 0
          - quay_secret_key | length > 0
          - quay_database_secret_key | length > 0
          - quay_superuser | length > 0
          - quay_superuser_password | length > 0
          - quay_superuser_email | length > 0
          - redhat_registry_host | length > 0
          - redhat_registry_username | length > 0
          - redhat_registry_password | length > 0
          - quay_default_org | length > 0
          - quay_default_team | length > 0
          - idm_admin_password | length > 0
          - quay_admin_users | length > 0
          - quay_registry_ldap_username | length > 0
          - quay_registry_ldap_first_name | length > 0
          - quay_registry_ldap_last_name | length > 0
          - quay_registry_ldap_email | length > 0
          - quay_registry_ldap_password | length >= 32
          - quay_registry_ldap_secret_name | length > 0
          - quay_writer_users | length > 0
        fail_msg: >-
          Missing required Quay, IdM, inventory, or AWS secret values.

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - podman
          - firewalld
          - python3-pip
          - python3-podman
          - policycoreutils-python-utils
          - openssl
          - curl
          - jq
          - openldap-clients
        state: present

    - name: Enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Quay firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ quay_http_port }}"
        - "{{ quay_https_port }}"

    - name: Create Podman authentication directory
      ansible.builtin.file:
        path: /root/.config/containers
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Login to Red Hat registry
      containers.podman.podman_login:
        registry: "{{ redhat_registry_host }}"
        username: "{{ redhat_registry_username }}"
        password: "{{ redhat_registry_password }}"
        authfile: "{{ redhat_registry_authfile }}"
      no_log: true

    - name: Pull required container images
      containers.podman.podman_image:
        name: "{{ item }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: present
      loop:
        - "{{ quay_image }}"
        - "{{ postgres_image }}"
        - "{{ redis_image }}"
    ###########################################################################
    # Detect an existing Quay installation
    ###########################################################################

    - name: Check for an existing Quay configuration
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/config.yaml"
      register: quay_existing_config

    - name: Check for an existing Quay PostgreSQL database
      ansible.builtin.stat:
        path: "{{ quay_root }}/postgres"
      register: quay_existing_postgres

    - name: Check for existing Quay registry storage
      ansible.builtin.stat:
        path: "{{ quay_root }}/storage"
      register: quay_existing_storage

    - name: Inspect existing Quay pod
      ansible.builtin.command:
        argv:
          - podman
          - pod
          - exists
          - quay-pod
      register: quay_existing_pod
      changed_when: false
      failed_when: false

    - name: Determine whether Quay is already installed
      ansible.builtin.set_fact:
        quay_existing_installation: >-
          {{
            quay_existing_config.stat.exists
            or quay_existing_postgres.stat.exists
            or quay_existing_storage.stat.exists
            or quay_existing_pod.rc == 0
          }}

    - name: Display existing Quay installation status
      ansible.builtin.debug:
        msg: >-
          Existing Quay installation detected. The deployment will be
          completely removed and rebuilt because
          quay_rebuild_existing_installation is enabled.
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Refuse to continue when an existing installation cannot be rebuilt
      ansible.builtin.fail:
        msg: >-
          An existing Quay installation was detected beneath
          {{ quay_root }}, but quay_rebuild_existing_installation is false.
          Enable quay_rebuild_existing_installation or remove the existing
          deployment manually.
      when:
        - quay_existing_installation | bool
        - not quay_rebuild_existing_installation | bool



    ###########################################################################
    # Destroy an existing Quay installation
    ###########################################################################

    - name: Stop existing Quay registry container
      containers.podman.podman_container:
        name: quay-registry
        state: stopped
      failed_when: false
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove existing Quay registry container
      containers.podman.podman_container:
        name: quay-registry
        state: absent
      failed_when: false
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove existing PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        state: absent
      failed_when: false
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove existing Redis container
      containers.podman.podman_container:
        name: quay-redis
        state: absent
      failed_when: false
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove existing Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: absent
      failed_when: false
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove existing generated Quay systemd units
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - pod-quay-pod.service
        - container-quay-postgres.service
        - container-quay-redis.service
        - container-quay-registry.service
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Reload systemd after removing Quay units
      ansible.builtin.systemd:
        daemon_reload: true
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Remove all persistent Quay installation data
      ansible.builtin.file:
        path: "{{ quay_root }}"
        state: absent
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Verify existing Quay installation directory was removed
      ansible.builtin.stat:
        path: "{{ quay_root }}"
      register: quay_removed_root
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Assert existing Quay installation was removed
      ansible.builtin.assert:
        that:
          - not quay_removed_root.stat.exists
        fail_msg: >-
          The existing Quay installation directory {{ quay_root }}
          could not be completely removed.
      when:
        - quay_existing_installation | bool
        - quay_rebuild_existing_installation | bool

    - name: Create Quay root directory
      ansible.builtin.file:
        path: "{{ quay_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create container-readable Quay configuration directory
      ansible.builtin.file:
        path: "{{ quay_root }}/config"
        state: directory
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0750"

    - name: Create container-readable Quay CA directory
      ansible.builtin.file:
        path: "{{ quay_root }}/config/extra_ca_certs"
        state: directory
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0750"

    - name: Create Quay storage directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0777"
      loop:
        - "{{ quay_root }}/storage"
        - "{{ quay_root }}/storage/registry"

    - name: Create PostgreSQL data directory
      ansible.builtin.file:
        path: "{{ quay_root }}/postgres"
        state: directory
        owner: "26"
        group: "26"
        mode: "0700"

    - name: Create Redis data directory
      ansible.builtin.file:
        path: "{{ quay_root }}/redis"
        state: directory
        owner: root
        group: root
        mode: "0777"

    - name: Define persistent SELinux labels
      ansible.builtin.command:
        argv:
          - semanage
          - fcontext
          - -a
          - -t
          - container_file_t
          - "{{ item }}"
      loop:
        - "{{ quay_root }}/config(/.*)?"
        - "{{ quay_root }}/storage(/.*)?"
        - "{{ quay_root }}/postgres(/.*)?"
        - "{{ quay_root }}/redis(/.*)?"
      register: quay_semanage_result
      changed_when: quay_semanage_result.rc == 0
      failed_when: >
        quay_semanage_result.rc != 0
        and 'already defined' not in
            quay_semanage_result.stderr | default('')

    - name: Restore SELinux labels on Quay directories
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}"
      register: quay_restorecon
      changed_when: quay_restorecon.stdout | length > 0

    ###########################################################################
    # Export and install the public ACM TLS certificate
    ###########################################################################

    - name: Create persistent Quay TLS directory
      ansible.builtin.file:
        path: "{{ quay_tls_directory }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Create local ACM TLS staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: "{{ quay_tls_local_staging_prefix }}"
      delegate_to: localhost
      become: false
      register: quay_tls_local_staging
      no_log: true

    - name: Export and install Quay ACM certificate
      block:
        - name: Generate ACM export passphrase
          ansible.builtin.set_fact:
            quay_acm_export_passphrase: >-
              {{
                lookup(
                  'ansible.builtin.password',
                  '/dev/null',
                  length=64,
                  chars=['ascii_letters', 'digits']
                )
              }}
          no_log: true

        - name: Write local ACM export passphrase
          ansible.builtin.copy:
            content: "{{ quay_acm_export_passphrase }}"
            dest: "{{ quay_tls_local_staging.path }}/passphrase"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Export Quay certificate from AWS ACM
          ansible.builtin.command:
            argv: >-
              {{
                [
                  'aws',
                  'acm',
                  'export-certificate',
                  '--certificate-arn',
                  quay_acm_certificate_arn,
                  '--passphrase',
                  'fileb://'
                  ~ quay_tls_local_staging.path
                  ~ '/passphrase',
                  '--region',
                  aws_region,
                  '--output',
                  'json',
                  '--no-cli-pager'
                ]
                +
                (
                  ['--profile', aws_profile]
                  if aws_profile | default('') | trim | length > 0
                  else []
                )
              }}
          delegate_to: localhost
          become: false
          register: quay_acm_export_result
          changed_when: false
          no_log: true

        - name: Parse exported ACM certificate data
          ansible.builtin.set_fact:
            quay_acm_exported_certificate: >-
              {{
                quay_acm_export_result.stdout
                | from_json
              }}
          no_log: true

        - name: Validate exported ACM material
          ansible.builtin.assert:
            that:
              - >-
                quay_acm_exported_certificate.Certificate
                | default('')
                | length > 0
              - >-
                quay_acm_exported_certificate.CertificateChain
                | default('')
                | length > 0
              - >-
                quay_acm_exported_certificate.PrivateKey
                | default('')
                | length > 0
            fail_msg: >-
              ACM did not return the Quay certificate, certificate chain,
              and encrypted private key. Verify that the ACM certificate is
              exportable.
          no_log: true

        - name: Write exported ACM leaf certificate locally
          ansible.builtin.copy:
            content: |
              {{ quay_acm_exported_certificate.Certificate | trim }}
            dest: "{{ quay_tls_local_staging.path }}/quay-leaf.crt"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Write exported ACM certificate chain locally
          ansible.builtin.copy:
            content: |
              {{ quay_acm_exported_certificate.CertificateChain | trim }}
            dest: "{{ quay_tls_local_staging.path }}/quay-chain.crt"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Write encrypted ACM private key locally
          ansible.builtin.copy:
            content: |
              {{ quay_acm_exported_certificate.PrivateKey | trim }}
            dest: "{{ quay_tls_local_staging.path }}/quay-encrypted.key"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: Build Quay web server certificate chain
          ansible.builtin.shell: |
            set -euo pipefail

            cat \
              "{{ quay_tls_local_staging.path }}/quay-leaf.crt" \
              "{{ quay_tls_local_staging.path }}/quay-chain.crt" \
              > "{{ quay_tls_local_staging.path }}/ssl.cert"

            chmod 0600 \
              "{{ quay_tls_local_staging.path }}/ssl.cert"
          args:
            executable: /bin/bash
          delegate_to: localhost
          become: false
          changed_when: false
          no_log: true

        - name: Validate Quay ACM certificate hostname
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ quay_tls_local_staging.path }}/quay-leaf.crt"
              - -noout
              - -checkhost
              - "{{ quay_public_tls_fqdn }}"
          delegate_to: localhost
          become: false
          register: quay_acm_hostname_check
          changed_when: false
          failed_when: quay_acm_hostname_check.rc != 0

        - name: Validate Quay ACM certificate lifetime
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ quay_tls_local_staging.path }}/quay-leaf.crt"
              - -noout
              - -checkend
              - "{{ quay_tls_minimum_validity_seconds | string }}"
          delegate_to: localhost
          become: false
          register: quay_acm_validity_check
          changed_when: false
          failed_when: quay_acm_validity_check.rc != 0

        - name: Install encrypted ACM private key temporarily
          ansible.builtin.copy:
            src: "{{ quay_tls_local_staging.path }}/quay-encrypted.key"
            dest: "{{ quay_tls_private_key_path }}.encrypted"
            owner: root
            group: root
            mode: "0600"
          no_log: true

        - name: Install temporary ACM export passphrase
          ansible.builtin.copy:
            content: "{{ quay_acm_export_passphrase }}"
            dest: "{{ quay_tls_directory }}/.acm-passphrase"
            owner: root
            group: root
            mode: "0600"
          no_log: true

        - name: Decrypt Quay ACM private key
          ansible.builtin.command:
            argv:
              - openssl
              - pkey
              - -in
              - "{{ quay_tls_private_key_path }}.encrypted"
              - -out
              - "{{ quay_tls_private_key_path }}"
              - -passin
              - "file:{{ quay_tls_directory }}/.acm-passphrase"
          register: quay_acm_private_key_decrypt
          changed_when: quay_acm_private_key_decrypt.rc == 0
          failed_when: quay_acm_private_key_decrypt.rc != 0
          no_log: true

        - name: Install Quay leaf certificate
          ansible.builtin.copy:
            src: "{{ quay_tls_local_staging.path }}/quay-leaf.crt"
            dest: "{{ quay_tls_leaf_certificate_path }}"
            owner: root
            group: root
            mode: "0644"

        - name: Install Quay certificate chain
          ansible.builtin.copy:
            src: "{{ quay_tls_local_staging.path }}/quay-chain.crt"
            dest: "{{ quay_tls_chain_path }}"
            owner: root
            group: root
            mode: "0644"

        - name: Install Quay web server certificate
          ansible.builtin.copy:
            src: "{{ quay_tls_local_staging.path }}/ssl.cert"
            dest: "{{ quay_tls_certificate_path }}"
            owner: "{{ quay_container_uid }}"
            group: "{{ quay_container_gid }}"
            mode: "0644"

        - name: Secure Quay private key
          ansible.builtin.file:
            path: "{{ quay_tls_private_key_path }}"
            state: file
            owner: "{{ quay_container_uid }}"
            group: "{{ quay_container_gid }}"
            mode: "0640"

        - name: Verify decrypted Quay private key
          ansible.builtin.command:
            argv:
              - openssl
              - pkey
              - -in
              - "{{ quay_tls_private_key_path }}"
              - -noout
              - -check
              - -passin
              - "pass:"
          register: quay_private_key_check
          changed_when: false
          failed_when: quay_private_key_check.rc != 0
          no_log: true

        - name: Read Quay certificate public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl x509 \
              -in "{{ quay_tls_leaf_certificate_path }}" \
              -noout \
              -pubkey |
              openssl pkey \
                -pubin \
                -outform DER |
              openssl dgst -sha256
          args:
            executable: /bin/bash
          register: quay_certificate_public_key_hash
          changed_when: false

        - name: Read Quay private key public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl pkey \
              -in "{{ quay_tls_private_key_path }}" \
              -pubout \
              -outform DER |
              openssl dgst -sha256
          args:
            executable: /bin/bash
          register: quay_private_key_public_key_hash
          changed_when: false
          no_log: true

        - name: Normalize Quay public key hashes
          ansible.builtin.set_fact:
            quay_certificate_public_key_sha256: >-
              {{
                quay_certificate_public_key_hash.stdout
                | default('')
                | regex_replace('^.*=', '')
                | trim
                | lower
              }}
            quay_private_key_public_key_sha256: >-
              {{
                quay_private_key_public_key_hash.stdout
                | default('')
                | regex_replace('^.*=', '')
                | trim
                | lower
              }}
          no_log: true

        - name: Verify Quay certificate and private key match
          ansible.builtin.assert:
            that:
              - quay_certificate_public_key_sha256 | length == 64
              - quay_private_key_public_key_sha256 | length == 64
              - >-
                quay_certificate_public_key_sha256
                ==
                quay_private_key_public_key_sha256
            fail_msg: >-
              The exported Quay ACM certificate and decrypted private key
              do not contain the same public key.
          no_log: true

        - name: Validate installed Quay certificate hostname
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ quay_tls_leaf_certificate_path }}"
              - -noout
              - -checkhost
              - "{{ quay_public_tls_fqdn }}"
          register: quay_installed_certificate_hostname_check
          changed_when: false
          failed_when: >-
            quay_installed_certificate_hostname_check.rc != 0

        - name: Restore SELinux labels on installed Quay TLS files
          ansible.builtin.command:
            argv:
              - restorecon
              - -RFv
              - "{{ quay_root }}/config"
              - "{{ quay_tls_directory }}"
          register: quay_tls_restorecon
          changed_when: quay_tls_restorecon.stdout | length > 0

        - name: Verify Quay TLS files exist
          ansible.builtin.stat:
            path: "{{ item }}"
          loop:
            - "{{ quay_tls_certificate_path }}"
            - "{{ quay_tls_private_key_path }}"
            - "{{ quay_tls_leaf_certificate_path }}"
            - "{{ quay_tls_chain_path }}"
          register: quay_tls_file_stats

        - name: Assert Quay TLS files were installed
          ansible.builtin.assert:
            that:
              - item.stat.exists
              - item.stat.isreg
            fail_msg: "Required Quay TLS file {{ item.item }} is missing."
          loop: "{{ quay_tls_file_stats.results }}"

      always:
        - name: Remove local ACM TLS staging directory
          ansible.builtin.file:
            path: >-
              {{
                quay_tls_local_staging.path
                | default('/nonexistent')
              }}
            state: absent
          delegate_to: localhost
          become: false
          no_log: true

        - name: Remove encrypted Quay ACM key
          ansible.builtin.file:
            path: "{{ quay_tls_private_key_path }}.encrypted"
            state: absent
          no_log: true

        - name: Remove temporary Quay ACM passphrase
          ansible.builtin.file:
            path: "{{ quay_tls_directory }}/.acm-passphrase"
            state: absent
          no_log: true

        - name: Clear Quay ACM export facts
          ansible.builtin.set_fact:
            quay_acm_export_passphrase: ""
            quay_acm_exported_certificate: {}
          no_log: true

    - name: Create and start Quay pod
      containers.podman.podman_pod:
        name: quay-pod
        state: started
        publish:
          - "{{ quay_http_port }}:8080"
          - "{{ quay_https_port }}:8443"

    - name: Run PostgreSQL container
      containers.podman.podman_container:
        name: quay-postgres
        pod: quay-pod
        image: "{{ postgres_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        env:
          POSTGRESQL_USER: "{{ quay_db_user }}"
          POSTGRESQL_PASSWORD: "{{ quay_db_password }}"
          POSTGRESQL_DATABASE: "{{ quay_db_name }}"
        volume:
          - "{{ quay_root }}/postgres:/var/lib/pgsql/data:Z"
      no_log: true

    - name: Run Redis container
      containers.podman.podman_container:
        name: quay-redis
        pod: quay-pod
        image: "{{ redis_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        command:
          - redis-server
          - --save
          - "60"
          - "1"
          - --loglevel
          - warning
        volume:
          - "{{ quay_root }}/redis:/data:Z"

    - name: Wait for PostgreSQL container to become ready
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - pg_isready
          - -h
          - 127.0.0.1
          - -p
          - "5432"
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
      register: postgres_ready
      retries: 30
      delay: 5
      until: postgres_ready.rc == 0
      changed_when: false

    - name: Enable required PostgreSQL pg_trgm extension for Quay
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -c
          - CREATE EXTENSION IF NOT EXISTS pg_trgm WITH SCHEMA public;
      register: pg_trgm_result
      changed_when: "'CREATE EXTENSION' in pg_trgm_result.stdout"

    - name: Verify PostgreSQL pg_trgm extension exists
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -tAc
          - >-
            SELECT extname FROM pg_extension
            WHERE extname = 'pg_trgm';
      register: pg_trgm_verify
      changed_when: false
      failed_when: pg_trgm_verify.stdout | trim != "pg_trgm"

    - name: Read the IdM CA certificate from the IdM server
      ansible.builtin.slurp:
        src: "{{ quay_ldap_ca_remote_path }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_idm_ca
      changed_when: false

    - name: Install the IdM CA certificate for Quay
      ansible.builtin.copy:
        dest: "{{ quay_ldap_ca_host_path }}"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0644"
        content: "{{ quay_idm_ca.content | b64decode }}"
      register: quay_idm_ca_copy

    - name: Install the IdM CA into the RHEL trust store
      ansible.builtin.copy:
        dest: /etc/pki/ca-trust/source/anchors/idm-ca.crt
        owner: root
        group: root
        mode: "0644"
        content: "{{ quay_idm_ca.content | b64decode }}"
      register: quay_system_ca_copy

    - name: Refresh the RHEL CA trust store
      ansible.builtin.command:
        argv:
          - update-ca-trust
      changed_when: quay_system_ca_copy.changed

    - name: Verify IdM LDAP bind and dynamic user search over LDAPS
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ idm_user_container_dn }}"
          - "{{ quay_ldap_user_filter }}"
          - dn
          - uid
          - mail
      changed_when: false
      no_log: true

    - name: Obtain IdM administrator Kerberos ticket
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s\n' {{ idm_admin_password | quote }} | kinit admin
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      changed_when: false
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    ###########################################################################
    # Dedicated IdM LDAP account for Quay registry access
    ###########################################################################

    - name: Check whether dedicated Quay LDAP user exists in IdM
      ansible.builtin.command:
        argv:
          - ipa
          - user-show
          - "{{ quay_registry_ldap_username }}"
          - --all
          - --raw
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_check
      changed_when: false
      failed_when: false
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Create dedicated Quay LDAP user in IdM
      ansible.builtin.command:
        argv:
          - ipa
          - user-add
          - "{{ quay_registry_ldap_username }}"
          - "--first={{ quay_registry_ldap_first_name }}"
          - "--last={{ quay_registry_ldap_last_name }}"
          - "--email={{ quay_registry_ldap_email }}"
          - --password
        stdin: |
          {{ quay_registry_ldap_password }}
          {{ quay_registry_ldap_password }}
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_create
      changed_when: quay_registry_idm_user_create.rc == 0
      failed_when: quay_registry_idm_user_create.rc != 0
      when: quay_registry_idm_user_check.rc != 0
      no_log: true
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Ensure dedicated Quay LDAP user is enabled
      ansible.builtin.command:
        argv:
          - ipa
          - user-enable
          - "{{ quay_registry_ldap_username }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_enable
      changed_when: >-
        'Enabled user account' in
        quay_registry_idm_user_enable.stdout | default('')
      failed_when: >
        quay_registry_idm_user_enable.rc != 0
        and
        'already enabled' not in
        quay_registry_idm_user_enable.stderr | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Verify dedicated Quay LDAP user exists
      ansible.builtin.command:
        argv:
          - ipa
          - user-show
          - "{{ quay_registry_ldap_username }}"
          - --all
          - --raw
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_idm_user_verify
      changed_when: false
      failed_when: quay_registry_idm_user_verify.rc != 0
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Ensure IdM groups exist for Quay synchronization
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ item.idm_group }}"
          - >-
            --desc=Quay {{ quay_default_org }}
            {{ item.team }} synchronized team
      loop: "{{ quay_team_syncs }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_add
      changed_when: idm_group_add.rc == 0
      failed_when: >
        idm_group_add.rc != 0
        and 'already exists' not in
            idm_group_add.stderr | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Add IdM users to Quay synchronization groups
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.0.idm_group }}"
          - "--users={{ item.1 }}"
      loop: "{{ quay_team_syncs | subelements('users') }}"
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_group_member_add
      changed_when: >-
        'Number of members added 1' in idm_group_member_add.stdout
      failed_when: >
        idm_group_member_add.rc != 0
        and 'Number of members added 0' not in
            idm_group_member_add.stdout | default('')
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin

    - name: Verify dedicated Quay LDAP user belongs to IdM writers group
      ansible.builtin.command:
        argv:
          - ipa
          - group-show
          - "{{ quay_idm_writer_group }}"
          - --all
          - --raw
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: quay_registry_writer_group_verify
      changed_when: false
      failed_when: >
        quay_registry_writer_group_verify.rc != 0
        or
        quay_registry_ldap_username not in
        quay_registry_writer_group_verify.stdout
      environment:
        KRB5CCNAME: /tmp/krb5cc_quay_admin


    - name: Verify IdM synchronization groups through LDAP
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -x
          - -H
          - "{{ quay_ldap_uri }}"
          - -D
          - "{{ quay_ldap_bind_dn }}"
          - -w
          - "{{ idm_admin_password }}"
          - -b
          - "{{ item.full_group_dn }}"
          - "(objectClass=*)"
          - dn
          - cn
          - member
      loop: "{{ quay_team_syncs }}"
      changed_when: false
      no_log: true

    ###########################################################################
    # Quay bootstrap configuration
    ###########################################################################

    - name: Write bootstrap Quay configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "Database"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: true
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore SELinux labels after writing bootstrap configuration
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}/config"
      register: quay_bootstrap_restorecon
      changed_when: quay_bootstrap_restorecon.stdout | length > 0

    - name: Inspect bootstrap Quay configuration
      ansible.builtin.stat:
        path: "{{ quay_root }}/config/config.yaml"
      register: quay_bootstrap_config_stat

    - name: Assert bootstrap configuration has container-readable permissions
      ansible.builtin.assert:
        that:
          - quay_bootstrap_config_stat.stat.exists
          - quay_bootstrap_config_stat.stat.isreg
          - quay_bootstrap_config_stat.stat.uid | int ==
            quay_container_uid | int
          - quay_bootstrap_config_stat.stat.gid | int ==
            quay_container_gid | int
          - quay_bootstrap_config_stat.stat.mode == "0640"
        fail_msg: >-
          {{ quay_root }}/config/config.yaml must be owned by
          UID {{ quay_container_uid }}, GID {{ quay_container_gid }},
          and have mode 0640.

    - name: Verify Quay image can read the mounted configuration and TLS files
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --entrypoint
          - /bin/sh
          - --volume
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_image }}"
          - -c
          - >-
            id;
            test -r /conf/stack/config.yaml;
            test -r /conf/stack/ssl.cert;
            test -r /conf/stack/ssl.key;
            test -r /conf/stack/extra_ca_certs/idm-ca.crt;
            echo configuration-readable
      register: quay_config_read_test
      changed_when: false
      failed_when:
        - quay_config_read_test.rc != 0
        - "'configuration-readable' not in quay_config_read_test.stdout"

    - name: Run Quay registry in bootstrap mode
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for Quay HTTPS in bootstrap mode
      ansible.builtin.command:
        argv:
          - curl
          - -kfsS
          - --connect-timeout
          - "5"
          - --max-time
          - "15"
          - "https://127.0.0.1:{{ quay_https_port }}/"
      register: quay_bootstrap_https_check
      retries: 60
      delay: 5
      until: quay_bootstrap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Read Quay bootstrap logs after startup failure
      ansible.builtin.command:
        argv:
          - podman
          - logs
          - --tail
          - "300"
          - quay-registry
      register: quay_bootstrap_logs
      changed_when: false
      failed_when: false
      when: quay_bootstrap_https_check.rc != 0

    - name: Display Quay bootstrap stdout
      ansible.builtin.debug:
        var: quay_bootstrap_logs.stdout_lines
      when:
        - quay_bootstrap_https_check.rc != 0
        - quay_bootstrap_logs.stdout_lines | default([]) | length > 0

    - name: Display Quay bootstrap stderr
      ansible.builtin.debug:
        var: quay_bootstrap_logs.stderr_lines
      when:
        - quay_bootstrap_https_check.rc != 0
        - quay_bootstrap_logs.stderr_lines | default([]) | length > 0

    - name: Inspect Quay bootstrap container state
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - quay-registry
          - --format
          - >-
            Status={{ '{{' }}.State.Status{{ '}}' }}
            Running={{ '{{' }}.State.Running{{ '}}' }}
            ExitCode={{ '{{' }}.State.ExitCode{{ '}}' }}
            Error={{ '{{' }}.State.Error{{ '}}' }}
            RestartCount={{ '{{' }}.RestartCount{{ '}}' }}
      register: quay_bootstrap_inspect
      changed_when: false
      failed_when: false
      when: quay_bootstrap_https_check.rc != 0

    - name: Display Quay bootstrap container state
      ansible.builtin.debug:
        var: quay_bootstrap_inspect.stdout_lines
      when: quay_bootstrap_https_check.rc != 0

    - name: Inspect Quay configuration mount after startup failure
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - quay-registry
          - --format
          - "{{ '{{' }}json .Mounts{{ '}}' }}"
      register: quay_bootstrap_mounts
      changed_when: false
      failed_when: false
      when: quay_bootstrap_https_check.rc != 0

    - name: Display Quay bootstrap mounts
      ansible.builtin.debug:
        var: quay_bootstrap_mounts.stdout
      when: quay_bootstrap_https_check.rc != 0

    - name: Fail when Quay bootstrap startup fails
      ansible.builtin.fail:
        msg: >-
          Quay did not respond in Database-authentication bootstrap mode.
          The configuration readability test passed, but the Quay process
          did not become healthy. Review the displayed Quay logs,
          container state, and mounts.
      when: quay_bootstrap_https_check.rc != 0

    - name: Initialize the Quay bootstrap administrator
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/user/initialize
        method: POST
        validate_certs: false
        body_format: json
        body:
          username: "{{ quay_superuser }}"
          password: "{{ quay_superuser_password }}"
          email: "{{ quay_superuser_email }}"
          access_token: true
        status_code:
          - 200
          - 201
        return_content: true
      register: quay_init_user
      no_log: true

    - name: Capture newly generated Quay bootstrap API token
      ansible.builtin.set_fact:
        quay_api_token: >-
          {{
            quay_init_user.json.access_token
            | default('')
            | string
            | trim
          }}
      no_log: true

    - name: Assert Quay administrator initialization succeeded
      ansible.builtin.assert:
        that:
          - quay_init_user.status | int in [200, 201]
          - quay_api_token | length > 0
        fail_msg: >-
          The clean Quay database did not return a new bootstrap API token.
          The /api/v1/user/initialize request returned HTTP
          {{ quay_init_user.status | default('unknown') }}.
      no_log: true


    - name: Verify that the bootstrap administrator exists and mark email as verified
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - -i
          - quay-postgres
          - psql
          - -U
          - "{{ quay_db_user }}"
          - -d
          - "{{ quay_db_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -v
          - "quay_username={{ quay_superuser }}"
          - -X
          - --no-psqlrc
          - -t
          - -A
        stdin: |
          UPDATE public."user"
          SET verified = true
          WHERE username = :'quay_username';

          SELECT CASE
            WHEN EXISTS (
              SELECT 1
              FROM public."user"
              WHERE username = :'quay_username'
                AND verified = true
            )
            THEN 'BOOTSTRAP_ADMIN_VERIFIED'
            ELSE 'BOOTSTRAP_ADMIN_NOT_FOUND'
          END;
      register: quay_verify_bootstrap_admin
      changed_when: "'UPDATE 1' in quay_verify_bootstrap_admin.stdout"
      failed_when: >
        quay_verify_bootstrap_admin.rc != 0
        or
        'BOOTSTRAP_ADMIN_VERIFIED' not in quay_verify_bootstrap_admin.stdout
      no_log: true

    - name: Ensure the Quay organization exists
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port }}/api/v1/organization/
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          name: "{{ quay_default_org }}"
          email: "{{ quay_default_org }}@example.com"
        status_code:
          - 200
          - 201
          - 400
      register: quay_create_org
      no_log: true
      failed_when: >
        quay_create_org.status == 400
        and (
          quay_create_org.json.error_message | default('')
          is not search('already|exists')
        )

    - name: Ensure owner and writer teams exist
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          role: "{{ item.role }}"
        status_code:
          - 200
          - 201
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_create_teams
      no_log: false

    - name: Add bootstrap administrator to the owners team
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ quay_owner_team
          }}/members/{{ quay_superuser }}
        method: PUT
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      register: quay_add_bootstrap_owner
      no_log: true
      failed_when: false

    ###########################################################################
    # Final LDAP configuration
    ###########################################################################

    - name: Stop Quay before enabling LDAP authentication
      containers.podman.podman_container:
        name: quay-registry
        state: stopped

    - name: Write final Quay LDAP configuration
      ansible.builtin.copy:
        dest: "{{ quay_root }}/config/config.yaml"
        owner: "{{ quay_container_uid }}"
        group: "{{ quay_container_gid }}"
        mode: "0640"
        content: |
          SERVER_HOSTNAME: "{{ quay_hostname }}"
          PREFERRED_URL_SCHEME: "https"
          SETUP_COMPLETE: true

          AUTHENTICATION_TYPE: "LDAP"
          FEATURE_MAILING: false
          FEATURE_USER_CREATION: true
          FEATURE_USER_INITIALIZE: false
          FEATURE_REQUIRE_EMAIL_VERIFICATION: false

          FEATURE_TEAM_SYNCING: true
          TEAM_RESYNC_STALE_TIME: "{{ quay_ldap_team_sync_stale_time }}"
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true

          DATABASE_SECRET_KEY: "{{ quay_database_secret_key }}"
          SECRET_KEY: "{{ quay_secret_key }}"

          DB_URI: "postgresql://{{ quay_db_user }}:{{ quay_db_password | urlencode }}@127.0.0.1:5432/{{ quay_db_name }}"

          BUILDLOGS_REDIS:
            host: "127.0.0.1"
            port: 6379

          USER_EVENTS_REDIS:
            host: "127.0.0.1"
            port: 6379

          DISTRIBUTED_STORAGE_CONFIG:
            default:
              - LocalStorage
              - storage_path: /datastorage/registry

          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
            - default

          DISTRIBUTED_STORAGE_PREFERENCE:
            - default

          LDAP_URI: "{{ quay_ldap_uri }}"

          LDAP_BASE_DN:
            - "{{ quay_ldap_base_dn }}"

          LDAP_ADMIN_DN: "{{ quay_ldap_bind_dn }}"
          LDAP_ADMIN_PASSWD: "{{ idm_admin_password }}"

          LDAP_USER_RDN:
          {% for rdn in quay_ldap_user_rdn %}
            - "{{ rdn }}"
          {% endfor %}

          LDAP_UID_ATTR: "{{ quay_ldap_uid_attr }}"
          LDAP_EMAIL_ATTR: "{{ quay_ldap_email_attr }}"
          LDAP_USER_FILTER: "{{ quay_ldap_user_filter }}"
          LDAP_SUPERUSER_FILTER: "{{ quay_ldap_superuser_filter }}"
          LDAP_TIMEOUT: 15
          LDAP_NETWORK_TIMEOUT: 15

          SUPER_USERS:
            - "{{ quay_superuser }}"
      no_log: true

    - name: Restore SELinux labels after writing LDAP configuration
      ansible.builtin.command:
        argv:
          - restorecon
          - -RFv
          - "{{ quay_root }}/config"
      register: quay_ldap_restorecon
      changed_when: quay_ldap_restorecon.stdout | length > 0

    - name: Verify Quay image can read the final LDAP configuration
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --entrypoint
          - /bin/sh
          - --volume
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_image }}"
          - -c
          - >-
            test -r /conf/stack/config.yaml;
            test -r /conf/stack/ssl.cert;
            test -r /conf/stack/ssl.key;
            test -r /conf/stack/extra_ca_certs/idm-ca.crt;
            echo ldap-configuration-readable
      register: quay_ldap_config_read_test
      changed_when: false
      failed_when:
        - quay_ldap_config_read_test.rc != 0
        - >-
          'ldap-configuration-readable'
          not in quay_ldap_config_read_test.stdout

    - name: Start Quay registry with LDAP authentication
      containers.podman.podman_container:
        name: quay-registry
        pod: quay-pod
        image: "{{ quay_image }}"
        authfile: "{{ redhat_registry_authfile }}"
        state: started
        recreate: true
        restart_policy: always
        volume:
          - "{{ quay_root }}/config:/conf/stack:z"
          - "{{ quay_root }}/storage:/datastorage:z"

    - name: Wait for Quay HTTPS after LDAP switch
      ansible.builtin.command:
        argv:
          - curl
          - -kfsS
          - --connect-timeout
          - "5"
          - --max-time
          - "15"
          - "https://127.0.0.1:{{ quay_https_port }}/"
      register: quay_ldap_https_check
      retries: 60
      delay: 5
      until: quay_ldap_https_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Read Quay logs when LDAP startup fails
      ansible.builtin.command:
        argv:
          - podman
          - logs
          - --tail
          - "300"
          - quay-registry
      register: quay_ldap_logs
      changed_when: false
      failed_when: false
      when: quay_ldap_https_check.rc != 0

    - name: Display Quay LDAP stdout
      ansible.builtin.debug:
        var: quay_ldap_logs.stdout_lines
      when:
        - quay_ldap_https_check.rc != 0
        - quay_ldap_logs.stdout_lines | default([]) | length > 0

    - name: Display Quay LDAP stderr
      ansible.builtin.debug:
        var: quay_ldap_logs.stderr_lines
      when:
        - quay_ldap_https_check.rc != 0
        - quay_ldap_logs.stderr_lines | default([]) | length > 0

    - name: Inspect Quay container after LDAP startup failure
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - quay-registry
          - --format
          - >-
            Status={{ '{{' }}.State.Status{{ '}}' }}
            Running={{ '{{' }}.State.Running{{ '}}' }}
            ExitCode={{ '{{' }}.State.ExitCode{{ '}}' }}
            Error={{ '{{' }}.State.Error{{ '}}' }}
            RestartCount={{ '{{' }}.RestartCount{{ '}}' }}
      register: quay_ldap_inspect
      changed_when: false
      failed_when: false
      when: quay_ldap_https_check.rc != 0

    - name: Display Quay LDAP container state
      ansible.builtin.debug:
        var: quay_ldap_inspect.stdout_lines
      when: quay_ldap_https_check.rc != 0

    - name: Fail when Quay does not start with LDAP
      ansible.builtin.fail:
        msg: >-
          Quay did not respond after switching to IdM LDAP authentication.
          Review the displayed Quay logs and container state.
      when: quay_ldap_https_check.rc != 0

    - name: Enable LDAP synchronization for Quay teams
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}/syncing
        method: POST
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        body_format: json
        body:
          group_dn: "{{ item.group_dn }}"
        status_code:
          - 200
          - 201
          - 204
          - 400
      loop: "{{ quay_team_syncs }}"
      register: quay_enable_team_sync
      no_log: true
      failed_when: >
        quay_enable_team_sync.status == 400
        and (
          quay_enable_team_sync.json.error_message | default('')
          is not search('already|exists|enabled')
        )

    - name: Read synchronized Quay team configuration
      ansible.builtin.uri:
        url: >-
          https://127.0.0.1:{{ quay_https_port
          }}/api/v1/organization/{{ quay_default_org
          }}/team/{{ item.team }}/permissions
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
          Accept: application/json
        status_code: 200
        return_content: true
      loop: "{{ quay_team_syncs }}"
      loop_control:
        label: "{{ item.team }}"
      register: quay_synced_teams
      changed_when: false
      no_log: false

    - name: Show synchronized Quay team validation
      ansible.builtin.debug:
        msg:
          team: "{{ item.item.team }}"
          role: "{{ item.item.role }}"
          idm_group: "{{ item.item.idm_group }}"
          group_dn: "{{ item.item.group_dn }}"
          api_status: "{{ item.status }}"
          repository_permissions: >-
            {{ item.json.permissions | default([]) }}
      loop: "{{ quay_synced_teams.results }}"
      loop_control:
        label: "{{ item.item.team }}"

    - name: Display deployment result
      ansible.builtin.debug:
        msg:
          - "Quay URL: https://{{ quay_hostname }}"
          - "Authentication: IdM LDAP"
          - "IdM base DN: {{ idm_base_dn }}"
          - "IdM user container: {{ idm_user_container_dn }}"
          - "IdM owner group: {{ quay_idm_owner_group_dn }}"
          - "IdM writer group: {{ quay_idm_writer_group_dn }}"
          - "Organization: {{ quay_default_org }}"
          - "Owner team: {{ quay_owner_team }}"
          - "Writer team: {{ quay_default_team }}"
          - >-
            PostgreSQL data is retained at
            {{ quay_root }}/postgres with UID/GID 26.
          - >-
            Quay configuration is owned by container UID
            {{ quay_container_uid }} with mode 0640.
          - >-
            LDAP users are created in Quay on their first successful
            LDAP login.
          - >-
            IdM group synchronization controls Quay team membership,
            and members of the IdM owner group become Quay superusers.
          - >-
            Dedicated Quay LDAP user:
            {{ quay_registry_ldap_username }}
          - >-
            Dedicated Quay LDAP credential secret:
            {{ quay_registry_ldap_secret_name }}
          - >-
            The dedicated Quay LDAP user belongs to the
            {{ quay_idm_writer_group }} IdM group, which synchronizes to the
            {{ quay_default_team }} Quay team.

    - name: Show running containers
      ansible.builtin.command:
        argv:
          - podman
          - ps
      register: podman_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        msg: "{{ podman_ps.stdout_lines | default(['podman ps was not executed']) }}"