---
###############################################################################
# Build a bootc container image and import it into AWS as an AMI
#
# Intended execution environment:
#
#   - Run by Ansible Automation Platform
#   - Target an Image Builder host
#   - AAP custom AWS credential attached to the job template
#   - Podman, AWS CLI, qemu-img and bootc-image-builder prerequisites installed
#
# Required AAP credential environment injection:
#
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#
# Required survey or extra variables:
#
#   image_mode_ssh_public_key
#
# Optional survey or extra variables:
#
#   image_mode_environment_name
#   image_mode_image_name
#   image_mode_image_tag
#   image_mode_quay_host
#   image_mode_quay_organization
#   image_mode_workspace
#   image_mode_force_rebuild
#   image_mode_delete_s3_disk_after_import
#
# Required AWS prerequisites:
#
#   - The automation IAM user can access the artifacts S3 bucket.
#   - The automation IAM user can call EC2 ImportImage APIs.
#   - The automation IAM user can pass the vmimport role.
#   - An IAM service role named vmimport exists.
#
# The resulting bucket name is:
#
#   <environment>-image-mode-artifacts-<account-id>-<region>
###############################################################################

- name: Build bootc image and import it into AWS as an AMI
  hosts: image_builder
  become: true
  gather_facts: true
  any_errors_fatal: true

  vars:
    ###########################################################################
    # Image identity
    ###########################################################################

    image_mode_environment_name: "image-mode-lab"

    image_mode_image_name: "sample-rhel9"
    image_mode_image_tag: "v1"

    image_mode_quay_host: "quay-1.lab.sandbox845.opentlc.com"
    image_mode_quay_organization: "image-mode"

    image_mode_image_reference: >-
      {{
        image_mode_quay_host
        ~ '/'
        ~ image_mode_quay_organization
        ~ '/'
        ~ image_mode_image_name
        ~ ':'
        ~ image_mode_image_tag
      }}

    ###########################################################################
    # Local workspace
    ###########################################################################

    image_mode_workspace_root: "/var/lib/image-mode/tmp"
    image_mode_workspace: >-
      {{ image_mode_workspace_root }}/{{ image_mode_image_name }}

    image_mode_files_directory: "{{ image_mode_workspace }}/files"
    image_mode_output_directory: "{{ image_mode_workspace }}/output"

    image_mode_containerfile_path: "{{ image_mode_workspace }}/Containerfile"
    image_mode_config_path: "{{ image_mode_files_directory }}/config.toml"
    image_mode_index_path: "{{ image_mode_files_directory }}/index.html"

    image_mode_disk_file: >-
      {{ image_mode_output_directory }}/image/disk.raw

    ###########################################################################
    # bootc-image-builder
    ###########################################################################

    image_mode_bootc_builder_image: >-
      registry.redhat.io/rhel9/bootc-image-builder:latest

    image_mode_root_disk_size: "60 GiB"

    ###########################################################################
    # AWS configuration
    #
    # These values are read from the environment injected by the AAP custom
    # credential. They are then explicitly passed to remote AWS CLI commands.
    ###########################################################################

    image_mode_aws_access_key_id: >-
      {{ lookup('ansible.builtin.env', 'AWS_ACCESS_KEY_ID') }}

    image_mode_aws_secret_access_key: >-
      {{ lookup('ansible.builtin.env', 'AWS_SECRET_ACCESS_KEY') }}

    image_mode_aws_session_token: >-
      {{ lookup('ansible.builtin.env', 'AWS_SESSION_TOKEN') | default('', true) }}

    image_mode_aws_region: >-
      {{
        lookup('ansible.builtin.env', 'AWS_REGION')
        | default(
            lookup('ansible.builtin.env', 'AWS_DEFAULT_REGION'),
            true
          )
      }}

    image_mode_aws_environment:
      AWS_ACCESS_KEY_ID: "{{ image_mode_aws_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "{{ image_mode_aws_secret_access_key }}"
      AWS_REGION: "{{ image_mode_aws_region }}"
      AWS_DEFAULT_REGION: "{{ image_mode_aws_region }}"
      AWS_EC2_METADATA_DISABLED: "true"

    ###########################################################################
    # AWS artifact and AMI settings
    ###########################################################################

    image_mode_artifacts_bucket_override: ""

    image_mode_s3_prefix: >-
      bootc/{{ image_mode_image_name }}/{{ image_mode_image_tag }}

    image_mode_s3_disk_key: >-
      {{ image_mode_s3_prefix }}/disk.raw

    image_mode_s3_checksum_key: >-
      {{ image_mode_s3_prefix }}/disk.raw.sha256

    image_mode_ami_display_name: >-
      {{ image_mode_image_name }}-{{ image_mode_image_tag }}

    image_mode_ami_description: >-
      RHEL bootc image {{ image_mode_image_reference }}

    image_mode_ami_architecture: "x86_64"
    image_mode_ami_license_type: "BYOL"
    image_mode_vmimport_role_name: "vmimport"

    ###########################################################################
    # Operation controls
    ###########################################################################

    image_mode_force_rebuild: false
    image_mode_create_artifacts_bucket: true
    image_mode_delete_s3_disk_after_import: false

    image_mode_import_poll_seconds: 30
    image_mode_import_timeout_seconds: 14400

    ###########################################################################
    # AMI tags
    ###########################################################################

    image_mode_ami_tags:
      Name: "{{ image_mode_ami_display_name }}"
      Environment: "{{ image_mode_environment_name }}"
      ImageMode: "bootc"
      RHELVersion: "9.8"
      Application: "nginx"
      ContainerImage: "{{ image_mode_image_reference }}"
      ManagedBy: "Ansible Automation Platform"

  pre_tasks:
    ###########################################################################
    # Validate execution environment
    ###########################################################################

    - name: Validate required operating system
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
          - ansible_facts.distribution_major_version | int >= 9
        fail_msg: >-
          This playbook requires a RHEL 9 or later Image Builder host.

    - name: Validate AWS credential injection
      ansible.builtin.assert:
        that:
          - image_mode_aws_access_key_id | length > 0
          - image_mode_aws_secret_access_key | length > 0
          - image_mode_aws_region | length > 0
        fail_msg: >-
          The AAP job must have the Image Mode AWS custom credential attached.
          The credential injector must provide AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY and AWS_REGION.
      no_log: true

    - name: Validate image build variables
      ansible.builtin.assert:
        that:
          - image_mode_environment_name | length > 0
          - image_mode_image_name | length > 0
          - image_mode_image_tag | length > 0
          - image_mode_quay_host | length > 0
          - image_mode_quay_organization | length > 0
          - image_mode_ssh_public_key is defined
          - image_mode_ssh_public_key | trim | length > 0
          - >-
            image_mode_ssh_public_key is match(
              '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp[0-9]+) '
            )
        fail_msg: >-
          A valid image_mode_ssh_public_key and all image identity variables
          must be supplied.

    - name: Add optional AWS session token to command environment
      ansible.builtin.set_fact:
        image_mode_aws_environment: >-
          {{
            image_mode_aws_environment
            | combine(
                {
                  'AWS_SESSION_TOKEN': image_mode_aws_session_token
                }
              )
          }}
      when: image_mode_aws_session_token | length > 0
      no_log: true

    - name: Locate required commands
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - "command -v {{ item }}"
      loop:
        - podman
        - aws
        - qemu-img
        - sha256sum
      register: image_mode_required_command_checks
      changed_when: false

    - name: Validate required commands
      ansible.builtin.assert:
        that:
          - >-
            image_mode_required_command_checks.results
            | selectattr('rc', 'ne', 0)
            | list
            | length == 0
        fail_msg: >-
          The Image Builder host must have podman, aws, qemu-img and sha256sum
          installed.

    ###########################################################################
    # Resolve AWS account and artifact bucket
    ###########################################################################

    - name: Get AWS caller identity
      ansible.builtin.command:
        argv:
          - aws
          - sts
          - get-caller-identity
          - --output
          - json
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_aws_caller_identity_command
      changed_when: false
      no_log: true

    - name: Parse AWS caller identity
      ansible.builtin.set_fact:
        image_mode_aws_caller_identity: >-
          {{ image_mode_aws_caller_identity_command.stdout | from_json }}
      no_log: true

    - name: Set AWS account ID
      ansible.builtin.set_fact:
        image_mode_aws_account_id: >-
          {{ image_mode_aws_caller_identity.Account }}

    - name: Derive Image Mode artifacts bucket name
      ansible.builtin.set_fact:
        image_mode_artifacts_bucket: >-
          {{
            (
              image_mode_artifacts_bucket_override
              if image_mode_artifacts_bucket_override | length > 0
              else
              image_mode_environment_name
              ~ '-image-mode-artifacts-'
              ~ image_mode_aws_account_id
              ~ '-'
              ~ image_mode_aws_region
            )
            | lower
          }}

    - name: Display resolved non-sensitive AWS settings
      ansible.builtin.debug:
        msg:
          aws_account_id: "{{ image_mode_aws_account_id }}"
          aws_region: "{{ image_mode_aws_region }}"
          artifacts_bucket: "{{ image_mode_artifacts_bucket }}"
          s3_disk_object: >-
            s3://{{ image_mode_artifacts_bucket }}/{{ image_mode_s3_disk_key }}
          image_reference: "{{ image_mode_image_reference }}"

    ###########################################################################
    # Validate VM Import/Export role
    ###########################################################################

    - name: Verify vmimport IAM service role exists
      ansible.builtin.command:
        argv:
          - aws
          - iam
          - get-role
          - --role-name
          - "{{ image_mode_vmimport_role_name }}"
          - --query
          - Role.Arn
          - --output
          - text
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_vmimport_role_check
      changed_when: false
      no_log: true

    ###########################################################################
    # Check for an existing AMI
    ###########################################################################

    - name: Find existing available AMI for this container image
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - describe-images
          - --owners
          - self
          - --filters
          - "Name=state,Values=available"
          - "Name=tag:ContainerImage,Values={{ image_mode_image_reference }}"
          - "Name=tag:Environment,Values={{ image_mode_environment_name }}"
          - --query
          - >-
            reverse(sort_by(Images,&CreationDate))[0].ImageId
          - --output
          - text
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_existing_ami_lookup
      changed_when: false
      no_log: true

    - name: Set existing AMI ID
      ansible.builtin.set_fact:
        image_mode_existing_ami_id: >-
          {{
            ''
            if image_mode_existing_ami_lookup.stdout | trim in ['', 'None', 'null']
            else image_mode_existing_ami_lookup.stdout | trim
          }}

    - name: Determine whether a new AMI must be built
      ansible.builtin.set_fact:
        image_mode_build_required: >-
          {{
            image_mode_force_rebuild | bool
            or image_mode_existing_ami_id | length == 0
          }}

    - name: Report existing AMI reuse
      ansible.builtin.debug:
        msg: >-
          Reusing existing AMI {{ image_mode_existing_ami_id }} for
          {{ image_mode_image_reference }}. Set image_mode_force_rebuild=true
          to generate and import a new AMI.
      when: not image_mode_build_required | bool

  tasks:
    ###########################################################################
    # Create workspace
    ###########################################################################

    - name: Create Image Mode workspace directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ image_mode_workspace_root }}"
        - "{{ image_mode_workspace }}"
        - "{{ image_mode_files_directory }}"
        - "{{ image_mode_output_directory }}"
      when: image_mode_build_required | bool

    ###########################################################################
    # Generate image content
    ###########################################################################

    - name: Create NGINX test page
      ansible.builtin.copy:
        dest: "{{ image_mode_index_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>RHEL Image Mode on AWS</title>
            <style>
              body {
                max-width: 800px;
                margin: 80px auto;
                padding: 0 24px;
                font-family: sans-serif;
                line-height: 1.6;
              }
              h1 {
                font-size: 2.5rem;
              }
              .box {
                padding: 2rem;
                border: 1px solid #ccc;
                border-radius: 12px;
              }
            </style>
          </head>
          <body>
            <div class="box">
              <h1>RHEL 9.8 Image Mode</h1>
              <p>This NGINX server was built as a bootc container image.</p>
              <p>
                The image was converted into an AWS AMI and deployed through
                Red Hat Satellite.
              </p>
            </div>
          </body>
          </html>
      when: image_mode_build_required | bool

    - name: Create bootc Containerfile
      ansible.builtin.copy:
        dest: "{{ image_mode_containerfile_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          FROM registry.redhat.io/rhel9/rhel-bootc:latest

          #############################################################################
          # Pin package resolution to RHEL 9.8
          #############################################################################

          RUN mkdir -p /etc/dnf/vars \
              && printf '%s\n' '9.8' > /etc/dnf/vars/releasever

          #############################################################################
          # Install application and EC2 prerequisites
          #############################################################################

          RUN dnf clean all \
              && rm -rf /var/cache/dnf \
              && dnf --releasever=9.8 -y install \
                  nginx \
                  cloud-init \
                  openssh-server \
                  chrony \
                  sudo \
                  curl \
              && dnf clean all \
              && rm -rf /var/cache/dnf

          #############################################################################
          # Add application content
          #############################################################################

          COPY files/index.html /usr/share/nginx/html/index.html

          #############################################################################
          # Configure the EC2 cloud-init data source
          #############################################################################

          RUN printf '%s\n' \
                'datasource_list: [ Ec2, None ]' \
                > /etc/cloud/cloud.cfg.d/99-ec2-datasource.cfg

          #############################################################################
          # Enable deployed operating-system services
          #############################################################################

          RUN systemctl enable nginx.service \
              && systemctl enable sshd.service \
              && systemctl enable chronyd.service \
              && systemctl enable cloud-init-local.service \
              && systemctl enable cloud-init.service \
              && systemctl enable cloud-config.service \
              && systemctl enable cloud-final.service

          #############################################################################
          # Record image metadata
          #############################################################################

          RUN printf '%s\n' \
                'IMAGE_NAME="{{ image_mode_image_name }}"' \
                'IMAGE_VERSION="{{ image_mode_image_tag }}"' \
                'RHEL_VERSION="9.8"' \
                'APPLICATION="nginx"' \
                'CONTAINER_IMAGE="{{ image_mode_image_reference }}"' \
                > /etc/image-mode-release

          EXPOSE 22
          EXPOSE 80

          CMD ["/sbin/init"]
      when: image_mode_build_required | bool

    - name: Create bootc-image-builder configuration
      ansible.builtin.copy:
        dest: "{{ image_mode_config_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          [[customizations.user]]
          name = "ec2-user"
          key = "{{ image_mode_ssh_public_key | trim }}"
          groups = ["wheel"]

          [[customizations.filesystem]]
          mountpoint = "/"
          minsize = "{{ image_mode_root_disk_size }}"
      when: image_mode_build_required | bool
      no_log: true

    ###########################################################################
    # Build and push bootc container
    ###########################################################################

    - name: Build bootc container image
      ansible.builtin.command:
        argv:
          - podman
          - build
          - --pull=always
          - --tag
          - "{{ image_mode_image_reference }}"
          - "{{ image_mode_workspace }}"
      register: image_mode_container_build
      changed_when: true
      when: image_mode_build_required | bool

    - name: Inspect bootc container label
      ansible.builtin.command:
        argv:
          - podman
          - inspect
          - "{{ image_mode_image_reference }}"
          - --format
          - >-
            {{ '{{' }} index .Config.Labels "containers.bootc" {{ '}}' }}
      register: image_mode_bootc_label
      changed_when: false
      when: image_mode_build_required | bool

    - name: Validate bootc container label
      ansible.builtin.assert:
        that:
          - image_mode_bootc_label.stdout | trim == "1"
        fail_msg: >-
          The built container does not have the containers.bootc=1 label and
          cannot be converted into a bootable disk.
      when: image_mode_build_required | bool

    - name: Push bootc container image to Quay
      ansible.builtin.command:
        argv:
          - podman
          - push
          - "{{ image_mode_image_reference }}"
      register: image_mode_container_push
      changed_when: true
      when: image_mode_build_required | bool

    ###########################################################################
    # Generate raw AMI-compatible disk
    ###########################################################################

    - name: Remove previous disk output
      ansible.builtin.file:
        path: "{{ image_mode_output_directory }}/image"
        state: absent
      when: image_mode_build_required | bool

    - name: Recreate output directory
      ansible.builtin.file:
        path: "{{ image_mode_output_directory }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: image_mode_build_required | bool

    - name: Generate AMI-compatible raw disk
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --privileged
          - --security-opt
          - label=type:unconfined_t
          - --pull=newer
          - --volume
          - /var/lib/containers/storage:/var/lib/containers/storage:Z
          - --volume
          - "{{ image_mode_config_path }}:/config.toml:ro,Z"
          - --volume
          - "{{ image_mode_output_directory }}:/output:Z"
          - "{{ image_mode_bootc_builder_image }}"
          - --type
          - ami
          - --config
          - /config.toml
          - "{{ image_mode_image_reference }}"
      register: image_mode_disk_build
      changed_when: true
      when: image_mode_build_required | bool

    - name: Check generated raw disk
      ansible.builtin.stat:
        path: "{{ image_mode_disk_file }}"
        get_checksum: false
      register: image_mode_disk_stat
      when: image_mode_build_required | bool

    - name: Validate generated raw disk exists
      ansible.builtin.assert:
        that:
          - image_mode_disk_stat.stat.exists
          - image_mode_disk_stat.stat.isreg
          - image_mode_disk_stat.stat.size | int > 0
        fail_msg: >-
          bootc-image-builder did not create
          {{ image_mode_disk_file }}.
      when: image_mode_build_required | bool

    - name: Inspect generated disk format
      ansible.builtin.command:
        argv:
          - qemu-img
          - info
          - --output
          - json
          - "{{ image_mode_disk_file }}"
      register: image_mode_disk_info_command
      changed_when: false
      when: image_mode_build_required | bool

    - name: Parse generated disk information
      ansible.builtin.set_fact:
        image_mode_disk_info: >-
          {{ image_mode_disk_info_command.stdout | from_json }}
      when: image_mode_build_required | bool

    - name: Validate generated disk is RAW
      ansible.builtin.assert:
        that:
          - image_mode_disk_info.format == "raw"
        fail_msg: >-
          Expected a RAW disk but qemu-img reported
          {{ image_mode_disk_info.format | default('unknown') }}.
      when: image_mode_build_required | bool

    - name: Generate raw disk SHA-256 checksum
      ansible.builtin.command:
        argv:
          - sha256sum
          - "{{ image_mode_disk_file }}"
      register: image_mode_disk_checksum_command
      changed_when: false
      when: image_mode_build_required | bool

    - name: Write raw disk checksum file
      ansible.builtin.copy:
        dest: "{{ image_mode_disk_file }}.sha256"
        owner: root
        group: root
        mode: "0644"
        content: >-
          {{ image_mode_disk_checksum_command.stdout }}

      when: image_mode_build_required | bool

    ###########################################################################
    # Ensure the S3 artifacts bucket exists
    ###########################################################################

    - name: Check Image Mode artifacts bucket
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - head-bucket
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_bucket_check
      changed_when: false
      failed_when: false
      no_log: true
      when: image_mode_build_required | bool

    - name: Create Image Mode artifacts bucket outside us-east-1
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - create-bucket
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --region
          - "{{ image_mode_aws_region }}"
          - --create-bucket-configuration
          - "LocationConstraint={{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_bucket_create
      changed_when: true
      no_log: true
      when:
        - image_mode_build_required | bool
        - image_mode_bucket_check.rc != 0
        - image_mode_create_artifacts_bucket | bool
        - image_mode_aws_region != "us-east-1"

    - name: Create Image Mode artifacts bucket in us-east-1
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - create-bucket
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --region
          - us-east-1
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_bucket_create_us_east_1
      changed_when: true
      no_log: true
      when:
        - image_mode_build_required | bool
        - image_mode_bucket_check.rc != 0
        - image_mode_create_artifacts_bucket | bool
        - image_mode_aws_region == "us-east-1"

    - name: Fail when artifacts bucket is missing and creation is disabled
      ansible.builtin.assert:
        that:
          - image_mode_bucket_check.rc == 0
        fail_msg: >-
          S3 bucket {{ image_mode_artifacts_bucket }} does not exist or cannot
          be accessed, and image_mode_create_artifacts_bucket is false.
      when:
        - image_mode_build_required | bool
        - image_mode_bucket_check.rc != 0
        - not image_mode_create_artifacts_bucket | bool

    - name: Configure S3 public-access blocking
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - put-public-access-block
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --public-access-block-configuration
          - >-
            BlockPublicAcls=true,
            IgnorePublicAcls=true,
            BlockPublicPolicy=true,
            RestrictPublicBuckets=true
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    - name: Configure default S3 bucket encryption
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - put-bucket-encryption
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --server-side-encryption-configuration
          - >-
            {"Rules":[{"ApplyServerSideEncryptionByDefault":
            {"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    ###########################################################################
    # Upload raw disk
    ###########################################################################

    - name: Upload raw disk to S3
      ansible.builtin.command:
        argv:
          - aws
          - s3
          - cp
          - "{{ image_mode_disk_file }}"
          - >-
            s3://{{ image_mode_artifacts_bucket }}/{{ image_mode_s3_disk_key }}
          - --region
          - "{{ image_mode_aws_region }}"
          - --only-show-errors
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_s3_disk_upload
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    - name: Upload raw disk checksum to S3
      ansible.builtin.command:
        argv:
          - aws
          - s3
          - cp
          - "{{ image_mode_disk_file }}.sha256"
          - >-
            s3://{{ image_mode_artifacts_bucket }}/{{ image_mode_s3_checksum_key }}
          - --region
          - "{{ image_mode_aws_region }}"
          - --only-show-errors
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_s3_checksum_upload
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    - name: Verify uploaded disk object
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - head-object
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --key
          - "{{ image_mode_s3_disk_key }}"
          - --region
          - "{{ image_mode_aws_region }}"
          - --output
          - json
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_s3_disk_object
      changed_when: false
      no_log: true
      when: image_mode_build_required | bool

    ###########################################################################
    # Import raw disk as an AMI
    ###########################################################################

    - name: Create AWS disk-container definition
      ansible.builtin.copy:
        dest: "{{ image_mode_workspace }}/disk-containers.json"
        owner: root
        group: root
        mode: "0600"
        content: >-
          {{
            [
              {
                "Description":
                  image_mode_ami_display_name ~ " bootc root disk",
                "Format": "RAW",
                "UserBucket": {
                  "S3Bucket": image_mode_artifacts_bucket,
                  "S3Key": image_mode_s3_disk_key
                }
              }
            ]
            | to_nice_json
          }}
      when: image_mode_build_required | bool

    - name: Start AWS VM image import
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - import-image
          - --description
          - "{{ image_mode_ami_description }}"
          - --architecture
          - "{{ image_mode_ami_architecture }}"
          - --license-type
          - "{{ image_mode_ami_license_type }}"
          - --role-name
          - "{{ image_mode_vmimport_role_name }}"
          - --disk-containers
          - "file://{{ image_mode_workspace }}/disk-containers.json"
          - --region
          - "{{ image_mode_aws_region }}"
          - --output
          - json
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_import_start_command
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    - name: Parse AWS image import task
      ansible.builtin.set_fact:
        image_mode_import_start: >-
          {{ image_mode_import_start_command.stdout | from_json }}
        image_mode_import_task_id: >-
          {{
            (
              image_mode_import_start_command.stdout
              | from_json
            ).ImportTaskId
          }}
      when: image_mode_build_required | bool

    - name: Display AWS import task ID
      ansible.builtin.debug:
        msg: >-
          Started AWS VM Import/Export task
          {{ image_mode_import_task_id }}.
      when: image_mode_build_required | bool

    - name: Wait for AWS image import to complete
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - describe-import-image-tasks
          - --import-task-ids
          - "{{ image_mode_import_task_id }}"
          - --region
          - "{{ image_mode_aws_region }}"
          - --output
          - json
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_import_status_command
      changed_when: false
      failed_when: false
      until: >-
        (
          image_mode_import_status_command.stdout
          | default('{}', true)
          | from_json
        ).ImportImageTasks[0].Status
        | default('unknown')
        in ['completed', 'deleted', 'deleting']
      retries: >-
        {{
          (
            image_mode_import_timeout_seconds
            / image_mode_import_poll_seconds
          )
          | int
        }}
      delay: "{{ image_mode_import_poll_seconds }}"
      no_log: true
      when: image_mode_build_required | bool

    - name: Parse final AWS import status
      ansible.builtin.set_fact:
        image_mode_import_result: >-
          {{
            (
              image_mode_import_status_command.stdout
              | from_json
            ).ImportImageTasks[0]
          }}
      when: image_mode_build_required | bool

    - name: Validate AWS image import completed successfully
      ansible.builtin.assert:
        that:
          - image_mode_import_result.Status == "completed"
          - image_mode_import_result.ImageId is defined
          - image_mode_import_result.ImageId | length > 0
        fail_msg: >-
          AWS image import did not complete successfully.
          Status={{ image_mode_import_result.Status | default('unknown') }};
          message={{
            image_mode_import_result.StatusMessage
            | default('No status message returned')
          }}.
      when: image_mode_build_required | bool

    - name: Set newly imported AMI ID
      ansible.builtin.set_fact:
        image_mode_ami_id: "{{ image_mode_import_result.ImageId }}"
      when: image_mode_build_required | bool

    - name: Set reused AMI ID
      ansible.builtin.set_fact:
        image_mode_ami_id: "{{ image_mode_existing_ami_id }}"
      when: not image_mode_build_required | bool

    - name: Wait for imported AMI to become available
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - wait
          - image-available
          - --image-ids
          - "{{ image_mode_ami_id }}"
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      changed_when: false
      no_log: true
      when: image_mode_build_required | bool

    ###########################################################################
    # Tag imported AMI
    ###########################################################################

    - name: Build AWS AMI tag arguments
      ansible.builtin.set_fact:
        image_mode_ami_tag_arguments: >-
          {{
            image_mode_ami_tags
            | dict2items
            | map('combine', {'unused': ''})
            | list
          }}
      when: image_mode_build_required | bool

    - name: Tag imported AMI
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'ec2',
              'create-tags',
              '--resources',
              image_mode_ami_id,
              '--tags'
            ]
            +
            (
              image_mode_ami_tags
              | dict2items
              | map(attribute='key')
              | zip(image_mode_ami_tags | dict2items | map(attribute='value'))
              | map('join', ',Value=')
              | map('regex_replace', '^(.*)$', 'Key=\1')
              | list
            )
            +
            [
              '--region',
              image_mode_aws_region
            ]
          }}
      environment: "{{ image_mode_aws_environment }}"
      changed_when: true
      no_log: true
      when: image_mode_build_required | bool

    - name: Get imported AMI information
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - describe-images
          - --image-ids
          - "{{ image_mode_ami_id }}"
          - --region
          - "{{ image_mode_aws_region }}"
          - --output
          - json
      environment: "{{ image_mode_aws_environment }}"
      register: image_mode_ami_description_command
      changed_when: false
      no_log: true

    - name: Parse imported AMI information
      ansible.builtin.set_fact:
        image_mode_ami_details: >-
          {{
            (
              image_mode_ami_description_command.stdout
              | from_json
            ).Images[0]
          }}

    - name: Find root EBS snapshot ID
      ansible.builtin.set_fact:
        image_mode_snapshot_id: >-
          {{
            (
              image_mode_ami_details.BlockDeviceMappings
              | selectattr('Ebs', 'defined')
              | map(attribute='Ebs.SnapshotId')
              | select('defined')
              | first
            )
            | default('')
          }}

    - name: Tag imported root snapshot
      ansible.builtin.command:
        argv:
          - aws
          - ec2
          - create-tags
          - --resources
          - "{{ image_mode_snapshot_id }}"
          - --tags
          - "Key=Name,Value={{ image_mode_ami_display_name }}-root"
          - "Key=Environment,Value={{ image_mode_environment_name }}"
          - "Key=ImageMode,Value=bootc"
          - "Key=ContainerImage,Value={{ image_mode_image_reference }}"
          - "Key=ManagedBy,Value=Ansible Automation Platform"
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      changed_when: true
      no_log: true
      when:
        - image_mode_build_required | bool
        - image_mode_snapshot_id | length > 0

    ###########################################################################
    # Optional S3 cleanup
    ###########################################################################

    - name: Delete imported raw disk from S3
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - delete-object
          - --bucket
          - "{{ image_mode_artifacts_bucket }}"
          - --key
          - "{{ image_mode_s3_disk_key }}"
          - --region
          - "{{ image_mode_aws_region }}"
      environment: "{{ image_mode_aws_environment }}"
      changed_when: true
      no_log: true
      when:
        - image_mode_build_required | bool
        - image_mode_delete_s3_disk_after_import | bool

  post_tasks:
    ###########################################################################
    # Publish final result for AAP job output
    ###########################################################################

    - name: Build Image Mode AMI result
      ansible.builtin.set_fact:
        image_mode_ami_result:
          ami_id: "{{ image_mode_ami_id }}"
          ami_name: "{{ image_mode_ami_display_name }}"
          state: "{{ image_mode_ami_details.State }}"
          architecture: "{{ image_mode_ami_details.Architecture }}"
          root_device_name: "{{ image_mode_ami_details.RootDeviceName }}"
          snapshot_id: "{{ image_mode_snapshot_id }}"
          container_image: "{{ image_mode_image_reference }}"
          aws_account_id: "{{ image_mode_aws_account_id }}"
          aws_region: "{{ image_mode_aws_region }}"
          artifacts_bucket: "{{ image_mode_artifacts_bucket }}"
          s3_disk_key: "{{ image_mode_s3_disk_key }}"
          import_task_id: >-
            {{
              image_mode_import_task_id
              | default('existing-ami-reused')
            }}
          new_ami_created: "{{ image_mode_build_required | bool }}"

    - name: Display Image Mode AMI result
      ansible.builtin.debug:
        var: image_mode_ami_result

    - name: Publish AMI ID through AAP job artifacts
      ansible.builtin.set_stats:
        data:
          image_mode_ami_id: "{{ image_mode_ami_id }}"
          image_mode_ami_name: "{{ image_mode_ami_display_name }}"
          image_mode_ami_snapshot_id: "{{ image_mode_snapshot_id }}"
          image_mode_ami_region: "{{ image_mode_aws_region }}"
          image_mode_artifacts_bucket: "{{ image_mode_artifacts_bucket }}"
          image_mode_container_image: "{{ image_mode_image_reference }}"
          image_mode_ami_result: "{{ image_mode_ami_result }}"
        per_host: false