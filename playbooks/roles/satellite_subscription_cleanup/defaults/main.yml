---
###############################################################################
# Role defaults for satellite_subscription_cleanup
###############################################################################

###############################################################################
# Host targeting and safety
###############################################################################

satellite_cleanup_include_satellite: false
satellite_cleanup_satellite_group: "satellite"
satellite_cleanup_role_variable: "role"
satellite_cleanup_satellite_role_value: "satellite"

###############################################################################
# Subscription-manager cleanup
###############################################################################

satellite_cleanup_unregister_existing_consumer: true
satellite_cleanup_ignore_unregister_errors: true
satellite_cleanup_subscription_manager_data: true
satellite_cleanup_require_subscription_manager: true

# Restore RHSM repository management. A prior image/build process can leave
# manage_repos=0, which causes "Repositories disabled by configuration."
satellite_cleanup_restore_manage_repos: true
satellite_cleanup_manage_repos_value: "1"

# Clear a release pin inherited from an earlier Satellite/content view.
# The activation role sets the correct release after registration.
satellite_cleanup_unset_release: true

# Remove redhat.repo after cleanup. It is regenerated after registration.
satellite_cleanup_remove_generated_redhat_repo: true
satellite_cleanup_redhat_repo_path: "/etc/yum.repos.d/redhat.repo"

###############################################################################
# RHSM certificate cleanup
###############################################################################

satellite_cleanup_remove_rhsm_certificates: true
satellite_cleanup_rhsm_certificate_directories:
  - /etc/pki/consumer
  - /etc/pki/entitlement

satellite_cleanup_recreate_rhsm_certificate_directories: true
satellite_cleanup_rhsm_directory_owner: "root"
satellite_cleanup_rhsm_directory_group: "root"
satellite_cleanup_rhsm_directory_mode: "0755"

###############################################################################
# Katello consumer package cleanup
###############################################################################

satellite_cleanup_remove_katello_ca_packages: true
satellite_cleanup_katello_package_pattern: "katello-ca-consumer*"
satellite_cleanup_remove_katello_ca_files: true
satellite_cleanup_katello_ca_files:
  - /etc/rhsm/ca/katello-default-ca.pem
  - /etc/rhsm/ca/katello-server-ca.pem

###############################################################################
# AWS RHUI cleanup
###############################################################################

# Keep RHUI packages until Satellite registration has been verified.
satellite_cleanup_remove_rhui_client_packages: false
satellite_cleanup_rhui_package_regex: >-
  ^(rh-amazon-rhui-client|rhui-client-config|rhui-.*-client)

###############################################################################
# DNF cleanup
###############################################################################

satellite_cleanup_clean_dnf_metadata: true
satellite_cleanup_remove_dnf_cache: true
satellite_cleanup_dnf_cache_path: "/var/cache/dnf"

###############################################################################
# Validation and reporting
###############################################################################

satellite_cleanup_verify_unregistered: true
satellite_cleanup_fail_if_still_registered: true
satellite_cleanup_verify_manage_repos: true
satellite_cleanup_display_status: true
