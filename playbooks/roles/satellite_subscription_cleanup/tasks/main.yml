---
###############################################################################
# Tasks for satellite_subscription_cleanup
###############################################################################

- name: PHASE 0 | Verify supported operating system family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family | default('') == "RedHat"
    fail_msg: >-
      The satellite_subscription_cleanup role supports Red Hat-family
      operating systems only. Host {{ inventory_hostname }} reports
      {{ ansible_facts.os_family | default('unknown') }}.

- name: PHASE 1 | Check whether subscription-manager is installed
  ansible.builtin.command:
    argv: [rpm, -q, subscription-manager]
  register: satellite_cleanup_subscription_manager_package
  changed_when: false
  failed_when: false

- name: PHASE 1 | Assert subscription-manager is installed when required
  ansible.builtin.assert:
    that:
      - satellite_cleanup_subscription_manager_package.rc | default(1) == 0
    fail_msg: >-
      subscription-manager is not installed on {{ inventory_hostname }}.
  when:
    - satellite_cleanup_require_subscription_manager | bool

- name: PHASE 1 | Read current subscription identity
  ansible.builtin.command:
    argv: [subscription-manager, identity]
  register: satellite_cleanup_existing_identity
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0

- name: PHASE 1 | Display current registration state
  ansible.builtin.debug:
    msg: >-
      {{
        satellite_cleanup_existing_identity.stdout
        | default(
            satellite_cleanup_existing_identity.stderr
            | default('No identity was found.'),
            true
          )
        | trim
      }}
  when:
    - satellite_cleanup_display_status | bool

- name: PHASE 2 | Unregister current consumer
  ansible.builtin.command:
    argv: [subscription-manager, unregister]
  register: satellite_cleanup_unregister
  changed_when: satellite_cleanup_unregister.rc | default(1) == 0
  failed_when: >-
    not (satellite_cleanup_ignore_unregister_errors | bool)
    and satellite_cleanup_unregister.rc | default(1) != 0
  when:
    - satellite_cleanup_unregister_existing_consumer | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0
    - satellite_cleanup_existing_identity is defined
    - satellite_cleanup_existing_identity.rc | default(1) == 0

- name: PHASE 3 | Clean subscription-manager local data
  ansible.builtin.command:
    argv: [subscription-manager, clean]
  register: satellite_cleanup_clean
  changed_when: >-
    satellite_cleanup_clean.rc | default(1) == 0
    and
    'local data removed' in
    (satellite_cleanup_clean.stdout | default('') | lower)
  failed_when: satellite_cleanup_clean.rc | default(1) != 0
  when:
    - satellite_cleanup_subscription_manager_data | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0

- name: PHASE 3 | Restore subscription-manager repository management
  ansible.builtin.command:
    argv:
      - subscription-manager
      - config
      - "--rhsm.manage_repos={{ satellite_cleanup_manage_repos_value }}"
  register: satellite_cleanup_manage_repos
  changed_when: false
  when:
    - satellite_cleanup_restore_manage_repos | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0

- name: PHASE 3 | Clear any previous release pin
  ansible.builtin.command:
    argv: [subscription-manager, release, --unset]
  register: satellite_cleanup_release_unset
  changed_when: >-
    satellite_cleanup_release_unset.rc | default(1) == 0
    and
    'release preference has been unset' in
    (
      (
        satellite_cleanup_release_unset.stdout | default('')
      )
      ~
      (
        satellite_cleanup_release_unset.stderr | default('')
      )
    ) | lower
  failed_when: false
  when:
    - satellite_cleanup_unset_release | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0

- name: PHASE 3 | Remove generated redhat.repo
  ansible.builtin.file:
    path: "{{ satellite_cleanup_redhat_repo_path }}"
    state: absent
  when:
    - satellite_cleanup_remove_generated_redhat_repo | bool

- name: PHASE 3 | Remove RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_remove_rhsm_certificates | bool

- name: PHASE 3 | Recreate RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ satellite_cleanup_rhsm_directory_owner }}"
    group: "{{ satellite_cleanup_rhsm_directory_group }}"
    mode: "{{ satellite_cleanup_rhsm_directory_mode }}"
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_remove_rhsm_certificates | bool
    - satellite_cleanup_recreate_rhsm_certificate_directories | bool

- name: PHASE 4 | Query installed Katello consumer CA packages
  ansible.builtin.command:
    argv:
      - rpm
      - -qa
      - "{{ satellite_cleanup_katello_package_pattern }}"
  register: satellite_cleanup_katello_packages_query
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_remove_katello_ca_packages | bool

- name: PHASE 4 | Build Katello package list
  ansible.builtin.set_fact:
    satellite_cleanup_katello_packages: >-
      {{
        satellite_cleanup_katello_packages_query.stdout_lines
        | default([])
        | map('trim')
        | reject('equalto', '')
        | list
      }}

- name: PHASE 4 | Remove installed Katello consumer CA packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_katello_packages }}"
    state: absent
    disable_gpg_check: true
  when:
    - satellite_cleanup_remove_katello_ca_packages | bool
    - satellite_cleanup_katello_packages | length > 0

- name: PHASE 4 | Remove stale Katello RHSM CA files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_katello_ca_files }}"
  when:
    - satellite_cleanup_remove_katello_ca_files | bool

- name: PHASE 5 | Find installed AWS RHUI client packages
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa |
    grep -E '{{ satellite_cleanup_rhui_package_regex }}' ||
    true
  args:
    executable: /bin/bash
  register: satellite_cleanup_rhui_packages_query
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_remove_rhui_client_packages | bool

- name: PHASE 5 | Build RHUI package list
  ansible.builtin.set_fact:
    satellite_cleanup_rhui_packages: >-
      {{
        satellite_cleanup_rhui_packages_query.stdout_lines
        | default([])
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  when:
    - satellite_cleanup_remove_rhui_client_packages | bool

- name: PHASE 5 | Initialize empty RHUI package list
  ansible.builtin.set_fact:
    satellite_cleanup_rhui_packages: []
  when:
    - satellite_cleanup_rhui_packages is not defined

- name: PHASE 5 | Remove AWS RHUI client packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_rhui_packages }}"
    state: absent
  when:
    - satellite_cleanup_remove_rhui_client_packages | bool
    - satellite_cleanup_rhui_packages | length > 0

- name: PHASE 6 | Clean DNF metadata
  ansible.builtin.command:
    argv: [dnf, clean, all]
  changed_when: false
  when:
    - satellite_cleanup_clean_dnf_metadata | bool

- name: PHASE 6 | Remove cached DNF metadata
  ansible.builtin.file:
    path: "{{ satellite_cleanup_dnf_cache_path }}"
    state: absent
  when:
    - satellite_cleanup_remove_dnf_cache | bool

- name: PHASE 6 | Recreate DNF cache directory
  ansible.builtin.file:
    path: "{{ satellite_cleanup_dnf_cache_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - satellite_cleanup_remove_dnf_cache | bool

- name: PHASE 7 | Read effective manage_repos setting
  ansible.builtin.command:
    argv:
      - subscription-manager
      - config
      - --list
  register: satellite_cleanup_final_config
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_verify_manage_repos | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0

- name: PHASE 7 | Assert RHSM repository management is enabled
  ansible.builtin.assert:
    that:
      - satellite_cleanup_final_config.rc | default(1) == 0
      - >-
        satellite_cleanup_final_config.stdout
        is regex_search(
          '(?m)^\s*manage_repos\s*=\s*\[?1\]?\s*$'
        )
    success_msg: >-
      subscription-manager repository management is enabled on
      {{ inventory_hostname }}.
    fail_msg: >-
      subscription-manager repository management is not enabled on
      {{ inventory_hostname }}.

      Expected:

        manage_repos = [1]

      Effective subscription-manager configuration:

      {{
        satellite_cleanup_final_config.stdout
        | default(
            satellite_cleanup_final_config.stderr
            | default('No configuration output was returned.'),
            true
          )
        | trim
      }}
  when:
    - satellite_cleanup_verify_manage_repos | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc | default(1) == 0
    - satellite_cleanup_final_config is defined
    - not (
        satellite_cleanup_final_config.skipped
        | default(false)
        | bool
      )
