---
###############################################################################
# Tasks for satellite_subscription_cleanup
###############################################################################

###############################################################################
# PHASE 0 | Validate host
###############################################################################

- name: PHASE 0 | Verify supported operating system family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "RedHat"
    fail_msg: >-
      The satellite_subscription_cleanup role supports
      Red Hat-family operating systems only.
      Host {{ inventory_hostname }}
      reports {{ ansible_facts.os_family | default('unknown') }}.

###############################################################################
# PHASE 1 | Inspect subscription-manager state
###############################################################################

- name: PHASE 1 | Check whether subscription-manager is installed
  ansible.builtin.command:
    argv:
      - rpm
      - -q
      - subscription-manager
  register: satellite_cleanup_subscription_manager_package
  changed_when: false
  failed_when: false

- name: PHASE 1 | Assert subscription-manager is installed when required
  ansible.builtin.assert:
    that:
      - satellite_cleanup_subscription_manager_package.rc == 0
    fail_msg: >-
      subscription-manager is not installed on
      {{ inventory_hostname }}.
  when:
    - satellite_cleanup_require_subscription_manager | bool

- name: PHASE 1 | Read current subscription identity
  ansible.builtin.command:
    argv:
      - subscription-manager
      - identity
  register: satellite_cleanup_existing_identity
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_subscription_manager_package.rc == 0

- name: PHASE 1 | Display current registration state
  ansible.builtin.debug:
    msg: >-
      {{
        satellite_cleanup_existing_identity.stdout
        | default(
            satellite_cleanup_existing_identity.stderr,
            true
          )
        | trim
      }}
  when:
    - satellite_cleanup_display_status | bool

###############################################################################
# PHASE 2 | Remove existing registration
###############################################################################

- name: PHASE 2 | Unregister current consumer
  ansible.builtin.command:
    argv:
      - subscription-manager
      - unregister
  register: satellite_cleanup_unregister
  changed_when: satellite_cleanup_unregister.rc == 0
  failed_when: >-
    not satellite_cleanup_ignore_unregister_errors
    and
    satellite_cleanup_unregister.rc != 0
  when:
    - satellite_cleanup_unregister_existing_consumer | bool
    - satellite_cleanup_existing_identity.rc == 0

- name: PHASE 2 | Report unregister result
  ansible.builtin.debug:
    msg: >-
      subscription-manager unregister returned
      rc={{ satellite_cleanup_unregister.rc }}.

      {{
        satellite_cleanup_unregister.stdout
        | default(
            satellite_cleanup_unregister.stderr,
            true
          )
      }}
  when:
    - satellite_cleanup_display_status | bool
    - satellite_cleanup_unregister is defined

###############################################################################
# PHASE 3 | Clean RHSM
###############################################################################

- name: PHASE 3 | Clean subscription-manager
  ansible.builtin.command:
    argv:
      - subscription-manager
      - clean
  register: satellite_cleanup_clean
  changed_when: true
  when:
    - satellite_cleanup_subscription_manager_data | bool

- name: PHASE 3 | Remove RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_remove_rhsm_certificates | bool

- name: PHASE 3 | Recreate RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ satellite_cleanup_rhsm_directory_owner }}"
    group: "{{ satellite_cleanup_rhsm_directory_group }}"
    mode: "{{ satellite_cleanup_rhsm_directory_mode }}"
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_recreate_rhsm_certificate_directories | bool

###############################################################################
# PHASE 4 | Remove Katello CA packages
###############################################################################

- name: PHASE 4 | Query installed Katello CA packages
  ansible.builtin.command:
    argv:
      - rpm
      - -qa
      - "{{ satellite_cleanup_katello_package_pattern }}"
  register: satellite_cleanup_katello_packages_query
  changed_when: false
  failed_when: false

- name: PHASE 4 | Build package list
  ansible.builtin.set_fact:
    satellite_cleanup_katello_packages: >-
      {{
        satellite_cleanup_katello_packages_query.stdout_lines
        | default([])
      }}

- name: PHASE 4 | Remove Katello packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_katello_packages }}"
    state: absent
  when:
    - satellite_cleanup_katello_packages | length > 0

- name: PHASE 4 | Remove Katello CA files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_katello_ca_files }}"
  when:
    - satellite_cleanup_remove_katello_ca_files | bool

###############################################################################
# PHASE 5 | Remove RHUI packages (optional)
###############################################################################

- name: PHASE 5 | Find RHUI packages
  ansible.builtin.shell: |
    rpm -qa | grep -E "{{ satellite_cleanup_rhui_package_regex }}" || true
  args:
    executable: /bin/bash
  register: satellite_cleanup_rhui_packages_query
  changed_when: false
  when:
    - satellite_cleanup_remove_rhui_client_packages | bool

- name: PHASE 5 | Remove RHUI packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_rhui_packages_query.stdout_lines }}"
    state: absent
  when:
    - satellite_cleanup_remove_rhui_client_packages | bool
    - satellite_cleanup_rhui_packages_query.stdout_lines | length > 0

###############################################################################
# PHASE 6 | Refresh package metadata
###############################################################################

- name: PHASE 6 | Clean DNF metadata
  ansible.builtin.command:
    argv:
      - dnf
      - clean
      - all
  when:
    - satellite_cleanup_clean_dnf_metadata | bool

###############################################################################
# PHASE 7 | Verify cleanup
###############################################################################

- name: PHASE 7 | Verify registration removed
  ansible.builtin.command:
    argv:
      - subscription-manager
      - identity
  register: satellite_cleanup_final_identity
  changed_when: false
  failed_when: false

- name: PHASE 7 | Assert registration removed
  ansible.builtin.assert:
    that:
      - satellite_cleanup_final_identity.rc != 0
    success_msg: >-
      {{ inventory_hostname }}
      is ready for Satellite registration.
    fail_msg: >-
      {{ inventory_hostname }}
      still has an RHSM identity.
  when:
    - satellite_cleanup_verify_unregistered | bool

- name: PHASE 7 | Display cleanup summary
  ansible.builtin.debug:
    msg:
      host: "{{ inventory_hostname }}"
      previous_registration_found: "{{ satellite_cleanup_existing_identity.rc == 0 }}"
      katello_packages_removed: "{{ satellite_cleanup_katello_packages | default([]) }}"
      ready_for_satellite_registration: "{{ satellite_cleanup_final_identity.rc != 0 }}"
  when:
    - satellite_cleanup_display_status | bool