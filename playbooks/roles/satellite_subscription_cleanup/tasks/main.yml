---
###############################################################################
# Tasks for satellite_subscription_cleanup
###############################################################################

###############################################################################
# PHASE 0 | Determine host eligibility
###############################################################################

- name: PHASE 0 | Resolve Satellite inventory group members
  ansible.builtin.set_fact:
    satellite_cleanup_satellite_group_members: >-
      {{
        groups[
          satellite_cleanup_satellite_group
          | default('satellite')
        ]
        | default([])
      }}

- name: PHASE 0 | Resolve host role value
  ansible.builtin.set_fact:
    satellite_cleanup_host_role_value: >-
      {{
        hostvars[inventory_hostname][
          satellite_cleanup_role_variable
          | default('role')
        ]
        | default('')
        | string
        | lower
      }}

- name: PHASE 0 | Determine whether host is a Satellite server
  ansible.builtin.set_fact:
    satellite_cleanup_is_satellite_host: >-
      {{
        inventory_hostname
        in satellite_cleanup_satellite_group_members
        or
        satellite_cleanup_host_role_value
        ==
        (
          satellite_cleanup_satellite_role_value
          | default('satellite')
          | string
          | lower
        )
      }}

- name: PHASE 0 | Skip Satellite server unless explicitly included
  ansible.builtin.meta: end_host
  when:
    - satellite_cleanup_is_satellite_host | bool
    - not (satellite_cleanup_include_satellite | default(false) | bool)

- name: PHASE 0 | Verify supported operating system family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "RedHat"
    fail_msg: >-
      The satellite_subscription_cleanup role supports Red Hat-family
      operating systems only. Host {{ inventory_hostname }} reports OS family
      {{ ansible_facts.os_family | default('unknown') }}.

###############################################################################
# PHASE 1 | Inspect subscription-manager state
###############################################################################

- name: PHASE 1 | Check whether subscription-manager is installed
  ansible.builtin.command:
    argv:
      - rpm
      - -q
      - subscription-manager
  register: satellite_cleanup_subscription_manager_package
  changed_when: false
  failed_when: false

- name: PHASE 1 | Assert subscription-manager is installed when required
  ansible.builtin.assert:
    that:
      - satellite_cleanup_subscription_manager_package.rc == 0
    fail_msg: >-
      subscription-manager is not installed on {{ inventory_hostname }}.
      Install it before running this role or set
      satellite_cleanup_require_subscription_manager=false.
  when:
    - satellite_cleanup_require_subscription_manager | default(true) | bool

- name: PHASE 1 | Read current subscription identity
  ansible.builtin.command:
    argv:
      - subscription-manager
      - identity
  register: satellite_cleanup_existing_identity
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_subscription_manager_package.rc == 0

- name: PHASE 1 | Display current registration state
  ansible.builtin.debug:
    msg: >-
      {{
        satellite_cleanup_existing_identity.stdout
        | default(
            satellite_cleanup_existing_identity.stderr,
            true
          )
        | default('subscription-manager is not installed')
        | trim
      }}
  when:
    - satellite_cleanup_display_status | default(true) | bool

###############################################################################
# PHASE 2 | Unregister current consumer
###############################################################################

- name: PHASE 2 | Unregister current consumer
  ansible.builtin.command:
    argv:
      - subscription-manager
      - unregister
  register: satellite_cleanup_unregister
  changed_when: satellite_cleanup_unregister.rc == 0
  failed_when: >-
    not (
      satellite_cleanup_ignore_unregister_errors
      | default(true)
      | bool
    )
    and
    satellite_cleanup_unregister.rc != 0
  when:
    - satellite_cleanup_unregister_existing_consumer | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc == 0
    - satellite_cleanup_existing_identity.rc | default(1) == 0

- name: PHASE 2 | Report unregister result
  ansible.builtin.debug:
    msg: >-
      subscription-manager unregister returned rc={{
        satellite_cleanup_unregister.rc | default('not-run')
      }}.
      {{
        satellite_cleanup_unregister.stdout
        | default(
            satellite_cleanup_unregister.stderr,
            true
          )
        | default('')
        | trim
      }}
  when:
    - satellite_cleanup_display_status | default(true) | bool
    - satellite_cleanup_unregister is defined
    - not (satellite_cleanup_unregister.skipped | default(false) | bool)

###############################################################################
# PHASE 3 | Clean local RHSM state
###############################################################################

- name: PHASE 3 | Clean subscription-manager local data
  ansible.builtin.command:
    argv:
      - subscription-manager
      - clean
  register: satellite_cleanup_clean
  changed_when: >-
    satellite_cleanup_clean.rc == 0
    and
    (
      'All local data removed'
      in satellite_cleanup_clean.stdout
      or
      'local data removed'
      in (satellite_cleanup_clean.stdout | lower)
    )
  failed_when: satellite_cleanup_clean.rc != 0
  when:
    - satellite_cleanup_subscription_manager_data | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc == 0

- name: PHASE 3 | Remove stale RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_remove_rhsm_certificates | default(true) | bool

- name: PHASE 3 | Recreate RHSM certificate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ satellite_cleanup_rhsm_directory_owner | default('root') }}"
    group: "{{ satellite_cleanup_rhsm_directory_group | default('root') }}"
    mode: "{{ satellite_cleanup_rhsm_directory_mode | default('0755') }}"
  loop: "{{ satellite_cleanup_rhsm_certificate_directories }}"
  when:
    - satellite_cleanup_remove_rhsm_certificates | default(true) | bool
    - satellite_cleanup_recreate_rhsm_certificate_directories | default(true) | bool

###############################################################################
# PHASE 4 | Remove stale Katello consumer packages and CA files
###############################################################################

- name: PHASE 4 | Find installed Katello consumer CA packages
  ansible.builtin.command:
    argv:
      - rpm
      - -qa
      - "{{ satellite_cleanup_katello_package_pattern }}"
  register: satellite_cleanup_katello_packages_query
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_remove_katello_ca_packages | default(true) | bool

- name: PHASE 4 | Store installed Katello consumer CA package names
  ansible.builtin.set_fact:
    satellite_cleanup_katello_packages: >-
      {{
        satellite_cleanup_katello_packages_query.stdout_lines
        | default([])
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  when:
    - satellite_cleanup_remove_katello_ca_packages | default(true) | bool

- name: PHASE 4 | Remove installed Katello consumer CA packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_katello_packages }}"
    state: absent
  when:
    - satellite_cleanup_remove_katello_ca_packages | default(true) | bool
    - satellite_cleanup_katello_packages | default([]) | length > 0

- name: PHASE 4 | Remove stale Katello RHSM CA files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ satellite_cleanup_katello_ca_files }}"
  when:
    - satellite_cleanup_remove_katello_ca_files | default(true) | bool

###############################################################################
# PHASE 5 | Optionally remove AWS RHUI client packages
###############################################################################

- name: PHASE 5 | Find installed AWS RHUI client packages
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa |
    grep -E "{{ satellite_cleanup_rhui_package_regex }}" ||
    true
  args:
    executable: /bin/bash
  register: satellite_cleanup_rhui_packages_query
  changed_when: false
  when:
    - satellite_cleanup_remove_rhui_client_packages | default(false) | bool

- name: PHASE 5 | Store installed AWS RHUI client package names
  ansible.builtin.set_fact:
    satellite_cleanup_rhui_packages: >-
      {{
        satellite_cleanup_rhui_packages_query.stdout_lines
        | default([])
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  when:
    - satellite_cleanup_remove_rhui_client_packages | default(false) | bool

- name: PHASE 5 | Remove AWS RHUI client packages
  ansible.builtin.dnf:
    name: "{{ satellite_cleanup_rhui_packages }}"
    state: absent
  when:
    - satellite_cleanup_remove_rhui_client_packages | default(false) | bool
    - satellite_cleanup_rhui_packages | default([]) | length > 0

###############################################################################
# PHASE 6 | Refresh DNF state
###############################################################################

- name: PHASE 6 | Clean DNF metadata
  ansible.builtin.command:
    argv:
      - dnf
      - clean
      - all
  register: satellite_cleanup_dnf_clean
  changed_when: satellite_cleanup_dnf_clean.rc == 0
  failed_when: satellite_cleanup_dnf_clean.rc != 0
  when:
    - satellite_cleanup_clean_dnf_metadata | default(true) | bool

###############################################################################
# PHASE 7 | Validate cleanup
###############################################################################

- name: PHASE 7 | Verify host is no longer registered
  ansible.builtin.command:
    argv:
      - subscription-manager
      - identity
  register: satellite_cleanup_final_identity
  changed_when: false
  failed_when: false
  when:
    - satellite_cleanup_verify_unregistered | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc == 0

- name: PHASE 7 | Assert local registration has been removed
  ansible.builtin.assert:
    that:
      - satellite_cleanup_final_identity.rc != 0
    fail_msg: >-
      {{ inventory_hostname }} still reports a subscription-manager consumer
      identity after cleanup:
      {{
        satellite_cleanup_final_identity.stdout
        | default(
            satellite_cleanup_final_identity.stderr,
            true
          )
        | trim
      }}
    success_msg: >-
      {{ inventory_hostname }} is no longer registered and is ready for
      installation of the current Satellite Katello consumer CA package.
  when:
    - satellite_cleanup_verify_unregistered | default(true) | bool
    - satellite_cleanup_fail_if_still_registered | default(true) | bool
    - satellite_cleanup_subscription_manager_package.rc == 0

- name: PHASE 7 | Warn when registration remains but failure is disabled
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ inventory_hostname }} still reports a subscription-manager
      identity after cleanup:
      {{
        satellite_cleanup_final_identity.stdout
        | default(
            satellite_cleanup_final_identity.stderr,
            true
          )
        | trim
      }}
  when:
    - satellite_cleanup_verify_unregistered | default(true) | bool
    - not (satellite_cleanup_fail_if_still_registered | default(true) | bool)
    - satellite_cleanup_subscription_manager_package.rc == 0
    - satellite_cleanup_final_identity.rc == 0

- name: PHASE 7 | Display cleanup summary
  ansible.builtin.debug:
    msg:
      host: "{{ inventory_hostname }}"
      previous_registration_found: >-
        {{
          satellite_cleanup_existing_identity.rc
          | default(1)
          == 0
        }}
      unregister_attempted: >-
        {{
          satellite_cleanup_unregister is defined
          and
          not (
            satellite_cleanup_unregister.skipped
            | default(false)
            | bool
          )
        }}
      rhsm_data_cleaned: >-
        {{
          satellite_cleanup_subscription_manager_data
          | default(true)
          | bool
        }}
      katello_packages_removed: >-
        {{
          satellite_cleanup_katello_packages
          | default([])
        }}
      rhui_package_removal_enabled: >-
        {{
          satellite_cleanup_remove_rhui_client_packages
          | default(false)
          | bool
        }}
      rhui_packages_removed: >-
        {{
          satellite_cleanup_rhui_packages
          | default([])
          if (
            satellite_cleanup_remove_rhui_client_packages
            | default(false)
            | bool
          )
          else 'disabled'
        }}
      ready_for_satellite_registration: >-
        {{
          (
            satellite_cleanup_subscription_manager_package.rc != 0
          )
          or
          (
            satellite_cleanup_final_identity.rc
            | default(1)
            != 0
          )
        }}
  when:
    - satellite_cleanup_display_status | default(true) | bool
