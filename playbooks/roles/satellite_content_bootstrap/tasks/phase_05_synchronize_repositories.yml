---
###############################################################################
# PHASE 5 | Synchronize repositories
###############################################################################

- name: PHASE 5 | Synchronize enabled repositories
  ansible.builtin.command:
    argv:
      - hammer
      - repository
      - synchronize
      - --id
      - "{{ item.repository_id }}"
      - --organization-label
      - "{{ satellite_organization_label }}"
      - --async
  loop: "{{ satellite_content_bootstrap_resolved_repositories }}"
  loop_control:
    label: "Repository ID {{ item.repository_id }} | {{ item.content_label }}"
  register: satellite_content_bootstrap_repository_sync_requests
  changed_when: true
  when: satellite_sync_repositories | bool

- name: PHASE 5 | Wait for repository synchronization tasks
  ansible.builtin.command:
    argv:
      - hammer
      - --output
      - json
      - task
      - list
      - --search
      - "label = Actions::Katello::Repository::Sync and state != stopped"
  register: satellite_content_bootstrap_active_sync_tasks
  changed_when: false
  retries: >-
    {{
      (satellite_repository_sync_timeout | int)
      //
      (satellite_repository_sync_poll | int)
    }}
  delay: "{{ satellite_repository_sync_poll | int }}"
  until: (satellite_content_bootstrap_active_sync_tasks.stdout | from_json | length) == 0
  when: satellite_sync_repositories | bool

- name: PHASE 5 | Check for failed repository synchronization tasks
  ansible.builtin.command:
    argv:
      - hammer
      - --output
      - json
      - task
      - list
      - --search
      - "label = Actions::Katello::Repository::Sync and result = error"
  register: satellite_content_bootstrap_failed_sync_tasks
  changed_when: false
  when: satellite_sync_repositories | bool

- name: PHASE 5 | Fail when repository synchronization failed
  ansible.builtin.assert:
    that:
      - (satellite_content_bootstrap_failed_sync_tasks.stdout | from_json | length) == 0
    fail_msg: >-
      One or more repository synchronization tasks failed. Review Monitor >
      Satellite Tasks or run hammer task list.
  when: satellite_sync_repositories | bool
