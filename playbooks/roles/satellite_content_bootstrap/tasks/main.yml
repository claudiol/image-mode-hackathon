---
###############################################################################
# Tasks | satellite_content_bootstrap
#
# The phase files keep the role maintainable while tasks/main.yml remains the
# single role entry point.
###############################################################################

- name: Include Satellite and organization validation tasks
  ansible.builtin.import_tasks: phase_01_validate_satellite.yml

- name: Include subscription connection and allocation tasks
  ansible.builtin.import_tasks: phase_02_subscription_connection.yml

- name: Include repository set validation tasks
  ansible.builtin.import_tasks: phase_03_validate_repository_sets.yml

- name: Include repository enablement and resolution tasks
  ansible.builtin.import_tasks: phase_04_enable_repositories.yml

- name: Include repository synchronization tasks
  ansible.builtin.import_tasks: phase_05_synchronize_repositories.yml

- name: Include lifecycle environment tasks
  ansible.builtin.import_tasks: phase_06_lifecycle_environment.yml

- name: Include content view and repository membership tasks
  ansible.builtin.import_tasks: phase_07_content_views.yml

- name: Include content view publication and promotion tasks
  ansible.builtin.import_tasks: phase_08_publish_promote.yml

- name: Include activation key management tasks
  ansible.builtin.import_tasks: phase_09_activation_keys.yml

- name: Include final validation and registration summary tasks
  ansible.builtin.import_tasks: phase_10_validation_summary.yml
