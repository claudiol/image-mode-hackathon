---
###############################################################################
# PHASE 4 | Enable repositories and resolve repository IDs
###############################################################################

- name: PHASE 4 | Enable requested RHEL repositories
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail

      repository_set_search='name="{{ item.1.repository_set_name }}"'
      repository_search='content_label="{{ item.1.content_label }}"'

      repo_set_id="$(
        hammer --csv --no-headers repository-set list \
          --organization-label {{ satellite_organization_label | quote }} \
          --search "${repository_set_search}" |
        awk -F',' 'NR == 1 { gsub(/"/, "", $1); print $1 }'
      )"

      if [[ -z "${repo_set_id}" ]]; then
        echo "Unable to resolve repository-set ID: {{ item.1.repository_set_name }}" >&2
        exit 2
      fi

      existing_id="$(
        hammer --csv --no-headers repository list \
          --organization-label {{ satellite_organization_label | quote }} \
          --search "${repository_search}" |
        awk -F',' 'NR == 1 { gsub(/"/, "", $1); print $1 }'
      )"

      if [[ -n "${existing_id}" ]]; then
        echo "ALREADY_ENABLED:${existing_id}"
        exit 0
      fi

      set +e
      enable_output="$(
        hammer repository-set enable \
          --id "${repo_set_id}" \
          --organization-label {{ satellite_organization_label | quote }} \
          --basearch {{ satellite_basearch | quote }} \
          --releasever {{ item.0.releasever | quote }} 2>&1
      )"
      enable_rc=$?
      set -e

      if [[ ${enable_rc} -eq 0 ]]; then
        printf '%s\n' "${enable_output}"
        echo "ENABLED"
        exit 0
      fi

      if grep -qiE \
        '409[[:space:]]+Conflict|already[[:space:]]+enabled|already[[:space:]]+exists' \
        <<< "${enable_output}"; then
        printf '%s\n' "${enable_output}" >&2
        echo "ALREADY_ENABLED_BY_SATELLITE"
        exit 0
      fi

      printf '%s\n' "${enable_output}" >&2
      exit "${enable_rc}"
    executable: /bin/bash
  loop: "{{ satellite_rhel_repository_definitions | subelements('repositories') }}"
  loop_control:
    label: "RHEL {{ item.0.releasever }} | {{ item.1.repository_set_name }}"
  register: satellite_content_bootstrap_repository_enable_results
  changed_when: >-
    'ENABLED' in satellite_content_bootstrap_repository_enable_results.stdout
    and
    'ALREADY_ENABLED' not in satellite_content_bootstrap_repository_enable_results.stdout
  failed_when: satellite_content_bootstrap_repository_enable_results.rc != 0

- name: PHASE 4 | Resolve enabled repository IDs
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail

      repository_search='content_label="{{ item.1.content_label }}"'

      repository_id="$(
        hammer --csv --no-headers repository list \
          --organization-label {{ satellite_organization_label | quote }} \
          --search "${repository_search}" |
        awk -F',' 'NR == 1 { gsub(/"/, "", $1); print $1 }'
      )"

      if [[ -z "${repository_id}" ]]; then
        echo "Unable to resolve enabled repository {{ item.1.content_label }}" >&2
        exit 2
      fi

      printf '%s\n' "${repository_id}"
    executable: /bin/bash
  loop: "{{ satellite_rhel_repository_definitions | subelements('repositories') }}"
  loop_control:
    label: "{{ item.1.content_label }} | release {{ item.0.releasever }}"
  register: satellite_content_bootstrap_enabled_repository_ids
  changed_when: false
  failed_when: >-
    satellite_content_bootstrap_enabled_repository_ids.rc != 0
    or
    (satellite_content_bootstrap_enabled_repository_ids.stdout | trim | length) == 0

- name: PHASE 4 | Build resolved repository metadata
  ansible.builtin.set_fact:
    satellite_content_bootstrap_resolved_repositories: >-
      {{
        satellite_content_bootstrap_resolved_repositories
        | default([])
        + [
            {
              'major': item.item.0.major,
              'releasever': item.item.0.releasever,
              'content_view': item.item.0.content_view,
              'activation_key': item.item.0.activation_key,
              'repository_set_name': item.item.1.repository_set_name,
              'content_label': item.item.1.content_label,
              'repository_id': item.stdout | trim | int
            }
          ]
      }}
  loop: "{{ satellite_content_bootstrap_enabled_repository_ids.results }}"
  loop_control:
    label: "{{ item.item.0.content_view }} <- {{ item.item.1.content_label }}"
