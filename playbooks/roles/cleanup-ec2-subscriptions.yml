---
###############################################################################
# Clean previous RHSM / Satellite registration state from AWS EC2 RHEL hosts
#
# Default target:
#   All inventory hosts except members of the [satellite] group
#
# Run:
#   ansible-playbook -i inventory cleanup-ec2-subscriptions.yml
#
# Include Satellite hosts only when explicitly required:
#   ansible-playbook -i inventory cleanup-ec2-subscriptions.yml \
#     -e satellite_cleanup_include_satellite=true
#
# Remove AWS RHUI client packages only when hosts will immediately be
# registered to Satellite:
#   ansible-playbook -i inventory cleanup-ec2-subscriptions.yml \
#     -e satellite_cleanup_remove_rhui_client_packages=true
###############################################################################

- name: Clean previous subscription and Satellite registration state
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: false
  serial: 1

  vars:
    satellite_cleanup_include_satellite: false
    satellite_cleanup_remove_rhui_client_packages: false
    satellite_cleanup_remove_katello_ca_packages: true
    satellite_cleanup_remove_rhsm_certificates: true

  pre_tasks:
    - name: Determine whether this host is a Satellite server
      ansible.builtin.set_fact:
        satellite_cleanup_is_satellite_host: >-
          {{
            inventory_hostname in (groups['satellite'] | default([]))
            or
            (
              hostvars[inventory_hostname].role
              | default('')
              | string
              | lower
            ) == 'satellite'
          }}

    - name: Skip Satellite server unless explicitly included
      ansible.builtin.meta: end_host
      when:
        - satellite_cleanup_is_satellite_host | bool
        - not (satellite_cleanup_include_satellite | bool)

    - name: Verify supported operating system family
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == 'RedHat'
        fail_msg: >-
          This cleanup playbook supports Red Hat-family operating systems only.
          Host {{ inventory_hostname }} reports OS family
          {{ ansible_facts.os_family | default('unknown') }}.

  tasks:
    - name: PHASE 1 | Check whether subscription-manager is installed
      ansible.builtin.command:
        argv:
          - rpm
          - -q
          - subscription-manager
      register: satellite_cleanup_subscription_manager_package
      changed_when: false
      failed_when: false

    - name: PHASE 1 | Read current subscription identity
      ansible.builtin.command:
        argv:
          - subscription-manager
          - identity
      register: satellite_cleanup_existing_identity
      changed_when: false
      failed_when: false
      when:
        - satellite_cleanup_subscription_manager_package.rc == 0

    - name: PHASE 1 | Display current registration state
      ansible.builtin.debug:
        msg: >-
          {{
            satellite_cleanup_existing_identity.stdout
            | default(
                satellite_cleanup_existing_identity.stderr,
                true
              )
            | default('subscription-manager is not installed')
            | trim
          }}

    - name: PHASE 2 | Unregister current consumer
      ansible.builtin.command:
        argv:
          - subscription-manager
          - unregister
      register: satellite_cleanup_unregister
      changed_when: satellite_cleanup_unregister.rc == 0
      failed_when: false
      when:
        - satellite_cleanup_subscription_manager_package.rc == 0
        - satellite_cleanup_existing_identity.rc | default(1) == 0

    - name: PHASE 2 | Report unregister result
      ansible.builtin.debug:
        msg: >-
          subscription-manager unregister returned rc={{
            satellite_cleanup_unregister.rc | default('not-run')
          }}. {{
            satellite_cleanup_unregister.stdout
            | default(
                satellite_cleanup_unregister.stderr,
                true
              )
            | default('')
            | trim
          }}
      when:
        - satellite_cleanup_unregister is defined

    - name: PHASE 3 | Clean subscription-manager local data
      ansible.builtin.command:
        argv:
          - subscription-manager
          - clean
      register: satellite_cleanup_clean
      changed_when: >-
        satellite_cleanup_clean.rc == 0
        and
        (
          'All local data removed' in satellite_cleanup_clean.stdout
          or
          'local data removed' in (satellite_cleanup_clean.stdout | lower)
        )
      failed_when: satellite_cleanup_clean.rc != 0
      when:
        - satellite_cleanup_subscription_manager_package.rc == 0

    - name: PHASE 3 | Remove stale RHSM consumer certificate directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/pki/consumer
        - /etc/pki/entitlement
      when:
        - satellite_cleanup_remove_rhsm_certificates | bool

    - name: PHASE 3 | Recreate RHSM certificate directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /etc/pki/consumer
        - /etc/pki/entitlement
      when:
        - satellite_cleanup_remove_rhsm_certificates | bool

    - name: PHASE 4 | Find installed Katello consumer CA packages
      ansible.builtin.command:
        argv:
          - rpm
          - -qa
          - "katello-ca-consumer*"
      register: satellite_cleanup_katello_packages_query
      changed_when: false
      failed_when: false
      when:
        - satellite_cleanup_remove_katello_ca_packages | bool

    - name: PHASE 4 | Store installed Katello consumer CA package names
      ansible.builtin.set_fact:
        satellite_cleanup_katello_packages: >-
          {{
            satellite_cleanup_katello_packages_query.stdout_lines
            | default([])
            | map('trim')
            | reject('equalto', '')
            | list
          }}
      when:
        - satellite_cleanup_remove_katello_ca_packages | bool

    - name: PHASE 4 | Remove installed Katello consumer CA packages
      ansible.builtin.dnf:
        name: "{{ satellite_cleanup_katello_packages }}"
        state: absent
      when:
        - satellite_cleanup_remove_katello_ca_packages | bool
        - satellite_cleanup_katello_packages | default([]) | length > 0

    - name: PHASE 4 | Remove stale Katello RHSM CA files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rhsm/ca/katello-default-ca.pem
        - /etc/rhsm/ca/katello-server-ca.pem
      when:
        - satellite_cleanup_remove_katello_ca_packages | bool

    - name: PHASE 5 | Find installed AWS RHUI client packages
      ansible.builtin.shell: |
        set -o pipefail
        rpm -qa | grep -E '^(rh-amazon-rhui-client|rhui-client-config|rhui-.*-client)' || true
      args:
        executable: /bin/bash
      register: satellite_cleanup_rhui_packages_query
      changed_when: false
      when:
        - satellite_cleanup_remove_rhui_client_packages | bool

    - name: PHASE 5 | Store installed AWS RHUI client package names
      ansible.builtin.set_fact:
        satellite_cleanup_rhui_packages: >-
          {{
            satellite_cleanup_rhui_packages_query.stdout_lines
            | default([])
            | map('trim')
            | reject('equalto', '')
            | list
          }}
      when:
        - satellite_cleanup_remove_rhui_client_packages | bool

    - name: PHASE 5 | Remove AWS RHUI client packages
      ansible.builtin.dnf:
        name: "{{ satellite_cleanup_rhui_packages }}"
        state: absent
      when:
        - satellite_cleanup_remove_rhui_client_packages | bool
        - satellite_cleanup_rhui_packages | default([]) | length > 0

    - name: PHASE 6 | Clean DNF metadata
      ansible.builtin.command:
        argv:
          - dnf
          - clean
          - all
      register: satellite_cleanup_dnf_clean
      changed_when: true
      failed_when: satellite_cleanup_dnf_clean.rc != 0

    - name: PHASE 6 | Verify host is no longer registered
      ansible.builtin.command:
        argv:
          - subscription-manager
          - identity
      register: satellite_cleanup_final_identity
      changed_when: false
      failed_when: false
      when:
        - satellite_cleanup_subscription_manager_package.rc == 0

    - name: PHASE 6 | Assert local registration has been removed
      ansible.builtin.assert:
        that:
          - satellite_cleanup_final_identity.rc != 0
        fail_msg: >-
          {{ inventory_hostname }} still reports a subscription-manager
          consumer identity after cleanup:
          {{
            satellite_cleanup_final_identity.stdout
            | default(
                satellite_cleanup_final_identity.stderr,
                true
              )
            | trim
          }}
        success_msg: >-
          {{ inventory_hostname }} is no longer registered and is ready for
          installation of the current Satellite Katello CA package.
      when:
        - satellite_cleanup_subscription_manager_package.rc == 0

    - name: PHASE 6 | Display cleanup summary
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          previous_registration_found: >-
            {{
              satellite_cleanup_existing_identity.rc
              | default(1)
              == 0
            }}
          katello_packages_removed: >-
            {{
              satellite_cleanup_katello_packages
              | default([])
            }}
          rhui_packages_removed: >-
            {{
              satellite_cleanup_rhui_packages
              | default([])
              if satellite_cleanup_remove_rhui_client_packages | bool
              else 'disabled'
            }}
          ready_for_satellite_registration: true
