---
###############################################################################
# Install Red Hat Satellite 6.19.x from an ISO stored in Amazon S3
#
# Expected inventory variables:
#
#   aws_region
#   secret_prefix
#   satellite_iso_s3_bucket
#   satellite_iso_s3_key
#   satellite_iso_sha256
#   satellite_initial_admin_username
#   satellite_organization_name
#   satellite_location_name
#   satellite_manifest_s3_bucket
#   satellite_manifest_s3_key
#   satellite_manifest_sha256

# Expected AWS Secrets Manager secret:
#
#   <secret_prefix>/satellite/admin_password
#
# The Satellite EC2 instance requires an IAM instance profile with:
#
#   s3:GetObject
#
# for:
#
#   s3://<satellite_iso_s3_bucket>/<satellite_iso_s3_key>
###############################################################################

- name: Install disconnected Red Hat Satellite from S3 ISO
  hosts: satellite
  become: true
  gather_facts: true
  any_errors_fatal: true

  vars:
    ###########################################################################
    # Satellite identity
    ###########################################################################

    satellite_fqdn: "{{ inventory_hostname }}"
    satellite_short_name: "{{ inventory_hostname.split('.')[0] }}"

    satellite_admin_username: >-
      {{
        satellite_initial_admin_username
        | default('admin')
      }}

    satellite_organization: >-
      {{
        satellite_organization_name
        | default('Image Mode Lab')
      }}

    satellite_location: >-
      {{
        satellite_location_name
        | default(
            'AWS Region - '
            ~ satellite_aws_region
          )
      }}

    ###########################################################################
    # AWS configuration
    ###########################################################################

    satellite_aws_region: >-
      {{
        aws_region
        | default('us-east-2')
      }}

    satellite_secret_prefix: >-
      {{
        secret_prefix
        | default('image-mode-lab')
      }}

    satellite_admin_password_secret_name: >-
      {{ satellite_secret_prefix }}/satellite/admin_password


    ###########################################################################
    # Public TLS certificate configuration
    ###########################################################################

    satellite_public_tls_fqdn: >-
      {{
        public_tls_fqdn
        | default(satellite_fqdn, true)
      }}

    satellite_acm_certificate_arn: >-
      {{
        acm_certificate_arn
        | default('', true)
      }}

    # Red Hat recommends retaining these files because later
    # satellite-installer and upgrade operations reference them.
    satellite_tls_directory: "/root/satellite_cert"

    satellite_tls_certificate_path: >-
      {{ satellite_tls_directory }}/satellite_cert.pem

    satellite_tls_private_key_path: >-
      {{ satellite_tls_directory }}/satellite_cert_key.pem

    satellite_tls_acm_chain_path: >-
      {{ satellite_tls_directory }}/acm_chain.pem

    satellite_tls_ca_bundle_path: >-
      {{ satellite_tls_directory }}/ca_cert_bundle.pem

    satellite_tls_current_certificate_path: >-
      {{ satellite_tls_directory }}/current_satellite_cert.pem

    satellite_tls_system_ca_parts_directory: >-
      {{ satellite_tls_directory }}/system-ca-parts

    satellite_tls_acm_chain_parts_directory: >-
      {{ satellite_tls_directory }}/acm-chain-parts

    satellite_tls_local_staging_prefix: "satellite-acm-tls-"

    satellite_tls_minimum_validity_seconds: 1209600

    satellite_force_public_tls_install: false


    ###########################################################################
    # Satellite ISO
    ###########################################################################

    satellite_iso_bucket: >-
      {{
        satellite_iso_s3_bucket
        | default('aap-containerized-installers')
      }}

    satellite_iso_key: >-
      {{
        satellite_iso_s3_key
        | default('Satellite-6.19.2-rhel-9-x86_64.dvd.iso')
      }}

    satellite_iso_s3_uri: >-
      s3://{{ satellite_iso_bucket }}/{{ satellite_iso_key }}

    satellite_iso_dest: >-
      /var/tmp/{{ satellite_iso_key | basename }}

    satellite_mount_path: "/var/mnt/satellite_iso"

    expected_satellite_iso_sha256: >-
      {{
        satellite_iso_sha256
        | default('')
        | trim
      }}

    ###########################################################################
    # Satellite subscription manifest
    ###########################################################################

    satellite_manifest_bucket: >-
      {{
        satellite_manifest_s3_bucket
        | default(satellite_iso_bucket)
      }}

    satellite_manifest_key: >-
      {{
        satellite_manifest_s3_key
        | default('manifest_Satellite.zip')
      }}

    satellite_manifest_s3_uri: >-
      s3://{{ satellite_manifest_bucket }}/{{ satellite_manifest_key }}

    satellite_manifest_dest: >-
      /var/tmp/{{ satellite_manifest_key | basename }}

    expected_satellite_manifest_sha256: >-
      {{
        satellite_manifest_sha256
        | default('')
        | trim
      }}

    ###########################################################################
    # IdM LDAP integration
    ###########################################################################

    satellite_idm_auth_source_name: "Red Hat IdM"

    satellite_idm_admin_group: "idm-admins"
    satellite_admin_user_group_name: "IdM Satellite Administrators"

    satellite_idm_host: "{{ idm_server_fqdn }}"

    satellite_idm_base_dn: >-
      dc={{ idm_domain_name.split('.') | join(',dc=') }}

    satellite_idm_users_base_dn: >-
      cn=users,cn=accounts,{{ satellite_idm_base_dn }}

    satellite_idm_groups_base_dn: >-
      cn=groups,cn=accounts,{{ satellite_idm_base_dn }}

    satellite_idm_bind_dn: >-
      uid=admin,cn=users,cn=accounts,{{ satellite_idm_base_dn }}


    ###########################################################################
    # Logs and installer markers
    ###########################################################################

    satellite_package_install_log: "/var/log/satellite-iso-install-packages.log"
    satellite_installer_log: "/var/log/foreman-installer/satellite.log"
    satellite_installer_rc_file: "/var/tmp/satellite-installer.rc"
    satellite_install_complete_marker: "/etc/foreman-installer/scenarios.d/satellite-answers.yaml"


    ###########################################################################
    # Temporary OpenSSL compatibility workaround
    ###########################################################################

    satellite_openssl_workaround_enabled: true
    satellite_openssl_compatible_version: "3.5.5-4.el9_8"
    satellite_openssl_arch: "x86_64"
    satellite_openssl_expected_packages:

      - >-
        openssl-{{ satellite_openssl_compatible_version }}.{{ satellite_openssl_arch }}

      - >-
        openssl-libs-{{ satellite_openssl_compatible_version }}.{{ satellite_openssl_arch }}

    ###########################################################################
    # Packages
    ###########################################################################

    satellite_bootstrap_packages:
      - awscli2
      - firewalld
      - chrony
      - tar
      - gzip
      - xz
      - rsync
      - bind-utils
      - sos
      - tmux
      - unzip
      - openssl
      - openssl-libs

    ###########################################################################
    # Host firewall
    #
    # TCP 80 and 443 are externally reachable through the AWS security group.
    # The remaining ports are principally for internal Satellite services and
    # managed hosts inside the VPC.
    ###########################################################################

    satellite_firewall_tcp_ports:
      - "80"
      - "443"
      - "5646"
      - "5647"
      - "8000"
      - "9090"

  pre_tasks:

    ###########################################################################
    # Validate required inventory data
    ###########################################################################

    - name: Validate required Satellite deployment variables
      ansible.builtin.assert:
        that:
          - satellite_fqdn | length > 0
          - satellite_fqdn is match('^[A-Za-z0-9][A-Za-z0-9.-]+$')
          - satellite_iso_bucket | length > 0
          - satellite_iso_key | length > 0
          - satellite_manifest_bucket | length > 0
          - satellite_manifest_key | length > 0
          - satellite_admin_username | length > 0
          - satellite_organization | length > 0
          - satellite_location | length > 0
          - satellite_secret_prefix | length > 0
          - satellite_aws_region | length > 0
          - satellite_public_tls_fqdn | length > 0
          - satellite_acm_certificate_arn | length > 0
        fail_msg: >-
          One or more required Satellite variables are missing or invalid.
          Verify the Terraform-generated [all:vars] inventory values.


    - name: Verify target operating system
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
          - ansible_facts.distribution_major_version == "9"
        fail_msg: >-
          This Satellite ISO deployment requires Red Hat Enterprise Linux 9.
          Detected {{ ansible_facts.distribution }}
          {{ ansible_facts.distribution_version }}.

    ###########################################################################
    # Read Satellite administrator password from AWS Secrets Manager
    #
    # This runs on the Terraform/Ansible controller. It therefore uses the
    # controller's AWS profile instead of requiring the Satellite EC2 instance
    # to read Secrets Manager.
    ###########################################################################

    - name: Read Satellite administrator password from AWS Secrets Manager
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'secretsmanager',
              'get-secret-value',
              '--secret-id',
              satellite_admin_password_secret_name,
              '--region',
              satellite_aws_region,
              '--query',
              'SecretString',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_admin_password_result
      changed_when: false
      no_log: true

    - name: Set Satellite administrator password fact
      ansible.builtin.set_fact:
        satellite_admin_password: >-
          {{
            satellite_admin_password_result.stdout
            | trim
          }}
      no_log: true

    - name: Validate retrieved Satellite administrator password
      ansible.builtin.assert:
        that:
          - satellite_admin_password | length >= 16
        fail_msg: >-
          The Satellite administrator password could not be retrieved from
          {{ satellite_admin_password_secret_name }}.
      no_log: true

    - name: Read IdM administrator password from AWS Secrets Manager
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'secretsmanager',
              'get-secret-value',
              '--secret-id',
              satellite_secret_prefix ~ '/idm/admin_password',
              '--region',
              satellite_aws_region,
              '--query',
              'SecretString',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_idm_admin_password_result
      changed_when: false
      no_log: true

    - name: Set IdM administrator password fact
      ansible.builtin.set_fact:
        satellite_idm_bind_password: >-
          {{

            satellite_idm_admin_password_result.stdout
            | trim
          }}
      no_log: true

    - name: Verify Satellite ACM certificate is issued
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'acm',
              'describe-certificate',
              '--certificate-arn',
              satellite_acm_certificate_arn,
              '--region',
              satellite_aws_region,
              '--query',
              'Certificate.Status',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_acm_certificate_status
      changed_when: false
      failed_when: >-
        satellite_acm_certificate_status.rc != 0
        or
        satellite_acm_certificate_status.stdout | trim != 'ISSUED'

  tasks:
    ###########################################################################
    # PHASE 1 | Host preparation
    ###########################################################################

    - name: PHASE 1 | Configure Satellite hostname
      block:
        - name: Set persistent Satellite hostname
          ansible.builtin.hostname:
            name: "{{ satellite_fqdn }}"

        - name: Ensure cloud-init preserves the configured hostname
          ansible.builtin.copy:
            dest: /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
            owner: root
            group: root
            mode: "0644"
            content: |
              preserve_hostname: true

        - name: Determine Satellite private IPv4 address
          ansible.builtin.set_fact:
            satellite_private_ip: >-
              {{
                private_ip
                | default(ansible_default_ipv4.address)
              }}

        - name: Validate Satellite private IPv4 address
          ansible.builtin.assert:
            that:
              - >-
                satellite_private_ip
                is match(
                  '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$'
                )
            fail_msg: >-
              No valid Satellite private IP was found in private_ip or
              ansible_default_ipv4.address.

        - name: Configure deterministic local hostname resolution
          ansible.builtin.blockinfile:
            path: /etc/hosts
            create: true
            owner: root
            group: root
            mode: "0644"
            marker: "# {mark} ANSIBLE MANAGED SATELLITE HOST"
            block: |
              {{ satellite_private_ip }} {{ satellite_fqdn }} {{ satellite_short_name }}

        - name: Verify Satellite FQDN resolves locally
          ansible.builtin.command:
            argv:
              - getent
              - ahostsv4
              - "{{ satellite_fqdn }}"
          register: satellite_hostname_resolution
          changed_when: false

        - name: Verify the resolved address includes the private IP
          ansible.builtin.assert:
            that:
              - satellite_private_ip in satellite_hostname_resolution.stdout
            fail_msg: >-
              {{ satellite_fqdn }} does not resolve to
              {{ satellite_private_ip }} on the Satellite host.

    ###########################################################################
    # PHASE 2 | Base packages and services
    ###########################################################################

    - name: PHASE 2 | Install bootstrap packages
      ansible.builtin.dnf:
        name: "{{ satellite_bootstrap_packages }}"
        state: present
        update_cache: true

    - name: PHASE 2 | Enable time synchronization
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: PHASE 2 | Start and enable firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: PHASE 2 | Open Satellite TCP ports
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ satellite_firewall_tcp_ports }}"

    ###########################################################################
    # PHASE 3 | Verify EC2 IAM/S3 access
    ###########################################################################

    - name: PHASE 3 | Verify caller identity from Satellite EC2 instance role
      ansible.builtin.command:
        argv:
          - aws
          - sts
          - get-caller-identity
          - "--region"
          - "{{ satellite_aws_region }}"
          - "--output"
          - json
      register: satellite_aws_identity
      changed_when: false

    - name: PHASE 3 | Verify Satellite ISO exists in S3
      ansible.builtin.command:
        argv:
          - aws
          - s3api
          - head-object
          - "--bucket"
          - "{{ satellite_iso_bucket }}"
          - "--key"
          - "{{ satellite_iso_key }}"
          - "--region"
          - "{{ satellite_aws_region }}"
      register: satellite_iso_head
      changed_when: false

    ###########################################################################
    # PHASE 4 | Download Satellite ISO
    ###########################################################################

    - name: PHASE 4 | Check for previously downloaded Satellite ISO
      ansible.builtin.stat:
        path: "{{ satellite_iso_dest }}"
        checksum_algorithm: sha256
        get_checksum: >-
          {{
            expected_satellite_iso_sha256
            | length > 0
          }}
      register: existing_satellite_iso

    - name: PHASE 4 | Determine whether Satellite ISO download is required
      ansible.builtin.set_fact:
        satellite_iso_download_required: >-
          {{
            not existing_satellite_iso.stat.exists
            or
            (
              expected_satellite_iso_sha256 | length > 0
              and
              existing_satellite_iso.stat.checksum
              | default('')
              != expected_satellite_iso_sha256
            )
          }}

    - name: PHASE 4 | Remove invalid or incomplete Satellite ISO
      ansible.builtin.file:
        path: "{{ satellite_iso_dest }}"
        state: absent
      when: satellite_iso_download_required

    - name: PHASE 4 | Download Satellite ISO from S3
      ansible.builtin.command:
        argv:
          - aws
          - s3
          - cp
          - "{{ satellite_iso_s3_uri }}"
          - "{{ satellite_iso_dest }}"
          - "--region"
          - "{{ satellite_aws_region }}"
          - "--only-show-errors"
      register: satellite_iso_download
      changed_when: true
      when: satellite_iso_download_required

    - name: PHASE 4 | Set Satellite ISO permissions
      ansible.builtin.file:
        path: "{{ satellite_iso_dest }}"
        owner: root
        group: root
        mode: "0644"

    - name: PHASE 4 | Calculate downloaded Satellite ISO checksum
      ansible.builtin.stat:
        path: "{{ satellite_iso_dest }}"
        checksum_algorithm: sha256
        get_checksum: true
      register: downloaded_satellite_iso

    - name: PHASE 4 | Validate downloaded Satellite ISO checksum
      ansible.builtin.assert:
        that:
          - >-
            downloaded_satellite_iso.stat.checksum
            == expected_satellite_iso_sha256
        fail_msg: >-
          Satellite ISO checksum verification failed. Expected
          {{ expected_satellite_iso_sha256 }}, but downloaded
          {{ downloaded_satellite_iso.stat.checksum }}.
      when: expected_satellite_iso_sha256 | length > 0

    ###########################################################################
    # PHASE 4B | Download Satellite subscription manifest
    ###########################################################################

    - name: PHASE 4B | Check for previously downloaded Satellite manifest
      ansible.builtin.stat:
        path: "{{ satellite_manifest_dest }}"
        checksum_algorithm: sha256
        get_checksum: >-
          {{
            expected_satellite_manifest_sha256
            | length > 0
          }}
      register: existing_satellite_manifest

    - name: PHASE 4B | Determine whether manifest download is required
      ansible.builtin.set_fact:
        satellite_manifest_download_required: >-
          {{
            not existing_satellite_manifest.stat.exists
            or
            (
              expected_satellite_manifest_sha256 | length > 0
              and
              existing_satellite_manifest.stat.checksum
              | default('')
              != expected_satellite_manifest_sha256
            )
          }}

    - name: PHASE 4B | Remove invalid or incomplete manifest
      ansible.builtin.file:
        path: "{{ satellite_manifest_dest }}"
        state: absent
      when: satellite_manifest_download_required

    - name: PHASE 4B | Download Satellite manifest from S3
      ansible.builtin.command:
        argv:
          - aws
          - s3
          - cp
          - "{{ satellite_manifest_s3_uri }}"
          - "{{ satellite_manifest_dest }}"
          - "--region"
          - "{{ satellite_aws_region }}"
          - "--only-show-errors"
      register: satellite_manifest_download
      changed_when: true
      when: satellite_manifest_download_required

    - name: PHASE 4B | Set Satellite manifest permissions
      ansible.builtin.file:
        path: "{{ satellite_manifest_dest }}"
        owner: root
        group: root
        mode: "0600"

    - name: PHASE 4B | Calculate downloaded manifest checksum
      ansible.builtin.stat:
        path: "{{ satellite_manifest_dest }}"
        checksum_algorithm: sha256
        get_checksum: true
      register: downloaded_satellite_manifest

    - name: PHASE 4B | Validate downloaded manifest checksum
      ansible.builtin.assert:
        that:
          - >-
            downloaded_satellite_manifest.stat.checksum
            == expected_satellite_manifest_sha256
        fail_msg: >-
          Satellite manifest checksum verification failed. Expected
          {{ expected_satellite_manifest_sha256 }}, but downloaded
          {{ downloaded_satellite_manifest.stat.checksum }}.
      when: expected_satellite_manifest_sha256 | length > 0

    - name: PHASE 4B | Verify manifest is a readable ZIP archive
      ansible.builtin.command:
        argv:
          - unzip
          - "-t"
          - "{{ satellite_manifest_dest }}"
      register: satellite_manifest_zip_test
      changed_when: false

    ###########################################################################
    # PHASE 5 | Mount Satellite ISO
    ###########################################################################

    ###########################################################################
    # PHASE 5 | Mount Satellite ISO
    ###########################################################################

    - name: PHASE 5 | Check whether Satellite ISO mount point is mounted
      ansible.builtin.command:
        argv:
          - findmnt
          - "--mountpoint"
          - "{{ satellite_mount_path }}"
          - "--noheadings"
          - "--output"
          - SOURCE,FSTYPE,OPTIONS
      register: satellite_existing_mount
      changed_when: false
      failed_when: false

    - name: PHASE 5 | Determine current Satellite ISO mount state
      ansible.builtin.set_fact:
        satellite_iso_already_mounted: >-
          {{
            satellite_existing_mount.rc == 0
            and
            satellite_existing_mount.stdout | trim | length > 0
          }}

    - name: PHASE 5 | Create Satellite ISO mount point when not mounted
      ansible.builtin.file:
        path: "{{ satellite_mount_path }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: not satellite_iso_already_mounted

    - name: PHASE 5 | Mount Satellite ISO
      ansible.posix.mount:
        path: "{{ satellite_mount_path }}"
        src: "{{ satellite_iso_dest }}"
        fstype: iso9660
        opts: loop,ro
        state: mounted
      register: satellite_iso_mount

    - name: PHASE 5 | Read mounted Satellite ISO details
      ansible.builtin.command:
        argv:
          - findmnt
          - "--target"
          - "{{ satellite_mount_path }}"
          - "--noheadings"
          - "--output"
          - SOURCE,FSTYPE,OPTIONS,TARGET
      register: satellite_iso_findmnt
      changed_when: false

    - name: PHASE 5 | Verify Satellite ISO is mounted read-only
      ansible.builtin.assert:
        that:
          - satellite_iso_findmnt.rc == 0
          - "'iso9660' in satellite_iso_findmnt.stdout"
          - >-
            satellite_iso_findmnt.stdout
            is search('(^|[, (])ro([, )]|$)')
          - satellite_mount_path in satellite_iso_findmnt.stdout
        fail_msg: |
          The Satellite ISO was not mounted as expected.

          Expected source:
            {{ satellite_iso_dest }}

          Expected mount point:
            {{ satellite_mount_path }}

          Actual findmnt output:
            {{ satellite_iso_findmnt.stdout | default('no output') }}

    - name: PHASE 5 | Verify Satellite package installer exists
      ansible.builtin.stat:
        path: "{{ satellite_mount_path }}/install_packages"
      register: satellite_install_packages_script

    - name: PHASE 5 | Fail when ISO does not contain install_packages
      ansible.builtin.assert:
        that:
          - satellite_install_packages_script.stat.exists
          - satellite_install_packages_script.stat.isreg
        fail_msg: >-
          {{ satellite_mount_path }}/install_packages was not found. Verify that
          {{ satellite_iso_s3_uri }} is the Red Hat Satellite installation DVD
          ISO and not a RHEL Binary DVD or another image.

    ###########################################################################
    # PHASE 6 | Install Satellite RPM packages
    ###########################################################################

    - name: PHASE 6 | Check whether Satellite packages are already installed
      ansible.builtin.command:
        argv:
          - rpm
          - "--query"
          - satellite
      register: installed_satellite_package
      changed_when: false
      failed_when: false

    - name: PHASE 6 | Install packages from mounted Satellite ISO
      ansible.builtin.shell: |
        set -o pipefail

        ./install_packages \
          2>&1 | tee "{{ satellite_package_install_log }}"
      args:
        chdir: "{{ satellite_mount_path }}"
        executable: /bin/bash
      register: satellite_package_install
      changed_when: true
      when: installed_satellite_package.rc != 0

    - name: PHASE 6 | Verify Satellite package installation
      ansible.builtin.command:
        argv:
          - rpm
          - "--query"
          - satellite
      register: verified_satellite_package
      changed_when: false

    - name: PHASE 6 | Locate satellite-installer command
      ansible.builtin.command:
        argv:
          - command
          - "-v"
          - satellite-installer
      register: satellite_installer_command
      changed_when: false

    - name: PHASE 6 | List available Satellite installer scenarios
      ansible.builtin.command:
        argv:
          - satellite-installer
          - "--list-scenarios"
      register: satellite_installer_scenarios
      changed_when: false

    - name: PHASE 6 | Locate satellite-installer command
      ansible.builtin.shell: |
        command -v satellite-installer
      args:
        executable: /bin/bash
      register: satellite_installer_command
      changed_when: false

    - name: PHASE 6 | List available Satellite installer scenarios
      ansible.builtin.command:
        argv:
          - satellite-installer
          - "--list-scenarios"
      environment:
        NO_COLOR: "1"
        TERM: "dumb"
      register: satellite_installer_scenarios
      changed_when: false

    - name: PHASE 6 | Verify Satellite installer scenario is available
      ansible.builtin.assert:
        that:
          - satellite_installer_command.rc == 0
          - satellite_installer_command.stdout | trim | length > 0
          - satellite_installer_scenarios.rc == 0
          - >-
            (
              'satellite (installed)'
              in
              (
                satellite_installer_scenarios.stdout
                | lower
              )
            )
            or
            (
              '--scenario satellite'
              in
              (
                satellite_installer_scenarios.stdout
                | lower
              )
            )
        fail_msg: |
          Satellite installer validation failed.

          Command path:
          {{ satellite_installer_command.stdout | default('not found') | trim }}

          Available scenarios:
          {{ satellite_installer_scenarios.stdout | default('none returned') }}
        success_msg: >-
          satellite-installer is available and the Satellite scenario is
          present or already installed.


    ###########################################################################
    # PHASE 6B | Apply temporary OpenSSL compatibility workaround
    ###########################################################################

    - name: PHASE 6B | Apply Satellite OpenSSL compatibility workaround
      when: satellite_openssl_workaround_enabled | bool
      block:
        - name: PHASE 6B | Read currently installed OpenSSL packages
          ansible.builtin.command:
            argv:
              - rpm
              - -q
              - --qf
              - "%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n"
              - openssl
              - openssl-libs
          register: current_satellite_openssl_packages
          changed_when: false
          failed_when: false

        - name: PHASE 6B | Determine whether OpenSSL remediation is required
          ansible.builtin.set_fact:
            satellite_openssl_remediation_required: >-
              {{
                (
                  'openssl-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                not in
                (
                  current_satellite_openssl_packages.stdout_lines
                  | default([])
                )
                or
                (
                  'openssl-libs-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                not in
                (
                  current_satellite_openssl_packages.stdout_lines
                  | default([])
                )
              }}

        - name: PHASE 6B | Query compatible OpenSSL packages
          ansible.builtin.command:
            argv:
              - dnf
              - repoquery
              - --available
              - --qf
              - "%{name}-%{version}-%{release}.%{arch}"
              - >-
                openssl-{{ satellite_openssl_compatible_version }}.{{ satellite_openssl_arch }}
              - >-
                openssl-libs-{{ satellite_openssl_compatible_version }}.{{ satellite_openssl_arch }}
          register: available_satellite_openssl_packages
          changed_when: false
          failed_when: false
          when: satellite_openssl_remediation_required | bool

        - name: PHASE 6B | Validate compatible OpenSSL package availability
          ansible.builtin.assert:
            that:
              - available_satellite_openssl_packages.rc == 0
              - >-
                (
                  'openssl-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                in
                (
                  available_satellite_openssl_packages.stdout_lines
                  | default([])
                )
              - >-
                (
                  'openssl-libs-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                in
                (
                  available_satellite_openssl_packages.stdout_lines
                  | default([])
                )
            fail_msg: |
              Required Satellite-compatible OpenSSL packages are unavailable.

              Required:
              {{ satellite_openssl_expected_packages | join('\n') }}

              Repository query:
              {{
                available_satellite_openssl_packages.stdout_lines
                | default([])
                | join('\n')
              }}

              Enabled repositories:
              Run:
                dnf repolist
                dnf repoquery --available openssl openssl-libs
          when: satellite_openssl_remediation_required | bool

        - name: PHASE 6B | Downgrade OpenSSL to compatible packages
          ansible.builtin.command:
            argv:
              - dnf
              - install
              - --assumeyes
              - --allowerasing
              - --disableexcludes=all
              - "{{ satellite_openssl_expected_packages[0] }}"
              - "{{ satellite_openssl_expected_packages[1] }}"
          register: satellite_openssl_package_change
          changed_when: >-
            satellite_openssl_package_change.rc == 0
            and
            (
              'Downgraded:' in
              (
                satellite_openssl_package_change.stdout
                | default('')
              )
              or
              'Installed:' in
              (
                satellite_openssl_package_change.stdout
                | default('')
              )
            )
          failed_when: satellite_openssl_package_change.rc != 0
          when: satellite_openssl_remediation_required | bool

        - name: PHASE 6B | Reboot after replacing OpenSSL libraries
          ansible.builtin.reboot:
            msg: >-
              Rebooting after applying the temporary Satellite OpenSSL
              compatibility workaround
            reboot_timeout: 1200
            connect_timeout: 10
            pre_reboot_delay: 5
            post_reboot_delay: 30
            test_command: "systemctl is-system-running --wait"
          when:
            - satellite_openssl_package_change is defined
            - satellite_openssl_package_change.changed

        - name: PHASE 6B | Reset SSH connection after reboot
          ansible.builtin.meta: reset_connection
          when:
            - satellite_openssl_package_change is defined
            - satellite_openssl_package_change.changed

        - name: PHASE 6B | Refresh gathered facts after reboot
          ansible.builtin.setup:
          when:
            - satellite_openssl_package_change is defined
            - satellite_openssl_package_change.changed

        - name: PHASE 6B | Read final OpenSSL package versions
          ansible.builtin.command:
            argv:
              - rpm
              - -q
              - --qf
              - "%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n"
              - openssl
              - openssl-libs
          register: final_satellite_openssl_packages
          changed_when: false

        - name: PHASE 6B | Validate compatible OpenSSL packages
          ansible.builtin.assert:
            that:
              - >-
                (
                  'openssl-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                in final_satellite_openssl_packages.stdout_lines
              - >-
                (
                  'openssl-libs-'
                  ~ satellite_openssl_compatible_version
                  ~ '.'
                  ~ satellite_openssl_arch
                )
                in final_satellite_openssl_packages.stdout_lines
            fail_msg: |
              Satellite-compatible OpenSSL packages were not installed.

              Expected:
              {{ satellite_openssl_expected_packages | join('\n') }}

              Installed:
              {{
                final_satellite_openssl_packages.stdout_lines
                | default([])
                | join('\n')
              }}

        - name: PHASE 6B | Read system OpenSSL version
          ansible.builtin.command:
            argv:
              - openssl
              - version
              - -a
          register: satellite_openssl_runtime
          changed_when: false

        - name: PHASE 6B | Read Ansible Python OpenSSL runtime
          ansible.builtin.command:
            argv:
              - "{{ ansible_python.executable | default('/usr/bin/python3') }}"
              - -c
              - >-
                import ssl;
                print(ssl.OPENSSL_VERSION);
                print(ssl._OPENSSL_API_VERSION)
          register: satellite_python_openssl_runtime
          changed_when: false

        - name: PHASE 6B | Verify Python SSL module loads successfully
          ansible.builtin.command:
            argv:
              - "{{ ansible_python.executable | default('/usr/bin/python3') }}"
              - -c
              - >-
                import ssl;
                context = ssl.create_default_context();
                print(type(context).__name__)
          register: satellite_python_ssl_context_check
          changed_when: false
          failed_when: satellite_python_ssl_context_check.rc != 0

        - name: PHASE 6B | Report OpenSSL compatibility state
          ansible.builtin.debug:
            msg:
              - >-
                Installed RPMs:
                {{
                  final_satellite_openssl_packages.stdout_lines
                }}
              - >-
                OpenSSL runtime:
                {{
                  satellite_openssl_runtime.stdout_lines
                  | default([])
                  | first
                  | default('unknown')
                }}
              - >-
                Python runtime:
                {{
                  satellite_python_openssl_runtime.stdout_lines
                  | default([])
                }}
              - >-
                Python SSL context:
                {{
                  satellite_python_ssl_context_check.stdout
                  | default('unavailable')
                }}
              - >-
                Reboot performed:
                {{
                  satellite_openssl_package_change.changed
                  | default(false)
                }}


    ###########################################################################
    # PHASE 7 | Determine current installation state
    ###########################################################################

    - name: PHASE 7 | Check for existing Satellite installer answer file
      ansible.builtin.stat:
        path: "{{ satellite_install_complete_marker }}"
      register: satellite_answer_file

    - name: PHASE 7 | Check current Satellite HTTPS endpoint
      ansible.builtin.uri:
        url: "https://{{ satellite_fqdn }}/users/login"
        method: GET
        validate_certs: false
        follow_redirects: all
        status_code:
          - 200
          - 301
          - 302
          - 401
          - 403
          - 422
          - 503
        timeout: 30
      register: existing_satellite_endpoint
      changed_when: false
      failed_when: false

    - name: PHASE 7 | Determine whether Satellite installer must run
      ansible.builtin.set_fact:
        satellite_installer_required: >-
          {{
            not satellite_answer_file.stat.exists
            or
            existing_satellite_endpoint.status
            | default(0)
            not in [200, 301, 302, 401, 403, 422]
          }}

    ###########################################################################
    # PHASE 8 | Configure Satellite
    ###########################################################################

    - name: PHASE 8 | Run Satellite installer
      ansible.builtin.command:
        argv:
          - satellite-installer
          - "--scenario"
          - satellite
          - "--foreman-initial-admin-username"
          - "{{ satellite_admin_username }}"
          - "--foreman-initial-admin-password"
          - "{{ satellite_admin_password }}"
          - "--foreman-initial-organization"
          - "{{ satellite_organization }}"
          - "--foreman-initial-location"
          - "{{ satellite_location }}"
      async: 7200
      poll: 30
      register: satellite_installer_output
      changed_when: true
      no_log: true
      when: satellite_installer_required

    - name: PHASE 8 | Verify Satellite installer answer file exists
      ansible.builtin.stat:
        path: "{{ satellite_install_complete_marker }}"
      register: completed_satellite_answer_file

    - name: PHASE 8 | Assert Satellite installer completed
      ansible.builtin.assert:
        that:
          - completed_satellite_answer_file.stat.exists
        fail_msg: >-
          Satellite installation did not create
          {{ satellite_install_complete_marker }}. Review
          {{ satellite_installer_log }}.

    ###########################################################################
    # PHASE 8B | Install public ACM TLS certificate
    ###########################################################################

    - name: PHASE 8B | Create persistent Satellite TLS directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - "{{ satellite_tls_directory }}"
        - "{{ satellite_tls_system_ca_parts_directory }}"
        - "{{ satellite_tls_acm_chain_parts_directory }}"

    - name: PHASE 8B | Read currently served Satellite certificate
      ansible.builtin.shell: |
        set -euo pipefail

        openssl s_client \
          -connect 127.0.0.1:443 \
          -servername "{{ satellite_public_tls_fqdn }}" \
          -showcerts \
          </dev/null 2>/dev/null |
          awk '
            /-----BEGIN CERTIFICATE-----/ {
              capture = 1
            }

            capture {
              print
            }

            /-----END CERTIFICATE-----/ {
              exit
            }
          '
      args:
        executable: /bin/bash
      register: satellite_current_tls_certificate_pem
      changed_when: false
      failed_when: false

    - name: PHASE 8B | Write currently served Satellite certificate
      ansible.builtin.copy:
        content: |
          {{ satellite_current_tls_certificate_pem.stdout | trim }}
        dest: "{{ satellite_tls_current_certificate_path }}"
        owner: root
        group: root
        mode: "0644"
      when:
        - >-
          satellite_current_tls_certificate_pem.stdout
          | default('')
          | trim
          | length > 0

    - name: PHASE 8B | Read current Satellite certificate fingerprint
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ satellite_tls_current_certificate_path }}"
          - -noout
          - -fingerprint
          - -sha256
      register: satellite_current_tls_fingerprint
      changed_when: false
      failed_when: false
      when:
        - >-
          satellite_current_tls_certificate_pem.stdout
          | default('')
          | trim
          | length > 0

    - name: PHASE 8B | Normalize current Satellite certificate fingerprint
      ansible.builtin.set_fact:
        satellite_current_tls_sha256: >-
          {{
            satellite_current_tls_fingerprint.stdout
            | default('')
            | regex_replace('^.*=', '')
            | regex_replace(':', '')
            | trim
            | upper
          }}

    - name: PHASE 8B | Create local ACM staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: "{{ satellite_tls_local_staging_prefix }}"
      delegate_to: localhost
      become: false
      register: satellite_tls_local_staging
      no_log: true

    - name: PHASE 8B | Export and deploy ACM certificate
      block:
        #######################################################################
        # Export ACM material on the Ansible controller
        #######################################################################

        - name: PHASE 8B | Generate ACM export passphrase
          ansible.builtin.set_fact:
            satellite_acm_export_passphrase: >-
              {{
                lookup(
                  'ansible.builtin.password',
                  '/dev/null',
                  length=64,
                  chars=['ascii_letters', 'digits']
                )
              }}
          no_log: true

        - name: PHASE 8B | Write local ACM export passphrase
          ansible.builtin.copy:
            content: "{{ satellite_acm_export_passphrase }}"
            dest: "{{ satellite_tls_local_staging.path }}/passphrase"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: PHASE 8B | Export Satellite certificate from ACM
          ansible.builtin.command:
            argv: >-
              {{
                [
                  'aws',
                  'acm',
                  'export-certificate',
                  '--certificate-arn',
                  satellite_acm_certificate_arn,
                  '--passphrase',
                  'fileb://' ~ satellite_tls_local_staging.path ~ '/passphrase',
                  '--region',
                  satellite_aws_region,
                  '--output',
                  'json',
                  '--no-cli-pager'
                ]
                +
                (
                  ['--profile', aws_profile]
                  if aws_profile | default('') | trim | length > 0
                  else []
                )
              }}
          delegate_to: localhost
          become: false
          register: satellite_acm_export_result
          changed_when: false
          no_log: true

        - name: PHASE 8B | Parse exported ACM certificate
          ansible.builtin.set_fact:
            satellite_acm_exported_certificate: >-
              {{
                satellite_acm_export_result.stdout
                | from_json
              }}
          no_log: true

        - name: PHASE 8B | Validate exported ACM material
          ansible.builtin.assert:
            that:
              - >-
                satellite_acm_exported_certificate.Certificate
                | default('')
                | length > 0
              - >-
                satellite_acm_exported_certificate.CertificateChain
                | default('')
                | length > 0
              - >-
                satellite_acm_exported_certificate.PrivateKey
                | default('')
                | length > 0
            fail_msg: >-
              ACM did not return a certificate, certificate chain, and
              encrypted private key.
          no_log: true

        - name: PHASE 8B | Write exported ACM leaf certificate locally
          ansible.builtin.copy:
            content: |
              {{ satellite_acm_exported_certificate.Certificate | trim }}
            dest: "{{ satellite_tls_local_staging.path }}/satellite_cert.pem"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: PHASE 8B | Write exported ACM chain locally
          ansible.builtin.copy:
            content: |
              {{ satellite_acm_exported_certificate.CertificateChain | trim }}
            dest: "{{ satellite_tls_local_staging.path }}/acm_chain.pem"
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        - name: PHASE 8B | Write encrypted ACM private key locally
          ansible.builtin.copy:
            content: |
              {{ satellite_acm_exported_certificate.PrivateKey | trim }}
            dest: >-
              {{ satellite_tls_local_staging.path }}/satellite_cert_key.encrypted
            mode: "0600"
          delegate_to: localhost
          become: false
          no_log: true

        #######################################################################
        # Validate the ACM certificate before changing Satellite
        #######################################################################

        - name: PHASE 8B | Validate ACM certificate hostname
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ satellite_tls_local_staging.path }}/satellite_cert.pem"
              - -noout
              - -checkhost
              - "{{ satellite_public_tls_fqdn }}"
          delegate_to: localhost
          become: false
          register: satellite_acm_hostname_check
          changed_when: false
          failed_when: satellite_acm_hostname_check.rc != 0

        - name: PHASE 8B | Validate ACM certificate remaining lifetime
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ satellite_tls_local_staging.path }}/satellite_cert.pem"
              - -noout
              - -checkend
              - "{{ satellite_tls_minimum_validity_seconds | string }}"
          delegate_to: localhost
          become: false
          register: satellite_acm_validity_check
          changed_when: false
          failed_when: satellite_acm_validity_check.rc != 0

        - name: PHASE 8B | Read exported ACM fingerprint
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "{{ satellite_tls_local_staging.path }}/satellite_cert.pem"
              - -noout
              - -fingerprint
              - -sha256
          delegate_to: localhost
          become: false
          register: satellite_acm_fingerprint
          changed_when: false

        - name: PHASE 8B | Normalize exported ACM fingerprint
          ansible.builtin.set_fact:
            satellite_acm_tls_sha256: >-
              {{
                satellite_acm_fingerprint.stdout
                | default('')
                | regex_replace('^.*=', '')
                | regex_replace(':', '')
                | trim
                | upper
              }}

        - name: PHASE 8B | Validate exported ACM fingerprint
          ansible.builtin.assert:
            that:
              - satellite_acm_fingerprint.rc == 0
              - satellite_acm_tls_sha256 | length == 64
              - satellite_acm_tls_sha256 is match('^[0-9A-F]{64}$')
            fail_msg: >-
              Could not determine a valid SHA-256 fingerprint for the
              exported Satellite ACM certificate.

        - name: PHASE 8B | Determine whether Satellite TLS update is required
          ansible.builtin.set_fact:
            satellite_public_tls_install_required: >-
              {{
                satellite_force_public_tls_install | bool
                or
                (
                  satellite_current_tls_sha256
                  | default('')
                )
                !=
                satellite_acm_tls_sha256
              }}

        - name: PHASE 8B | Report Satellite TLS state
          ansible.builtin.debug:
            msg:
              - "TLS FQDN: {{ satellite_public_tls_fqdn }}"
              - "ACM ARN: {{ satellite_acm_certificate_arn }}"
              - >-
                Current fingerprint:
                {{
                  satellite_current_tls_sha256
                  | default('not detected')
                }}
              - "ACM fingerprint: {{ satellite_acm_tls_sha256 }}"
              - >-
                Certificate update required:
                {{ satellite_public_tls_install_required }}

        #######################################################################
        # Install persistent certificate files on Satellite
        #######################################################################

        - name: PHASE 8B | Install ACM leaf certificate
          ansible.builtin.copy:
            src: "{{ satellite_tls_local_staging.path }}/satellite_cert.pem"
            dest: "{{ satellite_tls_certificate_path }}"
            owner: root
            group: root
            mode: "0644"
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Install ACM certificate chain
          ansible.builtin.copy:
            src: "{{ satellite_tls_local_staging.path }}/acm_chain.pem"
            dest: "{{ satellite_tls_acm_chain_path }}"
            owner: root
            group: root
            mode: "0644"
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Install encrypted ACM private key temporarily
          ansible.builtin.copy:
            src: >-
              {{ satellite_tls_local_staging.path }}/satellite_cert_key.encrypted
            dest: "{{ satellite_tls_private_key_path }}.encrypted"
            owner: root
            group: root
            mode: "0600"
          when: satellite_public_tls_install_required
          no_log: true

        - name: PHASE 8B | Install temporary ACM passphrase
          ansible.builtin.copy:
            content: "{{ satellite_acm_export_passphrase }}"
            dest: "{{ satellite_tls_directory }}/.acm-passphrase"
            owner: root
            group: root
            mode: "0600"
          when: satellite_public_tls_install_required
          no_log: true

        - name: PHASE 8B | Decrypt ACM private key
          ansible.builtin.command:
            argv:
              - openssl
              - pkey
              - -in
              - "{{ satellite_tls_private_key_path }}.encrypted"
              - -out
              - "{{ satellite_tls_private_key_path }}"
              - -passin
              - "file:{{ satellite_tls_directory }}/.acm-passphrase"
          register: satellite_acm_key_decrypt
          changed_when: satellite_acm_key_decrypt.rc == 0
          failed_when: satellite_acm_key_decrypt.rc != 0
          when: satellite_public_tls_install_required
          no_log: true

        - name: PHASE 8B | Secure unencrypted Satellite private key
          ansible.builtin.file:
            path: "{{ satellite_tls_private_key_path }}"
            state: file
            owner: root
            group: root
            mode: "0600"
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Verify Satellite private key is unencrypted
          ansible.builtin.command:
            argv:
              - openssl
              - pkey
              - -in
              - "{{ satellite_tls_private_key_path }}"
              - -noout
              - -check
              - -passin
              - "pass:"
          register: satellite_unencrypted_key_check
          changed_when: false
          failed_when: satellite_unencrypted_key_check.rc != 0
          when: satellite_public_tls_install_required
          no_log: true

        #######################################################################
        # Verify key and certificate match
        #######################################################################

        - name: PHASE 8B | Read certificate public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl x509 \
              -in "{{ satellite_tls_certificate_path }}" \
              -noout \
              -pubkey |
              openssl pkey \
                -pubin \
                -outform DER |
              openssl dgst -sha256
          args:
            executable: /bin/bash
          register: satellite_certificate_public_key_hash
          changed_when: false
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Read private key public key hash
          ansible.builtin.shell: |
            set -euo pipefail

            openssl pkey \
              -in "{{ satellite_tls_private_key_path }}" \
              -pubout \
              -outform DER |
              openssl dgst -sha256
          args:
            executable: /bin/bash
          register: satellite_private_key_public_key_hash
          changed_when: false
          when: satellite_public_tls_install_required
          no_log: true

        - name: PHASE 8B | Verify Satellite certificate and key match
          ansible.builtin.assert:
            that:
              - >-
                (
                  satellite_certificate_public_key_hash.stdout
                  | regex_replace('^.*=', '')
                  | trim
                  | lower
                )
                ==
                (
                  satellite_private_key_public_key_hash.stdout
                  | regex_replace('^.*=', '')
                  | trim
                  | lower
                )
            fail_msg: >-
              The exported ACM certificate and private key do not match.
          when: satellite_public_tls_install_required
          no_log: true

        #######################################################################
        # Build Satellite CA bundle: root first, then intermediates
        #######################################################################

        - name: PHASE 8B | Build complete Satellite CA bundle
          ansible.builtin.shell: |
            set -euo pipefail

            python3 - \
              "{{ satellite_tls_acm_chain_path }}" \
              "/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem" \
              "{{ satellite_tls_ca_bundle_path }}" <<'PYTHON'
            import pathlib
            import re
            import subprocess
            import sys
            import tempfile

            chain_path = pathlib.Path(sys.argv[1])
            system_bundle_path = pathlib.Path(sys.argv[2])
            output_path = pathlib.Path(sys.argv[3])

            pem_pattern = re.compile(
                r"-----BEGIN CERTIFICATE-----.*?"
                r"-----END CERTIFICATE-----",
                re.DOTALL,
            )

            def read_certificates(path):
                return pem_pattern.findall(
                    path.read_text(
                        encoding="utf-8",
                        errors="replace",
                    )
                )

            def certificate_field(pem, field):
                with tempfile.NamedTemporaryFile(
                    mode="w",
                    suffix=".pem",
                ) as handle:
                    handle.write(pem.strip() + "\n")
                    handle.flush()

                    result = subprocess.run(
                        [
                            "openssl",
                            "x509",
                            "-in",
                            handle.name,
                            "-noout",
                            f"-{field}",
                            "-nameopt",
                            "RFC2253",
                        ],
                        check=True,
                        text=True,
                        capture_output=True,
                    )

                return result.stdout.strip().split("=", 1)[-1]

            chain = read_certificates(chain_path)
            system_roots = read_certificates(system_bundle_path)

            if not chain:
                raise SystemExit(
                    f"No CA certificates found in {chain_path}"
                )

            chain_details = [
                {
                    "pem": pem,
                    "subject": certificate_field(pem, "subject"),
                    "issuer": certificate_field(pem, "issuer"),
                }
                for pem in chain
            ]

            system_root_details = [
                {
                    "pem": pem,
                    "subject": certificate_field(pem, "subject"),
                    "issuer": certificate_field(pem, "issuer"),
                }
                for pem in system_roots
            ]

            subjects = {
                item["subject"]
                for item in chain_details
            }

            highest_intermediate = next(
                (
                    item
                    for item in chain_details
                    if item["issuer"] not in subjects
                ),
                chain_details[-1],
            )

            root = next(
                (
                    item
                    for item in system_root_details
                    if
                    item["subject"] == highest_intermediate["issuer"]
                    and
                    item["subject"] == item["issuer"]
                ),
                None,
            )

            if root is None:
                raise SystemExit(
                    "Could not find the public root CA in the "
                    "RHEL system trust store. Required subject: "
                    f"{highest_intermediate['issuer']}"
                )

            ordered_intermediates = []
            current_subject = highest_intermediate["subject"]

            while True:
                current = next(
                    (
                        item
                        for item in chain_details
                        if item["subject"] == current_subject
                    ),
                    None,
                )

                if current is None:
                    break

                ordered_intermediates.insert(0, current)

                child = next(
                    (
                        item
                        for item in chain_details
                        if item["issuer"] == current["subject"]
                    ),
                    None,
                )

                if child is None:
                    break

                current_subject = child["subject"]

            bundle = [root["pem"]]
            bundle.extend(
                item["pem"]
                for item in ordered_intermediates
            )

            output_path.write_text(
                "\n".join(
                    certificate.strip()
                    for certificate in bundle
                )
                + "\n",
                encoding="utf-8",
            )

            output_path.chmod(0o644)

            print(
                f"Created CA bundle with {len(bundle)} certificates"
            )
            PYTHON
          args:
            executable: /bin/bash
          register: satellite_ca_bundle_build
          changed_when: >-
            'Created CA bundle'
            in (satellite_ca_bundle_build.stdout | default(''))
          failed_when: satellite_ca_bundle_build.rc != 0
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Verify ACM certificate chain
