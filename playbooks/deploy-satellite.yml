              - "{{ satellite_tls_certificate_path }}"
          register: satellite_tls_chain_validation
          changed_when: false
          failed_when: satellite_tls_chain_validation.rc != 0
          when: satellite_public_tls_install_required

        #######################################################################
        # Validate and deploy through supported Satellite tooling
        #######################################################################

        - name: PHASE 8B | Validate custom Satellite TLS files
          ansible.builtin.command:
            argv:
              - katello-certs-check
              - "-t"
              - satellite
              - "-b"
              - "{{ satellite_tls_ca_bundle_path }}"
              - "-c"
              - "{{ satellite_tls_certificate_path }}"
              - "-k"
              - "{{ satellite_tls_private_key_path }}"
          register: satellite_katello_certs_check
          changed_when: false
          failed_when: satellite_katello_certs_check.rc != 0
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Deploy public ACM certificate to Satellite
          ansible.builtin.command:
            argv:
              - satellite-installer
              - "--certs-server-cert"
              - "{{ satellite_tls_certificate_path }}"
              - "--certs-server-key"
              - "{{ satellite_tls_private_key_path }}"
              - "--certs-server-ca-cert"
              - "{{ satellite_tls_ca_bundle_path }}"
              - "--certs-update-server"
              - "--certs-update-server-ca"
          async: 3600
          poll: 30
          register: satellite_public_tls_installer
          changed_when: satellite_public_tls_installer.rc == 0
          failed_when: satellite_public_tls_installer.rc != 0
          when: satellite_public_tls_install_required
          no_log: false


        - name: PHASE 8B | Wait for Satellite TCP port 443
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 443
            state: started
            delay: 5
            timeout: 300
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Wait for a parseable Satellite TLS certificate
          ansible.builtin.shell: |
            set -euo pipefail

            certificate="$(
              timeout 15 \
                openssl s_client \
                  -connect 127.0.0.1:443 \
                  -servername "{{ satellite_public_tls_fqdn }}" \
                  </dev/null 2>/dev/null
            )"

            test -n "${certificate}"

            printf '%s\n' "${certificate}" |
              openssl x509 \
                -noout \
                -subject \
                -issuer \
                -serial \
                -dates
          args:
            executable: /bin/bash
          register: satellite_tls_certificate_parse_check
          changed_when: false
          failed_when: false
          retries: 30
          delay: 10
          until: satellite_tls_certificate_parse_check.rc == 0
          when: satellite_public_tls_install_required



        - name: PHASE 8B | Wait for Satellite HTTPS after TLS update
          ansible.builtin.uri:
            url: "https://{{ satellite_public_tls_fqdn }}/users/login"
            method: GET
            validate_certs: true
            follow_redirects: all
            status_code:
              - 200
              - 301
              - 302
              - 401
              - 403
              - 422
            timeout: 60
          register: satellite_public_tls_https_check
          retries: 30
          delay: 20
          until: >-
            satellite_public_tls_https_check.status
            in [200, 301, 302, 401, 403, 422]
          changed_when: false

        #######################################################################
        # Validate and deploy through supported Satellite tooling
        #######################################################################

        - name: PHASE 8B | Wait for Satellite HTTPS after TLS update
          ansible.builtin.uri:
            url: "https://{{ satellite_public_tls_fqdn }}/users/login"
            method: GET
            validate_certs: false
            follow_redirects: all
            status_code:
              - 200
              - 301
              - 302
              - 401
              - 403
              - 422
              - 503
            timeout: 60
            return_content: false
          register: satellite_public_tls_https_check
          retries: 30
          delay: 20
          until: >-
            satellite_public_tls_https_check.status
            | default(0)
            | int
            in [200, 301, 302, 401, 403, 422]
          changed_when: false
          when: satellite_public_tls_install_required

        - name: PHASE 8B | Deploy public ACM certificate to Satellite
          ansible.builtin.command:
            argv:
              - satellite-installer
              - "--certs-server-cert"
              - "{{ satellite_tls_certificate_path }}"
              - "--certs-server-key"
              - "{{ satellite_tls_private_key_path }}"
              - "--certs-server-ca-cert"
              - "{{ satellite_tls_ca_bundle_path }}"
              - "--certs-update-server"
              - "--certs-update-server-ca"
          async: 3600
          poll: 30
          register: satellite_public_tls_installer
          changed_when: satellite_public_tls_installer.rc == 0
          failed_when: satellite_public_tls_installer.rc != 0
          when: satellite_public_tls_install_required
          no_log: false

        - name: PHASE 8B | Wait for Satellite HTTPS after TLS update
          ansible.builtin.uri:
            url: "https://{{ satellite_public_tls_fqdn }}/users/login"
            method: GET
            validate_certs: true
            follow_redirects: all
            status_code:
              - 200
