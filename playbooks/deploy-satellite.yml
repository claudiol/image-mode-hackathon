---
###############################################################################
# Deploy Red Hat Satellite 6.19.x
#
# Role:
#   roles/deploy_satellite
#
# Controller-side requirements:
#   - AWS CLI
#   - Access to AWS Secrets Manager
#   - Access to ACM when public TLS installation is enabled
#
# Target-side requirements:
#   - RHEL 9
#   - EC2 instance profile with S3 read access to the Satellite ISO/manifest
###############################################################################

- name: Deploy Red Hat Satellite
  hosts: satellite
  become: true
  gather_facts: true
  any_errors_fatal: true

  pre_tasks:
    ###########################################################################
    # Validate required deployment data
    ###########################################################################

    - name: PRE | Validate required Satellite deployment variables
      ansible.builtin.assert:
        that:
          - satellite_fqdn | length > 0
          - satellite_fqdn is match('^[A-Za-z0-9][A-Za-z0-9.-]+$')
          - satellite_iso_bucket | length > 0
          - satellite_iso_key | length > 0
          - satellite_manifest_bucket | length > 0
          - satellite_manifest_key | length > 0
          - satellite_admin_username | length > 0
          - satellite_organization | length > 0
          - satellite_location | length > 0
          - satellite_secret_prefix | length > 0
          - satellite_aws_region | length > 0
          - not satellite_manage_public_tls | bool or satellite_public_tls_fqdn | length > 0
          - not satellite_manage_public_tls | bool or satellite_acm_certificate_arn | length > 0
          - not satellite_configure_idm | bool or satellite_idm_host | length > 0
          - not satellite_configure_idm | bool or satellite_idm_domain_name | length > 0
        fail_msg: >-
          One or more required Satellite deployment variables are missing or
          invalid. Verify the Terraform-generated inventory and AAP survey
          values.

    - name: PRE | Verify target operating system
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
          - ansible_facts.distribution_major_version == "9"
        fail_msg: >-
          This Satellite deployment requires Red Hat Enterprise Linux 9.
          Detected {{ ansible_facts.distribution }}
          {{ ansible_facts.distribution_version }}.

    ###########################################################################
    # Read administrator credentials on the controller
    ###########################################################################

    - name: PRE | Read Satellite administrator password
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'secretsmanager',
              'get-secret-value',
              '--secret-id',
              satellite_admin_password_secret_name,
              '--region',
              satellite_aws_region,
              '--query',
              'SecretString',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_admin_password_result
      changed_when: false
      no_log: true

    - name: PRE | Set Satellite administrator password
      ansible.builtin.set_fact:
        satellite_admin_password: "{{ satellite_admin_password_result.stdout | trim }}"
      no_log: true

    - name: PRE | Validate Satellite administrator password
      ansible.builtin.assert:
        that:
          - satellite_admin_password | length >= 16
        fail_msg: >-
          The Satellite administrator password could not be retrieved from
          {{ satellite_admin_password_secret_name }}.
      no_log: true

    - name: PRE | Read IdM administrator password
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'secretsmanager',
              'get-secret-value',
              '--secret-id',
              satellite_idm_admin_password_secret_name,
              '--region',
              satellite_aws_region,
              '--query',
              'SecretString',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_idm_admin_password_result
      changed_when: false
      no_log: true
      when: satellite_configure_idm | bool

    - name: PRE | Set IdM LDAP bind password
      ansible.builtin.set_fact:
        satellite_idm_bind_password: >-
          {{ satellite_idm_admin_password_result.stdout | trim }}
      no_log: true
      when: satellite_configure_idm | bool

    - name: PRE | Verify ACM certificate is issued
      ansible.builtin.command:
        argv: >-
          {{
            [
              'aws',
              'acm',
              'describe-certificate',
              '--certificate-arn',
              satellite_acm_certificate_arn,
              '--region',
              satellite_aws_region,
              '--query',
              'Certificate.Status',
              '--output',
              'text'
            ]
            +
            (
              ['--profile', aws_profile]
              if aws_profile | default('') | trim | length > 0
              else []
            )
          }}
      delegate_to: localhost
      become: false
      register: satellite_acm_certificate_status
      changed_when: false
      failed_when: >-
        satellite_acm_certificate_status.rc != 0
        or satellite_acm_certificate_status.stdout | trim != 'ISSUED'
      when: satellite_manage_public_tls | bool

  roles:
    - role: deploy_satellite
