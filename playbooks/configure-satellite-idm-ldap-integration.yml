---
- name: Configure Satellite LDAP authentication against IdM
  hosts: satellite
  become: false
  gather_facts: false

  vars:
    idm_admin_user: "admin"

    # IdM directory layout (mirrors the base-DN idiom in configure-aap-idm-sso.yml).
    idm_base_dn: "{{ idm_domain_name.split('.') | map('regex_replace', '^(.*)$', 'dc=\\1') | join(',') }}"
    ldap_accounts_base: "cn=accounts,{{ idm_base_dn }}"
    ldap_groups_base: "cn=groups,cn=accounts,{{ idm_base_dn }}"

    # Dedicated LDAP bind service account (ephemeral password, reset each run).
    satellite_bind_user: "svc-satellite-bind"
    satellite_bind_dn: "uid={{ satellite_bind_user }},cn=users,cn=accounts,{{ idm_base_dn }}"

    # IdM access groups that gate Satellite login and role mapping.
    satellite_users_group: "satellite-users"
    satellite_admins_group: "satellite-admins"

    satellite_url: "https://{{ inventory_hostname }}"

  pre_tasks:
    - name: Validate required inventory variables
      ansible.builtin.assert:
        that:
          - aws_region is defined
          - aws_region | length > 0
          - aws_profile is defined
          - aws_profile | length > 0
          - secret_prefix is defined
          - secret_prefix | length > 0
          - idm_server_fqdn is defined
          - idm_server_fqdn | length > 0
          - idm_domain_name is defined
          - idm_domain_name | length > 0
          - groups['idm'] is defined
          - groups['idm'] | length > 0
        fail_msg: "Missing required inventory variables (aws_region, aws_profile, secret_prefix, idm_server_fqdn, idm_domain_name, and an [idm] group)."

    - name: Read IdM admin password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/idm/admin_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: idm_admin_password_result
      changed_when: false
      no_log: true

    - name: Read Satellite admin username from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/satellite/admin_username"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: satellite_admin_username_result
      changed_when: false
      no_log: true

    - name: Read Satellite admin password from AWS Secrets Manager
      ansible.builtin.command:
        argv:
          - aws
          - secretsmanager
          - get-secret-value
          - --secret-id
          - "{{ secret_prefix }}/satellite/admin_password"
          - --region
          - "{{ aws_region }}"
          - --profile
          - "{{ aws_profile }}"
          - --query
          - SecretString
          - --output
          - text
      delegate_to: localhost
      become: false
      register: satellite_admin_password_result
      changed_when: false
      no_log: true

    - name: Set secret facts
      ansible.builtin.set_fact:
        idm_admin_password: "{{ idm_admin_password_result.stdout }}"
        satellite_admin_username: "{{ satellite_admin_username_result.stdout }}"
        satellite_admin_password: "{{ satellite_admin_password_result.stdout }}"
      no_log: true

    - name: Generate Satellite LDAP bind password for this run
      ansible.builtin.set_fact:
        satellite_bind_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      no_log: true

  tasks:
    - name: Ensure IdM groups and Satellite bind account exist
      ansible.builtin.shell: |
        set -euo pipefail

        echo "{{ idm_admin_password }}" | kinit "{{ idm_admin_user }}"

        # Access / role-mapping groups (idempotent).
        ipa group-show "{{ satellite_users_group }}" >/dev/null 2>&1 \
          || ipa group-add "{{ satellite_users_group }}" --desc="Members may log in to Satellite (viewer)"
        ipa group-show "{{ satellite_admins_group }}" >/dev/null 2>&1 \
          || ipa group-add "{{ satellite_admins_group }}" --desc="Members receive Satellite administrator rights"

        # Nest admins inside users so admins also satisfy the login filter.
        ipa group-add-member "{{ satellite_users_group }}" --groups="{{ satellite_admins_group }}" >/dev/null 2>&1 || true

        # Dedicated LDAP bind account with an ephemeral password (regenerated each run).
        if ipa user-show "{{ satellite_bind_user }}" >/dev/null 2>&1; then
          printf '%s\n%s\n' "{{ satellite_bind_password }}" "{{ satellite_bind_password }}" | ipa passwd "{{ satellite_bind_user }}"
        else
          printf '%s\n%s\n' "{{ satellite_bind_password }}" "{{ satellite_bind_password }}" | ipa user-add "{{ satellite_bind_user }}" \
            --first="Satellite" \
            --last="Bind" \
            --shell="/sbin/nologin" \
            --password
        fi

        ipa user-mod "{{ satellite_bind_user }}" --setattr=nsaccountlock=FALSE || true

        kdestroy
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      no_log: true

    - name: Read the IdM CA certificate from the IdM server
      ansible.builtin.slurp:
        src: /etc/ipa/ca.crt
      delegate_to: "{{ groups['idm'][0] }}"
      become: true
      register: idm_ca_cert
      changed_when: false

    - name: Install the IdM CA into the Satellite trust store
      ansible.builtin.copy:
        dest: /etc/pki/ca-trust/source/anchors/idm-ca.crt
        owner: root
        group: root
        mode: "0644"
        content: "{{ idm_ca_cert.content | b64decode }}"
      become: true
      register: idm_ca_copy

    - name: Refresh the Satellite CA trust store
      ansible.builtin.command:
        argv:
          - update-ca-trust
      become: true
      changed_when: idm_ca_copy.changed

    - name: Create IdM LDAP authentication source in Satellite
      redhat.satellite.auth_source_ldap:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_admin_username }}"
        password: "{{ satellite_admin_password }}"
        validate_certs: false
        name: "IdM"
        host: "{{ idm_server_fqdn }}"
        port: 636
        tls: true
        server_type: free_ipa
        account: "{{ satellite_bind_dn }}"
        account_password: "{{ satellite_bind_password }}"
        base_dn: "{{ ldap_accounts_base }}"
        groups_base: "{{ ldap_groups_base }}"
        attr_login: uid
        attr_firstname: givenName
        attr_lastname: sn
        attr_mail: mail
        ldap_filter: >-
          (memberOf=cn={{ satellite_users_group }},{{ ldap_groups_base }})
        onthefly_register: true
        usergroup_sync: true
        state: present
      no_log: true

    - name: Create Satellite usergroup for IdM viewers
      redhat.satellite.usergroup:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_admin_username }}"
        password: "{{ satellite_admin_password }}"
        validate_certs: false
        name: "idm-satellite-users"
        roles:
          - Viewer
        state: present

    - name: Create Satellite usergroup for IdM administrators
      redhat.satellite.usergroup:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_admin_username }}"
        password: "{{ satellite_admin_password }}"
        validate_certs: false
        name: "idm-satellite-admins"
        admin: true
        state: present

    - name: Link IdM group satellite-users to Satellite usergroup
      redhat.satellite.external_usergroup:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_admin_username }}"
        password: "{{ satellite_admin_password }}"
        validate_certs: false
        usergroup: "idm-satellite-users"
        auth_source: "IdM"
        name: "{{ satellite_users_group }}"
        state: present

    - name: Link IdM group satellite-admins to Satellite usergroup
      redhat.satellite.external_usergroup:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_admin_username }}"
        password: "{{ satellite_admin_password }}"
        validate_certs: false
        usergroup: "idm-satellite-admins"
        auth_source: "IdM"
        name: "{{ satellite_admins_group }}"
        state: present

    - name: Show integration summary
      ansible.builtin.debug:
        msg:
          - "Satellite LDAP auth source 'IdM' configured against {{ idm_server_fqdn }}:636 (LDAPS)."
          - "Login gated by IdM group: {{ satellite_users_group }} (filter enforced)."
          - "Role mapping: {{ satellite_users_group }} -> Viewer, {{ satellite_admins_group }} -> Administrator."
          - "Bind account: {{ satellite_bind_dn }} (password regenerated each run)."
          - "Test: ipa group-add-member {{ satellite_users_group }} --users=<user>, then log in to the Satellite UI."