---
controller_credential_types:
  - name: Red Hat Registry Credential
    description: Injects registry.redhat.io credentials for Image Mode builds
    kind: cloud
    inputs:
      fields:
        - id: redhat_registry_host
          type: string
          label: Red Hat Registry Host
        - id: redhat_registry_username
          type: string
          label: Red Hat Registry Username
        - id: redhat_registry_password
          type: string
          label: Red Hat Registry Password
          secret: true
      required:
        - redhat_registry_host
        - redhat_registry_username
        - redhat_registry_password
    injectors:
      extra_vars:
        redhat_registry_host: "{% raw %}{{ redhat_registry_host }}{% endraw %}"
        redhat_registry_username: "{% raw %}{{ redhat_registry_username }}{% endraw %}"
        redhat_registry_password: "{% raw %}{{ redhat_registry_password }}{% endraw %}"

  - name: Quay Registry Credential
    description: Injects Quay credentials for Image Mode publishing and deployment
    kind: cloud
    inputs:
      fields:
        - id: quay_registry_host
          type: string
          label: Quay Registry Host
        - id: quay_registry_username
          type: string
          label: Quay Username
        - id: quay_registry_password
          type: string
          label: Quay Password
          secret: true
      required:
        - quay_registry_host
        - quay_registry_username
        - quay_registry_password
    injectors:
      extra_vars:
        quay_registry_host: "{% raw %}{{ quay_registry_host }}{% endraw %}"
        quay_registry_username: "{% raw %}{{ quay_registry_username }}{% endraw %}"
        quay_registry_password: "{% raw %}{{ quay_registry_password }}{% endraw %}"