---
controller_credential_types:
  ###########################################################################
  # Red Hat Registry
  ###########################################################################

  - name: Red Hat Registry Credential
    description: >-
      Injects registry.redhat.io credentials for RHEL Image Mode builds.
    kind: cloud

    inputs:
      fields:
        - id: redhat_registry_host
          type: string
          label: Red Hat Registry Host

        - id: redhat_registry_username
          type: string
          label: Red Hat Registry Username

        - id: redhat_registry_password
          type: string
          label: Red Hat Registry Password
          secret: true

      required:
        - redhat_registry_host
        - redhat_registry_username
        - redhat_registry_password

    injectors:
      extra_vars:
        redhat_registry_host: >-
          {% raw %}{{ redhat_registry_host }}{% endraw %}

        redhat_registry_username: >-
          {% raw %}{{ redhat_registry_username }}{% endraw %}

        redhat_registry_password: >-
          {% raw %}{{ redhat_registry_password }}{% endraw %}

  ###########################################################################
  # Quay Registry
  ###########################################################################

  - name: Quay Registry Credential
    description: >-
      Injects Quay registry credentials for Image Mode image publishing
      and deployment.
    kind: cloud

    inputs:
      fields:
        - id: quay_registry_host
          type: string
          label: Quay Registry Host

        - id: quay_registry_username
          type: string
          label: Quay Registry Username

        - id: quay_registry_password
          type: string
          label: Quay Registry Password
          secret: true

      required:
        - quay_registry_host
        - quay_registry_username
        - quay_registry_password

    injectors:
      extra_vars:
        quay_registry_host: >-
          {% raw %}{{ quay_registry_host }}{% endraw %}

        quay_registry_username: >-
          {% raw %}{{ quay_registry_username }}{% endraw %}

        quay_registry_password: >-
          {% raw %}{{ quay_registry_password }}{% endraw %}

  ###########################################################################
  # Red Hat Identity Management administrator
  ###########################################################################

  - name: IdM Administrator Credential
    description: >-
      Injects the Red Hat Identity Management administrator principal and
      password for IdM and FreeIPA administration tasks.
    kind: cloud

    inputs:
      fields:
        - id: idm_admin_username
          type: string
          label: IdM Administrator Username
          help_text: >-
            IdM administrative principal, normally admin.

        - id: idm_admin_password
          type: string
          label: IdM Administrator Password
          secret: true

      required:
        - idm_admin_username
        - idm_admin_password

    injectors:
      extra_vars:
        idm_admin_username: >-
          {% raw %}{{ idm_admin_username }}{% endraw %}

        idm_admin_password: >-
          {% raw %}{{ idm_admin_password }}{% endraw %}

        ipaadmin_principal: >-
          {% raw %}{{ idm_admin_username }}{% endraw %}

        ipaadmin_password: >-
          {% raw %}{{ idm_admin_password }}{% endraw %}

  ###########################################################################
  # AWS IAM service account
  ###########################################################################

  - name: AWS IAM Service Account Credential
    description: >-
      Injects AWS IAM service-account credentials used by Image Mode
      automation to access Amazon S3, initiate VM Import/Export operations,
      inspect AMI import tasks, and perform other approved AWS API actions.
    kind: cloud

    inputs:
      fields:
        - id: aws_access_key_id
          type: string
          label: AWS Access Key ID
          help_text: >-
            Access-key ID belonging to the Terraform-created Image Mode
            automation IAM user.

        - id: aws_secret_access_key
          type: string
          label: AWS Secret Access Key
          secret: true
          help_text: >-
            Secret access key belonging to the Terraform-created Image Mode
            automation IAM user.

        - id: aws_region
          type: string
          label: AWS Region
          help_text: >-
            Default AWS region used by Image Mode automation.

      required:
        - aws_access_key_id
        - aws_secret_access_key
        - aws_region

    injectors:
      env:
        AWS_ACCESS_KEY_ID: >-
          {% raw %}{{ aws_access_key_id }}{% endraw %}

        AWS_SECRET_ACCESS_KEY: >-
          {% raw %}{{ aws_secret_access_key }}{% endraw %}

        AWS_REGION: >-
          {% raw %}{{ aws_region }}{% endraw %}

        AWS_DEFAULT_REGION: >-
          {% raw %}{{ aws_region }}{% endraw %}

      extra_vars:
        aws_access_key_id: >-
          {% raw %}{{ aws_access_key_id }}{% endraw %}

        aws_secret_access_key: >-
          {% raw %}{{ aws_secret_access_key }}{% endraw %}

        aws_region: >-
          {% raw %}{{ aws_region }}{% endraw %}

        aws_default_region: >-
          {% raw %}{{ aws_region }}{% endraw %}