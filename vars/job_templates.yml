---
controller_templates:

  - name: Build Image
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Builders"
    playbook: "playbooks/image_mode/build-image.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Image Mode Red Hat Registry Credential"
      - "Image Mode Quay Registry Credential"

  - name: Publish Image
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Builders"
    playbook: "playbooks/image_mode/publish-image.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Image Mode Quay Registry Credential"

  - name: Deploy Development
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Mode Development"
    playbook: "playbooks/image_mode/deploy-dev.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Image Mode Quay Registry Credential"

  - name: Deploy Production
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Mode Production"
    playbook: "playbooks/image_mode/deploy-prod.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Image Mode Quay Registry Credential"

  - name: Bootc Update
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Mode Development"
    playbook: "playbooks/image_mode/bootc-update.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Quay Registry Credential"

  - name: Validate Image
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Mode Development"
    playbook: "playbooks/image_mode/validate-image.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"

  - name: Rollback
    organization: "Image Mode Lab"
    project: "Image Mode CI/CD"
    inventory: "Image Mode Development"
    playbook: "playbooks/image_mode/rollback.yml"
    execution_environment: "Image Mode EE"
    credentials:
      - "AWS Machine Credential"
      - "Image Mode Quay Registry Credential"