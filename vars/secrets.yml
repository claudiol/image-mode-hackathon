aap_fqdn: "aap.demo.lab.com"
aap_controller_ip: "3.141.7.11"

gateway_admin_password: "2.slkGOI"

controller_username: "admin"
controller_password: "{{ gateway_admin_password }}"
controller_validate_certs: false


# =============================================================================
# Git Source Control Credential
# =============================================================================

git_username: "CHANGE_ME"
git_token: "CHANGE_ME"


# =============================================================================
# Red Hat Registry Credential
# Used to pull official RHEL Image Mode bootc base images
# =============================================================================

redhat_registry_host: "registry.redhat.io"
redhat_registry_username: "rh-ee-phduncan"
redhat_registry_password: "Kyerenduncan@1906"


# =============================================================================
# Quay Registry Credential
# Used to publish custom Image Mode images
# =============================================================================

quay_registry_host: "quay.io"
quay_registry_username: "CHANGE_ME"
quay_registry_password: "CHANGE_ME"


# =============================================================================
# AWS Machine Credential
# Used by AAP to connect to Image Mode build/deployment hosts
# =============================================================================

aws_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  CHANGE_ME
  -----END OPENSSH PRIVATE KEY-----


# =============================================================================
# Image Mode Git Repository
# =============================================================================

image_mode_repo_url: "https://github.com/YOUR_ORG/YOUR_REPO.git"
image_mode_repo_branch: "main"


# =============================================================================
# Image Mode Execution Environment
# =============================================================================

image_mode_ee_image: "quay.io/YOUR_ORG/image-mode-ee:latest"


# =============================================================================
# RHEL Image Mode Version Selection
#
# Supported:
#   rhel_version: "9"
#   rhel_version: "10"
#
# This controls:
#   - registry.redhat.io bootc base image
#   - Quay destination image name
# =============================================================================

rhel_version: "10"


# Official Red Hat bootc source images

image_mode_base_image_map:
  "9": "registry.redhat.io/rhel9/rhel-bootc:latest"
  "10": "registry.redhat.io/rhel10/rhel-bootc:latest"


# Published Image Mode images

image_mode_registry_image_map:
  "9": "quay.io/philip860/rhel9-image-mode"
  "10": "quay.io/philip860/rhel10-image-mode"


# Resolved Image Mode values

image_mode_base_image: "{{ image_mode_base_image_map[rhel_version | string] }}"

image_mode_registry_image: "{{ image_mode_registry_image_map[rhel_version | string] }}"


# Image lifecycle tag
#
# Examples:
#   dev
#   test
#   prod
#   v1.0.0

image_mode_image_tag: "dev"
