---
controller_credentials:
  - name: AWS Machine Credential
    organization: "Image Mode Lab"
    credential_type: Machine
    inputs:
      username: ec2-user
      ssh_key_data: "{{ aws_ssh_private_key }}"

  - name: Git Credential
    organization: "Image Mode Lab"
    credential_type: Source Control
    inputs:
      username: "{{ git_username }}"
      password: "{{ git_token }}"

  - name: Red Hat Registry Credential
    organization: "Image Mode Lab"
    credential_type: Container Registry
    inputs:
      host: "{{ redhat_registry_host | default('registry.redhat.io') }}"
      username: "{{ redhat_registry_username }}"
      password: "{{ redhat_registry_password }}"

  - name: Quay Registry Credential
    organization: "Image Mode Lab"
    credential_type: Container Registry
    inputs:
      host: "{{ quay_registry_host | default('quay.io') }}"
      username: "{{ quay_registry_username }}"
      password: "{{ quay_registry_password }}"