---
controller_credentials:
  ###########################################################################
  # Terraform-generated SSH machine credential
  ###########################################################################

  - name: Image Mode Machine Credential
    description: >-
      Terraform-generated SSH private key used to connect to AWS EC2 hosts
      over their VPC private addresses.
    organization: "Image Mode Lab"
    credential_type: Machine
    inputs:
      username: ec2-user
      ssh_key_data: "{{ image_mode_ssh_private_key }}"

  ###########################################################################
  # Git source control credential
  ###########################################################################

  - name: Git Credential
    description: >-
      Source control credentials for the Image Mode Git repository.
    organization: "Image Mode Lab"
    credential_type: Source Control
    inputs:
      username: "{{ git_username }}"
      password: "{{ git_token }}"

  ###########################################################################
  # Red Hat registry credential
  ###########################################################################

  - name: Image Mode Red Hat Registry Credential
    description: >-
      Registry credentials used to pull supported Red Hat container images.
    organization: "Image Mode Lab"
    credential_type: Red Hat Registry Credential
    inputs:
      redhat_registry_host: "{{ redhat_registry_host }}"
      redhat_registry_username: "{{ redhat_registry_username }}"
      redhat_registry_password: "{{ redhat_registry_password }}"

  ###########################################################################
  # Quay registry credential
  ###########################################################################

  - name: Image Mode Quay Registry Credential
    description: >-
      Dedicated LDAP registry credentials used to push and pull Image Mode
      container images from Quay.
    organization: "Image Mode Lab"
    credential_type: Quay Registry Credential
    inputs:
      quay_registry_host: "{{ resolved_quay_hostname }}"
      quay_registry_username: "{{ quay_registry_username }}"
      quay_registry_password: "{{ quay_registry_password }}"

  ###########################################################################
  # Red Hat Identity Management administrator credential
  ###########################################################################

  - name: Image Mode IdM Administrator Credential
    description: >-
      IdM administrator credentials retrieved from AWS Secrets Manager and
      injected into IdM administration job templates.
    organization: "Image Mode Lab"
    credential_type: IdM Administrator Credential
    inputs:
      idm_admin_username: "{{ idm_admin_username }}"
      idm_admin_password: "{{ idm_admin_password }}"