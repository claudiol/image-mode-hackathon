---
controller_credentials:
  ###########################################################################
  # Terraform-generated SSH machine credential
  ###########################################################################

  - name: Image Mode Machine Credential
    organization: "Image Mode Lab"
    credential_type: Machine
    inputs:
      username: ec2-user
      ssh_key_data: "{{ image_mode_ssh_private_key }}"

  ###########################################################################
  # Git source control credential
  ###########################################################################

  - name: Git Credential
    organization: "Image Mode Lab"
    credential_type: Source Control
    inputs:
      username: "{{ git_username }}"
      password: "{{ git_token }}"

  ###########################################################################
  # Red Hat registry credential
  ###########################################################################

  - name: Image Mode Red Hat Registry Credential
    organization: "Image Mode Lab"
    credential_type: Red Hat Registry Credential
    inputs:
      redhat_registry_host: "{{ redhat_registry_host }}"
      redhat_registry_username: "{{ redhat_registry_username }}"
      redhat_registry_password: "{{ redhat_registry_password }}"

  ###########################################################################
  # Quay registry credential
  ###########################################################################

  - name: Image Mode Quay Registry Credential
    organization: "Image Mode Lab"
    credential_type: Quay Registry Credential
    inputs:
      quay_registry_host: "{{ resolved_quay_hostname }}"
      quay_registry_username: "{{ quay_registry_username }}"
      quay_registry_password: "{{ quay_registry_password }}"
