---
controller_inventories:
  - name: "Image Mode Lab Infrastructure"
    description: "All infrastructure hosts generated by Terraform"
    organization: "Image Mode Lab"
    variables:
      aws_region: "{{ aws_region }}"
      aws_profile: "{{ aws_profile }}"
      secret_prefix: "{{ secret_prefix }}"
      parent_domain_name: "{{ parent_domain_name }}"
      idm_domain_name: "{{ idm_domain_name }}"
      idm_realm_name: "{{ idm_realm_name }}"

  - name: "Image Builders"
    description: "Terraform-generated hosts used to build Image Mode images"
    organization: "Image Mode Lab"
    variables:
      image_mode_base_image: "{{ image_mode_base_image }}"
      image_mode_registry_image: "{{ image_mode_registry_image }}"
      image_mode_image_tag: "{{ image_mode_image_tag }}"

  - name: "Image Mode Development"
    description: "Development Image Mode deployment hosts"
    organization: "Image Mode Lab"
    variables:
      image_mode_environment: development

  - name: "Image Mode Production"
    description: "Production Image Mode deployment hosts"
    organization: "Image Mode Lab"
    variables:
      image_mode_environment: production